why:["Right medication = one of the original six rights.","Right patient = one of the original six rights.","Right documentation = one of the original six rights.","✓ Blueprint Module 3 adds: 'Right reason and Right response' to the traditional six rights. Right reason = there must be a valid clinical indication. Right response = monitor for expected therapeutic effect and adverse effects."],
rat:"Traditional 6 Rights: patient, drug, dose, route, time, documentation. Blueprint adds: Right reason (clinical indication verified) and Right response (monitor effect). These additions shift from task-completion to clinical reasoning — especially critical for IV medications where effects are immediate.",
pearl:"Applying all 8 rights to IV therapy prevents: administering IV medications with no documented indication, administering without monitoring for response, or failing to reassess after administration. For high-alert IV medications, 'Right reason' prevents unnecessary administration that could cause harm."},

{id:177,mod:1,type:"mcq",
stem:"'The Dying Person's Bill of Rights.' Which principle is foundational to this concept?",
opts:["The dying patient forfeits decision-making rights when they become incapacitated","The dying patient has the right to be treated as a living human being with dignity until death","Family members make all decisions for dying patients regardless of the patient's expressed wishes","Aggressive life-prolonging treatment must always be attempted regardless of prognosis"],
ans:1,
why:["Incapacity requires a surrogate decision-maker but does not eliminate the patient's dignity or rights.","✓ The Dying Person's Bill of Rights holds that dying patients have the right to be treated as living human beings — with dignity, honesty, and respect — until the moment of death.","Family input is valuable but the patient's expressed wishes take precedence while they have capacity.","The Dying Person's Bill of Rights includes the right to choose palliative care and to refuse unwanted interventions."],
rat:"The Dying Person's Bill of Rights includes: right to be treated as a living person, right to maintain hope, right to be free from pain, right to honest answers, right to participate in care decisions, right to die in peace and dignity, right to not die alone. These principles guide nursing care.",
pearl:"Nurses can advocate for the dying patient's rights by: ensuring pain is adequately managed, facilitating honest communication, supporting patient choice, honoring advance directives, providing spiritual/emotional support, and ensuring the patient is not left alone near the end of life."},

{id:178,mod:2,type:"mcq",
stem:"The nurse's FIRST PRIORITY in caring for a patient with an altered level of consciousness is:",
opts:["Obtain a complete medication history","Maintain a PATENT AIRWAY — the brain requires oxygen","Insert an indwelling urinary catheter","Perform a complete neurological assessment"],
ans:1,
why:["Medication history is important but is not the immediate first priority.","✓ Brunner Ch. 61: 'The first priority of treatment for the patient with altered LOC is to obtain and maintain a patent airway.' ABC — Airway first, always.","Urinary catheter is a secondary intervention.","Neurological assessment is essential but airway takes precedence."],
rat:"Brunner Ch. 61 medical management of altered LOC: 'The first priority is to obtain and maintain a patent airway. The patient may be orally or nasally intubated, or a tracheostomy may be performed. Until the ability of the patient to breathe is determined, a mechanical ventilator is used.'",
pearl:"Altered LOC nursing priorities follow ABC: Airway (patent? protective reflexes intact? intubation needed?) → Breathing (rate, depth, pattern, O2 sat?) → Circulation (BP, HR, perfusion?) → Disability (GCS, pupils, motor response) → Exposure (full assessment). This is the ABCDE approach used in all acute assessments."},

{id:179,mod:2,type:"mcq",
stem:"A nurse auscultates an abnormal turbulent sound during systole at the left sternal border in a client with a history of rheumatic heart disease. Which term does the nurse use to document this finding?",
opts:["Normal valve closure creating S1 and S2","Abnormal, TURBULENT flow of blood in the heart","Electrical conduction abnormalities in the AV node","Pericardial inflammation causing friction"],

rat:"Murmurs result from turbulent blood flow through: narrowed (stenotic) valves, incompetent (regurgitant) valves, septal defects (VSD, ASD), or high-flow states (anemia, fever, pregnancy — 'innocent' murmurs). Characterized by: timing (systolic/diastolic), quality, intensity (grade I–VI), location, radiation.",
pearl:"All diastolic murmurs are pathological. Systolic murmurs may be innocent (no structural abnormality) or pathological. Innocent murmurs: soft (grade I–II), short, no radiation, no associated symptoms, no structural abnormality on echo. Common in children, athletes, pregnant women, and high-output states."},

pearl:"Patient education principle: explain the 'why' behind every intervention. Patients who understand the reason for their treatment are more cooperative and have better outcomes. Use plain language ('goes straight into your bloodstream immediately' rather than 'bypasses first-pass hepatic metabolism')."}

{id:181,mod:1,type:"mcq",

opts:["Clarifying","Directing/Focusing","General Lead","Sequencing"],

why:["Clarifying = trying to understand what was said more clearly.","Directing/Focusing = asking for elaboration on a specific topic — this guides the conversation.","✓ Lecture notes: 'General Leads: Encouraging the patient to continue talking.' Examples: 'Go on…', 'I see…', 'Tell me more.'","Sequencing = making sure you understand the steps in a process."],
rat:"General leads are minimal encouragers that signal the nurse is listening and invite the patient to continue at their own pace without redirection. They are useful when the patient needs space to process difficult emotions or complex information.",

{id:182,mod:1,type:"mcq",
stem:"A client near the end of life states, 'I've made my peace. I'm ready to go.' Which stage of grief best describes this response, and what is the most therapeutic nursing action?",
opts:["Depression — encourage the patient to talk about their sadness","Denial — gently help the patient face reality","Acceptance — be present, affirm the patient's peace, and ask what they need","Bargaining — explore what conditions the patient is placing on their acceptance"],

why:["Depression = intense sadness and withdrawal — not equanimity.","Denial = refusing to accept the diagnosis — this patient clearly accepts it.","✓ Acceptance = patient has processed grief and faces death with peace. Therapeutic response: be present, honor this state, and ask how to best support the patient.","Bargaining = 'if...then' conditions — this patient expresses readiness without conditions."],
rat:"Acceptance is not giving up — it is a state of peace with the reality of death. The nurse's role is to honor that peace, remain present, and support meaningful use of remaining time. Avoid projecting sadness onto a patient who has reached acceptance.",
pearl:"Not all patients reach acceptance, and forcing it is never therapeutic. For those who do, quiet presence and willingness to sit with the patient are more valuable than any intervention. Some of the most profound nursing moments are silent ones."},

{id:183,mod:1,type:"mcq",
stem:"Which is the correct description of THERAPEUTIC SILENCE as a communication technique?",

why:["Silence communicates presence and attentiveness when used intentionally — not disinterest.","Silence is explicitly listed as a therapeutic technique in the lecture notes.","✓ Lecture notes: 'Silence: Therapeutic listening.' Intentional silence lets the patient think, feel, and respond at their own pace.","Therapeutic silence is an intentional clinical skill — not a default."],
rat:"Therapeutic silence: the nurse remains present with eye contact and open body language while allowing the patient time to process. Many patients need silence after sharing something difficult. Premature verbal filling of silence can interrupt important patient processing.",
pearl:"Brief silence (5–10 seconds) after an emotional disclosure communicates 'I'm with you in this.' Learn to distinguish productive therapeutic silence from uncomfortable social silence — the difference is intentionality and body language. Don't rush to fill every pause."},

{id:184,mod:1,type:"sata",

{id:185,mod:1,type:"mcq",
stem:"A nurse is counseling a client who is weighing surgical options. Which response by the nurse best demonstrates patient advocacy?",
opts:["'Surgery is your only choice — you need this operation.'","'If you don't have surgery, you may not live to see your grandchildren.'","'Whether or not you have the surgery is your choice. It is your body.'","'Your family needs you to make the right decision.'"],
ans:2,
why:["This removes patient choice — coercion, not advocacy.","This uses fear to pressure the patient — emotional manipulation.","✓ The PPTX lists this exact statement as the therapeutic, advocacy-based response: it respects autonomy and supports the patient's right to decide.","Invoking family obligation to pressure a decision = manipulation, not advocacy."],
rat:"Patient advocacy = supporting the patient's RIGHT to self-determination, even when you disagree with their choice. A nurse who uses fear, guilt, or authority to override a patient's decision violates both the advocacy role and the ethical principle of autonomy.",
pearl:"Therapeutic advocacy in action: provide accurate information, ensure the patient understands options and consequences, verify the decision is free of coercion, document the informed decision-making process. Your role is to inform and support — not to decide for the patient."},

{id:186,mod:1,type:"mcq",
stem:"The four illness trajectories include sudden death, terminal illness (e.g., cancer), organ failure, and frailty. Which trajectory is characterized by a SLOW DECLINE OVER YEARS from an already frail baseline?",

ans:3,
why:["Sudden death = unexpected death — no trajectory of decline.","Terminal illness (cancer) = high function for a period, then rapid decline near death.","Organ failure = slow decline with episodic crises, each recovery less complete (HF, COPD, kidney disease).","✓ Brunner Ch. 13: 'Frailty (e.g., dementia) is typically diagnosed when one is already frail, with a slow decline over years.'"],
rat:"Understanding illness trajectories helps nurses anticipate care needs and timing for goals-of-care conversations. Frailty patients may have a very long trajectory — years of gradual decline — requiring sustained support and repeated goals-of-care discussions as functional status changes.",
pearl:"The frailty trajectory is often associated with dementia, failure to thrive, and multimorbidity in elderly patients. Unlike cancer, there is rarely a clear 'turning point.' Hospice eligibility for dementia patients requires: FAST Stage 7C or beyond, plus at least one complication (aspiration pneumonia, UTI, pressure ulcer, fever)."},

{id:187,mod:1,type:"mcq",
stem:"A nurse is helping a bereaved family understand the difference between grief and mourning. Which statement correctly describes mourning?",
opts:["Mourning = internal emotional reaction to loss","Mourning = the period during which grieving takes place","Mourning = individual, family, group, and cultural expressions of grief and associated behaviors","Mourning = a coordinated program of interdisciplinary care for the terminally ill"],
ans:2,
why:["Internal emotional reaction to loss = GRIEF.","Period during which grieving takes place = BEREAVEMENT.","✓ Chapter 44 PPTX and Brunner Ch. 13: 'Mourning: individual, family, group, and cultural expressions of grief and associated behaviors.' Mourning is the outward, observable expression.","Coordinated interdisciplinary care program = HOSPICE or PALLIATIVE CARE."],
rat:"Key grief terminology: Grief = internal feelings (invisible). Mourning = outward expressions and behaviors (visible — crying, rituals, ceremonies). Bereavement = the time period after a loss during which mourning occurs. Dysfunctional grief = unresolved or inhibited, may require professional support.",
pearl:"Cultural expressions of mourning vary enormously — some cultures are demonstrative (communal gathering, loud expression), others are quiet and private. Always ask about and respect cultural mourning practices. Create private space for families to express grief in their own culturally appropriate way."},

{id:188,mod:2,type:"mcq",
stem:"EJECTION FRACTION (EF) is defined as:",
opts:["Total volume of blood in the left ventricle at end of diastole","Percentage of the end-diastolic blood volume ejected from the ventricle with each heartbeat","Resistance to ejection of blood from the ventricle","Pressure in the ventricle at the end of systole"],
ans:1,
why:["Total volume at end diastole = end-diastolic volume (EDV) — not EF.","✓ Brunner Ch. 21: 'Ejection fraction: percentage of the end-diastolic blood volume ejected from the ventricle with each heartbeat.' Normal EF = 55–70%.","Resistance to ejection = AFTERLOAD.","Ventricular pressure at end of systole = end-systolic pressure — not EF."],
rat:"EF is a key cardiac function indicator measured by echocardiogram. Normal EF 55–70%. Heart failure with reduced EF (HFrEF) = EF <40% (systolic dysfunction). Heart failure with preserved EF (HFpEF) = EF ≥50% with HF symptoms (diastolic dysfunction).",
pearl:"EF guides HF treatment: HFrEF (EF <40%) → ACE inhibitors/ARBs, beta-blockers, diuretics, aldosterone antagonists, SGLT2 inhibitors. HFpEF (EF ≥50%) → rate control, treat underlying HTN/DM/AF, diuretics for congestion. Knowing EF directs therapy."},

{id:189,mod:2,type:"mcq",
stem:"What is the key difference between SYNCHRONIZED CARDIOVERSION and DEFIBRILLATION?",
opts:["They are the same procedure with different energy levels","Cardioversion is synchronized to the QRS complex; defibrillation is unsynchronized and not timed to the QRS","Defibrillation uses lower energy; cardioversion uses higher energy","Cardioversion is only used for ventricular arrhythmias"],
ans:1,
why:["They are distinct procedures with different indications and techniques.","✓ Brunner Ch. 22: 'Cardioversion: electrical current given in synchrony with the patient's own QRS complex. Defibrillation: electrical current given to stop an arrhythmia, not synchronized with the patient's QRS complex.'","Defibrillation typically uses higher energy, not lower.","Cardioversion is used for tachyarrhythmias WITH a pulse — AFib, flutter, SVT, stable VT."],
rat:"Synchronized cardioversion: shock timed to the R wave to avoid the T wave (vulnerable period — shock on T can induce VFib). Used for unstable tachyarrhythmias with a pulse. Defibrillation: unsynchronized, delivered immediately — used for VFib and pulseless VT where no organized QRS exists.",
pearl:"When setting up synchronized cardioversion, confirm the 'SYNC' mode is activated on the defibrillator before charging and delivering the shock. If accidental unsynchronized shock occurs during AFib/flutter, it can precipitate VFib. Always verbally confirm sync mode is on before delivery."},

{id:190,mod:2,type:"mcq",
stem:"The neurotransmitter GABA (gamma-aminobutyric acid) has which primary action?",
opts:["Usually excitatory; major parasympathetic transmitter","Usually inhibitory; affects behavior, attention, and fine movement","Inhibitory; controls mood, sleep, and pain inhibition","Inhibitory; located in nerve terminals of the spinal cord and cerebellum"],
ans:3,
why:["Excitatory + parasympathetic = acetylcholine.","Behavior/attention/fine movement = dopamine.","Mood/sleep/pain = serotonin.","✓ Brunner Ch. 60 neurotransmitter table: 'GABA: Source = nerve terminals of the spinal cord, cerebellum. Action = inhibitory.' GABA is the primary inhibitory neurotransmitter of the CNS."],
rat:"Brunner Ch. 60 neurotransmitter table: Acetylcholine = excitatory/parasympathetic. Serotonin = inhibitory, mood/sleep/pain. Dopamine = inhibitory, behavior/fine movement. Norepinephrine = excitatory, sympathetic. GABA = inhibitory, spinal cord/cerebellum.",
pearl:"GABA is targeted by many medications: benzodiazepines and barbiturates enhance GABA activity → sedation, anxiolysis, anticonvulsant effect. Alcohol also enhances GABA. GABA deficiency is implicated in anxiety disorders, seizures, and insomnia. Baclofen is a GABA-B agonist used for spasticity."},

{id:191,mod:2,type:"mcq",
stem:"What is the appropriate first-line treatment for SYMPTOMATIC SINUS BRADYCARDIA (HR 38, hypotension, altered mental status)?",
opts:["Immediate synchronized cardioversion","Amiodarone 300 mg IV push","Atropine 0.5 mg IV — may repeat up to total dose of 3 mg","Adenosine 6 mg IV rapid push"],
ans:2,
why:["Cardioversion is for tachyarrhythmias — not bradycardia.","Amiodarone is an antiarrhythmic for ventricular and supraventricular tachyarrhythmias — not bradycardia.","✓ Cardiac Rhythms lecture and ACLS: symptomatic bradycardia → atropine 0.5 mg IV, repeat every 3–5 minutes, max 3 mg total. If atropine fails → transcutaneous pacing → dopamine/epinephrine infusion.","Adenosine slows conduction (treats SVT) — would worsen bradycardia."],
rat:"Atropine mechanism: blocks vagal (parasympathetic) tone on the SA and AV nodes → increases heart rate and conduction speed. Works best for vagally mediated bradycardia and sinus bradycardia. Less effective for infranodal (below AV node) blocks like Mobitz II or 3rd degree block.",
pearl:"If atropine fails or the patient is severely compromised: initiate transcutaneous pacing immediately. Place pads, set rate (typically 60–80 bpm), increase output (mA) until electrical capture (wide QRS with T wave after each pacing spike). Verify mechanical capture by palpating a pulse. Transcutaneous pacing is uncomfortable — provide analgesia/sedation."},

{id:192,mod:2,type:"mcq",
stem:"Barrel chest in emphysema results from which mechanism?",
opts:["Fluid accumulation in the pleural space causing outward expansion","Chronic hyperinflation leading to a more fixed inspiratory rib position, plus loss of lung elasticity","Cardiac enlargement pushing outward on the chest wall","Increased respiratory muscle mass from years of labored breathing"],
ans:1,
why:["Pleural fluid = pleural effusion — causes dullness to percussion, not barrel chest.","✓ Brunner pgs. 606–608: 'In patients with COPD who have a primary emphysematous component, chronic hyperinflation leads to the barrel chest thorax configuration. This results from a more fixed position of the ribs in the inspiratory position (due to hyperinflation) and from loss of lung elasticity.'","Cardiomegaly causes cardiac silhouette enlargement on CXR — not barrel chest.","Respiratory muscle hypertrophy does not cause the rib cage to permanently expand."],
rat:"Barrel chest: AP diameter equals or exceeds transverse diameter (normal ratio ~1:2). The ribs are horizontally positioned instead of angled. On inspection: rounded, hyperinflated chest. On percussion: hyperresonance throughout. Associated with accessory muscle use, prolonged expiration, and tripod positioning.",
pearl:"COPD posture (Brunner Fig. 20-4): patient leans forward, uses accessory muscles of respiration, forces shoulder girdle upward, supraclavicular fossae retract on inspiration. Teaching: pursed-lip breathing (maintains positive airway pressure, prevents small airway collapse, slows exhalation to allow more complete CO2 elimination)."},

{id:193,mod:2,type:"mcq",
stem:"Which describes LOCKED-IN SYNDROME?",
opts:["A state where the patient is wakeful but devoid of conscious content or cognitive function","A condition from a lesion in the PONS causing paralysis and inability to speak, but cognition is INTACT — eye movements allow communication","Irreversible loss of all functions of the entire brain including the brain stem","An acute confused state that begins with disorientation"],
ans:1,
why:["Wakeful but no conscious content = persistent vegetative state.","✓ Brunner Ch. 61 glossary: 'Locked-in syndrome: condition resulting from a lesion in the pons in which the patient lacks all distal motor activity (paralysis) but cognition is intact.' Eye movements (vertical) are typically preserved and allow communication.","Irreversible loss of all brain function including brain stem = brain death.","Acute disorientation = delirium."],
rat:"Locked-in syndrome: the patient is cognitively FULLY INTACT but cannot move or speak. They experience and understand everything happening around them. Communication via eye movements (blink once for yes, twice for no) is critical. This has profound nursing implications — always speak to and about these patients with full respect.",
pearl:"Brunner also distinguishes: Coma (unarousable), Persistent Vegetative State (sleep-wake cycles but no cognitive content), Minimally Conscious State (some reproducible signs of awareness but cannot communicate), Locked-in Syndrome (full cognition, no motor output except eye movement). Each requires different assessment and communication approaches."},

{id:194,mod:2,type:"mcq",
stem:"A patient with METABOLIC ALKALOSIS develops tingling of the fingers and toes and muscle cramping (tetany). What is the physiologic mechanism?",
opts:["Hyperkalemia causing increased neuromuscular excitability","Alkalosis causes calcium ions to bind to plasma proteins, decreasing free ionized calcium (hypocalcemia)","Hypernatremia directly stimulates nerve endings","Metabolic alkalosis causes direct peripheral nerve irritation"],
ans:1,
why:["Alkalosis causes hypokalemia (not hyperkalemia) as H+ leaves cells and K+ enters cells.","✓ Brunner Ch. 10: 'In alkalosis, H+ ions are decreased. Calcium ions bind to proteins. As calcium ions bind to proteins, free Ca²⁺ ions decrease and hypocalcemia develops. Alkalosis is primarily manifested by symptoms related to hypocalcemia — tingling and tetany.'","Hypernatremia causes different neurological symptoms.","The mechanism is specifically ionized calcium decrease — not direct nerve irritation."],
rat:"Alkalosis → calcium binds to albumin → ionized (free) calcium decreases → neuromuscular excitability increases → tingling, carpopedal spasm, tetany, seizures (in severe cases). This is the same mechanism as true hypocalcemia. Chvostek's sign (facial twitch with tapping) and Trousseau's sign (carpal spasm with BP cuff inflation) assess for this.",
pearl:"Chvostek's sign: tap the facial nerve anterior to the ear → facial muscle twitch = positive (hypocalcemia). Trousseau's sign: inflate BP cuff above systolic for 3 min → carpal spasm = positive (hypocalcemia). Both indicate low ionized calcium — check in patients with alkalosis, hypoparathyroidism, or post-parathyroidectomy."},

{id:195,mod:3,type:"mcq",
stem:"Which action VIOLATES aseptic technique during peripheral IV insertion?",
opts:["Applying chlorhexidine with back-and-forth friction for 30 seconds and allowing to air dry","Wearing clean gloves during insertion","Re-palpating the cleaned insertion site with an ungloved finger immediately before inserting the catheter","Using a new sterile catheter for each insertion attempt"],
ans:2,
why:["Chlorhexidine friction + air dry = correct technique.","Clean gloves = required for all IV insertions.","✓ Re-palpating the cleaned site with an ungloved finger CONTAMINATES the prepared site. After cleaning, do NOT touch the site. If re-palpation is needed, clean the site again or use a sterile gloved finger.","New sterile catheter per attempt = correct technique — never reuse."],
rat:"Non-touch technique: after antiseptic prep, nothing non-sterile touches the insertion site. Common violations: blowing on the site to speed drying, re-palpating without sterile gloves, placing catheter on bedding before insertion, touching the needle tip. Any contamination requires restarting the cleaning process.",
pearl:"'If in doubt, throw it out' — if there is any question about contamination of the insertion site or catheter, start over. The cost of a new catheter and prep supplies is trivial compared to the cost of a blood stream infection. Contamination during insertion is a preventable cause of CLABSI."},

{id:196,mod:3,type:"mcq",
stem:"A provider orders 250 mL of 0.9% NS to infuse over 2 hours using a 15 gtt/mL tubing set. What is the correct drip rate in gtt/min?",
opts:["15 gtt/min","31 gtt/min","125 gtt/min","8 gtt/min"],
ans:1,
why:["15 gtt/min would only deliver 60 mL/hr — too slow.","✓ Step 1: 250 mL ÷ 2 hr = 125 mL/hr. Step 2: (125 mL/hr × 15 gtt/mL) ÷ 60 min = 1875 ÷ 60 = 31.25 ≈ 31 gtt/min.","125 gtt/min would deliver 500 mL/hr — dangerously fast.","8 gtt/min would deliver only 32 mL/hr — too slow."],
rat:"IV drip rate formula: (mL/hr × drop factor) ÷ 60 = gtt/min. For 15 gtt/mL tubing: shortcut = mL/hr ÷ 4. So 125 ÷ 4 = 31.25 ≈ 31 gtt/min. Always round to the nearest whole number.",
pearl:"Drop factor shortcuts: 10 gtt/mL → divide mL/hr by 6. 15 gtt/mL → divide mL/hr by 4. 20 gtt/mL → divide mL/hr by 3. 60 gtt/mL (microdrip) → gtt/min equals mL/hr exactly. Memorize these shortcuts — they save critical time on NCLEX calculations."},

{id:197,mod:3,type:"mcq",
stem:"Which statement about IV SITE SELECTION is correct?",
opts:["The antecubital fossa (AC) is the preferred site for long-term IV access due to large vein size","Lower extremity veins are preferred in adults because they are less likely to be affected by movement","The arm with an arteriovenous (AV) fistula should be avoided for ANY IV access, blood draws, or blood pressure measurements","Veins on the dominant arm should always be used first"],
ans:2,
why:["The AC fossa is associated with high complication rates (phlebitis, infiltration, catheter kinking with arm movement) and limits patient mobility — avoid for routine PIV access.","Lower extremity veins in adults carry HIGH risk of DVT and thrombophlebitis — avoid unless no upper extremity access is possible.","✓ IV lecture on sites to avoid: NEVER use the arm with an AV fistula — no IV access, no blood draws, no blood pressure. The fistula is the dialysis patient's lifeline; any intervention risks thrombosis, infection, or permanent damage.","The NON-dominant arm is preferred to preserve function and patient comfort."],
rat:"IV site selection hierarchy (distal to proximal, non-dominant preferred): dorsal hand veins → forearm (cephalic, basilic, median) → antecubital (last resort for peripheral). Sites to AVOID: AV fistula arm, mastectomy-side arm, paralyzed limb, infected/burned areas, lower extremities (DVT risk), existing phlebitis.",
pearl:"Why avoid the AC fossa for routine IV: catheter kinks with elbow flexion → flow interrupted → pump alarms constantly → patient and nurse frustration. Reserve AC veins for when nothing else is accessible, for one-time blood draws, or when a PICC is being placed (which terminates in the SVC, not the AC)."},

{id:198,mod:3,type:"mcq",
stem:"'scrub the hub' before every IV access. What is the correct technique?",
opts:["Wipe the hub once with an alcohol swab and access immediately","Vigorously scrub the needleless connector with chlorhexidine or 70% alcohol using friction for at least 15 seconds, then allow to air dry before accessing","Apply povidone-iodine to the hub and leave it in place while accessing","Scrubbing is only required before the first access of a new IV line"],
ans:1,
why:["One wipe is insufficient — mechanical friction is required to disrupt biofilm.","✓ Blueprint/IV lecture: 'Scrub the hub' = vigorous mechanical scrubbing × ≥15 seconds with an appropriate antiseptic + air dry before access. This removes biofilm and reduces microbial colonization at every access.","Povidone-iodine is not recommended for hub disinfection per current INS guidelines.","Every access requires hub scrubbing — not just the first. Every connection is a potential entry point for microorganisms."],
rat:"'Scrub the hub' is a proven CLABSI prevention strategy. Technique: new alcohol pad or CHG wipe, scrub top and sides of connector with friction × ≥15 seconds, allow to dry completely. Apply to every port, every time, no exceptions. This simple 15-second step prevents devastating bloodstream infections.",
pearl:"Studies show that the needleless connector becomes contaminated within hours of use. Proper hub disinfection before every access reduces intraluminal contamination — one of the primary routes of CLABSI. 'Scrub the hub' is now a universal standard in evidence-based IV care practice."},

{id:199,mod:3,type:"mcq",
stem:"Which patient statement indicates they have CORRECTLY understood their IV care teaching?",
opts:["'If the IV machine beeps, I'll just press the button to silence it and not bother the nurse.'","'I can take a shower with my IV in — I just need to keep the site covered and dry.'","'If my IV site starts to hurt or swell, I should just push the call button — my nurse will fix it.'","'I can adjust the clamp if I feel the IV is going too slow — it probably just needs to be turned up.'"],
ans:2,
why:["Silencing alarms without calling the nurse = dangerous. Alarms indicate a clinical problem requiring assessment.","✓ Patients can bathe/shower with peripheral IVs if the site is protected from getting wet. This is accurate information and demonstrates understanding of site protection.","This option is partially correct (calling the nurse for symptoms is right) but the phrasing is passive. Option B is the clearest demonstration of correct, actionable understanding.","Patients must NEVER adjust IV flow rates — this risks medication dosing errors and patient harm."],
rat:"Correct patient IV education per blueprint: report pain/swelling/redness/leakage immediately, protect site from moisture, do not kink or pull tubing, call nurse when alarm sounds, never adjust rate, know how to move safely with the IV pole. Evaluate understanding with teach-back.",
pearl:"Return demonstration and teach-back: 'To make sure I explained it clearly, can you tell me what you would do if you notice your IV site is swollen?' Correct answer: call the nurse right away. This method catches misunderstandings before they become incidents and is the standard for evaluating patient education effectiveness."},

{id:200,mod:3,type:"mcq",
stem:"This is the 200th and final question of the NRSG 3333 bank — integrating all three modules. A patient with COPD (M2) receiving IV vancomycin via a 20-gauge peripheral IV (M3) says tearfully, 'I just don't know how much longer I can keep fighting this' (M1). Applying Tanner's Model RESPONDING step, which nursing action BEST addresses all domains simultaneously?",
opts:["Chart that the patient appears tearful and continue the vancomycin infusion without further assessment","Assess the IV site for phlebitis, confirm vancomycin is infusing over ≥60 minutes, sit with the patient using therapeutic silence and open-ended questions, and notify the provider of the patient's distress and possible need for palliative care consultation","Increase the vancomycin rate to finish faster and free up time for emotional support","Call the family immediately without asking the patient for permission"],
ans:1,
why:["Charting without engaging the patient fails both the clinical and emotional dimensions of care.","✓ Tanner's RESPONDING step = advocacy + collaborative goal-setting. This response addresses: safe IV care (vancomycin ≥60 min to prevent Red Man Syndrome), physical assessment (IV site for phlebitis), AND emotional/palliative care (therapeutic presence, open questions, referral consideration).","Faster vancomycin infusion causes Red Man Syndrome — unsafe.","Contacting family without consent violates HIPAA and patient autonomy."],
rat:"Expert nursing integrates all domains simultaneously. Module 1: therapeutic communication + palliative care awareness. Module 2: COPD assessment + recognition of distress. Module 3: safe IV medication administration. The tearful statement warrants both clinical and emotional assessment — ask: 'Tell me more about what you mean by that.'",
pearl:"'I don't know how much longer I can keep fighting this' may signal: physical exhaustion, emotional burnout, caregiver fatigue, existential distress, or a desire to discuss goals of care. Open the conversation: 'That sounds really hard. Can you tell me more about how you've been feeling?' Then listen — your presence is the intervention."}

const QB_ATI30 = [

// ── MODULE 1 — Communication & End of Life (10 Qs) ──

{id:201,mod:1,type:"mcq",
stem:"A nurse is caring for a client who says, 'I feel like such a burden to my family.' Which response by the nurse is THERAPEUTIC?",
opts:["'I'm sure your family doesn't feel that way.'","'Have you told your family how you feel?'","'That sounds really painful. Tell me more about what's been making you feel that way.'","'Your family loves you — try not to think like that.'"],
ans:2,
why:["False reassurance — dismisses the client's feeling without exploring it.","Redirects immediately to action before acknowledging the emotion.","✓ Reflects the feeling back (therapeutic), then uses an open-ended question to invite further expression. Does not dismiss or redirect prematurely.","'Try not to think like that' invalidates the client's expressed experience."],
rat:"The therapeutic response acknowledges the feeling first, then opens space for the client to elaborate. Options A and D are false reassurance. Option B redirects to problem-solving before the client feels heard — a common but non-therapeutic response.",
pearl:"ATI/NCLEX pattern: when a client expresses an emotion, the correct answer almost always REFLECTS the emotion and INVITES elaboration before taking any action. Never dismiss, reassure falsely, or redirect immediately."},

{id:202,mod:1,type:"mcq",
stem:"A nurse is teaching a client about their newly prescribed warfarin. The client responds to each instruction by nodding and saying 'I understand.' Which action by the nurse BEST evaluates comprehension?",
opts:["Document that the client verbalized understanding","Ask the client if they have any questions","Tell the client they can call with questions after discharge","Ask the client to explain in their own words how they will take the medication and what side effects to watch for"],
ans:3,
why:["Documenting 'verbalized understanding' does not evaluate actual comprehension.","Asking if they have questions is passive — many clients say 'no' even when they do not understand.","Directing the client to call later does not evaluate present understanding.","✓ Teach-back: asking the client to explain in their own words is the gold standard for evaluating health literacy and true comprehension. It catches misunderstandings before discharge."],
rat:"Nodding and saying 'I understand' are not reliable indicators of comprehension — research consistently shows patients retain little of what is told verbally. Teach-back ('show me,' 'tell me back') is the evidence-based standard for evaluating patient education effectiveness.",
pearl:"Teach-back is an autonomous nursing function. Document the client's actual response, not just 'teaching done.' If the client cannot teach back correctly, re-teach using a different approach and document the return demonstration."},

{id:203,mod:1,type:"mcq",
stem:"A nurse enters a room and a client who is deaf does not notice the nurse's presence. Which action by the nurse is CORRECT?",
opts:["Call out the client's name loudly from the doorway","Gently touch the client on the shoulder or move into their line of sight before speaking","Knock loudly on the doorframe and wait for the client to look up","Ask a family member to get the client's attention first"],
ans:1,
why:["A deaf client cannot hear their name called — this is ineffective.","✓ Lecture notes on deaf/HH patients: 'Orient the patient to your presence BEFORE initiating conversation. This may be done by gently touching the patient or moving so that you can be seen.'","Knocking is ineffective for a client who cannot hear.","Family should not be used as an intermediary when the nurse can address the client directly."],
rat:"Lecture notes: for deaf/HH patients, never assume they will notice your entry. Orient to your presence first (gentle touch or visual cue), then face them directly, use simple sentences, do not cover mouth, verify hearing aid function.",
pearl:"ATI pattern: 'Which action does the nurse take FIRST?' with a deaf client = orient to your presence before any communication begins. This is the first step, not an optional step."},

{id:204,mod:1,type:"mcq",
stem:"A hospice nurse is visiting a family 2 weeks after a client's death. The client's spouse states, 'I keep thinking I hear him in the other room. Am I going crazy?' Which response by the nurse is MOST appropriate?",
opts:["'That sounds like complicated grief — I'll refer you to a psychiatrist.'","'That is a very common experience in early grief. Many people report sensing the presence of a loved one they have lost.'","'You should try to keep busy so those thoughts don't take over.'","'Has anyone in your family noticed you behaving differently lately?'"],
ans:1,
why:["Sensing the deceased's presence is normal acute grief — not complicated grief requiring psychiatric referral at 2 weeks.","✓ Normalizing a common grief experience reduces the client's fear of 'going crazy' and builds trust. Sensing the presence of a deceased loved one is well-documented in normal grief literature.","'Keep busy' is a dismissive minimization of the grief experience.","Redirecting to family observation shifts focus away from the client and does not address their distress."],
rat:"Sensing the presence of a deceased loved one (auditory, visual, or tactile) is reported by up to 80% of bereaved spouses in the first year. It is a normal grief experience, not psychosis. The therapeutic response is to normalize and create space for further expression.",
pearl:"Hospice bereavement support continues for 13 months post-death (Medicare Hospice Benefit). If grief is significantly impairing function after 12 months, consider referral for complicated grief treatment (CGT), not sooner."},

{id:205,mod:1,type:"mcq",
stem:"A nurse is caring for a cognitively impaired client who needs to choose between two meal options. Which approach is MOST appropriate?",
opts:["Ask, 'What would you like for lunch today?'","Offer only one option to reduce confusion","Show the client two meals and ask, 'Would you like chicken or pasta today?'","Skip asking the client and check with the family for food preferences"],
ans:2,
why:["Open-ended questions are too cognitively demanding for impaired clients — lecture notes specify avoiding open-ended questions with this population.","Offering no choice eliminates patient autonomy — the goal is to reduce cognitive demand while preserving choice.","✓ Lecture notes: 'Whenever possible, avoid open-ended questions. Ask would you like X or Y? instead of What would you like?' Limiting choices reduces cognitive demand while preserving autonomy.","Bypassing the client to consult family denies the client agency they may still possess."],
rat:"Lecture notes on communicating with cognitively impaired patients: keep communication simple and concrete, use limited-choice questions instead of open-ended, allow adequate response time, use pictures if appropriate. The client's autonomy is preserved through structured choices.",
pearl:"Two-choice questions are therapeutic for cognitively impaired clients, children, and clients with expressive aphasia. The nurse presents the choice simply and concretely, waits patiently, and accepts the response without rushing."},

{id:206,mod:1,type:"mcq",
stem:"A nurse is providing care to an unconscious client. A colleague states, 'There's no point in talking to her — she can't hear anything.' Which response by the nurse is CORRECT?",
opts:["'You're right — let's focus on the physical care.'","'Hearing is believed to be the last sense lost. We should always assume she can hear us and communicate accordingly.'","'I'll ask the provider whether communication is appropriate.'","'I only talk to her when family is present so they feel better.'"],
ans:1,
why:["Agreeing that communication is pointless contradicts evidence-based practice and lecture note content.","✓ Lecture notes: 'Assume the patient can hear you. Hearing is believed to be the last sense lost.' Communication with unconscious clients is always appropriate and potentially therapeutic.","No provider order is needed to maintain therapeutic communication with an unconscious client.","Communication should occur consistently, not only with family present."],
rat:"Evidence and lecture notes both support communication with unconscious patients. Nurses should explain procedures before touching, maintain normal tone, and be careful about what is said in the patient's presence. Negative comments at the bedside are never acceptable.",
pearl:"ATI pattern: 'which statement requires correction by the charge nurse?' — saying 'there's no point talking to an unconscious patient' is always the wrong statement. Always communicate. Always assume awareness."},

{id:207,mod:1,type:"mcq",
stem:"A nurse is completing Tanner's Model NOTICING step with a new client. Which action BEST represents this step?",
opts:["Calling the provider to report abnormal vital signs","Administering PRN medication for pain","Sitting quietly and reflecting on how the interaction could have gone better","Using open-ended questions and active observation to elicit the full context of the client's symptoms, social history, and concerns"],
ans:3,
why:["Calling the provider = Responding step (acting on interpreted data).","Administering medication = Responding step.","Reflecting on the interaction = Reflecting step.","✓ Tanner's Model PPTX: 'Noticing → open-ended questions, active observation → elicits full context and patient concerns.' Noticing is the initial data-gathering step."],
rat:"Tanner's 4 steps: Noticing (perceive/gather) → Interpreting (make sense of data) → Responding (act) → Reflecting (evaluate and learn). Each step links to a specific communication technique. Noticing = open-ended questions + active observation.",
pearl:"Students often confuse Noticing with Assessment. Noticing in Tanner's Model is broader — it includes background knowledge, past experience with similar patients, and the nurse's attunement to what is salient. Two nurses can perform the same assessment and notice different things based on their knowledge and experience."},

{id:208,mod:1,type:"mcq",
stem:"A client diagnosed with terminal pancreatic cancer states, 'If I can just live until my daughter's wedding in 3 months, I'll be okay with dying.' Which stage of Kübler-Ross does this BEST represent?",
opts:["Denial","Anger","Bargaining","Depression"],
ans:2,
why:["Denial = refusing to accept the diagnosis ('This can't be happening').","Anger = 'Why me? This isn't fair.'","✓ Bargaining = making deals or conditions around acceptance — 'If I can just get to X, then I'll accept dying.' This is classic Kübler-Ross bargaining.","Depression = profound sadness and withdrawal, often without conditions."],
rat:"Kübler-Ross stages (DABDA): Denial → Anger → Bargaining → Depression → Acceptance. Bargaining is characterized by conditional thinking: 'If I can just...then...' Patients may bargain with God, medical providers, or fate. It is a normal part of grief processing.",
pearl:"Kübler-Ross stages are not linear and not universally experienced — patients may skip stages, revisit them, or experience multiple stages simultaneously. The nurse's role is never to push a patient toward the 'next' stage but to meet them where they are."},

{id:209,mod:1,type:"mcq",
stem:"A nurse is caring for a client from a culture where making direct eye contact with a healthcare provider is considered disrespectful. The client avoids eye contact during discharge teaching. Which action by the nurse is MOST appropriate?",
opts:["Stop the teaching and refer the client to a social worker for cultural assessment","Document that the client was uncooperative and disengaged","Continue the teaching without forcing eye contact and use teach-back to verify comprehension","Instruct the client that eye contact helps with learning and ask them to try"],
ans:2,
why:["A social worker referral is not indicated for a cultural communication style difference during routine teaching.","Labeling the client as 'uncooperative' reflects cultural bias, not clinical assessment.","✓ Therapeutic communication PPTX: 'Goal is to treat everyone as an INDIVIDUAL. Avoid stereotyping.' Adapt without judgment. Verify comprehension with teach-back regardless of nonverbal cues.","Instructing the client to change a culturally appropriate behavior is disrespectful and violates cultural sensitivity principles."],
rat:"Cultural sensitivity = adapting care to the individual without imposing one culture's norms. Eye contact norms vary widely. Teach-back is a more reliable indicator of comprehension than eye contact — use it with all patients, especially when cultural communication differences are present.",
pearl:"Never assume disengagement based on culturally different nonverbal behavior. The teach-back is your objective measure. Document what the client demonstrated, not what they appeared to feel. 'Client verbalized and demonstrated correct insulin injection technique' is objective and defensible."},

{id:210,mod:1,type:"mcq",
stem:"A client receiving palliative care for end-stage heart failure states, 'I know I'm dying. I just want to be comfortable and spend time with my family.' The client's adult child pulls the nurse aside and says, 'We want everything done — put him on a ventilator if needed.' Which action by the nurse is MOST appropriate?",
opts:["Comply with the family's request — they are the legal next-of-kin","Explain to the family that the client has expressed a desire for comfort-focused care and that the client's wishes, while they have decision-making capacity, are the priority","Tell the family the provider will make the final decision","Document the family's wishes and say nothing further"],
ans:1,
why:["Next-of-kin decision-making authority only applies when the client LACKS decision-making capacity. This client is clearly stating their wishes — they retain capacity.","✓ A client with decision-making capacity has the right to direct their own care. The nurse's role is to advocate for the client's expressed wishes and facilitate communication between the family and care team.","The provider will be involved, but the nurse must first advocate for the client — not defer without action.","Documenting without advocating for the client is a failure of the nursing advocacy role."],
rat:"Patient autonomy: a client with decision-making capacity (oriented, understands diagnosis/prognosis/options, can communicate a choice) directs their own care. Family input is valuable but does not override the capacitated client's wishes. The nurse advocates for the patient's expressed wishes.",
pearl:"When family and patient goals conflict: 1) Assess that the client truly has capacity. 2) Clarify the client's goals clearly. 3) Facilitate a family meeting with the care team. 4) Consider palliative care/ethics consultation. 5) Document everything. Never abandon the client's stated wishes to appease family."},

// ── MODULE 2 — Cardiac, Neuro, Respiratory (12 Qs) ──

{id:211,mod:2,type:"mcq",
stem:"A nurse is reviewing a client's ECG. The rhythm is regular, rate 86 bpm, with a P wave before every QRS. The PR interval is 0.28 seconds. The QRS is 0.08 seconds. Which action does the nurse take FIRST?",
opts:["Prepare for immediate transcutaneous pacing","Administer atropine 0.5 mg IV","Continue monitoring — notify the provider of the finding and document","Prepare for synchronized cardioversion"],
ans:2,
why:["Transcutaneous pacing is for symptomatic bradycardia or high-degree blocks — this client's rate is 86 and there is no stated instability.","Atropine is for symptomatic bradycardia — this rate is normal and no symptoms are stated.","✓ First-degree AV block (PR >0.20 sec, no dropped beats, regular) in an asymptomatic client at normal rate = monitor, notify provider, document. No emergency intervention needed.","Cardioversion is for tachyarrhythmias with a pulse — this client's rate is 86."],
rat:"First-degree AV block: PR >0.20 sec, every P conducts, regular rhythm. Asymptomatic with normal rate = notification + monitoring only. Treatment is for the underlying cause (e.g., discontinue AV-nodal slowing drugs if newly started). Not an emergency.",
pearl:"ATI pattern: a question about a mildly abnormal ECG with a stable, asymptomatic client almost always has 'continue monitoring and notify the provider' as the correct action. Intervention questions require hemodynamic instability or symptoms."},

{id:212,mod:2,type:"mcq",
stem:"A nurse is caring for a client on a cardiac monitor. The rhythm suddenly changes to a pattern with no P waves, irregular R-R intervals, and a wavy baseline. The client is alert, BP 136/82. Which action does the nurse take FIRST?",
opts:["Call a code and begin CPR","Prepare for immediate unsynchronized defibrillation","Assess the client and notify the provider — this rhythm is consistent with atrial fibrillation","Administer adenosine 6 mg IV rapid push"],
ans:2,
why:["CPR is for pulseless arrest — this client is alert with a blood pressure.","Unsynchronized defibrillation is for pulseless VFib — this client is hemodynamically stable.","✓ AFib (no P waves, irregular R-R, fibrillatory baseline) in a STABLE client = assess client fully, notify provider, anticipate rate control and anticoagulation orders. No emergency shock needed.","Adenosine treats SVT (regular, narrow-complex tachycardia) — not AFib."],
rat:"AFib with stable hemodynamics: rate control (beta-blocker or CCB), anticoagulation (CHA₂DS₂-VASc score), assess for symptoms (palpitations, dyspnea, chest discomfort). Unstable AFib (hypotension, altered LOC, ischemic chest pain) → synchronized cardioversion.",
pearl:"The FIRST step with any new rhythm: assess the PATIENT, not just the monitor. 'Treat the patient, not the monitor.' Check: is there a pulse? Is the client symptomatic? What is the BP? This assessment determines whether the intervention is emergent or non-emergent."},

{id:213,mod:2,type:"mcq",
stem:"A nurse is assessing a client 4 hours post-craniotomy. Which finding requires IMMEDIATE notification of the provider?",
opts:["Blood pressure 142/88 mmHg","Temperature 37.6°C","Right pupil 5 mm and non-reactive; left pupil 3 mm and brisk","Mild headache rated 3/10"],
ans:2,
why:["Mild-moderate hypertension is common post-craniotomy and is monitored but not immediately alarming without other signs.","Low-grade temperature is expected post-operatively — not immediately alarming.","✓ Unequal pupils with one fixed and dilated = CN III compression from uncal herniation = neurosurgical emergency. This is the hallmark sign of catastrophic increasing ICP requiring immediate intervention.","Mild headache post-craniotomy is expected and manageable — not immediately alarming without other symptoms."],
rat:"Anisocoria (unequal pupils) + fixed/dilated pupil = CN III (oculomotor) compression = uncal herniation in progress. This is a critical finding that requires immediate provider notification, airway preparation, and mannitol/hypertonic saline readiness. Every minute matters.",
pearl:"Post-craniotomy neuro checks: assess LOC, pupil size/reaction, motor strength, GCS every 15-30 min initially. Report immediately: new pupil changes, declining GCS, new motor deficits, Cushing's triad (bradycardia + HTN + irregular respirations), CSF leak from nose/ears."},

{id:214,mod:2,type:"mcq",
stem:"A nurse is performing a cranial nerve assessment using the stick-of-gum method. The nurse holds an unwrapped piece of gum beside the client's ear with the client's eyes closed and asks if they can hear the sound of the wrapper. This assesses which cranial nerve?",
opts:["CN I (Olfactory)","CN V (Trigeminal)","CN VIII (Auditory/Vestibulocochlear)","CN XII (Hypoglossal)"],
ans:2,
why:["CN I is assessed by holding the gum near the nose with eyes closed to identify the scent.","CN V (Trigeminal) is assessed by asking the client to simulate chewing.","✓ Cranial Nerve PDF: 'CN VIII Auditory — With the patient's eyes closed, open package beside each ear to assess hearing.'","CN XII (Hypoglossal) is assessed by asking the client to stick out the tongue and assess for deviation."],
rat:"Stick-of-gum CN assessment (from your clinical resource): CN I=smell gum; CN II=read wrapper; CN III/IV/VI=follow gum through 6 fields + accommodation; CN V=simulate chewing; CN VII=taste gum on tongue; CN VIII=hear wrapper opening; CN IX=swallow saliva; CN X=say 'ah' (uvula); CN XI=shoulder shrug; CN XII=tongue out.",
pearl:"A key clinical point from the cranial nerve PDF: 'Identification of the specific cranial nerve is not essential but that timely identification of the deficit is vital, along with immediate communication of this finding to the practitioner.' Report the finding and its functional impact — not just the nerve number."},

{id:215,mod:2,type:"mcq",
stem:"A nurse is assessing a client with suspected increased ICP. Which finding is a LATE sign that indicates the client's condition has significantly worsened?",
opts:["Restlessness and disorientation","Unilateral extremity weakness","Headache that worsens with movement","Bradycardia, hypertension, and irregular respirations"],
ans:3,
why:["Restlessness and disorientation = EARLY ICP sign (cognitive cells most sensitive to hypoxia).","Unilateral extremity weakness = EARLY sign (pyramidal tract compression).","Headache worsening with movement = EARLY sign.","✓ Blueprint Chart 61-1 LATE signs: 'Pulse rate and respiratory rate decrease or become erratic; blood pressure and temperature increase; pulse pressure widens.' This is Cushing's triad — a late and ominous sign indicating herniation is imminent."],
rat:"Cushing's triad = VERY LATE ICP sign: bradycardia + hypertension (widened pulse pressure) + irregular respirations. It represents the brain's last attempt to maintain cerebral perfusion. By the time Cushing's triad appears, herniation may already be occurring. Early recognition and intervention are critical.",
pearl:"Never wait for Cushing's triad — it indicates impending herniation. Act on EARLY signs: confusion, restlessness, pupil changes, subtle motor changes, worsening headache. The window for effective intervention is early, not late."},

{id:216,mod:2,type:"mcq",
stem:"A nurse is preparing to administer 2 L of oxygen via nasal cannula to a client with COPD and a chronic PaCO₂ of 62 mmHg. The client's current SpO₂ is 86%. Which action is MOST appropriate?",
opts:["Apply the nasal cannula at 2 L/min — SpO₂ 86% is dangerously low and requires correction","Apply the nasal cannula and titrate to achieve SpO₂ of 88–92%, then reassess","Apply a non-rebreather mask at 15 L/min to rapidly correct the hypoxemia","Withhold all oxygen — this client should not receive supplemental O₂"],
ans:1,
why:["Blindly applying 2 L/min without a target SpO₂ may over-oxygenate and suppress hypoxic drive — target is 88–92%, not higher.","✓ Brunner Ch. 10 Quality and Safety Alert: COPD with chronic CO₂ retention → hypoxic drive. Apply oxygen and titrate to SpO₂ 88–92%. At 86%, oxygen IS needed — but titrated precisely, not maximally.","Non-rebreather at 15 L/min would correct hypoxemia but would also remove hypoxic drive → hypoventilation → CO₂ narcosis.","Withholding all oxygen is incorrect — SpO₂ 86% is unsafe and requires treatment."],
rat:"COPD oxygen management: the goal is NOT to normalize SpO₂ to 95–100% — it is to maintain 88–92%. This corrects dangerous hypoxemia while preserving the hypoxic drive that these patients depend on. Venturi mask provides the most precise control.",
pearl:"If a COPD patient's level of consciousness decreases after receiving supplemental O₂, immediately suspect CO₂ narcosis. Obtain ABG, reduce FiO₂, consider BiPAP support. Document baseline mental status before and after oxygen therapy in all COPD patients."},

{id:217,mod:2,type:"mcq",
stem:"A nurse auscultates a new S3 heart sound at the apex in a client with a history of hypertension who was admitted for shortness of breath and bilateral leg edema. Which interpretation is MOST accurate?",
opts:["S3 is a normal finding in all adults over 50","S3 at the apex in this clinical context suggests volume overload and is a sign consistent with heart failure","S3 is only significant when heard at the right sternal border","S3 indicates aortic stenosis and requires immediate valve replacement evaluation"],
ans:1,
why:["S3 is normal in children and young adults — it is pathological in adults over 40, especially with other HF symptoms.","✓ Brunner Ch. 21: 'S3: an abnormal heart sound detected early in diastole as resistance is met to blood entering either ventricle; MOST OFTEN due to volume overload associated with heart failure.' Context (HTN + dyspnea + edema) confirms HF as the likely etiology.","S3 at the right sternal border is not a standard finding — S3 is heard at the apex.","S3 is associated with volume overload/HF — not aortic stenosis specifically. Aortic stenosis produces a systolic ejection murmur."],
rat:"S3 (ventricular gallop): early diastolic sound, best heard at the apex with the bell of the stethoscope, client in left lateral decubitus position. Context matters: in a young athlete = normal. In an adult with dyspnea, edema, hypertension = strongly suggests heart failure.",
pearl:"Classic HF auscultation: S3 gallop + crackles in lung bases + JVD + peripheral edema. S4 (atrial gallop) = late diastolic, heard with hypertension/LVH. Summation gallop = S3 + S4 during tachycardia — single loud extra sound. Report new S3 in adult patients immediately."},

{id:218,mod:2,type:"mcq",
stem:"A nurse is reviewing a client's ABG results: pH 7.32, PaCO₂ 52 mmHg, HCO₃ 27 mEq/L, PaO₂ 58 mmHg. The client has a history of COPD. Which interpretation is CORRECT?",
opts:["Metabolic acidosis with respiratory compensation","Respiratory alkalosis — the client is hyperventilating","Respiratory acidosis with early metabolic compensation — consistent with COPD exacerbation","Normal ABG — these values are within acceptable limits for a COPD patient"],
ans:2,
why:["Metabolic acidosis would have low HCO₃ — this HCO₃ is normal/slightly elevated (compensatory retention).","Respiratory alkalosis = pH >7.45 and PaCO₂ <35 — this client has elevated PaCO₂ and low pH.","✓ pH <7.35 = acidosis. PaCO₂ >45 = respiratory cause. HCO₃ 27 = slightly elevated = kidneys retaining HCO₃ to compensate (chronic). PaO₂ 58 = hypoxemia. Pattern = respiratory acidosis with partial metabolic compensation — classic COPD exacerbation.","pH 7.32 is acidotic — not normal."],
rat:"ABG interpretation (ROME): Respiratory Opposite (respiratory acidosis: pH down, CO₂ up). Metabolic Equal (metabolic acidosis: pH down, HCO₃ down). This ABG: ↓pH + ↑PaCO₂ = respiratory acidosis. ↑HCO₃ = kidneys compensating (chronic adaptation). + Hypoxemia (PaO₂ 58) = needs controlled O₂.",
pearl:"Nursing priority with this ABG: 1) Apply controlled O₂ (target SpO₂ 88–92%, Venturi mask preferred). 2) Position upright. 3) Notify provider. 4) Anticipate bronchodilators, corticosteroids, possible BiPAP. 5) Reassess ABG after intervention. 6) Monitor LOC (CO₂ narcosis risk)."},

{id:219,mod:2,type:"mcq",
stem:"A nurse is performing a cardiac assessment. Which landmark is CORRECT for auscultating the PULMONIC valve?",
opts:["5th intercostal space, left midclavicular line","4th intercostal space, left sternal border","2nd intercostal space, right sternal border","2nd intercostal space, left sternal border"],
ans:3,
why:["5th ICS left MCL = Mitral/Apical area (S1>S2).","4th ICS left sternal border = Tricuspid area (S1>S2).","2nd ICS right sternal border = Aortic area (S2>S1).","✓ Cardiac Assessment PDF: Pulmonic = 2ICS LSB (left sternal border), S2>S1."],
rat:"Cardiac auscultation landmarks (Cardiac Assessment PDF): Aortic = 2ICS RSB. Pulmonic = 2ICS LSB. Erb's Point = 3ICS LSB (S1=S2). Tricuspid = 4ICS LSB. Mitral/Apical = 5ICS MCL. Mnemonic: 'All People Enjoy Time Magazine.'",
pearl:"S2>S1 at the BASE (aortic + pulmonic = 2nd ICS). S1>S2 at the APEX (mitral = 5ICS MCL). At Erb's point (3ICS LSB), S1=S2 — this is also the best location to hear aortic regurgitation (lean client forward, end-expiration)."},

{id:220,mod:2,type:"mcq",
stem:"A client has a pulseless rhythm on the monitor showing completely chaotic waveforms with no identifiable P waves, QRS complexes, or T waves. The nurse calls for help. Which action does the nurse take NEXT?",
opts:["Apply synchronized cardioversion at 200 joules","Begin CPR and defibrillate as soon as the AED/defibrillator is available","Administer atropine 1 mg IV push","Obtain a 12-lead ECG before initiating treatment"],
ans:1,
why:["Synchronized cardioversion is for tachyarrhythmias WITH a pulse — pulseless VFib requires unsynchronized defibrillation.","✓ VFib = shockable rhythm. Pulseless = cardiac arrest. Action: Begin CPR immediately, charge defibrillator, clear and deliver shock as soon as available. Every 1 minute without defibrillation reduces survival ~10%.","Atropine is for symptomatic bradycardia — never for VFib.","Obtaining a 12-lead ECG delays life-saving defibrillation — never delay for a diagnostic test in cardiac arrest."],
rat:"VFib management: CPR → charge defibrillator → clear → shock (200J biphasic) → immediately resume CPR (2 min) → rhythm check → if VFib: epinephrine 1 mg IV → shock again → amiodarone 300 mg after 3rd shock. Time to defibrillation is the single most important factor in survival.",
pearl:"'Shock first, talk later' for VFib. Defibrillation within 2 minutes of VFib onset = survival rates up to 90%. Each minute of delay reduces survival by approximately 10%. This is why public access defibrillators (AEDs) in public spaces save lives."},

{id:221,mod:2,type:"mcq",
stem:"A nurse is reviewing an ECG rhythm strip. The rhythm shows: P waves present, regular, rate 78 bpm, but after every 3 normal beats the PR interval progressively lengthens until one QRS is dropped, then the cycle resets. Which rhythm does the nurse identify?",
opts:["First-degree AV block","Second-degree AV block Type II (Mobitz II)","Second-degree AV block Type I (Wenckebach)","Third-degree (complete) heart block"],
ans:2,
why:["First-degree: PR is prolonged but CONSTANT — no progressive lengthening, no dropped beats.","Mobitz II: PR is CONSTANT, then QRS is suddenly dropped with NO progressive lengthening — different from this pattern.","✓ Cardiac Rhythms PDF: 'Second degree Type I — each successive impulse undergoes a longer delay. Then after 3 or 4 beats the impulse is blocked. After this blocked beat, the cycle of lengthening PR intervals resumes.' = Wenckebach.","Third-degree: P waves and QRS are completely independent — here the P waves clearly relate to (and precede) most QRS complexes."],
rat:"Wenckebach (Mobitz I): AV node level. Often associated with inferior MI (RCA supplies AV node), vagal stimulation, beta-blockers, digoxin. Usually reversible and benign. Mobitz II (infranodal) is more dangerous — sudden dropped beats without warning, higher risk of complete heart block.",
pearl:"Cardiac Rhythms PDF heart block poem: 'Longer longer longer drop — then you have WENCKEBACH.' Wenckebach = AV node = often reversible. Mobitz II = bundle of His = often needs pacemaker. Third degree = complete dissociation = pacemaker required."},

{id:222,mod:2,type:"mcq",
stem:"A nurse is assessing a client with a suspected stroke. During the neurological assessment, the nurse strokes the sole of the client's foot and observes the great toe dorsiflexing (extending upward) with fanning of the other toes. How does the nurse document this finding?",
opts:["Normal plantar reflex — toes curling downward as expected","Positive Babinski sign — consistent with upper motor neuron pathology","Negative Romberg test — indicating intact cerebellar function","Clonus — indicating lower motor neuron damage"],
ans:1,
why:["Normal plantar reflex = toes PLANTAR FLEX (curl downward) — this client's toes extended upward, which is abnormal.","✓ Brunner Ch. 60: 'Babinski reflex (sign): in adults is indicative of abnormalities in the motor control pathways leading from the cerebral cortex.' Great toe extension + fanning = POSITIVE Babinski = UMN lesion.","Romberg tests cerebellar balance — not assessed by stroking the foot sole.","Clonus = rapid alternating contraction/relaxation at a joint — also a UMN sign, but not what is described here."],
rat:"Positive Babinski in adults = UMN (upper motor neuron) pathology — stroke, TBI, MS, spinal cord injury, brain tumor. Normal adult plantar reflex: toes flex downward (plantar flexion) = negative Babinski. Positive Babinski is always abnormal in adults.",
pearl:"Document neurological findings objectively: 'Plantar stimulation of right foot elicits dorsiflexion of great toe with fanning of toes bilaterally — positive Babinski noted. Reported to provider at [time].' Never just write 'neuro exam abnormal' — document the specific finding."},

// ── MODULE 3 — IV Therapy (8 Qs) ──

{id:223,mod:3,type:"mcq",
stem:"A nurse is initiating a blood transfusion for a client. Which finding requires the nurse to STOP the transfusion immediately?",
opts:["Heart rate increases from 72 to 80 bpm 30 minutes after starting","Client reports mild fatigue — they were fatigued before the transfusion","Client develops fever of 38.8°C, back pain, and reports feeling 'different' 15 minutes after the transfusion begins","Client has mild itching at the IV site only"],
ans:2,
why:["Heart rate 72→80 bpm is a minor change within normal range — not alarming in isolation.","Pre-existing fatigue is not a transfusion reaction.","✓ Fever + back/flank pain + sudden onset of subjective change = classic signs of acute hemolytic transfusion reaction (most dangerous type) — stop transfusion immediately, keep IV open with NS, notify provider, send blood bag to blood bank, collect blood and urine samples.","Localized mild itching at IV site may be dressing-related — not a systemic transfusion reaction requiring immediate stop."],
rat:"Acute hemolytic transfusion reaction: ABO incompatibility causes complement activation → RBC destruction → fever, chills, flank/back pain, hemoglobinuria (pink/red urine), hypotension, tachycardia. Can cause DIC and renal failure. STOP immediately — even slowing the rate is wrong.",
pearl:"Transfusion reaction protocol: 1) STOP transfusion. 2) Maintain IV access with 0.9% NS. 3) Notify provider AND blood bank. 4) Return blood bag + attached tubing to blood bank with blood samples from a new site. 5) Collect first-void urine. 6) Monitor vitals every 5 minutes. 7) Document everything with times."},

{id:224,mod:3,type:"mcq",
stem:"A nurse is caring for a client with a peripheral IV who reports pain and tightness at the insertion site. On assessment, the nurse notes swelling extending 3 inches above the site, cool pale skin, and the pump is alarming with high pressure. Which action does the nurse take FIRST?",
opts:["Flush the IV with 10 mL of normal saline to clear the occlusion","Slow the infusion rate and apply a warm compress","Stop the infusion and remove the peripheral IV catheter","Obtain a blood return by aspirating the catheter with a syringe"],
ans:2,
why:["Flushing would force more fluid into the infiltrated tissue — dangerous, especially if the infusate is vesicant.","Slowing the rate continues the infiltration — harmful.","✓ This is Grade 2–3 infiltration (edema, cool skin, pain, pump pressure alarm). STOP infusion first to prevent further fluid from entering the tissue. Then remove catheter, assess, apply appropriate compress, restart elsewhere.","Aspirating an infiltrated peripheral IV will not provide blood return and wastes time."],
rat:"Infiltration management: STOP infusion → stop the harm. Then: remove catheter, assess the area, apply warm or cool compress (warm for hypotonic solutions, cool for isotonic/hypertonic), elevate extremity, restart IV at a new distal site on opposite arm, document grade and interventions.",
pearl:"The pump high-pressure alarm is a key clinical clue — it indicates resistance to flow, which in the context of swelling and pain = infiltration. A patent IV has no pressure alarm. This alarm should always trigger a site assessment — never just silence it and continue."},

{id:225,mod:3,type:"mcq",
stem:"A nurse is hanging a secondary IV piggyback of piperacillin-tazobactam (Zosyn) 3.375 g in 100 mL NS to infuse over 30 minutes. The primary line is infusing D5W at 75 mL/hr. Which finding indicates the nurse needs to take further action before proceeding?",
opts:["The secondary bag is hung higher than the primary bag","The primary line is running D5W — piperacillin-tazobactam is incompatible with dextrose solutions and should be diluted and run in NS only, not piggybacked into an active dextrose line without appropriate flushing","The infusion pump is programmed for 200 mL/hr for the secondary infusion","The tubing has been primed and all air is expelled"],
ans:1,
why:["Secondary bags hung higher than primary = correct setup (backcheck valve mechanism).","✓ Piperacillin-tazobactam is incompatible with dextrose solutions. Running it into an active D5W primary line risks precipitation/inactivation. The nurse must flush the line with NS before and after, or use a dedicated NS line.","200 mL/hr for 100 mL over 30 minutes = correct rate calculation (100 mL ÷ 0.5 hr = 200 mL/hr).","Primed tubing with no air = correct technique."],
rat:"IV compatibility is a critical safety responsibility. Before hanging any secondary infusion, verify compatibility with the primary solution AND all other concurrently infusing medications. Many antibiotics, particularly beta-lactams, are incompatible with dextrose. Always check with a pharmacist or compatibility reference.",
pearl:"Common incompatibility pitfalls: phenytoin (Dilantin) precipitates in ANY dextrose solution — use NS only. Piperacillin-tazobactam incompatible with dextrose. Amphotericin B requires D5W only — incompatible with NS. Calcium and phosphate together = precipitation. When in doubt, ask pharmacy."},

{id:226,mod:3,type:"mcq",
stem:"A nursing student is inserting a peripheral IV. After cleaning the site with chlorhexidine, the student re-palpates the vein directly over the cleaned site without gloves before inserting the catheter. Which action does the charge nurse take?",
opts:["Allow the insertion to proceed — palpating before insertion is standard practice","Stop the student and have them recleanse the site before proceeding — touching the cleaned site without sterile gloves contaminates the prepared field","Allow insertion to proceed but document the deviation","Ask the student to apply hand sanitizer before continuing"],
ans:1,
why:["Palpating the cleaned site without sterile gloves contaminates it — the insertion cannot safely proceed without recleaning.","✓ After antiseptic preparation, the site must not be touched unless sterile gloves are worn. Re-palpating with an ungloved finger = contamination of the sterile field = must reclean.","Allowing contaminated insertion to proceed and only documenting is a patient safety failure.","Hand sanitizer does not restore the sterile field at the insertion site itself."],
rat:"Non-touch technique: once the skin is cleaned, nothing non-sterile contacts the insertion site. If re-palpation is absolutely needed, it must be done with a sterile gloved finger, OR the site must be recleaned. 'If you touch it, you treat it' — reclean and restart.",
pearl:"Common ATI/NCLEX scenario: a student or colleague does something unsafe during a procedure. The correct nurse response is always to STOP the unsafe action first, then correct and reteach. Patient safety always takes priority over avoiding awkwardness or disrupting workflow."},

{id:227,mod:3,type:"mcq",
stem:"A nurse is preparing to administer potassium chloride (KCl) 20 mEq IV to a client with a serum potassium of 2.8 mEq/L. Which action is SAFE?",
opts:["Administer KCl 20 mEq IV push over 5 minutes for rapid correction","Dilute KCl 20 mEq in 100 mL NS and infuse via pump at no faster than 10 mEq/hour","Dilute KCl 20 mEq in 10 mL sterile water and infuse over 10 minutes","Administer KCl 40 mEq undiluted IV push for severe hypokalemia"],
ans:1,
why:["IV push KCl causes immediate cardiac arrest from ventricular fibrillation — NEVER give KCl IV push under any circumstances.","✓ Safe KCl administration: always diluted, always via infusion pump, rate ≤10 mEq/hr peripheral (≤20 mEq/hr central with continuous cardiac monitoring). This option meets all safety criteria.","10 mL is an inadequate dilution volume — minimum is 100 mL. The 10-minute time frame is also too rapid.","IV push KCl is fatal — never administered by any nurse regardless of clinical urgency."],
rat:"KCl is a HIGH-ALERT medication. Rules: never IV push, always diluted (minimum 100 mL), always via infusion pump, rate ≤10 mEq/hr peripherally, continuous cardiac monitoring during administration, verify concentration and rate with a second nurse. Maximum peripheral concentration: 40 mEq/100 mL.",
pearl:"ATI/NCLEX KCl questions almost always test: (1) never IV push, (2) must be diluted, (3) must use a pump, (4) rate limit. Any answer involving undiluted KCl, IV push, or rapid bolus = automatically wrong. This is a life-safety principle with zero exceptions."},

{id:228,mod:3,type:"mcq",
stem:"A client's peripheral IV site shows redness and warmth extending 5 cm proximal to the insertion site, accompanied by a palpable, tender cord along the vein. There is no purulent drainage. Using the phlebitis grading scale, the nurse grades this as:",
opts:["Grade 1 — erythema with or without pain","Grade 2 — erythema, edema, and pain","Grade 3 — erythema, edema, pain, streak formation, and palpable cord","Grade 4 — all of Grade 3 plus cord >1 inch and purulent drainage"],
ans:2,
why:["Grade 1 = erythema ± pain only. No edema, streak, or cord.","Grade 2 = erythema + edema + pain. No streak or cord.","✓ Grade 3 = Grade 2 features PLUS streak formation AND palpable venous cord. This client has redness, tenderness, and a palpable cord = Grade 3.","Grade 4 = Grade 3 PLUS palpable cord >1 inch AND purulent drainage. No purulent drainage is noted here."],
rat:"Phlebitis scale (IV lecture): 0=none; 1=erythema±pain; 2=erythema+edema+pain; 3=+streak+palpable cord; 4=+cord>1 inch+purulent drainage. Action for Grade 3: remove catheter, warm compresses, document, restart elsewhere, monitor for infection. Grade 4: additionally notify provider, culture site, watch for bacteremia.",
pearl:"A palpable cord = thrombosed vein segment = thrombophlebitis. While superficial thrombophlebitis rarely embolizes, it can become infected (septic thrombophlebitis) — a serious complication. Document the exact grade, length of streak, and all interventions. Monitor the area for 24–48 hours after catheter removal."},

{id:229,mod:3,type:"mcq",
stem:"A nurse is caring for a client receiving dopamine 5 mcg/kg/min via a peripheral IV when the client begins reporting burning pain at the insertion site. Assessment reveals pallor and coolness of the surrounding tissue with no swelling yet. Which action does the nurse take FIRST?",
opts:["Slow the infusion rate to reduce the burning sensation","Apply warm compresses to the site and continue the infusion","Stop the infusion immediately — dopamine is a vesicant and any extravasation requires immediate intervention","Flush the IV with 10 mL NS to confirm patency before taking action"],
ans:2,
why:["Slowing rate continues vesicant delivery into the tissue — not safe.","Warm compresses while continuing the infusion continues tissue exposure — not safe.","✓ Dopamine is a vesicant (listed in the IV lecture). ANY infiltration of a vesicant = Grade 4 extravasation regardless of volume. STOP immediately. Then: notify pharmacy (for phentolamine antidote), notify provider, do NOT remove catheter until antidote is administered through it, photograph, document.","Flushing would force more dopamine into extravasated tissue — dangerous."],
rat:"IV lecture vesicant list includes: dopamine, epinephrine, norepinephrine (catecholamines), vincristine, vinblastine, gentamycin, mannitol. Dopamine extravasation causes severe tissue necrosis. Antidote = phentolamine (alpha-blocker) injected locally. Stop first, antidote second, remove IV third.",
pearl:"Why keep the IV in place? The catheter provides direct access to the extravasated tissue for antidote delivery. Phentolamine is injected through the existing catheter into the area of extravasation for maximum effectiveness. Remove AFTER the antidote is given. This is counterintuitive but critical."},

{id:230,mod:3,type:"mcq",
stem:"A nurse has just completed inserting a peripheral IV in a client's left forearm. Which documentation entry is MOST complete and appropriate?",
opts:["'IV started in left forearm, site intact' — signed and dated","'20-gauge peripheral IV inserted into left cephalic vein, forearm, on first attempt. Chlorhexidine prep used and allowed to dry. Blood return confirmed. 0.9% NS flushed without resistance. IV site without redness, swelling, or induration. Saline lock applied. Client tolerated procedure without complaint.' — date, time, nurse signature","'IV patent and functioning' — signed and dated","'Client has IV access in left arm for medication administration' — signed and dated"],
ans:1,
why:["'Site intact' is vague — does not include gauge, site, attempts, or patient response.","✓ Blueprint Module 3: 'Record insertion site, gauge, number of attempts, and patient response. Document infusion type, rate, and any complications/interventions.' Option B includes all required elements: gauge, vein, location, attempt number, antiseptic, blood return, patency, site assessment, patient response, date/time/signature.","'Patent and functioning' contains no meaningful clinical detail.","Omits gauge, attempt number, antiseptic use, patency assessment, and clinical site assessment."],
rat:"Complete IV documentation (blueprint): anatomic site + vein name, catheter gauge, number of attempts, antiseptic used, blood return confirmation, flush patency, dressing type, infusion type and rate, site appearance, patient response, date/time, nurse signature. Inadequate documentation is a legal and safety risk.",
pearl:"Legal standard: documentation must be specific enough that another clinician reading it could understand exactly what was done, when, and by whom. 'IV started' is not legally defensible. The detailed entry in Option B creates a clear clinical and legal record."}

];
