const QB_BATCH3 = [

// ── MODULE 1: ADVANCED — Communication, grief, palliative (Brunner Ch.13, Ch.44 PPTX, lecture notes) ──

{id:121,mod:1,type:"mcq",
stem:"Which technique involves REPEATING what the person said or DESCRIBING their implied feeling?",
opts:["Validating","Reflecting","Clarifying","Directing/Focusing"],
ans:1,
why:["Validating = restating words as you heard them (confirms accuracy).","✓ Lecture notes: 'Reflecting: Repeating what the person said or describing the person's implied feeling.'","Clarifying = trying to clearly understand what was said (reduces ambiguity).","Directing/Focusing = asking for elaboration on a specific topic."],
rat:"Reflecting shows the patient they have been heard and helps them explore their own feelings more deeply. Example: Patient: 'I don't know if I can handle this.' Nurse: 'It sounds like you're feeling overwhelmed.'",
pearl:"NCLEX distinction: Restating (validating) = mirrors the WORDS back. Reflecting = mirrors the EMOTION back. Reflecting is generally more therapeutic for emotional topics because it validates feeling, not just content."},

{id:122,mod:1,type:"mcq",
stem:"A nurse asks a patient, 'You mentioned your pain started this morning — can you walk me through exactly what you were doing when it began?' Which communication technique is this?",
opts:["Silence","Sequencing","General lead","Reflecting"],
ans:1,
why:["Silence = therapeutic listening without verbal response.","✓ Lecture notes: 'Sequencing: Making sure you understand the steps in a process.' The nurse is asking the patient to walk through the sequence of events.","General lead = encouraging the patient to continue (e.g., 'Go on…').","Reflecting = describing implied feelings."],
rat:"Sequencing is used to understand the chronological order of events — important for history-taking, understanding how symptoms developed, and ensuring clinical accuracy. 'Walk me through exactly what happened' is the hallmark of sequencing.",
pearl:"Use sequencing for: onset of symptoms, sequence of events leading to injury, or medication administration process. It helps the nurse build an accurate timeline and can reveal important clinical details the patient may not volunteer otherwise."},

{id:123,mod:1,type:"mcq",
stem:"A nurse is providing care to a client with cognitive impairment. Which communication approach is most appropriate?",
opts:["Use complex open-ended questions to stimulate cognitive engagement and memory recall","Keep communication simple and concrete, limit choices to two options, allow up to two minutes for a response","Rely exclusively on family members to answer all assessment questions on the client's behalf","Use medical terminology clearly to avoid condescending language with cognitively impaired clients"],
ans:1,
why:["Open-ended complex questions are too cognitively demanding for impaired patients.","✓ Lecture notes: 'Keep communication simple and concrete. Break down instructions into simple tasks. Be patient and give the patient time to respond. If no response after 2 minutes, repeat.'","Medical jargon should be avoided with ALL patients.","Family relay bypasses the patient — the patient should be addressed directly whenever possible."],
rat:"Lecture notes on cognitively impaired patients: maintain eye contact, quiet environment, simple/concrete communication, break instructions into tasks, avoid pronouns/abstract terms, use pictures/drawings, avoid open-ended questions (use limited choices instead), allow 2-minute response time.",
pearl:"Instead of: 'What would you like to wear?' → ask: 'Would you like the blue shirt or the green shirt?' Limiting choices reduces cognitive demand while preserving autonomy. This technique also applies to dementia patients and pediatric patients."},

{id:124,mod:1,type:"mcq",
stem:"Which of the following statements BEST demonstrates patient advocacy in a clinical conversation?",
opts:["'Surgery is your only choice — you need this operation.'","'If you don't have surgery, you may not live to see your grandchildren.'","'Whether or not you have surgery is your choice — it is your body.'","'Your family needs you to make the right decision.'"],
ans:2,
why:["This removes patient choice — NOT advocacy, it is coercion.","This uses fear to pressure the patient — emotional manipulation, not advocacy.","✓ The PPTX lists this exact statement as an example of a therapeutic, advocacy-based response that respects autonomy.","Invoking family obligation to pressure a decision = manipulation, not advocacy."],
rat:"The therapeutic communication PPTX presents these examples asking: 'Are these responses therapeutic? Do they advocate for the patient?' The answer: 'Whether or not you have the surgery is your choice. It is your body.' = the only response that respects autonomy and advocates for the patient.",
pearl:"Patient advocacy = supporting the patient's RIGHT to make their own decision, even if you disagree with it. A nurse who withholds relevant information or uses fear/guilt to pressure a patient is violating both the advocacy role and the principle of autonomy."},

{id:125,mod:1,type:"sata",
stem:"A nurse is educating a nursing student about communication. Which of the following are components of nonverbal communication? Select all that apply.",
opts:["Tone and pitch of voice (paralanguage)","Body language and posture","Eye contact and facial expression","Choice of words and sentence structure","Personal space (proxemics) and touch"],
ans:[0,1,2,4],
why:["✓ Paralanguage (tone, pitch, volume, rate of speech) is listed under nonverbal in the PPTX.","✓ Body language and posture = nonverbal.","✓ Eye contact and facial expression = nonverbal.","Choice of words and sentence structure = VERBAL communication.","✓ Personal space (proxemics) and touch = nonverbal."],
rat:"The PPTX divides communication into: VERBAL (vocal, paralanguage — tone/pitch/volume/rate) and NONVERBAL (body language, gestures, facial expression, affect, posture, eye contact, dress/grooming, touch, personal space/proxemics, use of time).",
pearl:"'Dress and grooming' are included in nonverbal communication — a nurse's professional appearance communicates credibility and respect to patients. 'Use of time' (promptness, how long you spend with a patient) also communicates care or indifference nonverbally."},

{id:126,mod:1,type:"mcq",
stem:"A nurse is preparing to care for a client from a different cultural background. Which principle best guides culturally sensitive nursing care?",
opts:["All clients from the same cultural background share identical health beliefs and practices","Cultural sensitivity means treating every person as an individual while acknowledging that cultural backgrounds shape health beliefs","Providing culturally sensitive care means using the exact same standardized approach with every client","Cultural background should be ignored entirely to avoid stereotyping during clinical encounters"],
ans:1,
why:["All clients from the same culture do not share identical beliefs — individual variation is enormous. This is cultural stereotyping.","✓ Cultural sensitivity means recognizing that cultural background shapes health beliefs while treating every person as a unique individual. Avoid stereotyping AND cultural blindness.","Using the exact same approach for everyone regardless of cultural context is cultural BLINDNESS — it ignores meaningful differences in health beliefs and communication styles.","Ignoring cultural background entirely is also cultural blindness — it denies the real influence of culture on health behavior and communication."],
rat:"Cultural sensitivity per the PPTX: incorporate knowledge of specific cultural beliefs and values to plan appropriate care, acknowledge different perspectives, and treat each patient as an individual. Avoid both stereotyping AND cultural blindness.",
pearl:"Cultural humility goes beyond cultural competence — it recognizes that we can never fully know another culture and requires ongoing self-reflection, openness, and willingness to learn from patients about their own cultural context."},

{id:127,mod:1,type:"mcq",
stem:"A nurse is reviewing illness trajectories with a student nurse. Which trajectory does NOT involve a gradual decline toward death?",
opts:["Sudden death","Terminal illness (e.g., cancer — high function then rapid decline near death)","Organ failure (episodic exacerbations, each with less full recovery)","Linear progressive improvement with treatment"],
ans:3,
why:["Sudden death = Trajectory 1 in Brunner.","Terminal illness (cancer) = Trajectory 2.","Organ failure (heart failure, COPD, kidney disease) = Trajectory 3.","✓ Linear progressive IMPROVEMENT is NOT one of the four trajectories. Brunner describes trajectories that lead to death, not recovery. Frailty/dementia = Trajectory 4."],
rat:"Brunner Ch. 13 four illness trajectories: (1) Sudden death — unexpected; (2) Terminal illness — high function, then rapid decline (cancer); (3) Organ failure — slow decline with episodic crises, each recovery less complete (HF, COPD, kidney failure); (4) Frailty — already frail at diagnosis, slow decline over years (dementia).",
pearl:"Understanding illness trajectory helps nurses anticipate care needs and initiate goals-of-care conversations at the right time. For organ failure patients, each hospitalization is an opportunity to assess goals — many don't realize their prognosis is serious until the final illness."},

{id:128,mod:1,type:"mcq",
stem:"A nurse is educating a newly bereaved family about the grief process. Which statement correctly differentiates mourning from grief?",
opts:["Personal feelings that accompany an anticipated or actual loss","The period during which grieving from loss of a loved one takes place","Individual, family, group, and cultural expressions of grief and associated behaviors","A coordinated program of care for terminally ill patients"],
ans:2,
why:["Personal feelings of loss = GRIEF (internal).","Period of grieving = BEREAVEMENT (the time period).","✓ Brunner Ch. 13: 'Mourning: individual, family, group, and cultural expressions of grief and associated behaviors.' Mourning is the outward expression.","Coordinated care program = HOSPICE."],
rat:"Brunner Ch. 13 key grief terminology: Grief = internal emotional reaction to loss. Bereavement = period during which mourning takes place. Mourning = actions/expressions of grief (outward behaviors, symbols, ceremonies). Dysfunctional grief = abnormal — unresolved or inhibited.",
pearl:"Cultural expressions of mourning vary enormously — some cultures are demonstrative (loud crying, communal gathering), others are quiet and private. Always ask about and respect cultural mourning practices. Provide private space for families to express grief in their own way."},

{id:129,mod:1,type:"mcq",
stem:"A client with terminal cancer continues to make future plans despite being told their prognosis is months. The nurse approaches to discuss the client's care goals. Which approach is MOST appropriate?",
opts:["Firmly remind the client that they need to acknowledge their prognosis to make effective end-of-life plans","Document 'client in denial' in the chart and refer to psychiatry for a formal psychological evaluation","Sit with the client, acknowledge their plans without judgment, and gently explore their understanding of their illness at their own pace","Call the family immediately to inform them the client is not coping realistically with the prognosis"],
ans:2,
why:["Forcing a client to 'face reality' destroys therapeutic trust and violates patient-centered care.","Denial is a protective coping mechanism — at 2 months post-diagnosis it is not pathological and does not require psychiatric referral.","✓ Denial is often adaptive early in serious illness. The therapeutic approach is presence, acknowledgment, and gentle exploration — not confrontation. 'How much has your doctor told you about what to expect?' opens the conversation.","Contacting family without consent violates patient confidentiality and autonomy."],
rat:"Kübler-Ross: Denial serves as a psychological buffer that allows gradual emotional processing of devastating news. The nurse should NOT argue or force confrontation. Instead: acknowledge the patient's plans, ask open-ended questions about understanding, and remain present.",
pearl:"'How much has your doctor told you about your illness?' is a therapeutic way to assess a patient's level of understanding and readiness to discuss prognosis — without forcing confrontation. This opens space for the patient to lead the conversation at their own pace."},

{id:130,mod:1,type:"sata",
stem:"A nurse is caring for a client receiving end-of-life care. Which nursing actions reflect evidence-based practice for developing a therapeutic relationship in this setting? Select all that apply.",
opts:["Provide therapeutic presence — sitting with the client without needing to speak or fix","Explain the client's condition and care plan honestly and in terms they can understand","Avoid discussing prognosis to protect the client from emotional distress","Identify and address the client's physical, emotional, spiritual, and cultural needs","Promote client autonomy by supporting informed decision-making","Encourage family involvement according to the client's wishes"],
ans:[0,1,3,4,5],
why:["CORRECT — Therapeutic presence (simply being there without needing to fix) is one of the most powerful EOL nursing interventions.","CORRECT — Honest, clear communication builds trust and enables informed decision-making — a core EOL nursing responsibility.","INCORRECT — Withholding prognostic information violates patient autonomy and informed consent. Clients have the right to know their prognosis to make meaningful decisions.","CORRECT — Holistic care addresses all dimensions of suffering: physical pain, emotional distress, spiritual concerns, and cultural practices.","CORRECT — Autonomy is a fundamental ethical principle. The nurse advocates for the client's right to make their own care decisions.","CORRECT — Family involvement (per client wishes) provides social support and facilitates the grief process for both client and family."],
rat:"EOL nursing relationships are built on presence, honesty, holistic assessment, and advocacy for autonomy. Key NCLEX principle: withholding prognosis is paternalistic and violates autonomy. Therapeutic silence and physical presence are underrated tools. ATI emphasizes addressing ALL four domains: physical, psychological, social, spiritual."},

// ── MODULE 2: CARDIAC + NEURO + RESPIRATORY (with ECG images) ──

{id:131,mod:2,type:"mcq",
stem:"Examine the rhythm strip below. Which rhythm does this ECG represent?",
svg:_NSR,
opts:["Atrial fibrillation","Sinus bradycardia","Normal sinus rhythm","First-degree AV block"],
ans:2,
why:["AFib would show absent P waves and irregular R-R intervals — this strip shows regular intervals with upright P waves before each QRS.","Sinus bradycardia has the same features but rate <60 bpm — this strip shows ~75 bpm.","✓ Regular R-R intervals, upright P wave before every QRS, narrow QRS, rate 60–100 bpm = Normal Sinus Rhythm.","1st degree AV block has a prolonged PR interval >0.20 sec — the PR interval here is normal."],
rat:"NSR criteria (Cardiac Rhythms lecture and Brunner Ch. 22): Rate 60–100 bpm, regular rhythm, P wave before every QRS (upright in lead II), PR 0.12–0.20 sec, narrow QRS <0.12 sec. All boxes checked = NSR.",
pearl:"The 300-method for rate: count large boxes between R waves. This strip shows ~4 boxes → 300/4 = 75 bpm. Confirm NSR by checking all five criteria — rate, rhythm, P waves, PR interval, QRS width."},

{id:132,mod:2,type:"mcq",
stem:"Examine the rhythm strip below. A patient is alert with BP 88/58. What is this rhythm and what is the PRIORITY intervention?",
svg:_VTACH,
opts:["Normal sinus rhythm — reassure the client and continue routine monitoring","Atrial fibrillation — initiate anticoagulation therapy and consult cardiology","Ventricular tachycardia with hemodynamic instability — prepare for synchronized cardioversion","Ventricular fibrillation — call a code and begin immediate unsynchronized defibrillation"],
ans:2,
why:["This is clearly an abnormal wide-complex tachycardia — not NSR.","AFib shows narrow QRS and irregular rhythm — this is wide and regular.","✓ Wide QRS, regular, ~150 bpm, no P waves = VT. Patient is CONSCIOUS but UNSTABLE (BP 88/58) → synchronized cardioversion. If pulseless → defibrillation.","VFib shows completely chaotic waveforms with no organized QRS — this has organized wide complexes."],
rat:"VT with pulse + hemodynamic instability → synchronized cardioversion. VT with pulse + stable → IV amiodarone or procainamide. Pulseless VT → treat like VFib (immediate defibrillation + CPR). The key differentiator: does the patient have a pulse?",
pearl:"Synchronized vs. unsynchronized shock: Synchronized = shock timed to the R wave (prevents VFib induction) → use for tachyarrhythmias WITH a pulse. Unsynchronized (defibrillation) = anytime, don't wait for R wave → use for VFib and pulseless VT."},

{id:133,mod:2,type:"mcq",
stem:"A patient is found unresponsive and pulseless. Examine the rhythm strip below. What is the FIRST intervention?",
svg:_VFIB,
opts:["Administer atropine 0.5 mg IV push to increase ventricular automaticity","Begin CPR immediately and defibrillate as soon as the device is available","Perform synchronized cardioversion at 200 joules and reassess the rhythm","Obtain a 12-lead ECG before initiating any treatment to confirm the diagnosis"],
ans:1,
why:["Atropine is used for symptomatic bradycardia — NOT VFib.","✓ VFib + pulseless = shockable rhythm. CPR immediately while charging defibrillator, then shock as soon as available. Every 1 minute without defibrillation reduces survival by ~10%.","Synchronized cardioversion is for rhythms WITH a pulse (unstable tachyarrhythmias).","Adenosine is for SVT (narrow-complex) — not VFib."],
rat:"Cardiac Rhythms lecture: VFib = shockable rhythm → immediate defibrillation + CPR + epinephrine every 3–5 min + amiodarone after 3rd shock. The rhythm shows completely chaotic coarse waveforms with no organized P, QRS, or T waves.",
pearl:"VFib management sequence (ACLS): Identify VFib → Call code → CPR → Charge defibrillator → Clear → Shock 200J (biphasic) → Immediately resume CPR (2 min) → Epinephrine 1 mg IV → Rhythm check → If VFib persists: shock again → Amiodarone 300 mg IV."},

{id:134,mod:2,type:"mcq",
stem:"Examine the rhythm strip below. The patient is alert, HR 38, BP 100/70, denying symptoms. What is this rhythm?",
svg:_BRADY,
opts:["Ventricular escape rhythm — wide QRS and no P waves indicate a ventricular origin","Sinus bradycardia — rate below 60 with narrow QRS and upright P waves; observe if asymptomatic","Junctional rhythm — absent or inverted P waves with a narrow QRS at 40 to 60 bpm","Third-degree heart block — P waves and QRS complexes are completely independent of each other"],
ans:1,
why:["Ventricular escape: wide QRS, no P waves, rate 20–45. This has narrow QRS and upright P waves.","✓ All features of sinus rhythm (upright P before each QRS, normal PR, narrow QRS) but rate <60 = sinus bradycardia. Patient is asymptomatic → monitor only.","Junctional: absent or inverted P waves, rate 40–60, narrow QRS.","3rd degree: P waves and QRS completely independent of each other."],
rat:"Sinus bradycardia: rate <60, regular, normal P before every QRS. Treatment ONLY if symptomatic (hypotension, chest pain, syncope, altered LOC) → atropine 0.5 mg IV → transcutaneous pacing → dopamine/epinephrine. Asymptomatic bradycardia = observe.",
pearl:"Common causes of sinus bradycardia: athletes (physiologically normal), vagal stimulation (Valsalva, vomiting), inferior MI (RCA supplies SA node), hypothyroidism, hypothermia, beta-blockers, calcium channel blockers, digoxin toxicity, increased ICP."},

{id:135,mod:2,type:"mcq",
stem:"Examine the rhythm strip below. The patient is conscious with BP 72/44. What is this rhythm and what is the CORRECT intervention?",
svg:_AFIB,
opts:["Normal sinus rhythm — rate and rhythm are within normal limits, no intervention needed","Sinus tachycardia — identify and treat the underlying cause driving the elevated heart rate","Atrial fibrillation with hemodynamic instability — prepare for synchronized cardioversion","Atrial fibrillation with stable hemodynamics — initiate rate control and anticoagulation"],
ans:2,
why:["This is clearly not NSR — no P waves, irregular.","Sinus tachycardia has regular rhythm and visible P waves.","✓ No P waves + irregular R-R intervals + fibrillatory baseline = AFib. Patient is UNSTABLE (BP 72/44) → synchronized cardioversion. Stable AFib → rate control + anticoagulation.","Observation is appropriate for STABLE AFib — not with a BP of 72/44."],
rat:"AFib management: Stable → rate control (beta-blocker, diltiazem) + anticoagulation (CHA₂DS₂-VASc score). Unstable (hypotension, chest pain, altered LOC) → IMMEDIATE synchronized cardioversion. If AFib onset <48 hours → cardioversion can proceed. >48 hours or unknown → anticoagulate first (clot risk) unless emergent.",
pearl:"AFib key clues: 'Irregularly irregular' + 'no distinct P waves' + 'fibrillatory (wavy) baseline' + normal QRS (unless bundle branch block). Rate: atrial >300 chaotically; ventricular variable. Stroke risk 5× normal — CHA₂DS₂-VASc ≥2 (men) or ≥3 (women) → anticoagulate."},

{id:136,mod:2,type:"mcq",
stem:"Examine the rhythm strip below. The monitor shows a completely flat line. The patient is pulseless. What is this rhythm and what is the CORRECT treatment?",
svg:_ASYSTOLE,
opts:["Ventricular fibrillation — defibrillate immediately","Asystole — CPR + epinephrine; do NOT defibrillate","Pulseless electrical activity — synchronized cardioversion","Sinus bradycardia — administer atropine 0.5 mg IV"],
ans:1,
why:["Asystole is NOT a shockable rhythm. Defibrillating asystole has no benefit and may worsen outcomes.","✓ Cardiac Rhythms lecture: Asystole = flat line, confirm in 2 leads (rule out lead disconnect/equipment error), no electrical activity, non-shockable → CPR + epinephrine 1 mg IV every 3–5 min + treat reversible causes (Hs and Ts).","Synchronized cardioversion is for tachyarrhythmias with a pulse.","Sinus bradycardia has visible P waves and QRS complexes — asystole has neither."],
rat:"Asystole: cardiac arrest, flat ECG line, always confirm in TWO leads (loose lead can mimic asystole). Non-shockable: CPR + epinephrine + identify reversible causes (Hs: Hypovolemia, Hypoxia, H+ acidosis, Hypo/Hyperkalemia, Hypothermia; Ts: Tension pneumo, Tamponade, Toxins, Thrombosis).",
pearl:"Hs and Ts of cardiac arrest: Hypovolemia, Hypoxia, Hydrogen ion (acidosis), Hypo/Hyperkalemia, Hypothermia; Tension pneumothorax, Tamponade, Toxins, Thrombosis (PE), Thrombosis (coronary = MI). Treating the reversible cause is the only way to achieve ROSC in asystole/PEA."},

{id:137,mod:2,type:"mcq",
stem:"Examine the rhythm strip below. The PR interval progressively lengthens over several beats before a QRS is dropped, then the cycle resets. What is this rhythm?",
svg:_WENCK,
opts:["First-degree AV block — the PR interval is prolonged but constant with no dropped beats","Second-degree AV Block Type II (Mobitz II) — sudden dropped QRS without prior PR lengthening","Second-degree AV Block Type I (Wenckebach) — progressive PR lengthening until a QRS is dropped","Third-degree heart block — P waves and QRS complexes beat completely independently"],
ans:2,
why:["1st degree: consistently prolonged PR — no dropped beats and no cycle variation.","Mobitz II: CONSTANT PR, then SUDDEN unexpected dropped QRS — no progressive lengthening.","✓ Progressive PR lengthening → dropped QRS → cycle resets = classic Wenckebach (Mobitz I). AV node level block.","3rd degree: P waves and QRS completely independent, marching at different rates."],
rat:"Wenckebach: AV node issue, often caused by inferior MI (RCA supplies AV node), vagal tone, beta-blockers, digoxin. Usually benign, often reversible. May not require treatment unless symptomatic. Mobitz II is more dangerous (infranodal) and may require pacemaker.",
pearl:"Cardiac Rhythms lecture heart block poem: 'If the R is far from P = First degree. Longer, longer, longer, QRS drop = Wenckebach. If some P's just don't go through = Mobitz Two. If P's and Q's just don't agree = Third degree.'"},

{id:138,mod:2,type:"mcq",
stem:"Examine the rhythm strip below. The PR interval is consistently prolonged at 0.28 seconds, with a P wave before every QRS and no dropped beats. What is this rhythm?",
svg:_AVB1,
opts:["Normal sinus rhythm — all intervals are within normal limits and no intervention is needed","Second-degree AV block Type I (Wenckebach) — PR interval progressively lengthens before a drop","First-degree AV block — PR interval consistently exceeds 0.20 seconds with conduction to every QRS","Third-degree heart block — complete dissociation between P waves and QRS complexes"],
ans:2,
why:["NSR requires PR 0.12–0.20 sec — 0.28 sec is prolonged.","Wenckebach: PR progressively lengthens with dropped beats — this PR is CONSTANT.","✓ First-degree AV block: PR consistently >0.20 sec, every P conducts to QRS, regular rhythm. It is a DELAY, not a true block. Brunner Ch. 10 confirms: 'So it's actually a delay, not a complete block.'","3rd degree: P and QRS independent of each other — here every P precedes a QRS."],
rat:"First-degree AV block: PR >0.20 sec (>5 small boxes), each P conducts, regular rhythm. Usually benign. Causes: vagal tone, inferior MI, beta-blockers, calcium channel blockers, digoxin. No treatment required unless progression to higher-degree block.",
pearl:"Monitor patients with 1st degree block for progression, especially those on AV-nodal slowing medications (beta-blockers, CCBs, digoxin, amiodarone). Serial ECGs with any new symptoms. First-degree block alone is not an indication to stop these medications."},

{id:139,mod:2,type:"mcq",
stem:"Examine the ECG waveform diagram below. What does the ST segment represent?",
svg:_ECGWAVE,
opts:["Atrial depolarization generating the P wave visible at the beginning of the cardiac cycle","The period between end of ventricular depolarization and onset of ventricular repolarization","Conduction time from the SA node through the AV node represented by the PR interval","Complete ventricular repolarization represented by the T wave on the ECG tracing"],
ans:1,
why:["Atrial depolarization = P wave.","✓ The ST segment (from end of S wave to start of T wave) represents the period after ventricular depolarization when the ventricles are in a uniform state before repolarization begins — normally isoelectric (flat at baseline).","SA to AV conduction = PR interval.","Ventricular repolarization = T wave."],
rat:"Brunner Ch. 22: ST segment = 'the part of an ECG that reflects the end of the QRS complex to the beginning of the T wave.' Clinically critical: ST elevation = STEMI (acute ischemia/injury). ST depression = subendocardial ischemia or NSTEMI.",
pearl:"Normal ST segment: flat (isoelectric) at the baseline. ST elevation ≥1 mm in 2 contiguous leads = STEMI. ST depression = NSTEMI/unstable angina. Hyperacute T waves (tall, peaked) = very early STEMI sign. J-point elevation in young athletes = benign early repolarization."},

{id:140,mod:2,type:"fib",
stem:"A nursing student is reviewing cardiac conduction. Complete the following:\n\nThe sinoatrial (SA) node — the primary pacemaker of the heart — normally fires at a rate of _____ to _____ impulses per minute in a healthy adult at rest.",
blanks:["Impulses per minute"],
ans:["60 to 100"],
alt_answers:["60-100","60 to 100 bpm","60-100 bpm","60 to 100 beats per minute"],
why:"The SA node is the primary pacemaker firing at 60-100 bpm. Backup pacemakers: AV node 40-60 bpm, Bundle of His/Purkinje fibers 20-40 bpm. The SA node dominates because it has the highest intrinsic rate — whichever pacemaker fires fastest controls the heart.",
rat:"Pacemaker hierarchy (fastest wins): SA node (60-100) → AV node (40-60) → Bundle of His/Purkinje (20-40). If SA fails, AV takes over (junctional rhythm). If AV fails, ventricular escape rhythm (wide QRS at 20-40 bpm). A rate <60 from the SA node = sinus bradycardia. >100 = sinus tachycardia."},

{id:141,mod:2,type:"mcq",
stem:"Which statement about the left ventricle is correct?",
opts:["The left ventricle pumps deoxygenated blood to the lungs via the pulmonary artery","The left ventricle is thinner than the right because it works against lower systemic pressures","The left ventricle is two to three times more muscular because it ejects blood against high systemic arterial resistance","The left ventricle receives deoxygenated blood from the superior and inferior vena cava"],
ans:2,
why:["The LEFT ventricle pumps OXYGENATED blood to the systemic circulation via the aorta. The RIGHT ventricle pumps deoxygenated blood to the lungs.","The LEFT ventricle is THICKER/more muscular, not thinner.","✓ Brunner Ch. 21: 'The left ventricle is two to three times more muscular than the right ventricle. It must overcome high aortic and arterial pressures, whereas the right ventricle contracts against a low-pressure system.'","The superior and inferior vena cava drain into the RIGHT atrium."],
rat:"Brunner Ch. 21 cardiac anatomy: Left ventricle → aorta → systemic circulation (high pressure). Right ventricle → pulmonary artery → lungs (low pressure). The workload difference explains the thickness difference. Chronic hypertension → LVH (left ventricular hypertrophy).",
pearl:"Left ventricular hypertrophy (LVH) on ECG: increased QRS voltage (tall R waves in left leads, deep S in right leads). LVH is a consequence of chronic increased afterload (hypertension, aortic stenosis) — a risk factor for arrhythmias, heart failure, and sudden death."},

{id:142,mod:2,type:"mcq",
stem:"The pericardial space normally contains approximately how much fluid, and what is its purpose?",
opts:["Approximately 500 mL of fluid that cushions the heart from external physical trauma","About 20 mL of fluid that lubricates the heart surface and reduces friction during each contraction","About 200 mL of fluid that delivers nutrients directly to the outer myocardial tissue","No fluid is present — the pericardial space is normally a potential space with no measurable fluid"],
ans:1,
why:["500 mL would be massive pericardial effusion — abnormal.","✓ Brunner Ch. 21: 'The space between these two layers (pericardial space) is normally filled with about 20 mL of fluid, which lubricates the surface of the heart and reduces friction during systole.'","The coronary arteries supply nutrients — not pericardial fluid.","The space does contain fluid normally — 20 mL."],
rat:"Pericardial anatomy (Brunner Ch. 21): Two pericardial layers: visceral pericardium (adheres to epicardium) and parietal pericardium (tough outer layer attached to great vessels, diaphragm, sternum, vertebral column). Space between = ~20 mL lubricating fluid.",
pearl:"Cardiac tamponade occurs when excess pericardial fluid (blood, effusion) compresses the heart — even 100–200 mL accumulating rapidly can cause tamponade. Beck's triad: muffled heart sounds + hypotension + JVD. Treatment: pericardiocentesis (needle drainage)."},

{id:143,mod:2,type:"mcq",
stem:"Which is the CORRECT description of decerebrate posturing?",
opts:["Abnormal flexion of the upper extremities with extension of the lower extremities","Extreme extension of both the upper and lower extremities associated with brainstem-level injury","Flaccid paralysis of all four extremities indicating late-stage brain death","Voluntary withdrawal from painful stimuli indicating intact cortical pain perception"],
ans:1,
why:["Abnormal FLEXION of upper + extension of lower = DECORTICATE posturing (indicates cortical damage — 'cortex' = arms curl toward the 'core').","✓ Brunner Ch. 61 glossary: 'Decerebration: an abnormal body posture associated with severe brain injury, characterized by extreme EXTENSION of the upper and lower extremities.'","Flaccid paralysis = bilateral flaccidity occurs before death (very late sign).","Posturing is a pathological, not normal, response."],
rat:"Brunner Ch. 61 posturing: Decorticate = upper extremity FLEXION + lower extremity extension (damage above brain stem, cerebral cortex level). Decerebrate = ALL EXTREMITIES EXTENDED (damage at brain stem level — more severe, worse prognosis). Both indicate serious brain injury.",
pearl:"Memory trick: DeCORticate = arms curl toward the CORE (flexion). DeCEREBrate = all rigid EXTENSION (like a board). Decerebrate > decorticate in severity. Both occur as signs of increasing ICP and brain herniation — assess and report immediately."},

{id:144,mod:2,type:"mcq",
stem:"A client with a traumatic brain injury is being monitored for increased intracranial pressure. Which finding represents a LATE sign of increasing ICP?",
opts:["Mental confusion and restlessness reflecting early sensitivity of cognitive cells to hypoxia","Unilateral extremity weakness from early compression of the descending motor tracts","Constant severe headache that progressively worsens with movement or position changes","Bradycardia, hypertension, widening pulse pressure, and irregular respirations — Cushing's triad"],
ans:3,
why:["Mental confusion and restlessness = EARLY ICP sign.","Unilateral extremity weakness = EARLY sign (pyramidal tract compression).","Constant, increasing headache = EARLY sign.","✓ Blueprint/Brunner Chart 61-1 Late signs: 'LOC continues to deteriorate until comatose (GCS ≤8). Pulse rate and respiratory rate decrease or become erratic. Blood pressure and temperature increase. Pulse pressure widens.'"],
rat:"Late ICP signs (Brunner Chart 61-1): Cushing's triad (bradycardia, hypertension, irregular respirations), widening pulse pressure, Cheyne-Stokes or ataxic breathing, projectile vomiting, hemiplegia, decerebrate/decorticate posturing, loss of brain stem reflexes (pupillary, corneal, gag, swallowing), bilateral pupil changes.",
pearl:"Cushing's triad = VERY LATE sign of ICP (brain herniation imminent): Bradycardia + Hypertension + Irregular respirations. Do NOT wait for Cushing's triad — by this point brain herniation may be occurring. Act on EARLY signs (confusion, restlessness, pupil changes)."},

{id:145,mod:2,type:"mcq",
stem:"Which best describes ATAXIA?",
opts:["Loss of ability to recognize familiar objects through a specific sensory system — agnosia","Increased resistance to passive muscle stretch at rest reflecting increased resting muscle tone","Inability to coordinate muscle movements resulting in difficulty walking, talking, and performing self-care","An illusion of movement in which the client or surrounding environment appears to be spinning"],
ans:2,
why:["Loss of ability to recognize objects through a sensory system = AGNOSIA.","Increased muscle tone at rest = RIGIDITY.","✓ Brunner Ch. 60 glossary: 'Ataxia: inability to coordinate muscle movements, resulting in difficulty in walking, talking, and performing self-care activities.'","Illusion of movement = VERTIGO."],
rat:"Brunner Ch. 60 neurological terms: Ataxia=incoordination; Agnosia=can't recognize objects; Rigidity=↑muscle tone; Spasticity=↑tension when stretched; Flaccidity=limp/hypotonic; Vertigo=illusion of movement; Clonus=alternating rapid contraction/relaxation.",
pearl:"Causes of ataxia: cerebellar disease (cerebellar stroke, MS, alcoholic cerebellar degeneration), proprioceptive loss (vitamin B12 deficiency, tabes dorsalis), vestibular disease. Assessment: gait, finger-nose-finger test, heel-shin test, Romberg test."},

{id:146,mod:2,type:"mcq",
stem:"A client is being treated for metabolic alkalosis caused by prolonged nasogastric suctioning. Which IV fluid does the nurse anticipate administering to restore fluid volume and correct the alkalosis?",
opts:["Lactated Ringer's solution — contains bicarbonate precursors that buffer metabolic alkalosis","Normal saline 0.9% — restoring chloride and volume stops the renal retention of bicarbonate","Half-normal saline 0.45% — hypotonic solution preferred for hypertonic fluid corrections","3% hypertonic saline — used in cases of severe symptomatic hyponatremia"],
ans:2,
why:["LR is used for metabolic acidosis (contains lactate → bicarbonate). It would worsen alkalosis.","0.45% NS is hypotonic — used for hypernatremia correction, not alkalosis.","✓ Brunner Ch. 10: 'Treatment includes restoring normal fluid volume by administering normal saline because continued volume depletion perpetuates the alkalosis.'","3% saline is for severe hyponatremia — not metabolic alkalosis."],
rat:"Metabolic alkalosis from vomiting/GI loss: fluid/chloride depletion → kidneys retain Na+ with HCO3- → alkalosis perpetuates. Restoring volume with 0.9% NS corrects chloride deficit and stops the compensatory HCO3- retention. Add KCl to replace potassium losses.",
pearl:"Brunner Ch. 10 also notes: proton pump inhibitors (omeprazole) reduce HCl production — useful when alkalosis is driven by ongoing gastric losses (e.g., continuous NG suction). Acetazolamide (carbonic anhydrase inhibitor) enhances HCO3- excretion — useful in heart failure patients who cannot tolerate fluid loading."},

{id:147,mod:2,type:"mcq",
stem:"A client is admitted following a panic attack. ABG results show pH 7.52, PaCO2 28 mmHg, HCO3 23 mEq/L. Which acid-base imbalance does the nurse identify?",
opts:["Metabolic alkalosis — elevated pH with elevated bicarbonate","Respiratory acidosis — low pH caused by CO2 retention","Respiratory alkalosis — elevated pH caused by excessive CO2 loss from hyperventilation","Metabolic acidosis — low pH with decreased bicarbonate"],
ans:2,
why:["Metabolic alkalosis = elevated pH + elevated HCO3 — this client's HCO3 is normal (23).","Respiratory acidosis = low pH + elevated CO2 — this client has high pH and low CO2.","✓ pH >7.45 (alkalotic) + PaCO2 <35 (low, from hyperventilation blowing off CO2) + HCO3 normal = respiratory alkalosis. Classic panic attack/hyperventilation presentation.","Metabolic acidosis = low pH + low HCO3 — opposite of this client's findings."],
rat:"Respiratory alkalosis: pH >7.45, PaCO2 <35 (hyperventilation blows off CO2). Causes per Brunner: extreme anxiety, fever, salicylate toxicity (early), brain lesions, mechanical ventilation over-ventilation, pain, hypoxemia (early response). Compensation: kidneys excrete HCO3-.",
pearl:"Clinical signs of respiratory alkalosis: lightheadedness, numbness/tingling in extremities and around mouth (perioral paresthesias), carpopedal spasm, possible syncope — all due to decreased ionized calcium (alkalosis → calcium binds to proteins). Treatment: address the cause; paper bag breathing for anxiety-driven hyperventilation."},

{id:148,mod:2,type:"mcq",
stem:"A client with COPD and a chronic PaCO2 of 58 mmHg is receiving supplemental oxygen. Which statement best explains the physiologic risk of administering high-flow oxygen to this client?",
opts:["Elevated PaCO2 still drives breathing normally","Hypoxemia (low PaO2) is now the major drive for respiration","Plasma bicarbonate level drives respiration","Body temperature regulates breathing in COPD"],
ans:1,
why:["The respiratory center has lost sensitivity to CO2 in chronic CO2 retention — CO2 no longer reliably drives respiration.","✓ Brunner Ch. 10 Quality and Safety Alert: 'If the PaCO2 is chronically greater than 50 mm Hg, the respiratory center becomes relatively insensitive to CO2 as a respiratory stimulant, leaving HYPOXEMIA as the major drive for respiration.'","Bicarbonate does not directly drive respiration.","Temperature affects metabolic rate but is not the primary respiratory drive."],
rat:"This is the physiologic basis for controlled oxygen therapy in COPD. Giving high-flow O2 corrects hypoxemia → removes the hypoxic drive → patient hypoventilates → CO2 rises → CO2 narcosis → respiratory failure. Target SpO2 88–92% in known CO2 retainers.",
pearl:"NCLEX high-yield: Never give high-flow oxygen to a COPD patient without monitoring. If a COPD patient's LOC decreases after receiving O2, suspect CO2 narcosis. Get an ABG, titrate O2 down, and consider BiPAP support. Venturi mask is the most precise delivery device for controlled O2 therapy."},

{id:149,mod:2,type:"sata",
stem:"Which statements about VENTRICULAR ARRHYTHMIAS are correct? (Select ALL that apply)",
opts:["The electrical impulse originates in the ventricles, below the AV node","QRS complexes are typically wide and abnormal (>0.12 sec)","Ventricular fibrillation (VFib) produces no organized rhythm and no cardiac output","PVCs (premature ventricular contractions) are always a medical emergency requiring immediate treatment","VFib and pulseless VT are shockable rhythms treated with defibrillation"],
ans:[0,1,2,4],
why:["✓ Cardiac Rhythms lecture: impulse originates IN the ventricles, BELOW the AV node.","✓ Lecture: because conduction follows an abnormal pathway, QRS complexes are typically wide and abnormal.","✓ Lecture: VFib = chaotic, no organized rhythm, no contraction, no cardiac output.","PVCs are common and often benign. Isolated PVCs rarely require immediate treatment unless frequent (>6/min), multifocal, in runs, or occurring on T wave (R-on-T phenomenon).","✓ Lecture: VFib and pulseless VT = shockable rhythms → defibrillation + CPR."],
rat:"Cardiac Rhythms lecture on ventricular arrhythmias: originate below AV node, wide QRS, can be life-threatening. PVCs = early beats with wide abnormal QRS + compensatory pause. VT = rapid, regular, wide-complex. VFib = chaotic, pulseless, fatal without immediate defibrillation.",
pearl:"R-on-T phenomenon: PVC landing on the T wave (vulnerable period of ventricular repolarization) can trigger VFib. This is why PVCs on the T wave are concerning. Monitor patients on QT-prolonging medications carefully for this pattern."},

{id:150,mod:2,type:"hotspot",
stem:"A nurse is preparing to perform a complete cardiac auscultation assessment. The diagram below shows the anterior chest wall.\n\nClick on the location that represents ERB'S POINT — the site where S1 and S2 are equal in intensity and where aortic regurgitation murmurs are best heard.",
findings:[{text:"2nd ICS, Right Sternal Border (Aortic)"},{text:"2nd ICS, Left Sternal Border (Pulmonic)"},{text:"3rd ICS, Left Sternal Border (Erb's Point)"},{text:"4th ICS, Left Sternal Border (Tricuspid)"},{text:"5th ICS, Left Midclavicular Line (Mitral/Apex)"}],
ans:[2],
why:["2nd ICS RSB = Aortic area. S2 > S1 here. Best for aortic stenosis murmur.","2nd ICS LSB = Pulmonic area. Best for pulmonic stenosis/regurgitation.","CORRECT — 3rd ICS LSB = Erb's Point. S1 = S2 intensity. Best for aortic regurgitation. Mnemonic: All People Enjoy Time Magazine (Aortic-Pulmonic-Erb's-Tricuspid-Mitral).","4th ICS LSB = Tricuspid area. Best for tricuspid murmurs, right-sided sounds.","5th ICS MCL = Mitral/Apex. Loudest S1. PMI palpated here. Best for mitral stenosis/regurgitation and S3/S4."],
rat:"APETM mnemonic: Aortic (2R), Pulmonic (2L), Erb's (3L), Tricuspid (4L), Mitral (5L-MCL). Erb's is the only site with equal S1=S2. Clinical pearl: murmurs that radiate to Erb's point are often aortic in origin. Erb's point is also the best site to hear S3 in some clients."},

{id:151,mod:3,type:"mcq",
stem:"Examine the IV catheter gauge reference chart below. A client requires a blood transfusion. What is the minimum catheter gauge the nurse should use?",
svg:_IVGAUGE,
opts:["24-gauge — the smallest standard gauge, used for pediatric and fragile veins only","22-gauge — acceptable for slow infusions but causes red cell hemolysis with rapid flow","20-gauge — the minimum acceptable catheter size for safe blood product administration","18-gauge — the preferred gauge for rapid or large-volume blood product transfusion"],
ans:2,
why:["24-gauge is too small — red cells are hemolyzed when forced through it.","22-gauge is not acceptable for blood — causes hemolysis and is not recommended per the IV lecture.","✓ IV lecture: 'Pink (20): Medications, hydration, transfusions.' 20-gauge is the minimum acceptable for blood products.","18-gauge is preferred but 20-gauge is acceptable. 18 is not universally required for all transfusions."],
rat:"IV lecture catheter guide: 18-gauge (green) = preferred for transfusion; 20-gauge (pink) = minimum acceptable. Gauges smaller than 20 cannot safely administer blood products — red cell hemolysis occurs from shear forces in the narrow lumen. Always use at least a 20-gauge for blood.",
pearl:"For rapid transfusion (massive hemorrhage, trauma) → 14 or 16-gauge preferred. For routine single unit transfusion in a stable patient → 18 or 20-gauge acceptable. Blood must be administered through blood filter tubing and flushed only with 0.9% NS (never dextrose solutions or LR)."},

{id:152,mod:3,type:"mcq",
stem:"Examine the phlebitis grading scale below. A patient has erythema, edema, pain, and a visible streak extending 4 cm proximal to the IV site, with a palpable cord. How is this graded and what should the nurse do?",
svg:_PHLEBITIS,
opts:["Grade 1 — erythema only at the site with possible mild pain, no edema or streak","Grade 2 — erythema, edema, and pain at the insertion site without streak or cord","Grade 3 — erythema, edema, pain, streak formation, and a palpable venous cord along the vein","Grade 4 — all Grade 3 features plus a cord greater than 1 inch and purulent drainage"],
ans:2,
why:["Grade 1 = erythema ± pain only — this patient has more than that.","Grade 2 = erythema + edema + pain only — no streak or cord.","✓ Grade 3 = Grade 2 findings + streak formation + palpable venous cord. Action: REMOVE catheter, warm compresses, document, restart at new site proximal to or opposite from the phlebitic area.","Grade 4 = same as Grade 3 + palpable cord >1 inch + purulent drainage — this patient has no purulent drainage."],
rat:"Phlebitis treatment (IV lecture): All grades: remove catheter. Warm compresses. Document grade, location, interventions. Monitor for improvement. Restart IV at new site (not near the phlebitis). Grade 4 additionally: notify provider, culture drainage, monitor for bacteremia/sepsis.",
pearl:"Phlebitis prevention: use the smallest gauge appropriate for therapy, dilute irritating medications adequately, secure catheter to minimize movement, change dressing when soiled/lifted, maintain aseptic technique, assess site every hour. Chemical phlebitis (from acidic/alkaline meds) is most common."},

{id:153,mod:3,type:"mcq",
stem:"A nurse is preparing to connect IV tubing to a client's peripheral catheter. Which action best prevents air embolism?",
opts:["Use the largest gauge catheter available to maximize flow and reduce air entrainment risk","Ensure all IV tubing is fully primed with fluid, all connections are Luer-lock secured, and clamp tubing before disconnecting","Flush the IV line with 20 mL of normal saline rapidly after each use to clear any air","Change all IV tubing every 24 hours as the primary strategy to prevent air embolism"],
ans:1,
why:["Catheter gauge selection is for other reasons — not air embolism prevention.","✓ Air embolism prevention: eliminate all air from tubing before priming and connecting, secure all Luer-lock connections, clamp tubing when changing bags, and avoid leaving lines open to air.","Rapid flushing doesn't prevent air embolism.","Tubing replacement schedule is for infection prevention, not air embolism."],
rat:"Air embolism: air enters the venous system through an open IV line, connection, or during catheter removal. Symptoms: sudden chest pain, dyspnea, cyanosis, hypotension, 'mill wheel' murmur. Prevention: prime tubing completely, secure all connections, clamp before disconnecting, have patient perform Valsalva maneuver during catheter removal.",
pearl:"If air embolism is suspected: place patient in LEFT lateral Trendelenburg position (air rises to apex of right ventricle, away from pulmonary outflow tract), administer 100% O2, notify provider immediately. The left lateral position is the priority — prevents air from obstructing pulmonary circulation."},

{id:154,mod:3,type:"mcq",
stem:"Which statement about ASEPTIC TECHNIQUE during peripheral IV insertion is CORRECT?",
opts:["Gloves are optional if hands are washed immediately before insertion","Chlorhexidine is the preferred antiseptic — it must be allowed to air dry completely before insertion","Betadine (povidone-iodine) is the preferred antiseptic per current INS guidelines","The insertion site can be re-palpated after cleaning without contaminating the site"],
ans:1,
why:["Gloves are REQUIRED for all IV insertions — standard precautions.","✓ IV lecture and blueprint: chlorhexidine is the preferred antiseptic (shown in the lecture's chlorhexidine swab slide). Must air dry completely for maximum effectiveness (approximately 30 seconds minimum).","Current INS guidelines favor chlorhexidine gluconate + isopropyl alcohol over povidone-iodine.","Re-palpating the site AFTER cleaning contaminates the site — do not touch the insertion site after antiseptic application unless sterile gloves are worn."],
rat:"IV lecture chlorhexidine slide: chlorhexidine gluconate (2%) with 70% isopropyl alcohol is the preferred skin antiseptic for PIV insertion. Apply using back-and-forth friction for 30 seconds. Allow to air dry completely before insertion. Do not blow on or fan dry.",
pearl:"Why must chlorhexidine dry completely? The antimicrobial action continues as it dries — wet chlorhexidine is less effective. This applies to all procedures: central line insertion, blood cultures, IV starts. 'Dry before you try' is the clinical rule."},

{id:155,mod:3,type:"mcq",
stem:"'CLABSI prevention' as an objective even for peripheral IV nurses. What does CLABSI stand for and why is it relevant to peripheral IV care?",
opts:["Central Line-Associated Bloodstream Infection — peripheral IV sites carry the same risk of bacteremia as central lines","Catheter Lumen Assessment and Blood Sampling Instruction — a documentation protocol for IV nurses","Central Lab Analysis and Blood Specimen Inventory — a laboratory reporting classification system","Catheter Loss After Bloodstream Infection — a complication severity classification system"],
ans:0,
why:["✓ CLABSI = Central Line-Associated Bloodstream Infection. The blueprint specifically lists 'Recognize and prevent CLABSI crossover when caring for IV lines' — reminding nurses that IV access sites can become sources of bacteremia regardless of whether central or peripheral.","This is not a real acronym or standard.","This is not a real acronym or standard.","This is not a real acronym or standard."],
rat:"Blueprint Module 3: 'Maintain patient safety and infection prevention. Use proper hand hygiene and PPE during insertion and care. Adhere to standards for IV tubing and site changes. Recognize and prevent CLABSI crossover when caring for IV lines.' All IV lines carry infection risk.",
pearl:"IV-related infection bundle: 1) Hand hygiene before and after any IV access. 2) Chlorhexidine skin prep + allow to dry. 3) Sterile technique. 4) Secure catheter. 5) Date/label site. 6) Assess daily for necessity (remove when no longer needed). 6) Scrub the hub before every access ('scrub the hub' for ≥15 seconds)."},

{id:156,mod:3,type:"mcq",
stem:"Which solution is the ONLY acceptable IV fluid to run concurrently with or to flush blood products through a blood administration tubing?",
opts:["Lactated Ringer's (LR)","5% Dextrose in Water (D5W)","0.9% Normal Saline (NS)","Sterile water for injection"],
ans:2,
why:["LR contains calcium → can cause clumping of red cells and clot formation in the tubing.","D5W is hypotonic once metabolized — causes hemolysis of red blood cells via osmotic effect.","✓ Blood products are compatible ONLY with 0.9% Normal Saline. NS is used to prime blood tubing and flush before and after transfusion.","Sterile water is hypotonic and would cause severe hemolysis."],
rat:"Blood transfusion IV compatibility rule: 0.9% NS is the ONLY IV solution compatible with blood products. All other solutions — LR, D5W, D5NS, Plasmalyte, hypotonic salines, hypertonic salines — must NEVER be co-infused with blood. This is a patient safety non-negotiable.",
pearl:"Transfusion reaction signs: fever (most common), chills, back/flank pain, hemoglobinuria (pink/red urine), hypotension, tachycardia, wheezing, hives, anxiety, chest tightness. IMMEDIATE action: STOP transfusion, keep IV open with NS, notify provider, return blood bag to blood bank, send patient blood and urine samples."},

{id:157,mod:3,type:"fib",
stem:"A provider orders 500 mL of 5% Dextrose in 0.45% NS to infuse over 4 hours. The nurse selects macrodrip tubing with a drop factor of 10 gtt/mL.\n\nCalculate the drip rate. The nurse should set the flow to _____ gtt/min. (Round to the nearest whole number.)",
blanks:["Drip rate (gtt/min)"],
ans:["21"],
alt_answers:["21 gtt/min","21 drops/min","21 drops per minute"],
why:"Step 1: mL/hr = 500 ÷ 4 = 125 mL/hr. Step 2: gtt/min = (125 × 10) ÷ 60 = 1250 ÷ 60 = 20.8 → round to 21 gtt/min. Shortcut for 10 gtt/mL: divide mL/hr by 6 → 125 ÷ 6 = 20.8 → 21 gtt/min.",
rat:"10 gtt/mL shortcut: divide mL/hr by 6. Verification: 21 ÷ 4 = ~5 drops per 15 seconds at the bedside. D5W/0.45NS is a hypotonic solution used for free water replacement. Note: D5 solutions should not be used with blood products (causes hemolysis) or phenytoin (precipitates)."},

{id:158,mod:3,type:"mcq",
stem:"'verify compatibility of IV medications and solutions.' A patient has vancomycin ordered to infuse via a peripheral IV. The nurse recalls vancomycin requires special administration considerations. Which statement is CORRECT?",
opts:["Vancomycin can be given as a rapid IV push over 2 minutes","Vancomycin must be infused over at LEAST 60 minutes to prevent Red Man Syndrome","Vancomycin is always administered intramuscularly in outpatient settings","Vancomycin can be mixed with other antibiotics in the same IV bag"],
ans:1,
why:["IV push vancomycin causes Red Man Syndrome and is never appropriate.","✓ Vancomycin must be infused over ≥60 minutes (rate ≤10 mg/min). Rapid infusion causes mast cell degranulation → flushing, erythema, pruritus (Red Man Syndrome). Pre-medicate with diphenhydramine for susceptible patients.","Vancomycin is not available for IM administration.","Vancomycin should not be mixed with other drugs without verified compatibility."],
rat:"Vancomycin administration: dilute in 100–250 mL NS or D5W, infuse over ≥60 minutes. Red Man Syndrome prevention: slow infusion + premedication. Monitor: renal function (BUN/Cr), vancomycin trough levels (or AUC/MIC), signs of nephrotoxicity and ototoxicity.",
pearl:"Vancomycin is both nephrotoxic and ototoxic. Avoid concurrent use with aminoglycosides (additive nephrotoxicity/ototoxicity). Nephrotoxicity risk factors: high doses, prolonged therapy, pre-existing renal disease, dehydration, concomitant nephrotoxic drugs. Monitor urinalysis, BUN, creatinine during therapy."},

{id:159,mod:3,type:"mcq",
stem:"Which is the CORRECT procedure when a patient's peripheral IV is no longer needed and is to be discontinued?",
opts:["Apply a bandage and continue the infusion at a reduced rate to minimize further damage","Stop the infusion, apply pressure while withdrawing the catheter, inspect the tip for intactness, and apply a bandage","Aspirate the catheter with a syringe to confirm blood return before removing it","Flush the catheter with 10 mL of saline to clear any possible occlusion before removal"],
ans:1,
why:["No pressure risks hematoma formation — always apply pressure.","✓ Standard peripheral IV removal: remove securement/dressing, apply pressure with dry gauze while withdrawing catheter, apply firm pressure 1–2 minutes (longer for anticoagulated patients), inspect catheter tip for intactness (catheter embolism if broken), apply bandage.","Witnessing is not required for routine IV removal.","Heparin is not required before peripheral IV removal."],
rat:"IV discontinuation procedure: 1) Explain to patient, 2) Remove dressing/tape, 3) Apply dry gauze, 4) Withdraw catheter smoothly in same direction as vein, 5) Maintain firm pressure 1–2+ minutes, 6) Inspect tip for intactness, 7) Apply bandage, 8) Document site appearance and patient response.",
pearl:"Catheter EMBOLISM: if the catheter tip is not intact after removal, a fragment may have entered the venous circulation. Immediately apply tourniquet proximal to site (to slow travel), notify provider/radiology, prepare for imaging (X-ray can localize radiopaque catheter fragment). This is a rare but serious complication."},

{id:160,mod:3,type:"mcq",
stem:"'use infusion pumps or gravity (drop factor) devices correctly.' When should a nurse use an INFUSION PUMP rather than gravity infusion?",
opts:["Only for blood products — electronic pumps are not required for any other IV therapy","For high-alert medications, pediatric clients, critically ill clients, and any infusion requiring precise rate control","Only when specifically requested by the client or family for personal preference","For all infusions in the hospital regardless of medication type or client stability"],
ans:2,
why:["Blood products do use pumps but this is not the only indication.","Using pumps for every infusion is not always necessary (cost, availability).","✓ Infusion pumps are required for: high-alert medications (KCl, heparin, insulin, chemotherapy), pediatric patients (small volume precision critical), critical care, vesicants, epidurals, TPN — any situation where exact rate is critical.","Patient preference does not determine pump indication."],
rat:"Gravity infusion (drip rate): appropriate for stable patients receiving maintenance fluids where precise rate is less critical. Infusion pump: required when rate precision is critical (medications with narrow therapeutic windows, concentrated solutions, pediatric dosing). Pumps also provide alarms for occlusion, air, completion.",
pearl:"Pump safety: always program the pump with the drug library (Guardrails/smart pump technology) which has pre-set dose limits and alerts. Double-check pump settings with a second nurse for high-alert medications. 'Free-flow' protection is a required pump feature — prevents accidental bolus when tubing is removed."},

{id:161,mod:3,type:"mcq",
stem:"What distinguishes THROMBOPHLEBITIS from simple phlebitis?",
opts:["Phlebitis involves redness only — thrombophlebitis adds swelling at the insertion site","Thrombophlebitis involves both vein inflammation and clot formation within the affected vein segment","Thrombophlebitis occurs exclusively with central venous catheters and not peripheral IVs","Thrombophlebitis is a mild complication treated the same as Grade 1 phlebitis"],
ans:1,
why:["Redness alone = Grade 1 phlebitis — not thrombophlebitis.","✓ Thrombophlebitis = phlebitis (vein inflammation) + thrombus (blood clot) formation within the vein. The palpable cord in Grade 3–4 phlebitis represents a thrombosed (clotted) vein segment.","Thrombophlebitis occurs in peripheral veins as well as central lines.","Thrombophlebitis is more serious and may require anticoagulation in addition to catheter removal."],
rat:"Thrombophlebitis: vein inflammation + thrombus. The clot can dislodge and cause pulmonary embolism (rare with superficial peripheral veins but documented). Treatment: remove catheter, warm compresses, anticoagulation if extensive. Monitor for signs of septic thrombophlebitis (fever, bacteremia).",
pearl:"Septic thrombophlebitis = infected thrombus in the vein — can cause bacteremia and sepsis. Risk factors: prolonged catheter dwell time, immunocompromised patients, contaminated infusates, poor aseptic technique. Treatment: catheter removal + IV antibiotics + possible surgical vein excision in severe cases."},

{id:162,mod:3,type:"sata",
stem:"Which are correct principles for SAFE IV MEDICATION ADMINISTRATION? (Select ALL that apply)",
opts:["Verify TWO patient identifiers before every medication administration","Check compatibility before mixing any IV medications or adding to IV fluids","Administer IV push potassium chloride (KCl) rapidly to correct critical hypokalemia","Label all IV bags with drug name, dose, rate, date, time, and nurse initials","Perform a second-nurse verification for high-alert IV medications"],
ans:[0,1,3,4],
why:["✓ Two patient identifiers (name + DOB or MRN) before EVERY medication = TJC NPSG requirement.","✓ Compatibility verification before mixing = prevents precipitation, drug inactivation, patient harm.","IV PUSH KCl is FATAL — causes immediate cardiac arrest. Never administer KCl IV push under any circumstances. Always dilute and infuse via pump.","✓ Labeling all IV bags is a safety and regulatory requirement.","✓ High-alert medication double-check = standard safety practice for insulin, heparin, concentrated electrolytes, chemotherapy."],
rat:"Six Rights + Safety: Right patient (2 IDs), Right drug, Right dose, Right route, Right time, Right documentation. Add: Right reason and Right response. High-alert medications require double verification. KCl is a high-alert medication that must NEVER be given IV push.",
pearl:"The Joint Commission NPSGs for medication safety: 2 patient identifiers, medication reconciliation at all care transitions, standardized abbreviations (no 'U' for units, no trailing zeros, no QD). KCl is specifically listed as a high-alert medication that must be stored separately from other medications on clinical units."},

{id:163,mod:1,type:"mcq",
stem:"A client with end-stage COPD and their family ask the nurse to explain what hospice care involves. Which statement by the nurse is most accurate?",
opts:["Hospice care is available exclusively for clients with cancer-related terminal diagnoses","Hospice requires clients to continue at least one form of disease-directed treatment to remain eligible","Hospice is a Medicare Part A benefit for clients with a terminal illness and a prognosis of six months or less who elect comfort-focused care","Once enrolled in hospice, clients are permanently restricted from returning to curative treatment"],
ans:2,
why:["Hospice is available for ANY terminal diagnosis — not just cancer.","Patients must FOREGO (not continue) disease-directed treatment to enroll in hospice.","✓ Brunner Ch. 13 glossary: 'Medicare Hospice Benefit: a Medicare Part A entitlement that provides for comprehensive, interdisciplinary palliative care and services for eligible beneficiaries who have a terminal illness and a life expectancy of less than 6 months.'","Patients CAN revoke hospice and return to curative treatment — they are not locked in permanently."],
rat:"Medicare Hospice Benefit: Part A, terminal illness + prognosis ≤6 months, patient/family choose comfort over cure, physician certifies. Covers: medications related to terminal diagnosis, skilled nursing, social work, chaplaincy, aide services, bereavement (13 months post-death). Patients can revoke and re-enroll.",
pearl:"Common NCLEX misconception: 'Hospice means the patient will die within days.' Reality: patients can receive hospice for months. If a patient stabilizes or improves and no longer meets the ≤6-month prognosis, they may be discharged from hospice (and can re-enroll if condition worsens again)."},

{id:164,mod:3,type:"mcq",
stem:"Which of the following represents the PRIMARY ethical justification for a nurse administering opioids for pain in a terminally ill patient, even when the dose required might secondarily affect respiration?",
opts:["Distributive justice — ensuring equitable allocation of limited pain medications across all clients","The Principle of Double Effect — the intent is relief of suffering; respiratory depression is foreseen but not intended","Non-maleficence alone — do no harm always prohibits any action with a potentially harmful secondary effect","Veracity — the nurse is being transparent about the medication risks with the client and family"],
ans:1,
why:["Justice relates to fair resource distribution — not the rationale for opioid dosing.","✓ Brunner Ch. 13 discusses this explicitly: the purpose of palliative sedation and opioid analgesia 'is NOT to hasten the patient's death but to relieve intractable symptoms.' This is the Principle of Double Effect.","Non-maleficence alone would prohibit the opioid if harm was possible — the double effect principle resolves this tension.","Veracity = truth-telling; relevant but not the primary ethical justification here."],
rat:"Principle of Double Effect (Brunner Ch. 13): an action with both good and harmful effects is morally permissible when: (1) the action itself is not inherently wrong, (2) the agent intends only the good effect, (3) the harmful effect is foreseen but not intended, (4) the good effect is proportionate to the harm risked.",
pearl:"Landmark research: adequately dosed opioids for pain control do NOT shorten life in palliative patients and may actually extend life by reducing the physiologic stress of uncontrolled pain. Fear of 'killing' patients with morphine is a major barrier to adequate pain management — education is key."},

{id:165,mod:3,type:"mcq",
stem:"A nurse is preparing to start a peripheral IV on a patient who has a functional arteriovenous (AV) fistula in the left arm for hemodialysis. Where should the nurse insert the IV?",
opts:["Use the AV fistula arm — it has larger vessels and better access","Either arm is acceptable — it does not matter","Use the RIGHT arm only — NEVER use the arm with an AV fistula","The hand on the AV fistula side is acceptable if above the fistula"],
ans:2,
why:["The AV fistula arm must NEVER be used for IV access — this is an absolute contraindication.","It does matter significantly — using the fistula arm can destroy the fistula (the patient's lifeline for dialysis).","✓ IV lecture on IV site avoidance: NEVER use the arm with an AV fistula. Any puncture, compression, or blood pressure measurement on the fistula arm risks thrombosis, infection, or permanent damage to the fistula.","No site on the AV fistula arm is acceptable — the entire arm is off-limits."],
rat:"Sites to avoid for IV insertion: AV fistula arm (destroys lifeline), mastectomy-side arm (lymphedema/infection risk), paralyzed/hemiplegic limb (cannot detect complications), areas of infection or burns, antecubital fossa (limits mobility, high complication rate), lower extremities (DVT risk).",
pearl:"AV fistula protection rules: NO blood draws, NO IV access, NO blood pressure measurements, NO tight clothing/jewelry on the fistula arm. The fistula is the dialysis patient's lifeline — loss of fistula access can result in urgent central line placement with increased infection risk. Document and communicate fistula status clearly."},

{id:166,mod:3,type:"mcq",
stem:"A client with a chronic condition requires IV access for intermittent antibiotic therapy over the next 6 months. Which type of IV access is most appropriate?",
opts:["Peripheral IV in the forearm — most common type for short-term therapy","Peripheral IV in the antecubital fossa — large vein allows high-volume infusions","PICC line or tunneled central catheter — appropriate for long-term therapy lasting weeks to months","Intraosseous access — preferred for long-term medication delivery in adults"],
ans:2,
why:["Peripheral IVs are for SHORT-term therapy — they are not appropriate for 6 months of repeated access.","Antecubital PIV is suitable for short-term use only and limits mobility — not for months of therapy.","✓ Long-term therapy (weeks to months): PICC (weeks to months, can deliver all medications), tunneled CVC (months to years, chemotherapy/TPN), or implanted port (intermittent long-term). Peripheral access is not suitable.","Intraosseous access is for emergency situations only — not appropriate for long-term planned therapy."],
rat:"PIV indications: short-term therapy (days), IV fluids, isotonic medications, blood products. Central line indications: long-term therapy, concentrated/vesicant medications, TPN, hemodynamic monitoring, rapid fluid resuscitation with large-bore access.",
pearl:"Catheter selection guide: PIV = short-term, non-vesicant, isotonic meds. Midline = 2–4 weeks, non-vesicant only. PICC = weeks to months, all medications including TPN. Tunneled CVC (Hickman) = long-term (months to years), chemotherapy, TPN. Implanted port = intermittent long-term use, chemotherapy."},

{id:167,mod:1,type:"mcq",
stem:"A palliative care nurse is assessing a client's spiritual needs. Which concept best describes spirituality in the context of end-of-life care?",
opts:["Organized religious practice and formal participation in a faith community only","Personal belief systems focused on meaning, purpose, vitality, and connectedness to a transcendent dimension","The client's cultural heritage and ethnic background as documented in the medical record","Compliance with chaplaincy referrals and attendance at hospital-sponsored spiritual programs"],
ans:1,
why:["Spirituality is broader than organized religion — it includes non-religious personal meaning.","✓ Brunner Ch. 13 glossary: 'Spirituality: personal belief systems that focus on a search for meaning and purpose in life, intangible elements that impart meaning and vitality to life, and a connectedness to a higher or transcendent dimension.'","Spirituality is not measured by compliance with chaplaincy.","Cultural background is a separate component of holistic care."],
rat:"Brunner Ch. 13 identifies spirituality as a core domain of palliative care assessment (NCP 8 domains). Spiritual distress in dying patients: 'Why is this happening to me?' 'Is there meaning in my suffering?' Spiritual care: chaplaincy, active listening, life review, legacy work, rituals.",
pearl:"FICA Spiritual Assessment: F=Faith (what gives meaning?), I=Importance (how important is it?), C=Community (faith community involvement?), A=Address (how should we address spiritual needs?). A simple, non-intrusive way to open spiritual conversations with patients of any background."},

{id:168,mod:3,type:"mcq",
stem:"Which documentation entry for peripheral IV insertion is MOST complete and appropriate?",
opts:["'IV started in left hand' — date, time, nurse initials","'20G PIV left cephalic vein, 1st attempt, CHG prep dried, blood return confirmed, NS flush without resistance, site without redness swelling or induration, client tolerated' — date, time, signature","'Peripheral IV patent and functional in left arm' — date, time, nurse initials","'Client has left hand IV access, site looks good' — date, time, initials"],
ans:1,
why:["Too vague — gauge, attempts, site assessment, and patient response missing.","✓ Blueprint Module 3: 'Record insertion site, gauge, number of attempts, and patient response. Document infusion type, rate, and any complications/interventions.' This entry includes all required elements.","Too vague — no clinical specifics.","'Looks good' is not objective — describe what you observe (color, swelling, blood return, patency)."],
rat:"Complete IV insertion documentation per blueprint: anatomic site, vein used, gauge/length, number of attempts, antiseptic used, blood return confirmed, patency verified (flush), dressing type, infusion type and rate, patient response, date/time, nurse initials/signature.",
pearl:"Legal documentation principle: 'If it's not documented, it wasn't done.' In a malpractice case, your documentation is your defense. Use objective language: 'No redness, swelling, or induration at insertion site. Blood return confirmed. NS flush infuses without resistance. Patient denies pain at site.' Avoid subjective language like 'looks good.'"},

{id:169,mod:3,type:"mcq",
stem:"Which patient EDUCATION statement about peripheral IV care is CORRECT and should be included in patient teaching?",
opts:["'You can adjust the drip rate by moving the roller clamp if you feel the IV is running too slowly.'","'Report any pain, swelling, redness, or leakage at your IV site to your nurse immediately.'","'Keep your IV arm completely still and avoid all movement to prevent complications.'","'If your IV alarm beeps, wait for your nurse to come — do not touch the pump.'"],
ans:1,
why:["Patients should NEVER adjust IV flow rates — this is a safety risk.","✓ IV lecture blueprint: 'Teach signs of complications (pain, swelling, redness, leakage). Reinforce the importance of reporting changes promptly.'","Normal activity with an IV is acceptable — complete immobility is not necessary or realistic.","Patients should be taught to call the nurse when an alarm sounds — but the answer choice implies ignoring it, which is correct instruction. However, Option B is the most complete and directly source-based correct teaching point."],
rat:"Patient education per IV lecture blueprint: explain purpose and expected duration, teach complication signs (pain, swelling, redness, leakage), reinforce prompt reporting, instruct not to adjust rate, explain what to do when alarm sounds, teach how to move safely with the IV pole.",
pearl:"Empowered patients are an important safety check. When patients understand what normal vs. abnormal IV sites look and feel like, they often detect early complications before the next nursing assessment. Patient education is an autonomous nursing function and a legal and ethical obligation."},

{id:170,mod:1,type:"mcq",
stem:"A nurse is providing postmortem care for a deceased client. Which action is correct?",
opts:["Discourage family from viewing the body to prevent retraumatization from seeing the deceased","Complete all required paperwork and documentation before addressing the family's emotional needs","Listen to the family's grief, arrange for them to view the body if desired, and provide a private space for mourning","Immediately escort the family out of the unit after death to maintain workflow efficiency"],
ans:2,
why:["Research shows that viewing the body can SUPPORT healthy grieving — not harm it.","Paperwork should not take priority over family emotional support immediately after death.","✓ Chapter 44 PPTX: 'Listen to family's expressions of grief, loss, and helplessness. Offer solace and support by being an attentive listener. Arrange for family members to view the body. In case of sudden death, provide a PRIVATE place for family to begin grieving.'","Abruptly removing family is non-therapeutic and violates compassionate care standards."],
rat:"Postmortem family care (Chapter 44 PPTX): listen, offer solace, arrange viewing, provide privacy for sudden death, attend funeral if appropriate, make follow-up visit. Brunner Ch. 13: bereavement support continues for 13 months post-death under the Medicare Hospice Benefit.",
pearl:"The PPTX notes: 'It is appropriate for the nurse to attend the funeral and make a follow-up visit to the family.' While not a universal expectation, this represents the depth of the nurse-patient-family relationship in hospice/palliative care. Bereavement support is a core hospice service, not optional."}
