const QB_ATI30 = [

// ── MODULE 1 — Communication & End of Life (10 Qs) ──

{id:201,mod:1,type:"mcq",
stem:"A nurse is caring for a client who says, 'I feel like such a burden to my family.' Which response by the nurse is THERAPEUTIC?",
opts:["Leave the room to give the client private space to process the devastating news independently","Say 'I know this is hard, but there are great treatment options available for your diagnosis.'","Sit quietly beside the client and allow the silence — being present is the most therapeutic response","Begin explaining the treatment plan immediately to redirect the client toward something constructive"],
ans:2,
why:["False reassurance — dismisses the client's feeling without exploring it.","Redirects immediately to action before acknowledging the emotion.","✓ Reflects the feeling back (therapeutic), then uses an open-ended question to invite further expression. Does not dismiss or redirect prematurely.","'Try not to think like that' invalidates the client's expressed experience."],
rat:"The therapeutic response acknowledges the feeling first, then opens space for the client to elaborate. Options A and D are false reassurance. Option B redirects to problem-solving before the client feels heard — a common but non-therapeutic response.",
pearl:"ATI/NCLEX pattern: when a client expresses an emotion, the correct answer almost always REFLECTS the emotion and INVITES elaboration before taking any action. Never dismiss, reassure falsely, or redirect immediately."},

{id:202,mod:1,type:"mcq",
stem:"A nurse is teaching a client about their newly prescribed warfarin. The client responds to each instruction by nodding and saying 'I understand.' Which action by the nurse BEST evaluates comprehension?",
opts:["Document 'client verbalized understanding' and complete the discharge paperwork accordingly","Ask the client if they have any remaining questions about the medication or instructions","Tell the client they can call the clinic after discharge if any questions come up later","Ask the client to explain in their own words how they will take the medication and what side effects to watch for"],
ans:3,
why:["Documenting 'verbalized understanding' does not evaluate actual comprehension.","Asking if they have questions is passive — many clients say 'no' even when they do not understand.","Directing the client to call later does not evaluate present understanding.","✓ Teach-back: asking the client to explain in their own words is the gold standard for evaluating health literacy and true comprehension. It catches misunderstandings before discharge."],
rat:"Nodding and saying 'I understand' are not reliable indicators of comprehension — research consistently shows patients retain little of what is told verbally. Teach-back ('show me,' 'tell me back') is the evidence-based standard for evaluating patient education effectiveness.",
pearl:"Teach-back is an autonomous nursing function. Document the client's actual response, not just 'teaching done.' If the client cannot teach back correctly, re-teach using a different approach and document the return demonstration."},

{id:203,mod:1,type:"mcq",
stem:"A nurse enters a room and a client who is deaf does not notice the nurse's presence. Which action by the nurse is CORRECT?",
opts:["Call out the client's name loudly from the doorway to alert them before entering","Gently touch the client on the shoulder or move into their line of sight before initiating communication","Knock loudly on the doorframe several times and wait for the client to look up","Ask a nearby family member to get the client's attention before the nurse begins speaking"],
ans:1,
why:["A deaf client cannot hear their name called — this is ineffective.","✓ Lecture notes on deaf/HH patients: 'Orient the patient to your presence BEFORE initiating conversation. This may be done by gently touching the patient or moving so that you can be seen.'","Knocking is ineffective for a client who cannot hear.","Family should not be used as an intermediary when the nurse can address the client directly."],
rat:"Lecture notes: for deaf/HH patients, never assume they will notice your entry. Orient to your presence first (gentle touch or visual cue), then face them directly, use simple sentences, do not cover mouth, verify hearing aid function.",
pearl:"ATI pattern: 'Which action does the nurse take FIRST?' with a deaf client = orient to your presence before any communication begins. This is the first step, not an optional step."},

{id:204,mod:1,type:"mcq",
stem:"A hospice nurse is visiting a family 2 weeks after a client's death. The client's spouse states, 'I keep thinking I hear him in the other room. Am I going crazy?' Which response by the nurse is MOST appropriate?",
opts:["Refer the client immediately to psychiatry — this is a sign of complicated grief at two weeks","Normalize the experience — sensing the presence of a deceased loved one is common in early acute grief","Encourage the client to stay busy with activities to prevent these intrusive thoughts from occurring","Ask whether other family members have noticed behavioral changes in the client recently"],
ans:1,
why:["Sensing the deceased's presence is normal acute grief — not complicated grief requiring psychiatric referral at 2 weeks.","✓ Normalizing a common grief experience reduces the client's fear of 'going crazy' and builds trust. Sensing the presence of a deceased loved one is well-documented in normal grief literature.","'Keep busy' is a dismissive minimization of the grief experience.","Redirecting to family observation shifts focus away from the client and does not address their distress."],
rat:"Sensing the presence of a deceased loved one (auditory, visual, or tactile) is reported by up to 80% of bereaved spouses in the first year. It is a normal grief experience, not psychosis. The therapeutic response is to normalize and create space for further expression.",
pearl:"Hospice bereavement support continues for 13 months post-death (Medicare Hospice Benefit). If grief is significantly impairing function after 12 months, consider referral for complicated grief treatment (CGT), not sooner."},

{id:205,mod:1,type:"mcq",
stem:"A nurse is caring for a cognitively impaired client who needs to choose between two meal options. Which approach is MOST appropriate?",
opts:["Ask an open-ended question: 'What would you like for lunch today?'","Offer only one meal option to eliminate any confusion from having to make a decision","Present two specific options: 'Would you like the chicken or the pasta today?'","Skip asking the client directly and instead check with the family about food preferences"],
ans:2,
why:["Open-ended questions are too cognitively demanding for impaired clients — lecture notes specify avoiding open-ended questions with this population.","Offering no choice eliminates patient autonomy — the goal is to reduce cognitive demand while preserving choice.","✓ Lecture notes: 'Whenever possible, avoid open-ended questions. Ask would you like X or Y? instead of What would you like?' Limiting choices reduces cognitive demand while preserving autonomy.","Bypassing the client to consult family denies the client agency they may still possess."],
rat:"Lecture notes on communicating with cognitively impaired patients: keep communication simple and concrete, use limited-choice questions instead of open-ended, allow adequate response time, use pictures if appropriate. The client's autonomy is preserved through structured choices.",
pearl:"Two-choice questions are therapeutic for cognitively impaired clients, children, and clients with expressive aphasia. The nurse presents the choice simply and concretely, waits patiently, and accepts the response without rushing."},

{id:206,mod:1,type:"mcq",
stem:"A nurse is providing care to an unconscious client. A colleague states, 'There's no point in talking to her — she can't hear anything.' Which response by the nurse is CORRECT?",
opts:["Agree with the colleague and refocus exclusively on physical care tasks during the visit","Explain that hearing is believed to be the last sense lost — always speak normally and assume the client can hear","Ask the provider whether verbal communication is appropriate before speaking to this client","Speak to the client only when family members are present so they feel more comfortable"],
ans:1,
why:["Agreeing that communication is pointless contradicts evidence-based practice and lecture note content.","✓ Lecture notes: 'Assume the patient can hear you. Hearing is believed to be the last sense lost.' Communication with unconscious clients is always appropriate and potentially therapeutic.","No provider order is needed to maintain therapeutic communication with an unconscious client.","Communication should occur consistently, not only with family present."],
rat:"Evidence and lecture notes both support communication with unconscious patients. Nurses should explain procedures before touching, maintain normal tone, and be careful about what is said in the patient's presence. Negative comments at the bedside are never acceptable.",
pearl:"ATI pattern: 'which statement requires correction by the charge nurse?' — saying 'there's no point talking to an unconscious patient' is always the wrong statement. Always communicate. Always assume awareness."},

{id:207,mod:1,type:"mcq",
stem:"A nurse is completing Tanner's Model NOTICING step with a new client. Which action BEST represents this step?",
opts:["Calling the provider to report the client's abnormal vital signs and clinical findings","Administering a PRN pain medication based on the client's previously documented pain pattern","Sitting quietly in the hall after the visit to reflect on what went well and what to improve","Using open-ended questions and active observation to gather the full context of the client's symptoms and history"],
ans:3,
why:["Calling the provider = Responding step (acting on interpreted data).","Administering medication = Responding step.","Reflecting on the interaction = Reflecting step.","✓ Tanner's Model PPTX: 'Noticing → open-ended questions, active observation → elicits full context and patient concerns.' Noticing is the initial data-gathering step."],
rat:"Tanner's 4 steps: Noticing (perceive/gather) → Interpreting (make sense of data) → Responding (act) → Reflecting (evaluate and learn). Each step links to a specific communication technique. Noticing = open-ended questions + active observation.",
pearl:"Students often confuse Noticing with Assessment. Noticing in Tanner's Model is broader — it includes background knowledge, past experience with similar patients, and the nurse's attunement to what is salient. Two nurses can perform the same assessment and notice different things based on their knowledge and experience."},

{id:208,mod:1,type:"mcq",
stem:"A client with a terminal diagnosis states, 'If I can just make it to my granddaughter's graduation in three months, I'll be ready to let go.' Which stage of the Kübler-Ross grief model does this statement best represent?",
opts:["Denial — refusing to accept the terminal nature of the diagnosis","Anger — expressing frustration about the unfairness of the situation","Bargaining — attaching a condition or negotiated timeline to acceptance of death","Acceptance — coming to peace with the reality of dying"],
ans:2,
why:["Denial involves refusing to believe the diagnosis — this client clearly acknowledges dying.","Anger is characterized by expressions of injustice and rage — not conditional acceptance.","✓ Bargaining = 'If I can just get to X, then I'll be ready to die.' This is a conditional negotiation — a hallmark of the bargaining stage. The client is not ready to accept death yet but is beginning to process it.","Acceptance is unconditional peace with dying — this client's acceptance is still conditional on reaching a milestone."],
rat:"Kübler-Ross stages (DABDA): Denial → Anger → Bargaining → Depression → Acceptance. Bargaining is characterized by conditional thinking: 'If I can just...then...' Patients may bargain with God, medical providers, or fate. It is a normal part of grief processing.",
pearl:"Kübler-Ross stages are not linear and not universally experienced — patients may skip stages, revisit them, or experience multiple stages simultaneously. The nurse's role is never to push a patient toward the 'next' stage but to meet them where they are."},

{id:209,mod:1,type:"mcq",
stem:"A nurse is caring for a client from a culture where making direct eye contact with a healthcare provider is considered disrespectful. The client avoids eye contact during discharge teaching. Which action by the nurse is MOST appropriate?",
opts:["Stop the teaching and refer the client to a social worker for cultural assessment","Document that the client was uncooperative and disengaged","Continue the teaching without forcing eye contact and use teach-back to verify comprehension","Instruct the client that eye contact helps with learning and ask them to try"],
ans:2,
why:["A social worker referral is not indicated for a cultural communication style difference during routine teaching.","Labeling the client as 'uncooperative' reflects cultural bias, not clinical assessment.","✓ Therapeutic communication PPTX: 'Goal is to treat everyone as an INDIVIDUAL. Avoid stereotyping.' Adapt without judgment. Verify comprehension with teach-back regardless of nonverbal cues.","Instructing the client to change a culturally appropriate behavior is disrespectful and violates cultural sensitivity principles."],
rat:"Cultural sensitivity = adapting care to the individual without imposing one culture's norms. Eye contact norms vary widely. Teach-back is a more reliable indicator of comprehension than eye contact — use it with all patients, especially when cultural communication differences are present.",
pearl:"Never assume disengagement based on culturally different nonverbal behavior. The teach-back is your objective measure. Document what the client demonstrated, not what they appeared to feel. 'Client verbalized and demonstrated correct insulin injection technique' is objective and defensible."},

{id:210,mod:1,type:"mcq",
stem:"A client receiving palliative care for end-stage heart failure states, 'I know I'm dying. I just want to be comfortable and spend time with my family.' The client's adult child pulls the nurse aside and says, 'We want everything done — put him on a ventilator if needed.' Which action by the nurse is MOST appropriate?",
opts:["Comply with the family's request since they are the legal next of kin and can direct care","Explain that the client has decision-making capacity and that their expressed wishes take priority over family requests","Tell the family that the provider will make the final decision about the treatment plan","Document the family's request in the chart and take no further action at this time"],
ans:1,
why:["Next-of-kin decision-making authority only applies when the client LACKS decision-making capacity. This client is clearly stating their wishes — they retain capacity.","✓ A client with decision-making capacity has the right to direct their own care. The nurse's role is to advocate for the client's expressed wishes and facilitate communication between the family and care team.","The provider will be involved, but the nurse must first advocate for the client — not defer without action.","Documenting without advocating for the client is a failure of the nursing advocacy role."],
rat:"Patient autonomy: a client with decision-making capacity (oriented, understands diagnosis/prognosis/options, can communicate a choice) directs their own care. Family input is valuable but does not override the capacitated client's wishes. The nurse advocates for the patient's expressed wishes.",
pearl:"When family and patient goals conflict: 1) Assess that the client truly has capacity. 2) Clarify the client's goals clearly. 3) Facilitate a family meeting with the care team. 4) Consider palliative care/ethics consultation. 5) Document everything. Never abandon the client's stated wishes to appease family."},

// ── MODULE 2 — Cardiac, Neuro, Respiratory (12 Qs) ──

{id:211,mod:2,type:"mcq",
stem:"A nurse is reviewing a client's ECG. The rhythm is regular, rate 86 bpm, with a P wave before every QRS. The PR interval is 0.28 seconds. The QRS is 0.08 seconds. Which action does the nurse take FIRST?",
opts:["Prepare for immediate transcutaneous pacing — this rate is too low to be safe in any context","Administer atropine 0.5 mg IV push — this bradycardic rate requires urgent pharmacologic treatment","Continue monitoring and notify the provider — an asymptomatic 1st degree block at normal rate requires no emergency intervention","Prepare for synchronized cardioversion — this rhythm qualifies as an unstable tachyarrhythmia"],
ans:2,
why:["Transcutaneous pacing is for symptomatic bradycardia or high-degree blocks — this client's rate is 86 and there is no stated instability.","Atropine is for symptomatic bradycardia — this rate is normal and no symptoms are stated.","✓ First-degree AV block (PR >0.20 sec, no dropped beats, regular) in an asymptomatic client at normal rate = monitor, notify provider, document. No emergency intervention needed.","Cardioversion is for tachyarrhythmias with a pulse — this client's rate is 86."],
rat:"First-degree AV block: PR >0.20 sec, every P conducts, regular rhythm. Asymptomatic with normal rate = notification + monitoring only. Treatment is for the underlying cause (e.g., discontinue AV-nodal slowing drugs if newly started). Not an emergency.",
pearl:"ATI pattern: a question about a mildly abnormal ECG with a stable, asymptomatic client almost always has 'continue monitoring and notify the provider' as the correct action. Intervention questions require hemodynamic instability or symptoms."},

{id:212,mod:2,type:"mcq",
stem:"A nurse is caring for a client on a cardiac monitor. The rhythm suddenly changes to a pattern with no P waves, irregular R-R intervals, and a wavy baseline. The client is alert, BP 136/82. Which action does the nurse take FIRST?",
opts:["Call a code and begin CPR — no pulse means immediate resuscitation is required","Prepare for unsynchronized defibrillation — this pulseless rhythm requires immediate shocking","Assess the client at the bedside and notify the provider — atrial fibrillation in a stable client warrants monitoring not emergency shock","Administer adenosine 6 mg IV push — this is the first-line treatment for atrial fibrillation"],
ans:2,
why:["CPR is for pulseless arrest — this client is alert with a blood pressure.","Unsynchronized defibrillation is for pulseless VFib — this client is hemodynamically stable.","✓ AFib (no P waves, irregular R-R, fibrillatory baseline) in a STABLE client = assess client fully, notify provider, anticipate rate control and anticoagulation orders. No emergency shock needed.","Adenosine treats SVT (regular, narrow-complex tachycardia) — not AFib."],
rat:"AFib with stable hemodynamics: rate control (beta-blocker or CCB), anticoagulation (CHA₂DS₂-VASc score), assess for symptoms (palpitations, dyspnea, chest discomfort). Unstable AFib (hypotension, altered LOC, ischemic chest pain) → synchronized cardioversion.",
pearl:"The FIRST step with any new rhythm: assess the PATIENT, not just the monitor. 'Treat the patient, not the monitor.' Check: is there a pulse? Is the client symptomatic? What is the BP? This assessment determines whether the intervention is emergent or non-emergent."},

{id:213,mod:2,type:"mcq",
stem:"A nurse is assessing a client 4 hours post-craniotomy. Which finding requires IMMEDIATE notification of the provider?",
opts:["Blood pressure of 142/88 mmHg — mild hypertension is expected and routinely managed post-operatively","Temperature of 37.6°C — a low-grade fever is common in the first 24 hours after surgery","Right pupil 5 mm and non-reactive while the left pupil is 3 mm and brisk — unequal pupils after craniotomy","Mild headache rated 3 out of 10 — expected post-operative discomfort managed with analgesics"],
ans:2,
why:["Mild-moderate hypertension is common post-craniotomy and is monitored but not immediately alarming without other signs.","Low-grade temperature is expected post-operatively — not immediately alarming.","✓ Unequal pupils with one fixed and dilated = CN III compression from uncal herniation = neurosurgical emergency. This is the hallmark sign of catastrophic increasing ICP requiring immediate intervention.","Mild headache post-craniotomy is expected and manageable — not immediately alarming without other symptoms."],
rat:"Anisocoria (unequal pupils) + fixed/dilated pupil = CN III (oculomotor) compression = uncal herniation in progress. This is a critical finding that requires immediate provider notification, airway preparation, and mannitol/hypertonic saline readiness. Every minute matters.",
pearl:"Post-craniotomy neuro checks: assess LOC, pupil size/reaction, motor strength, GCS every 15-30 min initially. Report immediately: new pupil changes, declining GCS, new motor deficits, Cushing's triad (bradycardia + HTN + irregular respirations), CSF leak from nose/ears."},

{id:214,mod:2,type:"mcq",
stem:"A nurse is performing a cranial nerve assessment using the stick-of-gum method. The nurse holds the unwrapped gum near the client's ear and asks if they can hear the crinkling sound. Which cranial nerve is being assessed?",
opts:["CN I (Olfactory) — assessed by holding the gum near the nose to identify the scent","CN V (Trigeminal) — assessed by asking the client to simulate chewing the gum","CN VIII (Vestibulocochlear) — assessed by using the wrapper sound as a hearing test","CN XII (Hypoglossal) — assessed by asking the client to stick out their tongue"],
ans:2,
why:["CN I uses the SCENT of the gum to assess smell — not the sound of the wrapper.","CN V uses the chewing motion to assess the muscles of mastication — not the wrapper sound.","✓ CN VIII (Vestibulocochlear) — the crinkling sound of the wrapper tests hearing (cochlear branch). The nurse opens the wrapper near each ear separately while the client's eyes are closed.","CN XII assesses tongue movement by asking the client to protrude the tongue — not the wrapper sound."],
rat:"Stick-of-gum CN assessment (from your clinical resource): CN I=smell gum; CN II=read wrapper; CN III/IV/VI=follow gum through 6 fields + accommodation; CN V=simulate chewing; CN VII=taste gum on tongue; CN VIII=hear wrapper opening; CN IX=swallow saliva; CN X=say 'ah' (uvula); CN XI=shoulder shrug; CN XII=tongue out.",
pearl:"A key clinical point from the cranial nerve PDF: 'Identification of the specific cranial nerve is not essential but that timely identification of the deficit is vital, along with immediate communication of this finding to the practitioner.' Report the finding and its functional impact — not just the nerve number."},

{id:215,mod:2,type:"mcq",
stem:"A nurse is assessing a client with suspected increased ICP. Which finding is a LATE sign that indicates the client's condition has significantly worsened?",
opts:["Restlessness and disorientation — early cognitive signs from sensitivity of brain cells to hypoxia","New unilateral extremity weakness — early motor sign from pyramidal tract compression","Constant severe headache that progressively worsens with any movement or position change","Bradycardia, rising blood pressure with widening pulse pressure, and irregular respirations"],
ans:3,
why:["Restlessness and disorientation = EARLY ICP sign (cognitive cells most sensitive to hypoxia).","Unilateral extremity weakness = EARLY sign (pyramidal tract compression).","Headache worsening with movement = EARLY sign.","✓ Blueprint Chart 61-1 LATE signs: 'Pulse rate and respiratory rate decrease or become erratic; blood pressure and temperature increase; pulse pressure widens.' This is Cushing's triad — a late and ominous sign indicating herniation is imminent."],
rat:"Cushing's triad = VERY LATE ICP sign: bradycardia + hypertension (widened pulse pressure) + irregular respirations. It represents the brain's last attempt to maintain cerebral perfusion. By the time Cushing's triad appears, herniation may already be occurring. Early recognition and intervention are critical.",
pearl:"Never wait for Cushing's triad — it indicates impending herniation. Act on EARLY signs: confusion, restlessness, pupil changes, subtle motor changes, worsening headache. The window for effective intervention is early, not late."},

{id:216,mod:2,type:"mcq",
stem:"A nurse is preparing to administer 2 L of oxygen via nasal cannula to a client with COPD and a chronic PaCO₂ of 62 mmHg. The client's current SpO₂ is 86%. Which action is MOST appropriate?",
opts:["Apply the nasal cannula at 2 L/min — SpO₂ 86% is dangerously low and requires correction","Apply the nasal cannula and titrate to achieve SpO₂ of 88–92%, then reassess","Apply a non-rebreather mask at 15 L/min to rapidly correct the hypoxemia","Withhold all oxygen — this client should not receive supplemental O₂"],
ans:1,
why:["Blindly applying 2 L/min without a target SpO₂ may over-oxygenate and suppress hypoxic drive — target is 88–92%, not higher.","✓ Brunner Ch. 10 Quality and Safety Alert: COPD with chronic CO₂ retention → hypoxic drive. Apply oxygen and titrate to SpO₂ 88–92%. At 86%, oxygen IS needed — but titrated precisely, not maximally.","Non-rebreather at 15 L/min would correct hypoxemia but would also remove hypoxic drive → hypoventilation → CO₂ narcosis.","Withholding all oxygen is incorrect — SpO₂ 86% is unsafe and requires treatment."],
rat:"COPD oxygen management: the goal is NOT to normalize SpO₂ to 95–100% — it is to maintain 88–92%. This corrects dangerous hypoxemia while preserving the hypoxic drive that these patients depend on. Venturi mask provides the most precise control.",
pearl:"If a COPD patient's level of consciousness decreases after receiving supplemental O₂, immediately suspect CO₂ narcosis. Obtain ABG, reduce FiO₂, consider BiPAP support. Document baseline mental status before and after oxygen therapy in all COPD patients."},

{id:217,mod:2,type:"mcq",
stem:"A nurse auscultates a new S3 heart sound at the apex in a client with a history of hypertension who was admitted for shortness of breath and bilateral leg edema. Which interpretation is MOST accurate?",
opts:["S3 is a benign finding in adults of all ages and does not require further clinical evaluation","S3 in this clinical context suggests volume overload consistent with decompensated heart failure","S3 is significant only when auscultated at the right sternal border, not the cardiac apex","S3 is associated with aortic stenosis and indicates the need for urgent valve replacement evaluation"],
ans:1,
why:["S3 is normal in children and young adults — it is pathological in adults over 40, especially with other HF symptoms.","✓ Brunner Ch. 21: 'S3: an abnormal heart sound detected early in diastole as resistance is met to blood entering either ventricle; MOST OFTEN due to volume overload associated with heart failure.' Context (HTN + dyspnea + edema) confirms HF as the likely etiology.","S3 at the right sternal border is not a standard finding — S3 is heard at the apex.","S3 is associated with volume overload/HF — not aortic stenosis specifically. Aortic stenosis produces a systolic ejection murmur."],
rat:"S3 (ventricular gallop): early diastolic sound, best heard at the apex with the bell of the stethoscope, client in left lateral decubitus position. Context matters: in a young athlete = normal. In an adult with dyspnea, edema, hypertension = strongly suggests heart failure.",
pearl:"Classic HF auscultation: S3 gallop + crackles in lung bases + JVD + peripheral edema. S4 (atrial gallop) = late diastolic, heard with hypertension/LVH. Summation gallop = S3 + S4 during tachycardia — single loud extra sound. Report new S3 in adult patients immediately."},

{id:218,mod:2,type:"mcq",
stem:"A nurse is reviewing a client's ABG results: pH 7.32, PaCO₂ 52 mmHg, HCO₃ 27 mEq/L, PaO₂ 58 mmHg. The client has a history of COPD. Which interpretation is CORRECT?",
opts:["Metabolic acidosis with respiratory compensation — low pH and low bicarbonate with rising CO2","Respiratory alkalosis — the client is hyperventilating and blowing off excessive CO2","Respiratory acidosis with partial metabolic compensation — consistent with a COPD exacerbation","Normal ABG values — these findings are within acceptable limits for all adult clients"],
ans:2,
why:["Metabolic acidosis would have low HCO₃ — this HCO₃ is normal/slightly elevated (compensatory retention).","Respiratory alkalosis = pH >7.45 and PaCO₂ <35 — this client has elevated PaCO₂ and low pH.","✓ pH <7.35 = acidosis. PaCO₂ >45 = respiratory cause. HCO₃ 27 = slightly elevated = kidneys retaining HCO₃ to compensate (chronic). PaO₂ 58 = hypoxemia. Pattern = respiratory acidosis with partial metabolic compensation — classic COPD exacerbation.","pH 7.32 is acidotic — not normal."],
rat:"ABG interpretation (ROME): Respiratory Opposite (respiratory acidosis: pH down, CO₂ up). Metabolic Equal (metabolic acidosis: pH down, HCO₃ down). This ABG: ↓pH + ↑PaCO₂ = respiratory acidosis. ↑HCO₃ = kidneys compensating (chronic adaptation). + Hypoxemia (PaO₂ 58) = needs controlled O₂.",
pearl:"Nursing priority with this ABG: 1) Apply controlled O₂ (target SpO₂ 88–92%, Venturi mask preferred). 2) Position upright. 3) Notify provider. 4) Anticipate bronchodilators, corticosteroids, possible BiPAP. 5) Reassess ABG after intervention. 6) Monitor LOC (CO₂ narcosis risk)."},

{id:219,mod:2,type:"hotspot",
stem:"A nurse is performing a cardiac auscultation assessment on a client reporting palpitations. The nurse wants to auscultate the PULMONIC valve area.\n\nClick on the correct location on the chest diagram below.",
findings:[{text:"2nd ICS, Right Sternal Border"},{text:"2nd ICS, Left Sternal Border"},{text:"3rd ICS, Left Sternal Border"},{text:"4th ICS, Left Sternal Border"},{text:"5th ICS, Left Midclavicular Line"}],
ans:[1],
why:["2nd ICS RSB = Aortic area, not pulmonic. A common mix-up — both are at the 2nd ICS but on OPPOSITE sides.","CORRECT — Pulmonic valve = 2nd intercostal space, LEFT sternal border. S2 is loudest here (closure of pulmonic and aortic valves). Mnemonic: 'P' in Pulmonic = Position (left), second intercostal.","3rd ICS LSB = Erb's Point. Not pulmonic.","4th ICS LSB = Tricuspid area.","5th ICS MCL = Mitral/Apical area."],
rat:"Pulmonic = 2nd ICS LEFT (same side as the pulmonic valve's anatomic position). Aortic = 2nd ICS RIGHT. The trap: both are at the 2nd ICS. Remember: the Aorta exits on the Right, the Pulmonary artery exits on the Left — their auscultation areas reflect anatomic positions. S2 is louder at the BASE (2nd ICS) than S1."},

{id:220,mod:2,type:"mcq",
stem:"A client has a pulseless rhythm on the monitor showing completely chaotic waveforms with no identifiable P waves, QRS complexes, or T waves. The nurse calls for help. Which action does the nurse take NEXT?",
opts:["Apply synchronized cardioversion at 200 joules — this rhythm requires a synchronized shock","Begin CPR and defibrillate as soon as the device is ready — this pulseless rhythm is shockable","Administer atropine 1 mg IV push — this is the first-line drug for this type of arrest","Obtain a 12-lead ECG to confirm the diagnosis before starting any resuscitation measures"],
ans:1,
why:["Synchronized cardioversion is for tachyarrhythmias WITH a pulse — pulseless VFib requires unsynchronized defibrillation.","✓ VFib = shockable rhythm. Pulseless = cardiac arrest. Action: Begin CPR immediately, charge defibrillator, clear and deliver shock as soon as available. Every 1 minute without defibrillation reduces survival ~10%.","Atropine is for symptomatic bradycardia — never for VFib.","Obtaining a 12-lead ECG delays life-saving defibrillation — never delay for a diagnostic test in cardiac arrest."],
rat:"VFib management: CPR → charge defibrillator → clear → shock (200J biphasic) → immediately resume CPR (2 min) → rhythm check → if VFib: epinephrine 1 mg IV → shock again → amiodarone 300 mg after 3rd shock. Time to defibrillation is the single most important factor in survival.",
pearl:"'Shock first, talk later' for VFib. Defibrillation within 2 minutes of VFib onset = survival rates up to 90%. Each minute of delay reduces survival by approximately 10%. This is why public access defibrillators (AEDs) in public spaces save lives."},

{id:221,mod:2,type:"mcq",
stem:"A nurse reviews an ECG strip showing a regular rhythm, rate 78 bpm, P waves present. The PR interval measures 0.18 seconds on the first beat, 0.22 on the second, 0.26 on the third, and the fourth P wave has no following QRS. The cycle then resets. Which action does the nurse take?",
opts:["Continue monitoring only — this is a normal sinus rhythm with rate-related variation","Prepare for immediate transcutaneous pacing — this rhythm requires emergent intervention","Notify the provider, document the rhythm, assess the client for symptoms, and monitor for progression","Administer adenosine 6 mg IV push — this is the first-line treatment for this rhythm"],
ans:2,
why:["This is Wenckebach (Mobitz I) — a pathological rhythm, not normal variation.","Transcutaneous pacing is for SYMPTOMATIC bradycardia or high-degree blocks — Wenckebach in an asymptomatic client at 78 bpm does not require emergent pacing.","✓ Wenckebach (Mobitz I) in an asymptomatic client: notify provider, document clearly, assess for symptoms (dizziness, syncope, chest pain), identify and treat reversible causes (inferior MI, beta-blocker toxicity, digoxin), monitor for progression to higher-degree block.","Adenosine is used for SVT — it would worsen AV conduction block."],
rat:"Wenckebach (Mobitz I): AV node level. Often associated with inferior MI (RCA supplies AV node), vagal stimulation, beta-blockers, digoxin. Usually reversible and benign. Mobitz II (infranodal) is more dangerous — sudden dropped beats without warning, higher risk of complete heart block.",
pearl:"Cardiac Rhythms PDF heart block poem: 'Longer longer longer drop — then you have WENCKEBACH.' Wenckebach = AV node = often reversible. Mobitz II = bundle of His = often needs pacemaker. Third degree = complete dissociation = pacemaker required."},

{id:222,mod:2,type:"mcq",
stem:"A nurse is assessing a client with a suspected stroke. During the neurological assessment, the nurse strokes the sole of the client's foot and observes the great toe dorsiflexing (extending upward) with fanning of the other toes. How does the nurse document this finding?",
opts:["Normal plantar reflex — toes curling downward as expected","Positive Babinski sign — consistent with upper motor neuron pathology","Negative Romberg test — indicating intact cerebellar function","Clonus — indicating lower motor neuron damage"],
ans:1,
why:["Normal plantar reflex = toes PLANTAR FLEX (curl downward) — this client's toes extended upward, which is abnormal.","✓ Brunner Ch. 60: 'Babinski reflex (sign): in adults is indicative of abnormalities in the motor control pathways leading from the cerebral cortex.' Great toe extension + fanning = POSITIVE Babinski = UMN lesion.","Romberg tests cerebellar balance — not assessed by stroking the foot sole.","Clonus = rapid alternating contraction/relaxation at a joint — also a UMN sign, but not what is described here."],
rat:"Positive Babinski in adults = UMN (upper motor neuron) pathology — stroke, TBI, MS, spinal cord injury, brain tumor. Normal adult plantar reflex: toes flex downward (plantar flexion) = negative Babinski. Positive Babinski is always abnormal in adults.",
pearl:"Document neurological findings objectively: 'Plantar stimulation of right foot elicits dorsiflexion of great toe with fanning of toes bilaterally — positive Babinski noted. Reported to provider at [time].' Never just write 'neuro exam abnormal' — document the specific finding."},

// ── MODULE 3 — IV Therapy (8 Qs) ──

{id:223,mod:3,type:"mcq",
stem:"A nurse is initiating a blood transfusion for a client. Which finding requires the nurse to STOP the transfusion immediately?",
opts:["Heart rate increases from 72 to 80 bpm thirty minutes after the transfusion begins","The client reports mild fatigue that was already present before the transfusion was started","The client develops a fever of 38.8°C, flank pain, and says they feel 'different' 15 minutes in","The client has mild localized itching only at the IV insertion site under the dressing"],
ans:2,
why:["Heart rate 72→80 bpm is a minor change within normal range — not alarming in isolation.","Pre-existing fatigue is not a transfusion reaction.","✓ Fever + back/flank pain + sudden onset of subjective change = classic signs of acute hemolytic transfusion reaction (most dangerous type) — stop transfusion immediately, keep IV open with NS, notify provider, send blood bag to blood bank, collect blood and urine samples.","Localized mild itching at IV site may be dressing-related — not a systemic transfusion reaction requiring immediate stop."],
rat:"Acute hemolytic transfusion reaction: ABO incompatibility causes complement activation → RBC destruction → fever, chills, flank/back pain, hemoglobinuria (pink/red urine), hypotension, tachycardia. Can cause DIC and renal failure. STOP immediately — even slowing the rate is wrong.",
pearl:"Transfusion reaction protocol: 1) STOP transfusion. 2) Maintain IV access with 0.9% NS. 3) Notify provider AND blood bank. 4) Return blood bag + attached tubing to blood bank with blood samples from a new site. 5) Collect first-void urine. 6) Monitor vitals every 5 minutes. 7) Document everything with times."},

{id:224,mod:3,type:"mcq",
stem:"A nurse is caring for a client with a peripheral IV who reports pain and tightness at the insertion site. On assessment, the nurse notes swelling extending 3 inches above the site, cool pale skin, and the pump is alarming with high pressure. Which action does the nurse take FIRST?",
opts:["Flush the IV with 10 mL of normal saline to clear the occlusion","Slow the infusion rate and apply a warm compress","Stop the infusion and remove the peripheral IV catheter","Obtain a blood return by aspirating the catheter with a syringe"],
ans:2,
why:["Flushing would force more fluid into the infiltrated tissue — dangerous, especially if the infusate is vesicant.","Slowing the rate continues the infiltration — harmful.","✓ This is Grade 2–3 infiltration (edema, cool skin, pain, pump pressure alarm). STOP infusion first to prevent further fluid from entering the tissue. Then remove catheter, assess, apply appropriate compress, restart elsewhere.","Aspirating an infiltrated peripheral IV will not provide blood return and wastes time."],
rat:"Infiltration management: STOP infusion → stop the harm. Then: remove catheter, assess the area, apply warm or cool compress (warm for hypotonic solutions, cool for isotonic/hypertonic), elevate extremity, restart IV at a new distal site on opposite arm, document grade and interventions.",
pearl:"The pump high-pressure alarm is a key clinical clue — it indicates resistance to flow, which in the context of swelling and pain = infiltration. A patent IV has no pressure alarm. This alarm should always trigger a site assessment — never just silence it and continue."},

{id:225,mod:3,type:"mcq",
stem:"A nurse is about to hang a secondary piggyback of piperacillin-tazobactam into a primary line that is running D5W. Before proceeding, the nurse checks compatibility. Which action is correct?",
opts:["Hang the piggyback into the D5W line — piperacillin-tazobactam is stable in dextrose","Stop the D5W, flush the line with normal saline before and after the antibiotic, then resume D5W","Mix the piperacillin-tazobactam directly into the D5W bag to simplify the infusion","Administer the antibiotic as an IV push to avoid compatibility concerns altogether"],
ans:1,
why:["Piperacillin-tazobactam is NOT stable in dextrose solutions — it degrades and loses potency in D5W.","✓ Flush the line with normal saline before and after to prevent the antibiotic from mixing with the incompatible D5W in the tubing. This is the safe practice when primary and secondary solutions are incompatible.","Mixing incompatible drugs creates a chemically degraded solution — never mix without verified compatibility.","IV push is not appropriate for this antibiotic — it must be diluted and infused over 30 minutes minimum."],
rat:"IV compatibility is a critical safety responsibility. Before hanging any secondary infusion, verify compatibility with the primary solution AND all other concurrently infusing medications. Many antibiotics, particularly beta-lactams, are incompatible with dextrose. Always check with a pharmacist or compatibility reference.",
pearl:"Common incompatibility pitfalls: phenytoin (Dilantin) precipitates in ANY dextrose solution — use NS only. Piperacillin-tazobactam incompatible with dextrose. Amphotericin B requires D5W only — incompatible with NS. Calcium and phosphate together = precipitation. When in doubt, ask pharmacy."},

{id:226,mod:3,type:"mcq",
stem:"A nursing student is inserting a peripheral IV. After cleaning the site with chlorhexidine, the student re-palpates the vein directly over the cleaned site without gloves before inserting the catheter. Which action does the charge nurse take?",
opts:["Allow the insertion to proceed — palpating the site before catheter entry is standard technique","Stop the student and have them recleanse the site — touching the prepped area without sterile gloves contaminates the field","Allow the insertion to continue but document the deviation in the quality improvement report","Ask the student to apply hand sanitizer before continuing with the catheter insertion"],
ans:1,
why:["Palpating the cleaned site without sterile gloves contaminates it — the insertion cannot safely proceed without recleaning.","✓ After antiseptic preparation, the site must not be touched unless sterile gloves are worn. Re-palpating with an ungloved finger = contamination of the sterile field = must reclean.","Allowing contaminated insertion to proceed and only documenting is a patient safety failure.","Hand sanitizer does not restore the sterile field at the insertion site itself."],
rat:"Non-touch technique: once the skin is cleaned, nothing non-sterile contacts the insertion site. If re-palpation is absolutely needed, it must be done with a sterile gloved finger, OR the site must be recleaned. 'If you touch it, you treat it' — reclean and restart.",
pearl:"Common ATI/NCLEX scenario: a student or colleague does something unsafe during a procedure. The correct nurse response is always to STOP the unsafe action first, then correct and reteach. Patient safety always takes priority over avoiding awkwardness or disrupting workflow."},

{id:227,mod:3,type:"mcq",
stem:"A nurse is preparing to administer potassium chloride (KCl) 20 mEq IV to a client with a serum potassium of 2.8 mEq/L. Which action is SAFE?",
opts:["Administer KCl 20 mEq IV push over 5 minutes for rapid correction","Dilute KCl 20 mEq in 100 mL NS and infuse via pump at no faster than 10 mEq/hour","Dilute KCl 20 mEq in 10 mL sterile water and infuse over 10 minutes","Administer KCl 40 mEq undiluted IV push for severe hypokalemia"],
ans:1,
why:["IV push KCl causes immediate cardiac arrest from ventricular fibrillation — NEVER give KCl IV push under any circumstances.","✓ Safe KCl administration: always diluted, always via infusion pump, rate ≤10 mEq/hr peripheral (≤20 mEq/hr central with continuous cardiac monitoring). This option meets all safety criteria.","10 mL is an inadequate dilution volume — minimum is 100 mL. The 10-minute time frame is also too rapid.","IV push KCl is fatal — never administered by any nurse regardless of clinical urgency."],
rat:"KCl is a HIGH-ALERT medication. Rules: never IV push, always diluted (minimum 100 mL), always via infusion pump, rate ≤10 mEq/hr peripherally, continuous cardiac monitoring during administration, verify concentration and rate with a second nurse. Maximum peripheral concentration: 40 mEq/100 mL.",
pearl:"ATI/NCLEX KCl questions almost always test: (1) never IV push, (2) must be diluted, (3) must use a pump, (4) rate limit. Any answer involving undiluted KCl, IV push, or rapid bolus = automatically wrong. This is a life-safety principle with zero exceptions."},

{id:228,mod:3,type:"mcq",
stem:"A nurse assesses a peripheral IV site and finds erythema extending 5 cm above the insertion point, a palpable venous cord, tenderness along the vein path, and a visible red streak. There is no purulent drainage. Which phlebitis grade does the nurse assign?",
opts:["Grade 1 — erythema and warmth at the site with or without mild pain","Grade 2 — erythema, edema, and pain at the insertion site, no streak","Grade 3 — erythema, pain, streak formation, and palpable cord, no drainage","Grade 4 — Grade 3 features plus palpable cord over one inch with purulent drainage"],
ans:2,
why:["Grade 1 = erythema ± pain only — no streak or cord present.","Grade 2 = erythema, edema, and pain — no streak or cord.","✓ Grade 3 = Grade 2 findings PLUS streak formation AND palpable venous cord. All criteria present here. No purulent drainage = not Grade 4.","Grade 4 requires a cord greater than 1 inch AND purulent drainage — no purulent drainage is noted."],
rat:"Phlebitis scale (IV lecture): 0=none; 1=erythema±pain; 2=erythema+edema+pain; 3=+streak+palpable cord; 4=+cord>1 inch+purulent drainage. Action for Grade 3: remove catheter, warm compresses, document, restart elsewhere, monitor for infection. Grade 4: additionally notify provider, culture site, watch for bacteremia.",
pearl:"A palpable cord = thrombosed vein segment = thrombophlebitis. While superficial thrombophlebitis rarely embolizes, it can become infected (septic thrombophlebitis) — a serious complication. Document the exact grade, length of streak, and all interventions. Monitor the area for 24–48 hours after catheter removal."},

{id:229,mod:3,type:"bowtie",
stem:"A nurse is caring for a client receiving dopamine 5 mcg/kg/min via a peripheral IV when the nurse observes pallor, coolness, and swelling at the insertion site. Complete the bowtie clinical judgment.",
condition:{opts:["Phlebitis from vein wall inflammation","Dopamine extravasation — vesicant infiltration","Normal reaction to cold IV fluid","Grade 1 infiltration of isotonic solution"],ans:1},
actions:{opts:["Stop the infusion immediately and leave the catheter in place","Notify the provider and pharmacy for a phentolamine order","Remove the catheter immediately and apply warm compresses","Continue the infusion at a reduced rate to maintain perfusion","Document the site grade and time of discovery"],ans:[0,1]},
parameters:{opts:["Tissue color, temperature, and blanching at the extravasation site","Capillary refill and peripheral pulses distal to the site","Blood pressure after vasopressor interruption","Urine output and fluid balance","Signs of systemic infection including fever and chills"],ans:[0,1]},
why:["STOP immediately — dopamine is a potent alpha-1 vasoconstrictor causing ischemia with every second of continued infusion.","Phentolamine (alpha-blocker) is injected locally through the EXISTING catheter. The catheter must stay in place to deliver the antidote.","INCORRECT — Removing the catheter first eliminates the phentolamine delivery route.","INCORRECT — Reducing the infusion rate does not stop the vasoconstriction already occurring in the tissue.","Documentation is required but is NOT the priority action in the acute management sequence."],
rat:"Dopamine extravasation sequence: STOP infusion → keep catheter → phentolamine via existing catheter → new IV access → document. Phentolamine blocks alpha-1 receptors reversing vasoconstriction and restoring blood flow. Must be given within 12 hours."},

{id:230,mod:3,type:"mcq",
stem:"A nurse has just completed inserting a peripheral IV in a client's left forearm. Which documentation entry is MOST complete and appropriate?",
opts:["'IV started in left hand' — date, time, nurse initials only","'20G PIV left cephalic vein, 1st attempt, CHG dried, blood return, NS flush without resistance, no redness swelling or induration, client tolerated without complaint' — date, time, signature","'IV patent and functioning in left arm for medication administration' — date, time, initials","'Client has left hand peripheral IV, site appears intact and in good condition' — date, time"],
ans:1,
why:["'Site intact' is vague — does not include gauge, site, attempts, or patient response.","✓ Blueprint Module 3: 'Record insertion site, gauge, number of attempts, and patient response. Document infusion type, rate, and any complications/interventions.' Option B includes all required elements: gauge, vein, location, attempt number, antiseptic, blood return, patency, site assessment, patient response, date/time/signature.","'Patent and functioning' contains no meaningful clinical detail.","Omits gauge, attempt number, antiseptic use, patency assessment, and clinical site assessment."],
rat:"Complete IV documentation (blueprint): anatomic site + vein name, catheter gauge, number of attempts, antiseptic used, blood return confirmation, flush patency, dressing type, infusion type and rate, site appearance, patient response, date/time, nurse signature. Inadequate documentation is a legal and safety risk.",
pearl:"Legal standard: documentation must be specific enough that another clinician reading it could understand exactly what was done, when, and by whom. 'IV started' is not legally defensible. The detailed entry in Option B creates a clear clinical and legal record."}

];
