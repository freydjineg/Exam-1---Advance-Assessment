<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NRSG 3333 Exam Bank</title>
<style>
:root{--bg:#f5ede0;--bg2:#ede0cc;--card:#fffaf4;--or:#c2621a;--orl:#e07d35;--ord:#8b3e08;--tx:#2d1a08;--tx2:#5a3a1a;--tx3:#8a6040;--bdr:#d4aa80;--ok:#2d6a2d;--okb:#e8f5e8;--er:#8b1a1a;--erb:#fde8e8;--pt:#7a5500;--ptb:#fff3cd;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.screen{display:none;min-height:100vh;padding:2rem 1rem}.screen.active{display:block}
#home{max-width:700px;margin:0 auto}
.hdr{text-align:center;padding:2rem 0 1.5rem}.hdr .logo{font-size:2.5rem}.hdr h1{font-size:1.9rem;color:var(--ord)}.hdr p{color:var(--tx2);margin-top:.3rem}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(139,62,8,.08)}
.card h2{font-size:1.05rem;color:var(--ord);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--bdr)}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:.6rem}
.mrow label{flex:1;font-size:.93rem;color:var(--tx2)}
.mrow input[type=number]{width:72px;padding:5px 8px;border:1px solid var(--bdr);border-radius:6px;background:var(--bg);color:var(--tx);font-size:.9rem}
.mbadge{background:var(--or);color:#fff;border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:700}
.tot{text-align:center;font-size:.95rem;color:var(--tx2);margin:.6rem 0}.tot span{font-weight:700;color:var(--or);font-size:1.15rem}
.btn{display:inline-block;padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:600;transition:all .15s}
.btn-p{background:var(--or);color:#fff}.btn-p:hover{background:var(--ord)}
.btn-s{background:var(--bg2);color:var(--tx);border:1px solid var(--bdr)}.btn-s:hover{background:var(--bdr)}
.btn-d{background:#c0392b;color:#fff}.btn-d:hover{background:#96281b}
.btn-full{width:100%;text-align:center;padding:13px;font-size:1rem}
.btn-sm{padding:6px 14px;font-size:.83rem}
.wcard{background:linear-gradient(135deg,#fff5ee,#ffe8d0);border:1.5px solid var(--orl);border-radius:var(--r);padding:1.1rem 1.4rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.wcard .wi{flex:1}.wcard .wi h3{font-size:.97rem;color:var(--ord)}.wcard .wi p{font-size:.83rem;color:var(--tx3);margin-top:2px}
.wcnt{background:var(--er);color:#fff;border-radius:20px;padding:3px 12px;font-size:.83rem;font-weight:700}
#exam-wrap{max-width:860px;margin:0 auto}
.exam-top{display:flex;align-items:center;background:var(--card);border-bottom:1px solid var(--bdr);padding:.85rem 1.4rem;border-radius:var(--r) var(--r) 0 0;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(139,62,8,.07)}
.exam-top h2{font-size:.95rem;color:var(--ord);white-space:nowrap}
.pbwrap{flex:1;margin:0 1rem;height:8px;background:var(--bg2);border-radius:10px;overflow:hidden}
.pb{height:100%;background:var(--or);border-radius:10px;transition:width .3s}
.qcnt{font-size:.85rem;color:var(--tx2);white-space:nowrap}
.scroll{overflow-y:auto;max-height:calc(100vh - 68px);padding:1.2rem}
.qcard{background:var(--card);border:1px solid var(--bdr);border-radius:0 0 var(--r) var(--r);padding:1.8rem;min-height:480px;display:flex;flex-direction:column}
.qbadge{display:inline-block;font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:20px;margin-bottom:.9rem;text-transform:uppercase;letter-spacing:.05em}
.qb-mcq{background:#e8f0fe;color:#1a47a0}.qb-sata{background:#fce8f3;color:#8b1a5a}.qb-fib{background:#e8f5e8;color:#1a6b2d}
.qstem{font-size:1.03rem;line-height:1.65;color:var(--tx);margin-bottom:1.3rem;font-weight:500}
.qmedia{margin-bottom:1.1rem;border-radius:8px;overflow:hidden;border:1px solid var(--bdr);background:var(--bg);padding:.8rem;text-align:center}
.qmedia svg{max-width:100%;height:auto}
.opts{list-style:none;display:flex;flex-direction:column;gap:.55rem;flex:1}
.opt{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:9px;cursor:pointer;transition:all .14s;background:var(--bg);position:relative}
.opt:hover:not(.dis){border-color:var(--orl);background:#fff5ee}
.opt.sel{border-color:var(--or);background:#fff5ee}
.opt.corr{border-color:var(--ok);background:var(--okb)}
.opt.wrng{border-color:var(--er);background:var(--erb)}
.opt.dis{cursor:default}
.oltr{width:25px;height:25px;border-radius:50%;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;color:var(--tx2);background:#fff}
.opt.sel .oltr{background:var(--or);color:#fff;border-color:var(--or)}
.opt.corr .oltr{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.wrng .oltr{background:var(--er);color:#fff;border-color:var(--er)}
.otxt{font-size:.95rem;line-height:1.5;flex:1;padding-top:2px}
.tooltip{display:none;position:absolute;left:101%;top:50%;transform:translateY(-50%);background:#2d1a08;color:#fff;padding:7px 11px;border-radius:7px;font-size:.79rem;width:210px;z-index:50;line-height:1.4;pointer-events:none}
.opt.dis:hover .tooltip{display:block;}.tooltip::before{content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:#2d1a08}
.opt.wrng:hover .tooltip{display:block}
.sata-hint{font-size:.8rem;color:var(--tx3);margin-bottom:.9rem;font-style:italic}
.fib-wrap{display:flex;flex-direction:column;gap:.7rem;flex:1}
.fib-row{display:flex;align-items:center;gap:9px}
.fib-row label{font-size:.88rem;color:var(--tx2);min-width:90px}
.fib-in{padding:8px 11px;border:1.5px solid var(--bdr);border-radius:7px;font-size:.92rem;background:var(--bg);color:var(--tx);width:240px}
.fib-in.corr{border-color:var(--ok);background:var(--okb)}
.fib-in.wrng{border-color:var(--er);background:var(--erb)}
.fbpanel{margin-top:1.3rem;padding:1.1rem;border-radius:9px;border:1px solid;display:none}
.fbpanel.show{display:block}
.fbpanel.c-fb{background:var(--okb);border-color:var(--ok)}
.fbpanel.w-fb{background:var(--erb);border-color:var(--er)}
.fbpanel.p-fb{background:var(--ptb);border-color:var(--pt)}
.fbtit{font-weight:700;font-size:.97rem;margin-bottom:.45rem}
.c-fb .fbtit{color:var(--ok)}.w-fb .fbtit{color:var(--er)}.p-fb .fbtit{color:var(--pt)}
.fbans{font-size:.89rem;margin-bottom:.4rem;color:var(--tx2)}
.fbrat{font-size:.89rem;line-height:1.6;color:var(--tx);margin-bottom:.55rem}
.fbpearl{font-size:.85rem;background:#fffbe6;border-left:3px solid #e6a817;padding:7px 11px;border-radius:4px;color:#5a4000;line-height:1.5}
.fbpearl::before{content:'💡 NCLEX Pearl: ';font-weight:700}
.navrow{display:flex;align-items:center;justify-content:space-between;margin-top:1.3rem;gap:.8rem}
.navrow .btn{min-width:100px}
#results{max-width:680px;margin:0 auto;text-align:center}
.rcard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:2.2rem;box-shadow:0 2px 12px rgba(139,62,8,.1)}
.scirc{width:130px;height:130px;border-radius:50%;border:7px solid var(--or);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.3rem;background:#fff}
.spct{font-size:2.2rem;font-weight:700;color:var(--ord);line-height:1}
.slbl{font-size:.75rem;color:var(--tx3);margin-top:2px}
.rbanner{font-size:1.35rem;font-weight:700;margin-bottom:.4rem}
.rbanner.pass{color:var(--ok)}.rbanner.fail{color:var(--er)}
.rstats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:1.3rem 0}
.sbox{background:var(--bg);border-radius:8px;padding:11px}.sbox .n{font-size:1.45rem;font-weight:700;color:var(--or)}.sbox .l{font-size:.75rem;color:var(--tx3);margin-top:1px}
.motiv{font-size:3.5rem;margin:1rem 0}
.ract{display:flex;flex-direction:column;gap:9px;margin-top:1.3rem}
canvas#cc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;display:none}
@media(max-width:580px){.qcard{padding:1.1rem}.tooltip{display:none!important}.rstats{grid-template-columns:1fr 1fr}}

/* ── BOWTIE ── */
.bowtie-wrap{display:grid;grid-template-columns:1fr auto 1fr;gap:0;align-items:center;margin:18px 0}
.bt-col{border:2px solid var(--bdr);border-radius:12px;padding:14px;background:var(--bg)}
.bt-col h4{font-size:.78rem;font-weight:700;color:var(--or);text-transform:uppercase;letter-spacing:.04em;margin-bottom:10px;text-align:center}
.bt-center{display:flex;flex-direction:column;align-items:center;gap:0;padding:0 8px}
.bt-arrow{color:var(--or);font-size:1.4rem;line-height:1}
.bt-box{background:var(--or);color:white;border-radius:8px;padding:8px 12px;font-size:.78rem;font-weight:700;text-align:center;white-space:nowrap}
.bt-opt{display:flex;align-items:flex-start;gap:8px;padding:9px 11px;border:1.5px solid var(--bdr);border-radius:8px;cursor:pointer;transition:all .13s;background:var(--bg);margin-bottom:7px;font-size:.88rem}
.bt-opt:hover:not(.dis){border-color:var(--orl);background:#fff5ee}
.bt-opt.bt-sel{border-color:var(--or);background:#fff5ee}
.bt-opt.bt-sel .bt-circ{background:var(--or);color:white;border-color:var(--or)}
.bt-opt.corr{border-color:var(--ok);background:var(--okb)}
.bt-opt.wrng{border-color:var(--er);background:#fdf0f0}
.bt-opt.dis{cursor:default}
.bt-circ{width:22px;height:22px;min-width:22px;border-radius:50%;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--txt)}
.bt-section-label{font-size:.72rem;color:#888;text-align:center;margin-bottom:6px}
.bt-limit{font-size:.72rem;color:var(--or);font-weight:600;text-align:center;margin-bottom:8px}
@media(max-width:700px){.bowtie-wrap{grid-template-columns:1fr;}.bt-center{flex-direction:row;padding:8px 0}}

/* ── HOTSPOT ── */
.hs-finding{display:flex;align-items:flex-start;gap:10px;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:9px;cursor:pointer;transition:all .13s;background:var(--bg);margin-bottom:8px;font-size:.9rem}
.hs-finding:hover:not(.dis){border-color:var(--orl);background:#fff5ee}
.hs-finding.hs-sel{border-color:var(--or);background:#fff5ee}
.hs-finding.corr{border-color:var(--ok);background:var(--okb)}
.hs-finding.wrng{border-color:var(--er);background:#fdf0f0}
.hs-finding.dis{cursor:default}
.hs-check{width:20px;height:20px;min-width:20px;border-radius:4px;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:.8rem;transition:all .13s}
.hs-finding.hs-sel .hs-check{background:var(--or);border-color:var(--or);color:white}
.hs-finding.corr .hs-check{background:var(--ok);border-color:var(--ok);color:white}
.hs-finding.wrng .hs-check{background:var(--er);border-color:var(--er);color:white}
.hs-instr{font-size:.82rem;color:#888;margin-bottom:12px;padding:8px 12px;background:#f8f3ee;border-radius:7px;border-left:3px solid var(--orl)}
</style></head><body>
<canvas id="cc"></canvas>
<div id="home" class="screen active">
  <div class="hdr"><div class="logo">🩺</div><h1>NRSG 3333 Exam Bank</h1><p>Advanced Health Assessment · Personalized Practice</p></div>
  <div class="card"><h2>⚙️ Configure Your Exam</h2><div id="modcfg"></div><div class="tot">Total questions: <span id="totdisp">0</span></div><button class="btn btn-p btn-full" onclick="startExam()">Start Exam →</button></div>

</div>

    <div class="exam-top"><h2 id="emlbl">Exam</h2><div class="pbwrap"><div class="pb" id="pb"></div></div><div class="qcnt" id="qcnt">1/10</div></div>

const QB=[
// MODULE 1 — Health Assessment & Fundamentals
{id:1,mod:1,type:"mcq",stem:"When performing a health assessment, what should the nurse do FIRST?",opts:["Auscultate lung sounds","Obtain a complete health history","Perform a head-to-toe physical exam","Review the medication list"],ans:1,why:["Auscultation is objective data gathered AFTER the history.","✓ The health history always comes first — it guides the entire assessment.","Physical exam follows the history.","Medication review is part of the history, not the starting point."],rat:"The health history (subjective data) is obtained first and directs the physical examination. It establishes chief complaint, past medical history, allergies, and current medications.",pearl:"Nursing process order: Assess → Diagnose → Plan → Implement → Evaluate. Within assessment, SUBJECTIVE data (history) always precedes OBJECTIVE data (physical exam)."},

{id:2,mod:1,type:"mcq",stem:"A nurse uses a stick of gum to assess cranial nerve I. Which technique correctly tests CN I?",opts:["Smell the gum wrapper to assess CN I","Read the fine print on the wrapper with one eye covered to assess CN II","Open the wrapper near the ear with the client's eyes closed to assess hearing via CN VIII","Chew the gum while the nurse observes for jaw deviation to assess CN V"],ans:2,why:["Following an object tests CN III, IV, VI.","Hearing sound tests CN VIII.","✓ CN I (Olfactory) = smell. With eyes closed, the patient identifies the gum's scent (e.g., cinnamon).","Reading tests CN II (Optic)."],rat:"CN I (Olfactory) is responsible for the sense of smell. With eyes closed, hold an odorous item near the nose and ask the patient to identify it.",pearl:"Memory aid for CN I–XII: 'On Old Olympus Towering Tops A Finn And German Viewed Some Hops.' CN I=Olfactory=Smell only."},

{id:3,mod:1,type:"mcq",stem:"A nurse is performing a cranial nerve assessment and asks the client to hold their head still and follow a penlight through a large H pattern with their eyes only. Which cranial nerves are being assessed?",opts:["CN I, II, and III — olfactory, optic, and oculomotor","CN III, IV, and VI — oculomotor, trochlear, and abducens","CN V, VII, and VIII — trigeminal, facial, and vestibulocochlear","CN IX, X, and XI — glossopharyngeal, vagus, and accessory"],ans:1,why:["CN I tests smell, CN II tests vision — not eye movement tracking.","✓ CN III (oculomotor), IV (trochlear), and VI (abducens) all control extraocular muscle movement and are tested together using the H-pattern or six cardinal fields of gaze.","CN V controls facial sensation and chewing, CN VII controls facial expression, CN VIII controls hearing and balance — not eye tracking.","CN IX, X, and XI control swallowing, phonation, and shoulder/neck strength — not eye movement."],rat:"CN III (Oculomotor), CN IV (Trochlear), and CN VI (Abducens) collectively control all eye movements. Testing all six cardinal positions of gaze assesses all three nerves.",pearl:"CN III also controls pupil constriction and eyelid elevation (ptosis = CN III palsy). A 'down and out' eye with ptosis = classic CN III palsy — common in posterior communicating artery aneurysm."},

{id:4,mod:1,type:"sata",stem:"Which actions correctly assess cranial nerve function using the stick-of-gum method? (Select ALL that apply)",opts:["Hold gum near nose to assess smell (CN I)","Ask patient to read the wrapper text (CN II)","Move gum through 6 positions of gaze (CN III/IV/VI)","Place gum on tongue to assess taste (CN VII)","Unwrap gum beside each ear to assess hearing (CN VIII)"],ans:[0,1,2,3,4],why:["✓ Smell = CN I","✓ Reading small print = CN II","✓ Eye movements = CN III, IV, VI","✓ Taste = CN VII","✓ Hearing = CN VIII"],rat:"The stick-of-gum technique efficiently assesses all 12 cranial nerves at the bedside. CN XI (shrug) and CN XII (tongue protrusion) can also be assessed in the same encounter.",pearl:"This technique was published in the Journal of Emergency Nursing (2010). A full CN I–XII exam takes under 2 minutes — critical in busy clinical settings."},

{id:5,mod:1,type:"mcq",stem:"A nurse assesses a client and asks them to say 'Ahh.' The uvula deviates to the right. Which finding does the nurse report to the provider?",opts:["Normal finding — slight uvular deviation is common and clinically insignificant","Right CN X (vagus) deficit — the uvula deviates toward the intact side","Left CN X (vagus) deficit — the uvula deviates away from the injured side toward the intact side","CN XII (hypoglossal) deficit — uvular deviation indicates tongue muscle involvement"],ans:2,why:["Uvular deviation on phonation is always abnormal and requires follow-up.","Right CN X injury would pull the uvula to the LEFT (toward the intact left side). Deviation to the right means the right side is intact and pulling.","✓ Left CN X injury weakens the left soft palate — the intact right side pulls the uvula to the right. Uvula deviates AWAY from the injured side.","CN XII controls the tongue — uvular deviation is specifically a CN X (vagus) finding."],rat:"CN X (Vagus) controls soft palate and uvula elevation. On saying 'ah,' the uvula should remain midline. Deviation away from the lesion indicates CN X weakness on that side.",pearl:"Contrast: UVULA deviates AWAY from the lesion (CN X). TONGUE deviates TOWARD the lesion (CN XII). This contrast is high-yield for NCLEX neurological questions."},

{id:6,mod:1,type:"fib",stem:"Fill in the blank: The normal documentation phrase for an intact cranial nerve exam is: 'Cranial nerves ___ through ___ grossly intact by physical examination.'",blanks:["First CN number","Last CN number"],ans:["I","XII"],rat:"'Cranial nerves I–XII grossly intact by physical examination' is the standard documentation for a normal cranial nerve assessment. Any abnormal findings require specific documentation of the nerve affected and the exact finding.",pearl:"Always document abnormal CN findings specifically. Example: 'Nystagmus noted on left lateral gaze, CN VI involvement suspected.' Specific documentation is essential for legal protection and care continuity."},

{id:7,mod:1,type:"mcq",stem:"A nurse tests a client's visual acuity and the client can only read the 200 line on the Snellen chart at a distance of 20 feet. How does the nurse correctly document this finding?",opts:["Visual acuity 20/20 — the client reads at 20 feet what a normal eye reads at 20 feet","Visual acuity 20/100 — the client sees at 20 feet what a normal eye sees at 100 feet","Visual acuity 20/200 — the client sees at 20 feet what a person with normal vision sees at 200 feet","Visual acuity 20/400 — the client sees at 20 feet what a normal eye sees at 400 feet"],ans:2,why:["20/20 means the client can read at 20 feet what a normal eye reads at 20 feet — perfect vision.","20/100 means the client sees at 20 feet what a normal eye sees at 100 feet — not matching the described finding.","✓ 20/200 is the correct documentation: the client reads at 20 feet what a person with normal vision reads at 200 feet. This is the legal definition of blindness.","20/400 would mean reading only the very largest letter — not consistent with reading the 200 line."],rat:"Snellen notation: numerator = test distance (20 ft); denominator = distance at which normal eye reads that line. 20/200 = legal blindness threshold in the US.",pearl:"Safety considerations for visually impaired patients: orient to environment, keep call light within reach, ensure adequate lighting, use verbal communication, place items consistently."},

{id:8,mod:1,type:"mcq",stem:"A nurse is preparing to use an otoscope to examine an adult client's ear canal. Which technique is correct?",opts:["Pull the auricle down and forward to straighten the canal","Pull the auricle up and back to straighten the ear canal","Push the auricle inward toward the canal without pulling","No traction is needed — insert the speculum straight into the canal"],ans:1,why:["Down and forward is the correct technique for INFANTS and young children — not adults.","✓ In adults, pulling the auricle UP and BACK straightens the S-shaped adult ear canal, allowing clear visualization of the tympanic membrane.","Pushing the auricle inward does not straighten the canal and risks injury.","Without traction, the curved canal prevents adequate visualization of the tympanic membrane."],rat:"Adult ear canal curves upward — pulling the auricle up and back straightens it for otoscope insertion. In children under 3, pull down and back (canal curves differently in young children).",pearl:"Classic NCLEX trick: adult = UP and BACK. Child under 3 = DOWN and BACK. The difference in technique reflects anatomical differences in ear canal development."},

{id:9,mod:1,type:"mcq",stem:"A nurse assesses a client's skin and notes a raised, fluid-filled lesion that is less than 1 cm in diameter. Which term correctly describes this lesion?",opts:["Papule — solid, raised, less than 1 cm, no fluid content","Vesicle — small raised blister with clear serous fluid inside","Pustule — raised lesion containing thick purulent fluid","Macule — flat discolored patch with no elevation above skin"],ans:1,why:["A papule is raised and solid — it does not contain fluid.","✓ A vesicle is raised, less than 1 cm, and contains clear serous fluid. Examples: chickenpox, herpes simplex, contact dermatitis blisters.","A pustule is specifically filled with purulent (pus-containing) fluid — not clear serous fluid.","A macule is flat — it has no elevation above the skin surface."],rat:"Primary skin lesions: macule (flat, colored), papule (raised, solid, <1cm), vesicle (fluid-filled, <1cm), bulla (fluid-filled, >1cm), pustule (pus-filled), nodule (solid, deep), plaque (raised, solid, >1cm).",pearl:"Melanoma ABCDE: Asymmetry, Border irregularity, Color variation, Diameter >6mm, Evolution. Any lesion meeting criteria requires dermatology referral."},

{id:10,mod:1,type:"mcq",stem:"A nurse is preparing to perform a complete abdominal assessment. In which order should the four assessment techniques be performed?",opts:["Palpation, percussion, auscultation, then inspection","Auscultation, inspection, percussion, then palpation","Inspection, auscultation, percussion, then palpation","Inspection, percussion, palpation, then auscultation"],ans:2,why:["Beginning with palpation can stimulate bowel sounds, altering auscultation findings.","Inspection must always precede hands-on assessment techniques.","✓ The correct abdominal sequence is Inspection → Auscultation → Percussion → Palpation. Auscultation precedes percussion and palpation to avoid altering bowel sounds.","Performing percussion before auscultation can alter bowel motility and change ausculatory findings."],rat:"For the abdomen, auscultation occurs BEFORE palpation and percussion because touching the abdomen can stimulate or inhibit bowel sounds, giving false results.",pearl:"This is a classic NCLEX trap! IPPA for all systems; IAPA for the abdomen. Palpating before auscultating may artificially stimulate or suppress bowel sounds."},

{id:11,mod:1,type:"mcq",stem:"While palpating a client's precordium, a nurse feels a vibrating sensation under the palm of the hand. How does the nurse document this finding?",opts:["Heave — an abnormal systolic lifting sensation of the chest wall","Thrill — a palpable vibration associated with a Grade IV or higher cardiac murmur","Bruit — an audible turbulent sound heard over a vessel with a stethoscope","Click — a brief high-pitched sound from abnormal valve movement"],ans:1,why:["A heave or lift is a sustained outward movement of the chest wall — felt as a lifting, not a vibration.","✓ A thrill is a palpable vibration felt on the chest wall, similar to a purring cat. It indicates turbulent blood flow and corresponds to a Grade IV or higher murmur.","A bruit is auscultated with a stethoscope over vessels — it is a sound, not a palpable vibration.","A click is an auscultatory finding — heard, not palpated."],rat:"A thrill is a palpable murmur indicating significant turbulence (Grade IV+). It is never normal and requires further evaluation.",pearl:"Murmur grades I–VI: Grade I = barely audible; Grade III = loud without thrill; Grade IV = loud WITH thrill; Grade VI = audible without stethoscope. Any thrill = Grade IV or higher."},

{id:12,mod:1,type:"mcq",stem:"A nurse auscultates a client's heart and hears two distinct sounds — a louder sound at the beginning of systole and a second sound at the end of systole. Which structures produce these sounds?",opts:["S1 is produced by semilunar valve (aortic/pulmonic) closure at the start of systole","S1 is produced by AV valve closure (mitral and tricuspid) and S2 by semilunar valve closure (aortic and pulmonic)","Both S1 and S2 are produced by the same AV valves as they open and close during each cardiac cycle","S1 represents the electrical depolarization of the atria and S2 represents ventricular depolarization on the ECG"],ans:1,why:["This reversal is incorrect — S1 occurs at the START of systole when AV valves close, not semilunar valves.","✓ S1 = closure of the mitral (bicuspid) and tricuspid AV valves at the onset of ventricular systole. S2 = closure of the aortic and pulmonic semilunar valves at the end of systole.","S1 and S2 are produced by different valve pairs — AV valves and semilunar valves respectively.","S1 and S2 are produced by valve CLOSURE — not by atrial or ventricular contraction itself."],rat:"S1 = mitral + tricuspid closure = beginning of systole. S2 = aortic + pulmonic closure = end of systole/beginning of diastole. S1 loudest at apex; S2 loudest at base.",pearl:"'Lub-DUB': S1 coincides with carotid pulse upstroke. The shorter gap (S1→S2) = systole. The longer gap (S2→next S1) = diastole at normal heart rates."},

{id:13,mod:1,type:"mcq",stem:"A nurse auscultates an S3 heart sound at the apex in a 65-year-old client with dyspnea and bilateral ankle edema. Which condition does this finding most likely indicate?",opts:["A normal age-related cardiac change requiring no further evaluation","Aortic stenosis — turbulent flow through a narrowed aortic valve","Left ventricular failure — S3 reflects volume overload and reduced compliance","Pericarditis — friction from inflamed pericardial layers"],ans:2,why:["S3 is normal in children and young adults — it is pathological in adults over 40, especially with symptoms.","Aortic stenosis produces a systolic ejection murmur — not an S3.","✓ S3 (ventricular gallop) in an adult with dyspnea and edema = left ventricular failure. It reflects resistance to early diastolic ventricular filling due to volume overload.","Pericarditis produces a pericardial friction rub — a scratching, three-component sound — not an S3."],rat:"S3 (ventricular gallop) in adults = LV failure, dilated cardiomyopathy, or mitral regurgitation. It occurs early in diastole due to rapid ventricular filling. Sounds like 'Ken-tuck-Y' (S1-S2-S3).",pearl:"S3 = 'Ken-TUCKY' (S1-S2-S3). S4 = 'TEN-nes-see' (S4-S1-S2). S4 occurs late in diastole from atrial contraction into a stiff ventricle — seen in HTN, aortic stenosis, hypertrophic cardiomyopathy."},

{id:14,mod:1,type:"sata",stem:"Which cardiac auscultation locations are CORRECTLY matched? (Select ALL that apply)",opts:["Aortic area — 2nd ICS, right sternal border","Pulmonic area — 2nd ICS, left sternal border","Erb's point — 3rd ICS, left sternal border","Tricuspid area — 4th ICS, left sternal border","Mitral area — 5th ICS, midclavicular line"],ans:[0,1,2,3,4],why:["✓","✓","✓","✓","✓"],rat:"All five cardiac auscultation landmarks: Aortic (2ICS RSB), Pulmonic (2ICS LSB), Erb's Point (3ICS LSB), Tricuspid (4ICS LSB), Mitral/Apical (5ICS MCL). S2>S1 at base; S1>S2 at apex.",pearl:"Mnemonic 'All People Enjoy Time Magazine': Aortic, Pulmonic, Erb's, Tricuspid, Mitral. PMI normally at 5ICS MCL — displaced laterally suggests cardiomegaly."},

{id:15,mod:1,type:"mcq",stem:"A nurse simultaneously assesses an apical pulse of 108 bpm and a radial pulse of 90 bpm in the same client. How does the nurse document this finding?",opts:["Sinus tachycardia — both rates are elevated above 100 bpm","Pulsus paradoxus — a drop in systolic BP greater than 10 mmHg with inspiration","Pulse deficit — the difference of 18 bpm between the apical and radial rates","Orthostatic hypotension — a positional change in pulse rate on standing"],ans:2,why:["Sinus tachycardia describes the rate — it does not describe the apical-radial difference.","Pulsus paradoxus is assessed with a blood pressure cuff during inspiration — not a pulse comparison.","✓ Pulse deficit = the difference between the apical and radial pulse rates. Here: 108 − 90 = 18 bpm pulse deficit. Common in atrial fibrillation when some beats are too weak to generate a peripheral pulse.","Orthostatic hypotension is a blood pressure change with position — not a pulse rate discrepancy."],rat:"Pulse deficit indicates that some cardiac contractions do not generate adequate stroke volume to produce a palpable peripheral pulse. Most commonly caused by atrial fibrillation. Requires two nurses simultaneously counting apical and radial pulses for 1 full minute.",pearl:"AFib produces an irregularly irregular rhythm. A large pulse deficit (>10) with irregular rhythm should prompt provider notification and assessment for hemodynamic compromise."},

{id:16,mod:1,type:"mcq",stem:"A nurse is preparing to palpate a client's thyroid gland using the posterior approach. Which positioning is correct?",opts:["Position the client supine and tilt the chin upward toward the ceiling","Stand in front of the client and place both thumbs on the trachea below the cricoid","Stand behind the client with both hands placed on the neck, fingers curling around to the trachea","Position the client in left lateral decubitus and palpate from the right side"],ans:2,why:["Supine with chin up is used for some neck examinations but not the standard posterior thyroid approach.","Standing in front using thumbs describes the anterior approach — not the posterior approach.","✓ The posterior approach: stand behind the client, place fingertips on both sides of the trachea just below the cricoid cartilage. Ask the client to swallow — the thyroid rises under the fingertips.","Left lateral decubitus is a cardiac auscultation position — not used for thyroid palpation."],rat:"Thyroid palpation: stand behind patient, place fingers on either side of trachea below cricoid cartilage. Have patient swallow (sip of water helps) — thyroid rises with swallowing, making nodules and asymmetry easier to detect.",pearl:"Thyroid bruit (auscultated over the thyroid) = increased blood flow → suggests hyperthyroidism/Graves disease. Hyperthyroid signs: tachycardia, weight loss, heat intolerance, tremor, exophthalmos."},

{id:17,mod:1,type:"mcq",stem:"A nurse assesses a client's blood pressure in three positions. Lying: 135/82 mmHg, Sitting: 118/74 mmHg, Standing: 102/66 mmHg. How does the nurse interpret this finding?",opts:["Normal postural variation — blood pressure changes with position are expected","Hypertensive urgency — the lying blood pressure of 135/82 requires intervention","Orthostatic hypotension — a drop in systolic BP of 20 mmHg or more when moving from lying to standing","White coat hypertension — elevated reading caused by clinical anxiety"],ans:2,why:["A drop of 33 mmHg systolic from lying to standing exceeds the threshold for orthostatic hypotension.","135/82 mmHg is Stage 1 hypertension — not hypertensive urgency (which requires SBP ≥180).","✓ Orthostatic hypotension = SBP drop ≥20 mmHg or DBP drop ≥10 mmHg within 3 minutes of standing. Here SBP drops 33 mmHg (135→102). Risk: falls, syncope.","White coat hypertension is elevated in-office readings — not a positional BP pattern."],rat:"Orthostatic hypotension causes: dehydration, antihypertensives, diuretics, prolonged bedrest, autonomic neuropathy, aging. Management: rise slowly, dangle legs before standing, increase fluid intake, compression stockings.",pearl:"Orthostatic hypotension is a major fall risk in elderly patients. Teach: dangle legs at bedside, rise slowly, call for assistance. Review medications — antihypertensives and diuretics are common culprits."},

{id:18,mod:1,type:"mcq",stem:"A nurse grades a client's pitting edema. When pressed, the indentation measures 4 mm and rebounds in less than 15 seconds. Which grade does the nurse document?",opts:["+1 — trace pitting, 2 mm depth, rebounds immediately on release","+2 — mild pitting, 4 mm depth, rebounds within 15 seconds","+3 — moderate pitting, 6 mm depth, rebounds in 15 to 30 seconds","+4 — severe pitting, 8 mm or deeper, rebounds after 30 seconds"],ans:1,why:["+1 = 2 mm depth with immediate rebound — shallower than described.","✓ +2 pitting edema = 4 mm indentation rebounding in less than 15 seconds. Moderate edema.","+3 = 6 mm indentation, 15–30 second rebound — deeper and slower than described.","+4 = 8+ mm, rebound over 30 seconds — severe pitting not matching this description."],rat:"Pitting edema grading: +1=2-3mm/<15sec; +2=3-4mm/15-30sec; +3=5-6mm/>30sec; +4=>7mm/prolonged. Bilateral edema suggests systemic causes (HF, renal disease, hypoalbuminemia).",pearl:"Unilateral leg edema + warmth + redness = suspect DVT. NEVER massage a suspected DVT — risk of pulmonary embolism. Notify provider and prepare for duplex ultrasound."},

{id:19,mod:1,type:"mcq",stem:"During a respiratory assessment, a nurse hears a high-pitched, continuous, musical sound on auscultation that is heard throughout the expiratory phase. Which breath sound does the nurse document?",opts:["Crackles — discontinuous popping sounds from fluid in the alveoli","Wheezes — high-pitched continuous musical sounds from narrowed airways","Rhonchi — low-pitched, continuous rumbling sounds from secretions in large airways","Stridor — a high-pitched sound heard primarily on inspiration from upper airway obstruction"],ans:1,why:["Crackles are discontinuous, not continuous or musical — caused by fluid in alveoli.","✓ Wheezes are high-pitched, continuous, musical sounds caused by narrowed or obstructed airways. Primarily expiratory. Associated with asthma, COPD, bronchospasm.","Rhonchi are LOW-pitched, continuous sounds from secretions in large airways — not high-pitched or musical.","Stridor is primarily inspiratory and heard without a stethoscope — caused by upper airway obstruction."],rat:"Wheezing results from airway narrowing (bronchospasm, mucus, foreign body). Predominantly expiratory. Both inspiratory and expiratory wheezing = severe obstruction.",pearl:"Stridor = upper airway emergency. Sudden stridor may indicate anaphylaxis, croup, epiglottitis, or foreign body. Priority: maintain airway, call for help, prepare for intubation."},

{id:20,mod:1,type:"mcq",stem:"A nurse strokes the plantar surface of an adult client's foot and observes the great toe extending upward with fanning of the remaining toes. Which statement correctly describes this finding?",opts:["Normal plantar reflex — plantar flexion of the toes is expected in all adults","Positive Babinski sign — indicates an abnormality in the upper motor neuron pathways from the cerebral cortex","Negative Romberg test — this response confirms intact cerebellar and proprioceptive function","Hyperreflexia — an exaggerated deep tendon reflex from lower motor neuron irritation"],ans:1,why:["Normal adult plantar reflex = toes CURL DOWNWARD (plantar flexion). Upward extension is abnormal.","✓ Positive Babinski = great toe extends (dorsiflexes) + other toes fan. In adults this indicates UMN pathology — stroke, TBI, MS, spinal cord injury.","Romberg test assesses balance with eyes closed — it is not the plantar reflex test.","Hyperreflexia involves exaggerated DTR responses — Babinski is a specific UMN sign, not hyperreflexia."],rat:"Normal adult plantar reflex: toes curl downward (plantar flexion). Positive Babinski (great toe up + toe fanning) = UMN lesion. Part of every stroke assessment.",pearl:"UMN vs LMN: UMN = hyperreflexia, spasticity, positive Babinski, minimal atrophy. LMN = hyporeflexia, flaccidity, atrophy, fasciculations, negative Babinski. Critical NCLEX distinction for neurological questions."},

{id:21,mod:1,type:"mcq",stem:"A nurse is assessing Tanner's Model of Clinical Judgment. Which step involves perceiving what is relevant based on past experience and expectations?",opts:["Responding","Reflecting","Noticing","Interpreting"],ans:2,why:["Responding = deciding what action to take.","Reflecting = thinking back after the situation to learn from it.","✓ Noticing = first step — perceiving what is salient based on clinical knowledge, background, and past experience.","Interpreting = making sense of what was noticed."],rat:"Tanner's 4 steps: Noticing (perceive relevant data) → Interpreting (make sense of data) → Responding (act) → Reflecting (learn). Clinical judgment improves with experience and reflection.",pearl:"Tanner emphasizes that clinical judgment is not just checklist-following — it involves intuition developed through experience. Novice nurses follow protocols; expert nurses perceive subtle cues others miss."},

{id:22,mod:1,type:"mcq",stem:"A client tells the nurse, 'I'm really worried about my surgery tomorrow.' Which response by the nurse is MOST therapeutic?",opts:["'Everything is going to be fine — this is a routine procedure.'","'Have you talked to your surgeon about your concerns?'","'Tell me more about what specifically concerns you.'","'Try not to worry — anxiety before surgery is completely normal.'"],ans:2,why:["False reassurance dismisses the client's feelings without acknowledging or exploring them.","Redirecting to the surgeon closes the therapeutic conversation before the client feels heard.","✓ Open-ended invitation to elaborate — acknowledges the concern and invites the client to express their specific fears. This is reflecting + general lead combined.","'Try not to worry' is dismissive and minimizes a legitimate emotional response."],rat:"Therapeutic communication principles: use open-ended questions, validate feelings, avoid false reassurance, maintain non-judgmental presence. 'Tell me more' is a classic therapeutic open-ended technique.",pearl:"NCLEX therapeutic communication: NEVER use false reassurance, changing the subject, asking 'why' questions, or giving unsolicited advice. Always validate feelings first, then gather information."},

{id:23,mod:1,type:"sata",stem:"Which are examples of NON-THERAPEUTIC communication techniques? (Select ALL that apply)",opts:["Giving false reassurance ('It will all be fine')","Using therapeutic silence","Asking 'Why did you stop your medication?'","Offering unsolicited advice","Reflecting the patient's feelings back to them"],ans:[0,2,3],why:["✓ False reassurance dismisses feelings — non-therapeutic.","Silence IS therapeutic — it allows processing.","✓ 'Why' questions sound accusatory and create defensiveness — non-therapeutic.","✓ Unsolicited advice disrespects patient autonomy — non-therapeutic.","Reflecting IS therapeutic — shows active listening."],rat:"Non-therapeutic techniques: false reassurance, 'why' questions, unsolicited advice, changing subject, minimizing feelings, excessive questioning. These create barriers to therapeutic nurse-patient relationship.",pearl:"Replace 'why' with open-ended prompts: Instead of 'Why did you stop your medication?' ask 'Can you help me understand what made it difficult to continue your medication?' This is empowering, not accusatory."},

{id:24,mod:1,type:"mcq",stem:"During a mental status examination, a nurse asks a client to spell the word 'WORLD' backwards. Which cognitive function is this task specifically designed to assess?",opts:["Long-term memory — the ability to recall events from the distant past","Concentration and attention — the ability to focus and perform sequential mental tasks","Abstract reasoning — the ability to interpret proverbs or identify similarities","Orientation — awareness of person, place, time, and situation"],ans:1,why:["Long-term memory is assessed by asking about past events, historical facts, or personal history.","✓ Spelling WORLD backwards (or serial 7 subtractions) specifically tests concentration and attention — the ability to hold information in working memory while performing a sequential mental task.","Abstract reasoning is assessed by asking the client to interpret proverbs ('a rolling stone gathers no moss') or find similarities between objects.","Orientation is assessed by asking the client about their name, location, date, and situation."],rat:"MMSE (Mini-Mental State Examination) tests: orientation, registration, attention/concentration, recall, language, visuospatial ability. Attention deficit = hallmark of DELIRIUM.",pearl:"Attention deficits are the hallmark of DELIRIUM. If patient cannot spell WORLD backwards, suspect acute confusion. Investigate cause immediately: infection, medications, metabolic disturbance, pain, urinary retention."},

{id:25,mod:1,type:"mcq",stem:"A nurse completes an orientation assessment. The client correctly states their name and identifies they are in a hospital, but states the year is 1985. How does the nurse document this finding?",opts:["Oriented ×4 — the client correctly answered the orientation questions","Oriented ×1 — the client only knows their name","Oriented ×2 — oriented to person and place only","Oriented ×3 — oriented to person, place, and time"],ans:2,why:["Oriented ×4 requires correct person, place, time, AND situation — the client missed time.","Oriented ×1 means the client only knows their name — this client also knows their location.","✓ The client correctly identified person (own name) and place (hospital) but not time (wrong year). Documentation: 'oriented ×2, person and place.'","Oriented ×3 requires correct person, place, AND time — the client stated the wrong year."],rat:"Orientation levels: ×1=person; ×2=person+place; ×3=person+place+time; ×4=person+place+time+event. Orientation to time is typically the first to decline in cognitive impairment.",pearl:"Always document specific orientation responses, not just 'A&O×3.' Example: 'Patient states name correctly, identifies location as hospital, states year as 1985 (incorrect).' Specific documentation supports accurate clinical tracking."},

// MODULE 2 — Cardiac, Respiratory & IV Therapy
{id:26,mod:2,type:"mcq",stem:"A nurse identifies an irregularly irregular cardiac rhythm with no distinct P waves, a wavy fibrillatory baseline, and narrow QRS complexes on the monitor. Which rhythm does the nurse identify?",opts:["Normal sinus rhythm — regular rhythm with upright P wave before each QRS complex","Atrial fibrillation — no organized P waves, irregular ventricular response","Ventricular fibrillation — completely disorganized with no QRS complexes","Atrial flutter — regular sawtooth pattern at 250 to 350 bpm with fixed block ratio"],ans:1,why:["NSR is regular with a clear upright P wave preceding every QRS — opposite of this description.","✓ AFib key features: no distinct P waves, irregularly irregular R-R intervals, fibrillatory wavy baseline, narrow QRS. Classic description matches exactly.","VFib has completely disorganized waveforms — no QRS complexes are identifiable.","Atrial flutter has a regular sawtooth pattern — not irregularly irregular."],rat:"AFib key features: absent P waves, fibrillatory baseline, irregularly irregular ventricular rhythm, normal QRS. AFib increases stroke risk 5-fold due to atrial stasis and clot formation.",pearl:"AFib stroke prevention: CHA₂DS₂-VASc score. Score ≥2 (men) or ≥3 (women) = anticoagulation recommended. Rate control target: resting HR <80 bpm."},

{id:27,mod:2,type:"mcq",stem:"A nurse is monitoring a client on telemetry and notes a regular rhythm with a rate of 38 bpm, a P wave before every QRS complex, a normal PR interval, and a narrow QRS. Which rhythm does the nurse identify?",opts:["Junctional escape rhythm — P waves absent or inverted, rate 40 to 60 bpm","Third-degree heart block — P waves and QRS complexes with no relationship to each other","Sinus bradycardia — all features of normal sinus rhythm but with a rate below 60 bpm","Ventricular escape rhythm — wide QRS with no P waves, rate 20 to 40 bpm"],ans:2,why:["Junctional rhythm has absent or inverted P waves — this client has normal upright P waves before each QRS.","Third-degree block shows complete P-QRS dissociation — here every P precedes a QRS normally.","✓ Sinus bradycardia: all NSR criteria (regular, P before every QRS, normal PR, narrow QRS) but rate <60 bpm. Rate 38 bpm confirms bradycardia.","Ventricular escape has wide QRS complexes and no identifiable P waves — opposite of this description."],rat:"Sinus bradycardia: rate <60, originates in SA node. Causes: vagal stimulation, athletes, beta-blockers, hypothyroidism, inferior MI, increased ICP. Treatment only if symptomatic.",pearl:"Symptomatic bradycardia treatment: Atropine 0.5 mg IV → repeat to max 3 mg → transcutaneous pacing → dopamine or epinephrine infusion. Atropine is ineffective for complete heart block."},

{id:28,mod:2,type:"mcq",stem:"A nurse reviews a rhythm strip showing PR intervals that progressively lengthen over several beats until a QRS complex is dropped, after which the cycle resets. Which rhythm does the nurse identify?",opts:["Rate 78 bpm, regular, narrow QRS, constant PR of 0.16 sec, P before every QRS","Rate 78 bpm, irregular R-R intervals, no visible P waves, narrow QRS","Rate 78 bpm, regular, narrow QRS, PR progressively lengthens until a QRS drops, then resets","Rate 78 bpm, P waves present but completely unrelated to QRS complexes"],ans:1,why:["First-degree = consistently prolonged PR without dropped beats.","✓ Wenckebach (Mobitz I): PR progressively lengthens until a QRS drops, then resets. AV node level block.","Mobitz II = constant PR, sudden unexpected QRS drop — more dangerous.","Third-degree = complete P-QRS dissociation."],rat:"Wenckebach pattern: PR gets longer until a beat is dropped, then cycle resets. Mobitz I is relatively benign (AV node issue), often reversible. Mobitz II (infranodal) is more dangerous and may require pacemaker.",pearl:"Heart block poem: 'If the PR is far from P, First degree. Longer longer longer QRS drop = Wenckebach. Some P's don't go through = Mobitz Two. P's and Q's don't agree = Third degree.'"},

{id:29,mod:2,type:"mcq",stem:"A client is found pulseless with ventricular fibrillation on the cardiac monitor. Which action does the nurse take FIRST?",opts:["Administer epinephrine 1 mg IV push and reassess the rhythm after two minutes","Defibrillate immediately while a second nurse begins CPR","Perform synchronized cardioversion at 100 joules for the unstable rhythm","Call the provider and obtain an order before initiating any resuscitation measures"],ans:1,why:["Epinephrine is given after the first shock and two minutes of CPR — it is not the first action.","✓ VFib is a shockable pulseless rhythm. The priority sequence: begin CPR while charging the defibrillator → shock as soon as available. Simultaneous CPR and defibrillator preparation is the correct first response.","Synchronized cardioversion is for rhythms WITH a pulse. Pulseless VFib requires unsynchronized defibrillation.","In a pulseless client with VFib, resuscitation begins immediately — no provider order is needed."],rat:"Shockable rhythms: VFib and pulseless VT → immediate defibrillation + CPR. Non-shockable: asystole and PEA → CPR + epinephrine + treat reversible causes.",pearl:"Shockable: VFib, pulseless VT. Non-shockable: asystole, PEA. Remember: you SHOCK VFib/pulseless VT. You do NOT shock asystole or PEA — treat cause and give epinephrine + CPR."},

{id:30,mod:2,type:"mcq",stem:"A nurse is calculating heart rate using the 300-method and counts 4 large boxes between two consecutive R waves on the ECG strip. What is the heart rate?",opts:["300 bpm — one large box between R waves","150 bpm — two large boxes between R waves","75 bpm — four large boxes between R waves","60 bpm — five large boxes between R waves"],ans:2,why:["300 ÷ 1 = 300 bpm — this would require R waves in adjacent large boxes.","300 ÷ 2 = 150 bpm — this requires 2 large boxes between R waves, not 4.","✓ 300-method: divide 300 by the number of large boxes between R waves. 300 ÷ 4 = 75 bpm.","300 ÷ 5 = 60 bpm — this requires 5 large boxes, not 4."],rat:"300 method (for regular rhythms): 300 ÷ number of large boxes between consecutive R waves = heart rate. Large box = 0.20 sec. For irregular rhythms: count R waves in 6-sec strip × 10.",pearl:"Memorize: 1 box=300, 2=150, 3=100, 4=75, 5=60, 6=50. Normal sinus rhythm = 60–100 bpm, regular, P before each QRS, PR 0.12–0.20 sec, QRS <0.12 sec."},

{id:31,mod:2,type:"mcq",stem:"A nurse reviews a client's 12-lead ECG and identifies ST elevation in leads II, III, and aVF. Which area of the heart and coronary artery does the nurse identify as the most likely site of injury?",opts:["Anterior wall MI — left anterior descending artery occlusion, leads V1 through V4","Lateral wall MI — left circumflex artery occlusion, leads I, aVL, V5, and V6","Inferior wall MI — right coronary artery occlusion, leads II, III, and aVF","Posterior wall MI — right coronary artery occlusion, leads V7 through V9"],ans:2,why:["Anterior STEMI: LAD occlusion — ST elevation in V1–V4, not II, III, aVF.","Lateral STEMI: circumflex occlusion — leads I, aVL, V5, V6.","✓ Inferior STEMI: RCA occlusion — ST elevation in II, III, and aVF. The RCA supplies the inferior wall. Also watch for right ventricular MI — obtain right-sided leads.","Posterior MI shows ST depression in V1–V3 (reciprocal) — posterior leads V7–V9 confirm; not the same as inferior leads."],rat:"STEMI localization: Anterior=V1-V4; Inferior=II,III,aVF; Lateral=I,aVL,V5-V6; Posterior=ST depression V1-V3. Inferior STEMI (RCA) = check V4R for RV involvement.",pearl:"Inferior STEMI + RV involvement: DO NOT give nitroglycerin (patients are preload-dependent — NTG causes severe hypotension). Give IV fluids. Check V4R lead for ST elevation confirming RV infarct. HIGH-YIELD NCLEX!"},

{id:32,mod:2,type:"hotspot",
stem:"A nurse assesses a peripheral IV site and finds the following: erythema and warmth at the insertion site with a red streak extending 4 cm above the site and a 3 cm palpable, firm cord along the vein path. There is no purulent drainage.\n\nClick on the assessment finding below that represents the MOST clinically significant sign justifying IMMEDIATE catheter removal and documentation of the phlebitis grade.",
findings:[{text:"Erythema and warmth at site"},{text:"Red streak 4 cm above site"},{text:"Palpable venous cord along vein path"},{text:"No purulent drainage present"}],
ans:[2],
why:["Erythema and warmth alone = Grade 1-2 phlebitis. Significant but the palpable cord is the Grade 3 defining feature.","Red streak is a Grade 2-3 feature, but the palpable cord is what defines Grade 3 and is the most clinically significant finding.","CORRECT — A palpable venous cord defines Grade 3 phlebitis. Grade 3 requires immediate removal. Cord >1 inch with purulent drainage = Grade 4.","The absence of purulent drainage rules out Grade 4 but does not reduce the urgency of the Grade 3 cord."],
rat:"Phlebitis grading: Grade 1 = erythema only. Grade 2 = erythema + edema + pain. Grade 3 = Grade 2 + streak + palpable cord. Grade 4 = Grade 3 + cord >1 inch + purulent drainage. ANY phlebitis = remove IV immediately. The palpable cord indicates thrombophlebitis — risk of clot propagation."},

{id:33,mod:2,type:"mcq",stem:"A nurse assesses a peripheral IV site and finds the client's forearm is swollen, cool, and pale around the insertion site. The pump is alarming with increased occlusion pressure. Which complication does the nurse identify?",opts:["Phlebitis — vein wall inflammation from chemical or mechanical trauma","Infiltration — non-vesicant IV fluid leaking into the surrounding tissue","Air embolism — air entering the venous system through the IV tubing","Thrombosis — clot formation obstructing the IV catheter lumen"],ans:1,why:["Phlebitis presents with redness, warmth, and a palpable cord — not pallor, coolness, or swelling.","✓ Infiltration = non-vesicant fluid leaking into surrounding tissue. Signs: swelling, coolness, pallor, tightness, high-pressure pump alarm, pain. The catheter is no longer in the vein.","Air embolism presents with sudden chest pain, dyspnea, and 'mill wheel' murmur — not local site changes.","Thrombosis causes occlusion — the pump would alarm but there would be no visible local swelling."],rat:"Infiltration: non-vesicant fluid extravasation. Treatment: stop infusion, remove catheter, elevate extremity, warm (hypotonic) or cool (isotonic/hypertonic) compresses per facility policy, restart elsewhere.",pearl:"All extravasations are infiltrations, but not all infiltrations are extravasations. Extravasation = vesicant leakage = tissue necrosis risk. Vesicants: chemotherapy, dopamine, norepinephrine, hypertonic saline, phenytoin."},

{id:34,mod:2,type:"mcq",stem:"A nurse receives an order to administer potassium chloride (KCl) 20 mEq IV to a client with a potassium level of 2.8 mEq/L. Which administration method is safe?",opts:["A diluted piggyback infusion","An IV push","Via infusion pump","Over 1 hour"],ans:1,why:["Diluted piggyback is the correct method.","✓ IV PUSH potassium = FATAL. Causes immediate cardiac arrest. This is one of the most dangerous medication errors in nursing.","Infusion pump use is REQUIRED for KCl.","Infusion over at least 1 hour (10-20 mEq/hr peripherally) is appropriate."],rat:"KCl SAFETY RULES: NEVER IV push, always dilute, always use infusion pump, peripheral max 10-20 mEq/hr, central line max 40 mEq/hr with continuous cardiac monitoring. KCl is a high-alert medication.",pearl:"KCl is on The Joint Commission NPSG high-alert medication list. Must be stored separately, requires double-check, must be diluted. Undiluted KCl vials should NEVER be kept on clinical units."},

{id:35,mod:2,type:"mcq",stem:"A COPD patient's SpO2 is 88% on room air. The nurse prepares to administer oxygen. What is the TARGET SpO2?",opts:["95–100%","88–92%","100%","Above 94% at all times"],ans:1,why:["95–100% is the target for most patients — but not for chronic CO2 retainers.","✓ COPD patients rely on hypoxic drive. Target SpO2 88–92% provides adequate oxygenation without eliminating the hypoxic drive.","100% O2 in COPD can suppress respiratory drive → CO2 narcosis → respiratory arrest.","Above 94% may be appropriate for non-COPD patients but not chronic CO2 retainers."],rat:"COPD and oxygen: chronic CO2 retainers rely on low O2 as respiratory stimulus. Excessive O2 can eliminate this drive → respiratory depression. Target SpO2 88–92%; use low-flow NC 1–2 L/min or Venturi mask.",pearl:"Venturi mask is the MOST PRECISE O2 delivery device — delivers exact FiO2 (24%, 28%, 35%, 40%, 60%). Preferred for COPD. Color-coded adapters indicate FiO2. Never give high-flow O2 to COPD without ABG monitoring."},

{id:36,mod:2,type:"mcq",stem:"A client's ABG shows: pH 7.29, PaCO2 62 mmHg, HCO3 28 mEq/L, PaO2 52 mmHg. The client has a history of COPD. Which interpretation is correct?",opts:["Metabolic acidosis with respiratory compensation — low pH and low bicarbonate","Respiratory alkalosis with metabolic compensation — high pH and low CO2","Respiratory acidosis with partial metabolic compensation — low pH, elevated CO2, elevated bicarbonate","Normal ABG — these values are within acceptable limits for a client with COPD"],ans:2,why:["Metabolic acidosis would show low HCO3 — this client's HCO3 is 28 (elevated, showing compensation).","Respiratory alkalosis = high pH with low CO2 — this client has low pH and high CO2.","✓ pH 7.29 (acidotic) + CO2 62 (elevated = respiratory cause) + HCO3 28 (elevated = renal compensation) = respiratory acidosis with partial metabolic compensation. Classic COPD exacerbation pattern.","pH 7.29 is below 7.35 — this is acidosis, not normal, even for COPD."],rat:"ABG interpretation: pH<7.35=acidosis; pH>7.45=alkalosis. PaCO2↑=respiratory acidosis; HCO3↑=metabolic alkalosis. Compensation = kidneys retain HCO3 in chronic respiratory acidosis.",pearl:"ROME method: Respiratory=Opposite (pH↑/CO2↓ or pH↓/CO2↑). Metabolic=Equal (pH↑/HCO3↑ or pH↓/HCO3↓). Then check for compensation (opposite system moving in same direction as primary disorder)."},

{id:37,mod:2,type:"sata",
stem:"A nurse is admitting a client with left-sided heart failure. Which assessment findings should the nurse anticipate? Select all that apply.",
opts:["Bibasilar crackles on auscultation","Orthopnea — difficulty breathing when lying flat","S3 gallop (ventricular gallop) on auscultation","Frothy, pink-tinged sputum","Jugular venous distension","Tracheal deviation toward the affected side"],
ans:[0,1,2,3],
why:["CORRECT — Left HF causes pulmonary congestion; fluid backs into the lungs producing bibasilar crackles.","CORRECT — Pulmonary venous congestion worsens in the supine position, causing orthopnea (2–3 pillow sleeping).","CORRECT — S3 = early diastole, rapid ventricular filling with excess volume. Pathological in adults >40. Classic HF finding.","CORRECT — Severe pulmonary edema forces fluid into alveoli, producing frothy pink-tinged sputum.","INCORRECT — JVD is a RIGHT-sided heart failure finding (elevated central venous pressure backing up through the venous system).","INCORRECT — Tracheal deviation is a sign of tension pneumothorax, not heart failure."],
rat:"Left-sided heart failure causes backup of blood into the pulmonary circulation. Key signs: bibasilar crackles, orthopnea, S3 gallop, pink frothy sputum, dyspnea on exertion. JVD and peripheral edema = right-sided HF. Knowing which side produces which findings is high-yield for NCLEX."},

{id:38,mod:2,type:"mcq",stem:"A nurse prepares to administer nitroglycerin to a patient with chest pain. Which assessment is MOST critical before administration?",opts:["Hold nitroglycerin if the client reports a headache — this is a contraindication","Assess blood pressure before each dose and hold if SBP is below 90 mmHg","Administer nitroglycerin with the client standing to maximize vasodilation effect","Give nitroglycerin every 10 minutes up to five doses if pain persists"],ans:1,why:["Last meal is relevant for procedures, not nitroglycerin.","✓ Nitroglycerin is a vasodilator. Contraindications: SBP <90 mmHg, RV infarction, PDE-5 inhibitor use within 24–48 hours (sildenafil/tadalafil) — combination causes life-threatening hypotension.","Heart rate is important but BP is the critical safety check before NTG.","Religious beliefs are not relevant to NTG administration."],rat:"Always check BP before each NTG dose. Contraindications: SBP<90, HR<50 or >100, RV MI, PDE-5 inhibitors. NTG reduces preload (venodilation) and dilates coronary arteries.",pearl:"ACS mnemonic MONA: Morphine, Oxygen (if SpO2<90%), Nitroglycerin, Aspirin. Note: routine O2 no longer recommended unless hypoxic per current guidelines. Always follow facility protocols and updated guidelines."},

{id:39,mod:2,type:"mcq",stem:"A client presents with muffled heart sounds, jugular vein distension, and hypotension. Which condition does the nurse suspect?",opts:["Hypertensive urgency — severely elevated blood pressure with end-organ involvement","Acute decompensated heart failure — fluid overload with pulmonary congestion","Cardiac tamponade — Beck's triad of muffled sounds, hypotension, and JVD","Tension pneumothorax — tracheal deviation and absent breath sounds"],ans:2,why:["Hypertensive urgency presents with markedly elevated BP — not hypotension or muffled heart sounds.","Acute decompensated HF presents with crackles, S3, and peripheral edema — not muffled heart sounds or JVD as primary features.","✓ Beck's triad = muffled heart sounds + hypotension + JVD. Caused by fluid in the pericardial sac compressing the heart. Treatment: pericardiocentesis.","Tension pneumothorax = absent breath sounds on the affected side + tracheal deviation AWAY from tension side — not muffled heart sounds."],rat:"Cardiac tamponade: pericardial fluid compresses the heart, preventing diastolic filling. Beck's triad: muffled sounds + hypotension + JVD. Also: pulsus paradoxus >10 mmHg. Treatment: pericardiocentesis.",pearl:"Pulsus paradoxus >10 mmHg = cardiac tamponade sign. Measure with BP cuff: note when Korotkoff sounds first appear (expiration only) then when heard on both inspiration and expiration. The difference = pulsus paradoxus."},

{id:40,mod:2,type:"mcq",stem:"A nurse is administering dopamine through a peripheral IV when the client reports severe burning at the site. The surrounding tissue is pale and cool. Which action does the nurse take FIRST?",opts:["Flush the IV with 10 mL of normal saline to restore patency before taking further action","Apply warm compresses to the site and slow the infusion to reduce local irritation","Stop the infusion immediately — dopamine is a vesicant and this indicates extravasation","Notify the provider and wait for orders before stopping the dopamine infusion"],ans:2,why:["Flushing would force more vesicant dopamine into the extravasated tissue — dangerous.","Warm compresses while continuing the infusion allows further vesicant delivery — not safe.","✓ Dopamine is a vesicant. Burning + pallor + coolness = extravasation. STOP immediately. Keep the catheter in place for antidote (phentolamine) delivery. Notify pharmacy and provider.","Waiting for orders before stopping a vesicant that is actively extravasating causes unnecessary tissue injury."],rat:"Extravasation treatment: STOP → call provider → notify pharmacy → DO NOT remove catheter (antidote injected through it) → photograph site → document → follow protocol. Phentolamine reverses catecholamine extravasation.",pearl:"Extravasation antidotes: Catecholamines (dopamine/epi/norepi) → Phentolamine. Vinca alkaloids → Hyaluronidase. Anthracyclines (doxorubicin) → Dexrazoxane. Memorize these pairs — they are clinically and exam-critical."},

{id:41,mod:2,type:"mcq",stem:"A trauma patient needs rapid fluid resuscitation. Which IV catheter provides the fastest flow rate?",opts:["1+ = 2 mm deep indentation, rebounds instantly","2+ = 4 mm deep indentation, rebounds in under 15 seconds","3+ = 6 mm deep indentation, rebounds in 15 to 30 seconds","4+ = 8 mm deep or more, indentation lasts more than 30 seconds"],ans:3,why:["24-gauge = smallest — pediatric/fragile veins. Very slow.","22-gauge = small — routine meds, not adequate for rapid resuscitation.","18-gauge = large volume infusions but not the maximum.","✓ 14-gauge provides maximum flow rate. Poiseuille's law: flow ∝ radius⁴. Larger bore = dramatically faster flow."],rat:"IV gauge and use: 14=trauma; 16=major surgery/unstable; 18=large volume/transfusion; 20=general/meds/hydration; 22=small veins/short term; 24=pediatric/fragile. Smaller number = larger bore = faster flow.",pearl:"REMEMBER: gauge is inversely proportional to size. 14>18>22 in bore size. Blood transfusion requires minimum 20-gauge (18 preferred). Anything smaller than 22-gauge cannot administer blood products."},

{id:42,mod:2,type:"fib",
stem:"A provider orders an IV infusion to run at 125 mL/hr using macrodrip tubing with a drop factor of 15 gtt/mL. The nurse needs to set the manual gravity drip rate.\n\nCalculate the drip rate. The nurse should set the flow to _____ gtt/min. (Round to the nearest whole number.)",
blanks:["Drip rate (gtt/min)"],
ans:["31"],
alt_answers:["31 gtt/min","31 drops/min","31 drops per minute"],
why:"Formula: (mL/hr × drop factor) ÷ 60 = gtt/min. Calculation: (125 × 15) ÷ 60 = 1875 ÷ 60 = 31.25 → round to 31 gtt/min. Shortcut for 15 gtt/mL: divide mL/hr by 4 → 125 ÷ 4 = 31.25 → 31 gtt/min.",
rat:"IV drip rate formula: (Volume in mL ÷ Time in hours) × Drop factor ÷ 60 = gtt/min. Common drop factors: 10 gtt/mL (÷6), 15 gtt/mL (÷4), 20 gtt/mL (÷3), 60 gtt/mL (microdrip = same as mL/hr). 15-second verification: count drops for 15 sec, multiply by 4 — should equal gtt/min."},

{id:43,mod:2,type:"mcq",stem:"A client receiving IV vancomycin develops flushing of the face and neck, with erythema spreading to the chest and pruritus, 20 minutes after the infusion begins. Which action does the nurse take FIRST?",opts:["Stop the infusion permanently and document a vancomycin allergy in the chart","Administer epinephrine 0.3 mg IM immediately — this is an anaphylactic reaction","Slow the infusion rate and administer diphenhydramine as ordered — this is Red Man Syndrome","Increase the infusion rate to complete the dose quickly and minimize total exposure time"],ans:2,why:["Red Man Syndrome is not a true allergy — stopping permanently is not indicated unless the reaction continues despite slowing.","Anaphylaxis involves airway compromise, hypotension, urticaria, and bronchospasm — this presentation is flushing and pruritus only, consistent with Red Man Syndrome.","✓ Red Man Syndrome = rate-related mast cell degranulation (not IgE-mediated). Treatment: slow the rate to infuse over ≥60 minutes and give diphenhydramine. Not a true allergy.","Increasing the rate would worsen the reaction — rate reduction is the intervention."],rat:"Red man syndrome: flushing, erythema of face/neck/chest, pruritus — occurs with rapid vancomycin infusion. NOT a true allergy. Prevention: infuse over at least 60 minutes. Pre-treat with diphenhydramine.",pearl:"Red man ≠ anaphylaxis. Red man = rate-dependent, flushing only, no hypotension/bronchospasm. Anaphylaxis = IgE-mediated, urticaria, angioedema, bronchospasm, hypotension → epinephrine. Red man → slow rate + Benadryl."},

{id:44,mod:2,type:"sata",
stem:"A nurse is caring for a client admitted with suspected deep vein thrombosis (DVT) of the left leg. Which nursing interventions are appropriate at this time? Select all that apply.",
opts:["Elevate the affected extremity above the level of the heart","Apply warm moist compresses to the affected limb","Maintain the client on bed rest and avoid massaging the leg","Administer anticoagulant therapy as ordered","Vigorously dorsiflex the foot to assess for Homans sign","Monitor for sudden onset shortness of breath or chest pain"],
ans:[0,2,3,5],
why:["CORRECT — Elevation promotes venous return and reduces edema in the affected extremity.","INCORRECT — Warm compresses are controversial and not a primary intervention; the priority is preventing embolism, not applying heat.","CORRECT — Massaging a DVT can dislodge the clot causing pulmonary embolism. Bed rest reduces this risk.","CORRECT — Anticoagulation (heparin, LMWH, or direct oral anticoagulants) is the primary treatment for DVT.","INCORRECT — Homans sign is an unreliable and potentially dangerous test — dorsiflexion can dislodge the clot. It has been removed from clinical guidelines.","CORRECT — Sudden dyspnea and chest pain are classic signs of pulmonary embolism (PE), the most dangerous complication of DVT."],
rat:"DVT management priorities: prevent embolism (no massage, bed rest), anticoagulation, elevation, and monitoring for PE. Homans sign is no longer recommended due to poor sensitivity/specificity and risk of dislodging the clot. PE surveillance is critical — hypoxia, tachycardia, pleuritic chest pain."},

{id:45,mod:2,type:"sata",stem:"Which findings indicate LEFT-sided heart failure? (Select ALL that apply)",opts:["Bibasilar crackles","Jugular venous distension (JVD)","Orthopnea (dyspnea when supine)","S3 gallop","Peripheral pitting edema in both legs"],ans:[0,2,3],why:["✓ Bibasilar crackles = pulmonary congestion = left HF.","JVD = right HF finding (systemic venous congestion).","✓ Orthopnea = pulmonary congestion = left HF.","✓ S3 gallop = LV failure hallmark.","Bilateral peripheral edema = right HF finding."],rat:"Left HF → pulmonary congestion: crackles, orthopnea, PND, S3. Right HF → systemic congestion: JVD, hepatomegaly, bilateral ankle edema, ascites. Most patients eventually develop biventricular failure.",pearl:"Left vs Right HF: Think L=Lungs (left) and R=Remainder of body (right). Left HF backs up into LUNGS → crackles, orthopnea. Right HF backs up into BODY → edema, JVD, hepatomegaly."},

{id:46,mod:2,type:"mcq",stem:"A client on a loop diuretic has a serum potassium of 2.8 mEq/L. Which action does the nurse take as the PRIORITY?",opts:["Administer the next scheduled dose of loop diuretic as ordered without delay","Encourage increased dietary potassium intake and reassess at the next blood draw","Notify the provider, hold the diuretic, and anticipate an order for potassium replacement","Document the finding and continue monitoring — 2.8 mEq/L is a minor variation"],ans:2,why:["Continuing the loop diuretic will worsen hypokalemia — this is unsafe.","Diet alone is insufficient to correct a potassium of 2.8 — IV or oral replacement is needed.","✓ Serum K+ 2.8 mEq/L is significantly low (normal 3.5–5.0). Priority: notify provider, hold the diuretic, and anticipate potassium replacement. Monitor for ECG changes (U waves, PVCs).","K+ 2.8 is a clinically significant value — it requires intervention, not passive monitoring."],rat:"Hypokalemia (K+ <3.5): loop diuretics cause significant potassium wasting. K+<3.0 = severe arrhythmia risk. ECG changes: flat/inverted T waves, prominent U waves, ST depression. Replace with oral KCl if tolerated; IV KCl for severe cases (NEVER IV push).",pearl:"Hypokalemia ECG: flat T waves + prominent U waves (positive deflection after T wave). HyperKalemia ECG: TALL peaked T waves → widened QRS → sine wave → cardiac arrest. Know both patterns for NCLEX telemetry questions."},

{id:47,mod:2,type:"mcq",stem:"A nurse is caring for a client with a chest tube connected to a water-seal drainage system. Continuous bubbling is noted in the water-seal chamber. Which interpretation is correct?",opts:["This is expected — continuous bubbling confirms the chest tube is draining normally","This indicates an air leak in the system — assess all connections and insertion site","This is caused by excessive fluid drainage and requires clamping the tube","This is normal tidaling — fluid movement with each breath is expected"],ans:1,why:["Intermittent bubbling during coughing or exhalation is expected — CONTINUOUS bubbling is not normal.","✓ Continuous bubbling in the water-seal chamber indicates an air leak — either from the client (lung not fully expanded) or from a loose connection in the tubing system. Assess all connections systematically.","Clamping a chest tube is dangerous without a specific clinical indication — not appropriate here.","Tidaling is the gentle rise and fall of fluid with breathing — it is not bubbling."],rat:"Chest tube water-seal: Normal = tidaling with respiration. Normal = intermittent bubbling with coughing. ABNORMAL = continuous bubbling = air leak. First: check all connections from insertion site to drainage system.",pearl:"Chest tube complications: occlusion, dislodgement, kinking, continuous air leak. If tube dislodges: cover insertion site with petroleum gauze to prevent open pneumothorax. NEVER clamp a chest tube routinely — risk of tension pneumothorax."},

// MODULE 3 — Loss, Grief, Communication & Ethics
{id:48,mod:1,type:"mcq",stem:"A client receiving hospice care states, 'Why is this happening to me? I've lived a good life!' Which stage of grief does this response reflect?",opts:["Denial","Anger","Bargaining","Acceptance"],ans:1,why:["Denial = 'There must be a mistake.'","✓ Anger = 'Why me? It's not fair!' — directed at God, providers, family. Acknowledge without taking it personally.","Bargaining = 'If I can just... then I'll accept it.'","Acceptance = peaceful readiness to face death."],rat:"Kübler-Ross stages (DABDA): Denial, Anger, Bargaining, Depression, Acceptance. Stages are NOT linear — patients may skip, revisit, or experience multiple simultaneously.",pearl:"Therapeutic response during anger: acknowledge without defending. 'I can hear how angry and frustrated you feel. That makes complete sense given what you're going through.' Never argue or take anger personally."},

{id:49,mod:1,type:"mcq",stem:"A terminally ill patient says, 'If I can just see my grandchild born, I'll accept what comes.' This represents which Kübler-Ross stage?",opts:["Administer a PRN antiemetic and reassess in one hour","Reposition the client in high Fowler's position and notify the provider immediately","Encourage the client to take slow deep breaths and offer a cool cloth to the forehead","Check the last bowel movement date and administer a laxative if indicated"],ans:2,why:["Denial = refusing to believe the diagnosis.","Anger = expressing rage about the situation.","✓ Bargaining = 'if...then' condition. Negotiating with God, fate, or medical team for more time or postponement of death.","Depression = quiet sadness and withdrawal."],rat:"Bargaining: 'if I can just...' statements with conditions attached. Often directed at God or fate. Patient accepts reality but tries to negotiate timing/circumstances. Therapeutic: acknowledge hope and emotional needs.",pearl:"Bargaining ≠ denial. The patient accepts the reality but is trying to negotiate. It is a healthy coping mechanism. Therapeutic response: listen actively, acknowledge wishes, involve chaplaincy if appropriate."},

{id:50,mod:3,type:"mcq",stem:"A terminally ill client becomes withdrawn, stops eating, and states, 'I just feel so sad about leaving my family.' Which interpretation does the nurse apply when planning care?",opts:["Clinical depression — this client meets DSM-5 criteria and needs antidepressant therapy","Preparatory depression — a normal part of the dying process as the client grieves impending losses","Complicated grief — requiring immediate psychiatric referral and crisis intervention","Denial — the client is refusing to accept the diagnosis and needs direct confrontation"],ans:1,why:["Clinical depression is diagnosed when symptoms impair function for ≥2 weeks and are not explained by normal grief — preparatory depression in the dying is a separate concept.","✓ Preparatory depression = normal grief response in the dying — sadness, withdrawal, decreased appetite as the client mourns impending losses. The nurse should be present, listen, and avoid forced cheerfulness.","Complicated grief is abnormal persistence after bereavement — not a feature of the active dying process.","The client is acknowledging their dying — this is acceptance-adjacent awareness, not denial."],rat:"Preparatory depression: grieving future losses (leaving loved ones, loss of existence). Normal and expected. Benefits most from presence, listening, meaning-making, and spiritual care rather than medications alone.",pearl:"When a dying patient expresses sadness: sit with them. Don't try to fix it. Don't say 'try to stay positive.' Presence, validation, and active listening are more therapeutic than any intervention. Sometimes silence communicates more than words."},

{id:51,mod:1,type:"mcq",stem:"A nurse is caring for a client with a valid DNR/DNI order who goes into cardiac arrest. Which action does the nurse take?",opts:["Initiate CPR while calling for help — the family has not been notified yet","Call a code and begin advanced cardiac life support per ACLS protocol","Honor the DNR — provide comfort care and notify the provider and family","Attempt CPR for 2 minutes then stop if there is no return of spontaneous circulation"],ans:2,why:["Initiating CPR violates the client's documented advance directive — the DNR must be honored.","Calling a full code violates the client's legal advance directive — this would constitute battery.","✓ A valid DNR means the client has made an informed decision to decline cardiopulmonary resuscitation. The nurse honors the directive, provides comfort care, notifies the provider and family, and documents the time of death.","Attempting CPR for any duration violates a valid DNR — the document must be honored completely."],rat:"Advance directives represent the patient's autonomous right to direct their own care. Nurses are legally and ethically obligated to honor valid advance directives. Document time of death, notify provider, support family.",pearl:"POLST (Physician Orders for Life-Sustaining Treatment) = medical order signed by physician/APRN, immediately actionable in any setting. Living Will = legal document expressing wishes. POLST is more portable and clinically actionable than a living will."},

{id:52,mod:3,type:"mcq",stem:"A Jehovah's Witness client with decision-making capacity declines a blood transfusion despite severe anemia. Which action by the nurse is most appropriate?",opts:["Administer the transfusion anyway — saving the client's life takes legal priority over religious beliefs","Call the provider to seek a court order overriding the client's refusal","Document the refusal, ensure the client received complete information about the risks, and honor the decision","Ask the family to convince the client to accept the transfusion before proceeding"],ans:2,why:["Administering treatment against a capacitated client's expressed refusal constitutes battery — illegal and unethical.","A court order cannot override a competent adult's informed refusal of treatment in most jurisdictions.","✓ A capacitated adult has the absolute right to refuse treatment, including blood products, for any reason including religious beliefs. Document thoroughly, ensure informed refusal, and honor the decision.","Family pressure does not override a capacitated adult's autonomous decision — and the client has already refused."],rat:"Respect for autonomy: competent adults can refuse any treatment. Document refusal thoroughly, ensure patient has full information, ensure decision is voluntary, explore alternatives, notify provider.",pearl:"Jehovah's Witnesses vary in what they'll accept. Ask specifically: most refuse whole blood, RBCs, WBCs, platelets, plasma. Some accept albumin, clotting factors, autologous blood (cell saver). Never assume — ask the individual patient what they will or won't accept."},

{id:53,mod:1,type:"mcq",stem:"A dying client asks the nurse, 'Am I going to die soon?' Which response by the nurse is MOST therapeutic?",opts:["'I can't answer that — you'll need to ask your doctor that question.'","'You are getting weaker, but many patients surprise us — try to stay positive.'","'What makes you ask that right now? Tell me what you've been noticing.'","'Yes, it looks like it could be soon — you should say your goodbyes.'"],ans:2,why:["Redirecting to the provider closes the therapeutic conversation and abandons the client at a vulnerable moment.","False reassurance ('patients surprise us') dismisses a legitimate and profound question.","✓ Reflect the question back with an open-ended invitation to share more — this acknowledges the weight of the question, invites the client to express their fears, and opens a therapeutic conversation rather than closing it.","Bluntly confirming imminent death without exploring the client's knowledge and readiness is not therapeutic — assess understanding first."],rat:"When patients ask difficult end-of-life questions: first explore what they already know, what they're feeling, and what they need. This is the NURSE-FIRST principle. Then provide information tailored to what the patient can hear.",pearl:"SPIKES framework for bad news: Setting, Perception (what does patient know?), Invitation (how much do they want to know?), Knowledge (deliver gently), Emotions (acknowledge empathetically), Strategy/Summary. Apply these principles daily."},
