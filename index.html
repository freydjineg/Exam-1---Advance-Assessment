  html+=`<span class="qbadge qb-${q.type}">${typeLabels[q.type]}</span>`;

  // module badge
  html+=`<span style="font-size:.72rem;background:var(--bg2);color:var(--tx3);padding:2px 8px;border-radius:20px;margin-left:6px;font-weight:600">Module ${q.mod}</span>`;

  // media (EKG/diagrams)
  if(q.svg) html+=`<div class="qmedia">${q.svg}</div>`;

  html+=`<div class="qstem">${q.stem}</div>`;

  if(q.type==='mcq') html+=renderMCQ(q,saved);
  else if(q.type==='sata') html+=renderSATA(q,saved);
  else if(q.type==='fib') html+=renderFIB(q,saved);

  // feedback panel
  html+=renderFeedback(q,saved);

  // nav
  html+=`<div class="navrow">
    <button class="btn btn-s" onclick="navQ(-1)" ${state.idx===0?'disabled':''}>← Back</button>`;
  if(saved===undefined){
    html+=`<button class="btn btn-p" onclick="submitAnswer('${q.id}','${q.type}')">Submit Answer</button>`;
  } else if(state.idx<state.exam.length-1){
    html+=`<button class="btn btn-p" onclick="navQ(1)">Next →</button>`;
  } else {
    html+=`<button class="btn btn-p" onclick="finishExam()">Finish Exam →</button>`;
  }
  html+=`</div>`;

  document.getElementById('qcard').innerHTML=html;
}

function renderMCQ(q,saved){
  const letters='ABCD';
  return`<ul class="opts">`+q.opts.map((opt,i)=>{
    let cls='opt';
    let tooltip='';
    if(saved!==undefined){
      cls+=' dis';
      if(i===q.ans) cls+=' corr';
      else if(i===saved && saved!==q.ans) cls+=' wrng';
      // Show tooltip on ALL non-correct options after reveal
      if(i!==q.ans){
        tooltip=`<div class="tooltip">${q.why[i]}</div>`;
      }
    } else {
      if(q._pending===i) cls+=' sel';
    }
    return`<li class="${cls}" onclick="${saved===undefined?`selectMCQ('${q.id}',${i})`:''}">
      <div class="oltr">${letters[i]}</div>
      <div class="otxt">${opt}</div>${tooltip}
    </li>`;
  }).join('')+'</ul>';
}

function renderSATA(q,saved){
  const letters='ABCDE';
  let html=`<div class="sata-hint">Select all that apply. Partial credit given for correct selections.</div><ul class="opts">`;
  html+=q.opts.map((opt,i)=>{
    let cls='opt';
    let tooltip='';
    if(saved!==undefined){
      cls+=' dis';
      const correctAns=Array.isArray(q.ans)?q.ans:[q.ans];
      const userSel=Array.isArray(saved)?saved:[];
      if(correctAns.includes(i)) cls+=' corr';
      if(userSel.includes(i) && !correctAns.includes(i)) cls+=' wrng';
      // Show tooltip on all non-correct options after reveal
      if(!correctAns.includes(i)){tooltip=`<div class="tooltip">${q.why[i]}</div>`;}
    }
    return`<li class="${cls}" onclick="${saved===undefined?`toggleSATA('${q.id}',${i})`:''}">
      <div class="oltr">${letters[i]}</div>
      <div class="otxt">${opt}</div>${tooltip}
    </li>`;
  }).join('');
  return html+'</ul>';
}

function renderFIB(q,saved){
  let html=`<div class="fib-wrap">`;
  html+=q.blanks.map((lbl,i)=>{
    let cls='fib-in';
    let val='';
    if(saved!==undefined){
      val=saved[i]||'';
      const correct=q.ans[i].toLowerCase().trim();
      const user=(saved[i]||'').toLowerCase().trim();
      cls+= user===correct?' corr':' wrng';
    }
    return`<div class="fib-row">
      <label>${lbl}:</label>
      <input class="${cls}" type="text" id="fib_${q.id}_${i}" value="${val}" placeholder="Type answer..." ${saved!==undefined?'disabled':''}>
    </div>`;
  }).join('');
  return html+'</div>';
}

function renderFeedback(q,saved){
  if(saved===undefined) return`<div class="fbpanel" id="fbpanel"></div>`;

  let fbClass, fbTitle, fbAns;

  if(q.type==='mcq'){
    const correct=saved===q.ans;
    fbClass=correct?'c-fb':'w-fb';
    fbTitle=correct?'✓ Correct!':'✗ Incorrect';
    fbAns=`<div class="fbans">Correct answer: <strong>${q.opts[q.ans]}</strong></div>`;
  } else if(q.type==='sata'){
    const correctSet=Array.isArray(q.ans)?q.ans:[q.ans];
    const userSet=Array.isArray(saved)?saved:[];
    const correctSel=userSet.filter(i=>correctSet.includes(i)).length;
    const wrongSel=userSet.filter(i=>!correctSet.includes(i)).length;
    const points=Math.max(0,correctSel-wrongSel);
    const total=correctSet.length;
    const allRight=points===total && wrongSel===0;
    fbClass=allRight?'c-fb':(points>0?'p-fb':'w-fb');
    fbTitle=allRight?'✓ Perfect!':'Points: '+points+'/'+total;
    const corrLabels=correctSet.map(i=>'ABCDE'[i]).join(', ');
    fbAns=`<div class="fbans">Correct answers: <strong>${corrLabels}</strong></div>`;
  } else {
    const allRight=q.ans.every((a,i)=>(saved[i]||'').toLowerCase().trim()===a.toLowerCase().trim());
    fbClass=allRight?'c-fb':'w-fb';
    fbTitle=allRight?'✓ Correct!':'✗ Incorrect';
    fbAns=`<div class="fbans">Correct answers: <strong>${q.ans.join(', ')}</strong></div>`;
  }

  return`<div class="fbpanel ${fbClass} show">
    <div class="fbtit">${fbTitle}</div>
    ${fbAns}
    <div class="fbrat">${q.rat}</div>
    <div class="fbpearl">${q.pearl}</div>
  </div>`;
}

// ── INTERACTION ──
function selectMCQ(qid,idx){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;
  // temp select visual
  document.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.toggle('sel',i===idx);
  });
  q._pending=idx;
}

function toggleSATA(qid,idx){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;
  if(!q._pendingSATA) q._pendingSATA=[];
  const i=q._pendingSATA.indexOf(idx);
  if(i>-1) q._pendingSATA.splice(i,1);
  else q._pendingSATA.push(idx);
  document.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.toggle('sel',q._pendingSATA.includes(i));
  });
}

function submitAnswer(qid,type){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;

  let answer;
  if(type==='mcq'){
    if(q._pending===undefined){alert('Please select an answer first.');return;}
    answer=q._pending;
  } else if(type==='sata'){
    if(!q._pendingSATA || q._pendingSATA.length===0){alert('Please select at least one option.');return;}
    answer=[...q._pendingSATA];
  } else if(type==='fib'){
    answer=q.blanks.map((_,i)=>document.getElementById('fib_'+qid+'_'+i)?.value||'');
    if(answer.every(a=>!a.trim())){alert('Please fill in the blanks.');return;}
  }

  state.answers[q.id]=answer;

  // Update wrong bank
  let isWrong=false;
  if(type==='mcq') isWrong=answer!==q.ans;
  else if(type==='sata'){
    const correctSet=Array.isArray(q.ans)?q.ans:[q.ans];
    const userSet=answer;
    isWrong=!(correctSet.every(i=>userSet.includes(i)) && userSet.every(i=>correctSet.includes(i)));
  } else if(type==='fib'){
    isWrong=!q.ans.every((a,i)=>(answer[i]||'').toLowerCase().trim()===a.toLowerCase().trim());
  }

  if(isWrong) state.wrongBank[q.id]=true;
  else delete state.wrongBank[q.id];

  updateWrongSec();
  renderQ();
}

function navQ(dir){
  const newIdx=state.idx+dir;
  if(newIdx>=0 && newIdx<state.exam.length){
    state.idx=newIdx;
    renderQ();
    document.querySelector('.scroll').scrollTo(0,0);
  }
}

// ── FINISH ──
function finishExam(){
  let totalPts=0, earnedPts=0, correctCount=0, wrongCount=0;

  state.exam.forEach(q=>{
    const ans=state.answers[q.id];
    if(ans===undefined) return;

    if(q.type==='mcq'){
      totalPts+=1;
      if(ans===q.ans){earnedPts+=1;correctCount++;}
      else wrongCount++;
    } else if(q.type==='sata'){
      const correctSet=Array.isArray(q.ans)?q.ans:[q.ans];
      const userSet=Array.isArray(ans)?ans:[];
      const pts=Math.max(0,userSet.filter(i=>correctSet.includes(i)).length - userSet.filter(i=>!correctSet.includes(i)).length);
      totalPts+=correctSet.length;
      earnedPts+=pts;
      const allRight=pts===correctSet.length && userSet.filter(i=>!correctSet.includes(i)).length===0;
      if(allRight) correctCount++; else wrongCount++;
    } else if(q.type==='fib'){
      const allRight=q.ans.every((a,i)=>(ans[i]||'').toLowerCase().trim()===a.toLowerCase().trim());
      totalPts+=1;
      if(allRight){earnedPts+=1;correctCount++;}
      else wrongCount++;
    }
  });

  const pct=totalPts>0?Math.round((earnedPts/totalPts)*100):0;
  const pass=pct>=PASS;

  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rcorr').textContent=correctCount;
  document.getElementById('rwrng').textContent=wrongCount;
  document.getElementById('rtot').textContent=state.exam.length;

  const banner=document.getElementById('rbanner');
  banner.textContent=pass?'🎉 Passing Score!':'Keep Studying — You\'ve Got This!';
  banner.className='rbanner '+(pass?'pass':'fail');

  const motivImgs=['🏥','👩‍⚕️','🩺','💉','🩻','🏨'];
  const motivTexts=pass?[
    'Outstanding work! Your patients are lucky to have such a dedicated nurse.',
    'You passed! Every patient you care for benefits from your dedication.',
    'Excellent! Keep building on this knowledge.',
    'You did it! Your hard work is paying off.',
  ]:[
    'You\'re building toward excellence. Review your missed questions and try again!',
    'Growth mindset: every wrong answer is a learning opportunity.',
    'Great nurses are made through practice and persistence. Keep going!',
  ];
  document.getElementById('motivimg').textContent=motivImgs[Math.floor(Math.random()*motivImgs.length)];
  document.getElementById('motivtxt').textContent=motivTexts[Math.floor(Math.random()*motivTexts.length)];

  const wbtn=document.getElementById('wreviewbtn');
  const wrongCount2=Object.keys(state.wrongBank).length;
  wbtn.style.display=wrongCount2>0?'block':'none';

  showScreen('results');
  if(pass || state.wrongOnly) launchConfetti();
}

// ── CONFETTI ──
function launchConfetti(){
  const canvas=document.getElementById('cc');
  const ctx=canvas.getContext('2d');
  canvas.style.display='block';
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const colors=['#c2621a','#e07d35','#8b3e08','#f5ede0','#2d6a2d','#1a47a0','#8b1a5a'];
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height-canvas.height,
    r:Math.random()*6+4,
    d:Math.random()*120+80,
    color:colors[Math.floor(Math.random()*colors.length)],
    tilt:Math.random()*10-10,
    tiltAngle:0,
    tiltSpeed:Math.random()*.1+.05
  }));

  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.lineWidth=p.r/2;
      ctx.strokeStyle=p.color;
      ctx.moveTo(p.x+p.tilt+(p.r/4),p.y);
      ctx.lineTo(p.x+p.tilt,p.y+p.tilt+(p.r/4));
      ctx.stroke();
      p.tiltAngle+=p.tiltSpeed;
      p.y+=((Math.cos(frame*(Math.PI/180)+p.d)+2)*0.7);
      p.tilt=Math.sin(p.tiltAngle)*12;
      if(p.y>canvas.height){p.x=Math.random()*canvas.width;p.y=-10;}
    });
    frame++;
    if(frame<360) requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
  }
  draw();
}

pearl:"The ANA/HPNA 2017 'Call for Action' identified 5 areas of palliative nursing: clinical practice, education, policy, research, and administration. This blueprint guides nursing's role in transforming end-of-life care at all levels."},

// ══ MODULE 2 — Cardiac, Neurological, Respiratory from textbooks and slides ══

{id:81,mod:2,type:"mcq",
stem:"The apical impulse (point of maximal impulse/PMI) is normally palpated at which location?",
opts:["2nd intercostal space, right sternal border","3rd intercostal space, left sternal border","5th intercostal space, left midclavicular line","4th intercostal space, left sternal border"],
ans:2,
why:["2nd ICS RSB = aortic auscultation area.","3rd ICS LSB = Erb's point.","✓ Brunner Ch. 21 glossary: 'Apical impulse: impulse normally palpated at the fifth intercostal space, left midclavicular line; caused by contraction of the left ventricle (synonym: point of maximal impulse).'","4th ICS LSB = tricuspid auscultation area."],
rat:"Brunner Ch. 21: PMI/apical impulse = 5th ICS left MCL. If the PMI is displaced laterally beyond the MCL, this suggests cardiomegaly. The PMI is felt as a brief, discrete outward tap during systole.",
pearl:"A PMI that is diffuse (covers >2–3 cm) or sustained suggests left ventricular hypertrophy. A PMI displaced to the anterior axillary line suggests significant cardiac enlargement. Document the exact location and character of the PMI in every cardiac assessment."},

{id:82,mod:2,type:"mcq",
stem:"A nurse assesses a client and counts an apical rate of 98 bpm while a second nurse simultaneously counts a radial rate of 82 bpm. How does the nurse document this finding?",
opts:["A drop in systolic BP >10 mmHg with inspiration","The difference between the apical and radial pulse rates","A blood pressure less than 90/60 mmHg compromising perfusion","The ratio of systolic to diastolic blood pressure"],
ans:1,
why:["Drop in SBP >10 mmHg with inspiration = pulsus paradoxus (cardiac tamponade).","✓ Brunner Ch. 21 glossary: 'Pulse deficit: the difference between the apical and radial pulse rates.'","BP <90/60 compromising perfusion = hypotension.","SBP:DBP ratio = pulse pressure, not pulse deficit."],
rat:"Brunner Ch. 21: Pulse deficit occurs when some cardiac contractions do not generate enough force to produce a peripheral pulse. Measured by two nurses simultaneously counting apical and radial pulses for 1 full minute. Associated with atrial fibrillation.",
pearl:"A significant pulse deficit (>10 bpm) in a patient with irregular rhythm = strong indicator of atrial fibrillation with inadequate stroke volume for some beats. The ventricular rate felt at the apex is the true heart rate; the radial rate reflects only the effective beats."},

{id:83,mod:2,type:"mcq",
stem:"Which statement about S3 heart sound is correct?",
opts:["S3 is normal in all age groups and requires no follow-up","S3 is detected early in diastole and is most often due to volume overload associated with heart failure","S3 is produced by closure of the atrioventricular valves","S3 is a systolic sound heard after the S2"],
ans:1,
why:["S3 is normal in children and young adults but pathological in adults >40.","✓ Brunner Ch. 21 glossary: 'S3: an abnormal heart sound detected early in diastole as resistance is met to blood entering either ventricle; most often due to volume overload associated with heart failure.'","S1 is produced by AV valve closure. S2 is produced by semilunar valve closure.","S3 is a DIASTOLIC sound — it occurs after S2, not after S1."],
rat:"Brunner Ch. 21: S3 = ventricular gallop, early diastolic, most often caused by volume overload/heart failure. S4 = detected LATE in diastole, caused by increased resistance to blood entering the ventricle during atrial contraction (caused by ventricular hypertrophy/stiffness).",
pearl:"From Brunner: S4 is 'most often caused by hypertrophy of the ventricle' and is always pathological. Summation gallop = S3 + S4 occurring simultaneously during tachycardia, creating a single loud gallop sound. Brunner also defines 'opening snaps' as abnormal diastolic sounds from rigid AV valve leaflets (mitral stenosis)."},

{id:84,mod:2,type:"mcq",
stem:"The PR interval on the ECG represents:",
opts:["Ventricular depolarization (the QRS complex)","Conduction of an electrical impulse from the SA node through the AV node","Ventricular repolarization","The time between the end of the T wave and the next P wave"],
ans:1,
why:["The QRS complex represents ventricular depolarization.","✓ Brunner Ch. 22 glossary: 'PR interval: the part of an ECG that reflects conduction of an electrical impulse from the sinoatrial node through the atrioventricular node.'","The T wave and ST segment represent ventricular repolarization.","The TP interval = isoelectric line between T wave and next P wave."],
rat:"Brunner Ch. 22 ECG waveform review: P wave = atrial depolarization. PR interval = SA node through AV node conduction (normal 0.12–0.20 sec). QRS = ventricular depolarization. ST segment = end of ventricular depolarization to start of repolarization. T wave = ventricular repolarization. QT interval = ventricular depolarization through complete repolarization.",
pearl:"Brunner Ch. 22 states: the U wave 'may reflect Purkinje fiber repolarization; usually not seen unless the patient's serum potassium level is LOW.' Prominent U waves = hypokalemia. This is a high-yield ECG finding in patients on loop diuretics."},

{id:85,mod:2,type:"mcq",
stem:"A client receives a bolus dose of epinephrine. Which cardiovascular effects does the nurse anticipate? Select all that apply.",
opts:["Decreases heart rate (negative chronotropy) and AV conduction","Increases heart rate (positive chronotropy), AV conduction (positive dromotropy), and force of contraction (positive inotropy)","Only affects blood pressure without changing heart rate","Causes dilation of peripheral arteries and lowers blood pressure"],
ans:1,
why:["Decreased HR and AV conduction = PARASYMPATHETIC (vagal) stimulation.","✓ Brunner Ch. 22: 'Stimulation of the sympathetic system results in positive chronotropy (increased heart rate), positive dromotropy (increased AV conduction), and positive inotropy (increased force of myocardial contraction).' Also constricts peripheral vessels, increasing BP.","Sympathetic stimulation has multiple cardiac effects.","Dilation of arteries and lowered BP = parasympathetic effect."],
rat:"Brunner Ch. 22 autonomic effects on heart: Sympathetic = fight-or-flight → ↑HR, ↑conduction, ↑contractility, vasoconstriction, ↑BP. Parasympathetic = rest-and-digest → ↓HR (negative chronotropy), ↓AV conduction (negative dromotropy), ↓atrial contractility, vasodilation, ↓BP.",
pearl:"Brunner notes: 'Decreased sympathetic stimulation (e.g., rest, anxiety reduction methods such as therapeutic communication or meditation, or beta-adrenergic blocking agents) may DECREASE the incidence of arrhythmias.' Therapeutic communication literally has a physiological effect on cardiac rhythm."},

{id:86,mod:2,type:"mcq",
stem:"The QT interval represents:",
opts:["Only atrial depolarization","Conduction from the SA node to the AV node","The time from ventricular depolarization through complete repolarization","The isoelectric period between heartbeats"],
ans:2,
why:["Atrial depolarization = P wave only.","SA to AV conduction = PR interval.","✓ Brunner Ch. 22 glossary: 'QT interval: the part of an ECG that reflects the time from ventricular depolarization through repolarization.'","Isoelectric period = TP interval."],
rat:"The QT interval is clinically significant because a prolonged QT (>440 ms in men, >460 ms in women) increases risk of torsades de pointes (a dangerous polymorphic ventricular tachycardia). Many medications prolong the QT interval.",
pearl:"QT-prolonging medications include: antiarrhythmics (amiodarone, sotalol), antibiotics (azithromycin, fluoroquinolones), antipsychotics (haloperidol, quetiapine), and methadone. Always check baseline QTc before administering these medications and monitor with serial ECGs."},

{id:87,mod:2,type:"mcq",
stem:"The Monro-Kellie hypothesis states that:",
opts:["Increased ICP always causes immediate brain herniation","Due to limited space within the skull, an increase in any one cranial content (brain tissue, blood, or CSF) causes a change in the volume of the others","ICP can be measured non-invasively with blood pressure cuffs","Brain death occurs when ICP exceeds 20 mmHg"],
ans:1,
why:["Compensation mechanisms exist before herniation occurs.","✓ Brunner Ch. 61 glossary: 'Monro-Kellie hypothesis: theory that states that due to limited space for expansion within the skull, an increase in any one of the cranial contents — brain tissue, blood, or CSF — causes a change in the volume of the others.'","ICP requires invasive monitoring (intraventricular catheter, fiberoptic sensor).","Brain death requires cessation of all brain functions, not just ICP elevation."],
rat:"The Monro-Kellie doctrine: the rigid skull holds a fixed volume. The three contents — brain tissue (~80%), blood (~10%), CSF (~10%) — must stay in balance. If one increases, the others must decrease OR ICP rises. Once compensation fails, ICP rises exponentially.",
pearl:"Compensation for increased ICP occurs by displacing CSF into the spinal subarachnoid space and compressing cerebral veins. Once these mechanisms are exhausted, small increases in volume cause dramatic ICP spikes. Normal ICP: 0–15 mmHg. Treatment goal: keep ICP ≤20 mmHg."},

{id:88,mod:2,type:"mcq",
stem:"A client is admitted following a traumatic brain injury. Which finding indicates an EARLY sign of increasing intracranial pressure (ICP)?",
opts:["Cushing's triad (bradycardia, hypertension, irregular respirations)","Bilateral fixed and dilated pupils","Disorientation, restlessness, purposeless movements, and mental confusion","Decerebrate posturing"],
ans:2,
why:["Cushing's triad = LATE sign of severely elevated ICP.","Bilateral fixed/dilated pupils = LATE sign indicating herniation.","✓ Blueprint/Brunner Chart 61-1 EARLY signs: 'Disorientation, restlessness, increased respiratory effort, purposeless movements, and mental confusion — early indications because brain cells responsible for cognition are extremely sensitive to decreased oxygenation.'","Decerebrate posturing = LATE sign of brain stem compression."],
rat:"Blueprint Chart 61-1 Early ICP signs: disorientation/restlessness/confusion (cognitive cells most sensitive to hypoxia), pupillary changes/impaired extraocular movements (CN II/III/IV/VI compressed), unilateral extremity weakness (pyramidal tract compression), severe/constant headache aggravated by movement.",
pearl:"Critical ICP progression: Early: confusion/restlessness → Late: Cushing's triad (widening pulse pressure, bradycardia, irregular respirations), fixed/dilated pupils, decerebrate posturing, then brain death. Nursing priority: detect EARLY signs before herniation occurs."},

{id:89,mod:2,type:"mcq",
stem:"A client sustains a traumatic brain injury. Which Glasgow Coma Scale (GCS) score indicates severe neurologic impairment or brain death?",
opts:["GCS 15","GCS 9–12","GCS ≤8","GCS 13–14"],
ans:2,
why:["GCS 15 = fully responsive, intact neurological function.","GCS 9–12 = moderate impairment.","✓ Blueprint/Brunner Ch. 61: 'A score of 3 indicates severe impairment of neurologic function, brain death, or pharmacologic inhibition. A GCS ≤8 = severe brain injury.' GCS ≤8 is the standard threshold for airway protection consideration.","GCS 13–14 = mild impairment."],
rat:"Glasgow Coma Scale: Eye (1–4) + Verbal (1–5) + Motor (1–6) = 3–15 total. GCS 3 = minimum (no response to any stimuli). GCS ≤8 = severe brain injury, needs airway protection. GCS 15 = fully alert. Chart 63-4 in Brunner details the complete scale.",
pearl:"GCS is not diagnosis — it describes the level of consciousness. GCS ≤8 = intubation consideration (cannot protect airway). Motor component is the MOST PROGNOSTICALLY SIGNIFICANT subscale. A patient who localizes pain (motor 5) has better prognosis than one who extends (motor 2 = decerebrate)."},

{id:90,mod:2,type:"mcq",
stem:"A nurse strokes the sole of an adult client's foot during a neurological assessment. The great toe extends upward and the other toes fan out. How does the nurse interpret this finding?",
opts:["Normal reflex — expected in healthy adults","Abnormalities in the motor control pathways from the cerebral cortex (UMN lesion)","Lower motor neuron damage causing hyporeflexia","A normal finding if the patient is over 65"],
ans:1,
why:["Positive Babinski is NORMAL only in infants <12–18 months (myelination incomplete).","✓ Brunner Ch. 60 glossary: 'Babinski reflex (sign): a reflex action of the toes; in adults is indicative of abnormalities in the motor control pathways leading from the cerebral cortex.' = UMN lesion.","LMN damage causes hyporeflexia, flaccidity, atrophy — NOT positive Babinski.","Age does not change the significance of Babinski in adults — it is always pathological."],
rat:"Brunner Ch. 60: Babinski reflex in adults = UMN pathology (pyramidal/corticospinal tract lesion). Causes: stroke, MS, brain tumor, spinal cord injury, TBI. Normal adult plantar reflex: toes curl downward (plantar flexion) = negative Babinski.",
pearl:"Brunner Ch. 60 also defines: Clonus = alternating contraction and relaxation in rapid succession (hyperreflexia); Spasticity = sustained increased muscle tension when passively stretched; Rigidity = increased resistance to passive stretch at rest. These all indicate UMN pathology."},

{id:91,mod:2,type:"mcq",
stem:"Which neurotransmitter is described as 'usually inhibitory; helps control mood and sleep, inhibits pain pathways'?",
opts:["Acetylcholine","Dopamine","Serotonin","Norepinephrine"],
ans:2,
why:["Acetylcholine = usually excitatory; parasympathetic effects; located in many brain areas and autonomic NS.","Dopamine = usually inhibitory; affects behavior, attention, emotions, and fine movement (deficient in Parkinson's).","✓ Brunner Ch. 60, Table of Major Neurotransmitters: Serotonin — Source: brain stem, hypothalamus, dorsal horn. Action: inhibitory; helps control mood and sleep, inhibits pain pathways.","Norepinephrine = usually excitatory; affects mood and overall activity; sympathetic NS transmitter."],
rat:"Brunner Ch. 60 neurotransmitter table: Acetylcholine (parasympathetic, excitatory), Serotonin (inhibitory, mood/sleep/pain), Dopamine (inhibitory, behavior/movement), Norepinephrine (excitatory, sympathetic), GABA (inhibitory, spinal cord/cerebellum).",
pearl:"SSRIs (selective serotonin reuptake inhibitors) work by blocking serotonin reabsorption, increasing available serotonin at the synapse → improves mood and pain modulation. Low serotonin is implicated in depression, anxiety, and chronic pain — key pharmacology concept for NCLEX."},

{id:92,mod:2,type:"mcq",
stem:"The Romberg test assesses for:",
opts:["Cranial nerve II function (visual acuity)","Deep tendon reflex integrity","Cerebellar dysfunction — the patient's ability to maintain position for 20 seconds with eyes closed","Motor cortex function (fine motor coordination)"],
ans:2,
why:["CN II testing = visual acuity (Snellen chart, visual fields).","Deep tendon reflexes = separate assessment using reflex hammer.","✓ Brunner Ch. 60 glossary: 'Romberg test: test for cerebellar dysfunction that can be done with the patient seated or standing; inability to maintain position for 20 seconds is a positive test.'","Motor cortex function = assessed via muscle strength testing and coordination tasks."],
rat:"Romberg test: patient stands with feet together, arms at sides, eyes open (stability) then closed. Positive Romberg = unable to maintain balance for 20 seconds with eyes closed. Indicates cerebellar dysfunction or proprioceptive deficit (loss of position sense).",
pearl:"Distinguish: Positive Romberg with eyes OPEN = cerebellar problem (cannot compensate). Positive Romberg with eyes CLOSED only = proprioceptive/vestibular problem (relies on vision to compensate). Wide-based gait + positive Romberg = classic cerebellar findings."},

{id:93,mod:2,type:"mcq",
stem:"Metabolic ALKALOSIS is characterized by which ABG pattern?",
opts:["pH <7.35, PaCO2 >45, HCO3 normal (uncompensated respiratory acidosis)","pH >7.45, HCO3 >26 mEq/L (high bicarbonate concentration)","pH <7.35, HCO3 <22 mEq/L (low bicarbonate)","pH >7.45, PaCO2 <35 (respiratory alkalosis)"],
ans:1,
why:["pH <7.35, PaCO2 >45 = respiratory acidosis (not metabolic alkalosis).","✓ Brunner Ch. 10: 'In metabolic alkalosis, evaluation of ABGs reveals a pH greater than 7.45 and a serum bicarbonate concentration greater than 26 mEq/L.'","pH <7.35, HCO3 <22 = metabolic acidosis.","pH >7.45, PaCO2 <35 = respiratory alkalosis (hyperventilation)."],
rat:"Brunner Ch. 10: Metabolic alkalosis = high pH (>7.45) + high HCO3 (>26 mEq/L). Causes: severe vomiting/gastric suction (loss of HCl), pyloric stenosis, diuretic therapy (K+ loss → H+ secretion), hyperaldosteronism, antacid overuse. The lungs compensate by retaining CO2 (hypoventilation).",
pearl:"Brunner clinical manifestations of metabolic alkalosis: tingling fingers/toes, dizziness, and TETANY (cramping muscles) — all due to hypocalcemia. Alkalosis causes calcium to bind to proteins → decreased ionized Ca2+. Hypokalemia also develops and may cause PVCs and prominent U waves on ECG."},

{id:94,mod:2,type:"mcq",
stem:"A common cause of METABOLIC ALKALOSIS is severe vomiting. What is the mechanism?",
opts:["Vomiting causes loss of bicarbonate from the GI tract","Gastric fluid (pH 1–3) contains HCl; its loss pulls H+ from the bloodstream, making it alkalotic","Vomiting causes respiratory compensation via hyperventilation","Vomiting increases aldosterone, causing metabolic acidosis"],
ans:1,
why:["GI tract below the stomach loses bicarbonate (causing metabolic ACIDOSIS). Stomach secretes HCl (acid), so its LOSS causes alkalosis.","✓ Brunner Ch. 10: 'Gastric fluid has an acid pH (usually 1 to 3), and loss of this highly acidic fluid pulls H+ ions from the bloodstream to replenish the gastric acid. As a result, the bloodstream loses H+ ions and becomes alkalotic.'","Hypoventilation (not hyperventilation) compensates for metabolic alkalosis.","Aldosterone causes H+ excretion → alkalosis, but the mechanism described is incorrect."],
rat:"Brunner Ch. 10 pathophysiology of metabolic alkalosis: vomiting removes HCl from stomach → blood gives up H+ to replenish gastric acid → blood becomes alkalotic. Also: pyloric stenosis, gastric suction, diuretics, and antacid overuse.",
pearl:"Treatment per Brunner: restore fluid volume with NORMAL SALINE (volume depletion perpetuates alkalosis), replace K+ as KCl (addresses both K+ and Cl- losses), proton pump inhibitors reduce HCl production (useful with gastric suction), acetazolamide (carbonic anhydrase inhibitor) enhances bicarbonate excretion in HF patients who cannot tolerate fluid loading."},

{id:95,mod:2,type:"mcq",
stem:"A client with COPD has a chronically elevated PaCO2 of 58 mmHg. Which physiologic change explains why high-flow oxygen is dangerous for this client?",
opts:["COPD patients have a higher pain threshold for CO2","Compensatory renal changes (HCO3 retention) have had time to occur, normalizing pH","COPD patients develop tolerance to hypoxia through polycythemia only","The PaCO2 never truly rises in COPD patients"],
ans:1,
why:["Pain threshold does not affect acid-base physiology.","✓ Brunner Ch. 10: 'Patients with long-term COPD may not develop symptoms of hypercapnia because compensatory renal changes have had time to occur.' The kidneys retain HCO3 over months to years, compensating for elevated PaCO2.","Polycythemia helps with hypoxia but doesn't directly compensate for CO2 retention.","PaCO2 does rise in COPD — that's the definition of chronic respiratory acidosis."],
rat:"Brunner Ch. 10 Quality and Safety Alert: 'If the PaCO2 is chronically greater than 50 mm Hg, the respiratory center becomes relatively insensitive to CO2 as a respiratory stimulant, leaving hypoxemia as the MAJOR DRIVE for respiration.' → This is why high-flow O2 is dangerous in COPD.",
pearl:"This is the classic NCLEX oxygen rationale: COPD patients with chronic hypercapnia depend on LOW O2 (hypoxic drive) to breathe. Giving high-flow O2 removes this drive → hypoventilation → CO2 narcosis → respiratory failure. Target SpO2 88–92% in known CO2 retainers."},

{id:96,mod:2,type:"mcq",
stem:"Which ECG finding is associated with HYPOKALEMIA caused by metabolic alkalosis?",
opts:["Tall, peaked T waves and widened QRS","Prominent U waves and ventricular rhythm disturbances such as PVCs","Shortened QT interval and bradycardia","Delta waves and a slurred upstroke of the QRS"],
ans:1,
why:["Tall peaked T waves + widened QRS = HYPERkalemia.","✓ Brunner Ch. 10: 'In hypokalemia a prominent U wave often develops on the ECG and ventricular rhythm disturbances, such as PVCs, may occur. Hypokalemia also can lead to decreased GI motility and paralytic ileus.'","Shortened QT = hypercalcemia.","Delta waves + slurred QRS = Wolff-Parkinson-White syndrome (pre-excitation), not hypokalemia."],
rat:"Brunner Ch. 10 links hypokalemia to metabolic alkalosis through this mechanism: alkalosis → kidneys increase H+ reabsorption → excrete K+ → hypokalemia develops. ECG changes: flat/inverted T waves, prominent U waves, ST depression, widened QRS in severe cases.",
pearl:"Brunner also notes: 'Hypokalemia also can lead to decreased GI motility and paralytic ileus.' This is relevant for post-surgical patients on nasogastric suction — monitor K+ closely and replace as needed to prevent ileus and cardiac dysrhythmias."},

{id:97,mod:2,type:"mcq",
stem:"Which is the PRIMARY risk factor for COPD that is also the most modifiable?",
opts:["Alpha-1 antitrypsin deficiency","Occupational dust exposure","Environmental tobacco smoke and active smoking","Advanced age"],
ans:2,
why:["Alpha-1 antitrypsin deficiency is a genetic risk factor — not modifiable.","Occupational exposure is important but less prevalent than smoking.","✓ Brunner pgs. 606-608: 'Smoking cessation is the single most cost-effective intervention to reduce the risk of developing COPD and to stop its progression.' Smoking = the most important modifiable risk factor.","Age is a risk factor but is not modifiable."],
rat:"Brunner pgs. 606-608: 'In 2017, over 34 million people in the US reported that they were active smokers. Smoking kills more than 480,000 people each year and costs the nation more than $300 billion annually. Smoking cessation is the single most cost-effective intervention to reduce COPD risk.'",
pearl:"COPD smoking cessation strategies per Brunner: set a quit date, follow up within 3–5 days, nicotine replacement therapy (gum, inhaler, patch, spray, tablet), bupropion SR, nortriptyline, varenicline (Chantix). Relapses are common — focus on successes rather than failures."},

{id:98,mod:2,type:"mcq",
stem:"COPD GRADE II (Moderate) is characterized by which spirometric finding?",
opts:["FEV1/FVC <70% and FEV1 ≥80% predicted","FEV1/FVC <70% and FEV1 50–79% predicted","FEV1/FVC <70% and FEV1 30–49% predicted","FEV1/FVC <70% and FEV1 <30% predicted"],
ans:1,
why:["FEV1/FVC <70% and FEV1 ≥80% = GOLD Grade I (Mild).","✓ Brunner GOLD Table: Grade II (Moderate) = FEV1/FVC <70% AND FEV1 50–79% predicted.","FEV1 30–49% = GOLD Grade III (Severe).","FEV1 <30% = GOLD Grade IV (Very Severe)."],
rat:"GOLD COPD Grades (all require FEV1/FVC <70%): Grade I Mild = FEV1 ≥80%. Grade II Moderate = FEV1 50–79%. Grade III Severe = FEV1 30–49%. Grade IV Very Severe = FEV1 <30%. Spirometry is the gold standard for diagnosis and severity classification.",
pearl:"COPD Assessment: Spirometry classifies SEVERITY. Symptoms + exacerbation history classify RISK. Treatment is guided by BOTH: mild/low risk → SABA PRN; moderate → add LAMA/LABA; severe → add ICS; very severe → consider O2 therapy, pulmonary rehab, surgical options."},

{id:99,mod:2,type:"mcq",
stem:"A nurse reviews an ECG rhythm strip and notes a rate of 78 bpm, regular rhythm, a P wave before every QRS, and a PR interval of 0.24 seconds with no dropped beats. Which rhythm does the nurse identify?",
opts:["Absence of P waves","Wide QRS complexes (>0.12 sec)","PR interval consistently >0.20 seconds with a P wave before every QRS","Dropped QRS beats in a repeating pattern"],
ans:2,
why:["Absent P waves = atrial fibrillation or junctional rhythm.","Wide QRS = ventricular origin or bundle branch block.","✓ Cardiac Rhythms lecture: First-degree block = conduction DELAY at the AV node/bundle of His, causing PR interval >0.20 seconds. A P precedes every QRS — no dropped beats. 'So it's actually a delay, not a complete block.'","Dropped QRS beats in a pattern = second-degree block (Wenckebach or Mobitz II)."],
rat:"From Cardiac Rhythms narrated lecture: 'First-degree heart block is caused by a conduction delay at the AV node or bundle of His. The PR interval will be longer than normal (over 0.20 sec). So it's actually a delay, not a complete block.' Usually benign — no treatment needed.",
pearl:"Heart Block poem from the lecture: 'If the R is far from P, then you have FIRST degree. Longer, longer, longer, QRS drop — then you have WENKEBACH. If some P's just don't go through — then you have MOBITZ TWO. If P's and Q's just don't agree — then you have THIRD degree.'"},

{id:100,mod:2,type:"mcq",
stem:"SECOND-DEGREE heart block Type I (Wenckebach) is described as:",
opts:["A constant PR interval with sudden, unexpected dropped QRS beats","Progressive PR lengthening with more P waves than QRS complexes; after a blocked beat, the cycle resets — also called Wenckebach block","Complete dissociation between P waves and QRS complexes","A wide complex tachycardia with no visible P waves"],
ans:1,
why:["Constant PR + sudden drops = Mobitz II (Type II), not Wenckebach.","✓ Cardiac Rhythms lecture: 'Second degree heart block Type I causes some impulses to be blocked. Each successive impulse undergoes a longer delay. Then after 3 or 4 beats the impulse is blocked. After this blocked beat, the cycle of lengthening PR intervals resumes. This heart block is also called a Wenckebach block.'","Complete P-QRS dissociation = third-degree block.","Wide-complex tachycardia without P waves = ventricular tachycardia."],
rat:"Wenckebach (Mobitz I): AV node level block, often associated with inferior MI (RCA supplies AV node), vagal stimulation, or medications (beta-blockers, digoxin). Often benign and reversible. Mobitz II is infranodal (bundle of His) and more serious — may require pacemaker.",
pearl:"Clinical significance from lecture: Mobitz I = AV node issue → often reversible. Mobitz II = infranodal → HIGH risk of progressing to complete (3rd degree) heart block → usually requires PERMANENT PACEMAKER. Distinguishing the two is critical for clinical decision-making."},

{id:101,mod:2,type:"mcq",
stem:"A nurse observes a regular cardiac rhythm on the monitor with a rate of 118 bpm, upright P waves before every QRS, and a narrow QRS complex. Which rhythm does the nurse identify?",
opts:["A normal sinus rhythm with a heart rate over 100 bpm that occurs with exercise, excitement, and some illnesses","An irregularly irregular rhythm with absent P waves","A wide-complex tachycardia originating in the ventricles","A sawtooth flutter wave pattern at 250–350 bpm"],
ans:0,
why:["✓ Cardiac Rhythms lecture: 'Sinus tachycardia is a normal sinus rhythm with a heart rate over 100 bpm. This occurs with exercise, excitement and with some illnesses.'","Irregularly irregular + absent P waves = atrial fibrillation.","Wide-complex ventricular tachycardia = VT.","Sawtooth waves 250–350 = atrial flutter."],
rat:"Sinus tachycardia features: rate >100 bpm, regular, P wave before every QRS (upright in lead II), normal PR interval, normal narrow QRS. Treat the CAUSE — fever, pain, dehydration, anxiety, hyperthyroidism, medications (epinephrine, atropine, caffeine, stimulants).",
pearl:"Sinus tachycardia is a SYMPTOM, not a primary arrhythmia. NCLEX priority: identify and treat the underlying cause. A new HR of 118 in a post-op patient → check: pain? fever? blood loss? pulmonary embolism? hypovolemia? Do not reflexively reach for rate control medications."},

{id:102,mod:2,type:"sata",
stem:"A nurse is comparing three supraventricular rhythms. Which statements correctly describe atrial fibrillation, atrial flutter, and SVT? Select all that apply.",
opts:["AFib: no P waves, irregularly irregular rhythm — key clue: 'No P waves + irregular'","Atrial Flutter: sawtooth flutter waves at 250–350 bpm — key clue: 'sawtooth pattern'","SVT: fast, regular, narrow-complex — P waves may be hidden — key clue: 'fast + regular + narrow'","AFib QRS complexes are always wide (>0.12 sec)","Atrial Flutter is always irregularly irregular"],
ans:[0,1,2],
why:["✓ Exact description from the Cardiac Rhythms lecture comparison table.","✓ Exact description from the lecture table.","✓ Exact description from the lecture table.","AFib QRS is NORMAL (narrow) unless there is aberrant conduction or bundle branch block.","Atrial Flutter is USUALLY REGULAR (fixed block ratio, e.g., 2:1, 4:1). The lecture states 'usually regular.'"],
rat:"Cardiac Rhythms lecture comparison table: AFib = atrial >300, ventricular variable, irregularly irregular, absent P waves, normal QRS, key clue: No P waves + irregular. Flutter = 250–350 atrial, usually regular, sawtooth waves, normal QRS. SVT = 150–250, regular, hidden P waves, narrow QRS.",
pearl:"From the lecture: 'Irregularly irregular is characteristic of atrial fibrillation.' The most common trigger words on NCLEX for AFib: 'irregularly irregular' + 'absent P waves' + 'fibrillatory baseline.' For SVT: 'sudden onset' + 'sudden termination' + 'narrow complex' + 'P waves buried in T waves.'"},

{id:103,mod:2,type:"mcq",
stem:"A nurse responds to a cardiac monitor alarm and finds a client pulseless. The monitor shows completely chaotic waveforms with no identifiable P waves, QRS complexes, or T waves. Which rhythm does the nurse identify?",
opts:["Regular wide-complex tachycardia at 100–250 bpm with absent P waves","Completely chaotic, no organized rhythm, no identifiable waveforms, no cardiac output — requires defibrillation + CPR","Narrow-complex tachycardia at 150–250 bpm with hidden P waves","Irregularly irregular rhythm with absent P waves and normal QRS — ventricular rate 60–150"],
ans:1,
why:["Regular wide-complex at 100–250, no P waves = ventricular tachycardia (VT).","✓ VFib lecture description: 'Chaotic, no organized rhythm, no contraction, no pulse. Coarse or fine waves. Cardiac arrest — life-threatening. Treatment: Defibrillation + CPR + Epinephrine + meds.'","Narrow complex 150–250, hidden P waves = SVT.","Irregularly irregular + absent P waves + normal QRS = atrial fibrillation."],
rat:"VFib: completely disorganized ventricular electrical activity, no coordinated contractions, zero cardiac output. Patient is pulseless. Shockable rhythm — immediate defibrillation is the priority. CPR continues until defibrillator is ready.",
pearl:"Lecture key: Shockable = VFib + pulseless VT. Non-shockable = asystole + PEA. 'Pulseless VT is treated like VFib (shockable rhythm).' For asystole: confirm in TWO leads before calling asystole (rule out equipment error). Treatment: CPR + epinephrine only — NO SHOCK."},

{id:104,mod:2,type:"mcq",
stem:"NORMAL SINUS RHYTHM (NSR) requires which of the following features?",
opts:["Rate 40–60 bpm, regular, P wave before each QRS","Rate 60–100 bpm, regular, P wave before every QRS, upright and consistent P waves","Rate 100–150 bpm, irregular, absent P waves","Rate 60–100 bpm, wide QRS >0.12 sec, P waves may vary"],
ans:1,
why:["40–60 bpm = sinus bradycardia.","✓ NSR key features from lecture: 'P wave before every QRS, P waves upright and consistent, regular rhythm, heart rate 60–100 bpm (adult normal range).'","100–150 + irregular + absent P = atrial fibrillation.","Wide QRS = ventricular origin, not NSR."],
rat:"NSR from the lecture: the cardiac electrical impulse originates in the SA node → travels through atria (P wave) → pauses at AV node (PR interval) → continues to ventricles (QRS complex) → T wave represents ventricular repolarization. All components must be present and normal.",
pearl:"Normal ECG intervals: PR = 0.12–0.20 sec (3–5 small boxes). QRS = <0.12 sec (<3 small boxes). QT = <0.44 sec. One small box = 0.04 sec. One large box = 0.20 sec. 1500/number of small boxes between R waves = heart rate. 300/number of large boxes = heart rate (regular rhythms)."},

// ══ MODULE 3 — IV Therapy (Blueprint Module 3) ══

{id:105,mod:3,type:"mcq",
stem:"The PRIMARY purpose of IV therapy is:",
opts:["To replace blood products exclusively","To maintain fluid/electrolyte balance, replace losses, correct imbalances, and provide venous access for medication administration","To provide nutrition when the GI tract is functioning normally","To monitor central venous pressure continuously"],
ans:1,
why:["Blood products are ONE purpose, but not the primary or only one.","✓ IV therapy lecture: 'Purpose of IV therapy: Maintain daily fluid and electrolyte balance. Replace fluid and electrolyte losses. Correct fluid and electrolyte imbalance. Provide access to venous system for medication administration.'","IV nutrition (TPN) is used when GI tract is NOT functioning — not when it IS.","CVP monitoring = central line function, not peripheral IV therapy purpose."],
rat:"IV therapy lecture Knowledge and Science section: Four purposes — maintain balance, replace losses, correct imbalances, medication access. Blueprint Module 3 objectives include: demonstrate safe insertion, select appropriate site/gauge, maintain aseptic technique, monitor complications.",
pearl:"The 6 Rights of medication administration apply to IV therapy: Right patient (two identifiers), Right drug, Right dose, Right route, Right time, Right documentation. The blueprint adds: Right reason and Right response. Always verify compatibility before mixing IV medications."},

{id:106,mod:3,type:"mcq",
stem:"A nurse is inserting a peripheral IV for short-term IV therapy. Which statement about peripheral IV access is correct?",
opts:["12–24 hours","No routine replacement — change only when clinically indicated or per facility policy","Every 7 days regardless of site condition","96 hours for all PIVs without exception"],
ans:1,
why:["12–24 hours would be unnecessarily frequent and cause significant patient discomfort.","✓ Current INS (Infusion Nurses Society) guidelines recommend changing PIVs only when clinically indicated — not on a routine schedule — unless facility policy requires otherwise. This reduces unnecessary restarts and patient discomfort.","7 days is too long for most peripheral IVs.","96-hour routine rotation is an older standard no longer recommended by INS as routine."],
rat:"Current evidence-based practice: peripheral IVs should be assessed every 1–2 hours (or per policy) and removed when signs of complication develop — not on a fixed schedule. The lecture states: 'Monitor q1h, dressing integrity, I&O.' Site rotation only when clinically indicated.",
pearl:"Blueprint learning outcome: 'Document insertion site, gauge, number of attempts, and patient response. Document infusion type, rate, and any complications/interventions.' Meticulous documentation protects patients and nurses legally."},

{id:107,mod:3,type:"mcq",
stem:"The CORRECT flushing technique for a saline lock (IVAD) is:",
opts:["Flush rapidly with 1 mL using a small insulin syringe","Use 2–3 mL normal saline with a pulsatile (push-pause) technique, ending with positive pressure closure","Use heparin flush exclusively — normal saline is not acceptable","Flush with 10 mL sterile water after each medication"],
ans:1,
why:["Rapid flushing with a small syringe generates excessive pressure — can damage vein or catheter.","✓ IV lecture: 'Flushing guidelines: 2–3 mL saline q12 hour, with each use or per facility policy. Pulsatile method. Positive pressure method.' Pulsatile = push-pause technique; Positive pressure = clamp while still pushing to prevent blood reflux.","Heparin is used for central lines — NOT standard for peripheral IVs per current INS guidelines.","Sterile water is HYPOTONIC and NEVER used for IV flushing — causes hemolysis."],
rat:"IVAD (saline lock) flushing: 2–3 mL NS, pulsatile push-pause technique (creates turbulence to clear fibrin), positive pressure closure (prevents blood backflow into catheter). Assess for patency first. Flush before AND after each medication administration.",
pearl:"SASH protocol for central lines: Saline → Administer → Saline → Heparin. For peripheral saline locks: SAP — Saline → Administer → (positive pressure) close. Per INS, heparin is NOT routinely recommended for peripheral IVs — normal saline is sufficient for maintaining patency."},

{id:108,mod:3,type:"mcq",
stem:"A client receiving dopamine via a peripheral IV reports burning at the site. The nurse notes the surrounding tissue is pale and cool. Which complication does the nurse suspect, and why?",
opts:["Inflammation of the vein wall from mechanical or chemical trauma","Infiltration of any amount of a VESICANT into surrounding tissue — can cause blistering, severe tissue injury, or necrosis","Normal backflow of blood into the IV tubing indicating a patent catheter","Clot formation within the IV catheter lumen"],
ans:1,
why:["Inflammation of the vein = phlebitis.","✓ IV lecture: 'Infiltration of any amount of a vesicant is considered an extravasation. Leakage of a vesicant into surrounding tissue. Vesicant: Any medication that can cause blistering, severe tissue injury or tissue necrosis.'","Blood backflow = sign of patency, not a complication.","Clot in catheter = occlusion."],
rat:"IV lecture vesicant examples: Chemotherapeutic agents (Vinca Alkaloids: vincristine, vinblastin), Catecholamines (Dopamine, Epinephrine, Norepinephrine, Levophed), Other meds (Gentamycin, Mannitol). Any infiltration of these = extravasation = Grade 4 regardless of volume.",
pearl:"Extravasation treatment from lecture (STOP mnemonic): STOP infusion → Notify Pharmacy (for antidote) → Notify Physician → Clean the site → Remove IV. Do NOT remove catheter until antidote is given through it. Document, photograph, monitor site. Phentolamine for catecholamines."},

{id:109,mod:3,type:"sata",
stem:"A nurse assesses a peripheral IV site and notes swelling greater than 6 inches, cool pale skin, pain, and possible numbness. Using the infiltration grading scale, which grade does the nurse assign? Select all that apply.",
opts:["Gross edema >6 inches","Cool and pale skin around the site","Pain at the insertion site","Possible numbness","Pitting edema with skin tight and leaking"],
ans:[0,1,2,3],
why:["✓ Grade 3 = gross edema >6 inches.","✓ Grade 3 = cool to touch, pale.","✓ Grade 3 = pain.","✓ Grade 3 = possible numbness.","Pitting edema + skin tight and leaking = Grade 4 (most severe)."],
rat:"IV lecture infiltration grading: 0=none; 1=edema <1 inch, cool, pale; 2=edema 1–6 inches, cool, pale; 3=gross edema >6 inches, cool, pale, pain, possible numbness; 4=gross edema >6 inches, pitting edema, skin tight, leaking, bruised, moderate/severe pain. *Any vesicant infiltration = Grade 4.",
pearl:"Infiltration treatment per lecture: Warm compresses for HYPOTONIC solutions. Cool compresses for ISOTONIC or HYPERTONIC solutions. Elevate extremity. Remove catheter and restart elsewhere. Document infiltration grade and treatment. Monitor site for resolution vs. worsening."},

{id:110,mod:3,type:"mcq",
stem:"What is the FIRST priority intervention when EXTRAVASATION is suspected?",
opts:["Apply warm compresses and continue the infusion at a slower rate","Immediately STOP the infusion","Notify pharmacy and wait for antidote before doing anything else","Remove the IV catheter immediately before calling anyone"],
ans:1,
why:["Never continue an extravasation infusion — tissue damage worsens with continued infusion.","✓ IV lecture: 'STOP infusion!!' is listed FIRST in the extravasation treatment sequence. Stopping the drug prevents further tissue damage.","Pharmacy notification is critical but comes AFTER stopping the infusion.","Do NOT remove the catheter first — it may be needed to administer the antidote through it."],
rat:"Extravasation treatment sequence per lecture: 1) STOP infusion. 2) Notify pharmacy (for antidote). 3) Notify physician. 4) Clean the site. 5) Remove IV (after antidote given). Rationale: keeping the catheter in place allows antidote injection into the extravasated tissue through the existing access.",
pearl:"Why NOT remove the catheter first: the antidote (e.g., phentolamine for catecholamines, hyaluronidase for vinca alkaloids) is injected through the existing catheter INTO the extravasated area for maximum effectiveness. Removing the catheter eliminates this treatment opportunity."},

{id:111,mod:3,type:"mcq",
stem:"A client develops fever, hypotension, tachycardia, and altered mental status three days after peripheral IV insertion. Which complication does the nurse suspect?",
opts:["Sepsis is limited to IV insertion sites and cannot spread systemically","Sepsis is a life-threatening complication of infection where chemicals released to fight infection trigger inflammation throughout the body, potentially causing multi-organ failure","Sepsis only occurs in immunocompromised patients","Sepsis is characterized by bradycardia and hypertension"],
ans:1,
why:["Sepsis is a SYSTEMIC condition — it can originate from an IV site but spreads throughout the body.","✓ IV lecture: 'Sepsis occurs when chemicals released in the bloodstream to fight an infection trigger inflammation throughout the body. This can cause a cascade of changes that damage multiple organ systems, leading them to fail, sometimes even resulting in death.'","Sepsis can occur in any patient — immunocompromised or not.","Sepsis is characterized by fever, tachycardia (not brady), hypotension, and respiratory changes."],
rat:"IV lecture on sepsis: 'Symptoms include fever, difficulty breathing, low blood pressure, fast heart rate, and mental confusion. Treatment includes antibiotics and intravenous fluids.' This directly reflects SIRS criteria and sepsis management principles.",
pearl:"IV-related infection prevention (blueprint objectives): proper hand hygiene and PPE during insertion, chlorhexidine site preparation and allow to dry, sterile technique throughout, date/label all IV tubing and dressings, change per facility policy, assess site every hour. CLABSI prevention standards also apply when caring for central lines."},

{id:112,mod:3,type:"mcq",
stem:"A PHLEBITIS grade of 1 is characterized by:",
opts:["No symptoms at the IV site","Erythema (redness/warmth to touch) with possible pain — no edema or cord","Erythema, edema, pain, and streak formation","Palpable venous cord >1 inch with purulent drainage"],
ans:1,
why:["No symptoms = Grade 0.","✓ IV lecture phlebitis scale: '1 = erythema (red/warm to touch), possible pain.' No edema, no streak, no cord at this grade.","Erythema + edema + pain = Grade 2. Adding streak + cord = Grade 3.","Cord >1 inch + purulent drainage = Grade 4."],
rat:"Phlebitis scale from lecture: 0=none; 1=erythema±pain; 2=erythema+edema+pain; 3=Grade 2+streak+palpable venous cord; 4=Grade 3+cord>1 inch+purulent drainage. Treatment at any grade: remove catheter, warm compresses, document, monitor for infection.",
pearl:"Grade 4 phlebitis = infectious thrombophlebitis — potential source of bacteremia and sepsis. Notify provider, culture the site, consider systemic antibiotics, and monitor for systemic infection signs (fever, tachycardia, leukocytosis). Document time, grade, and all interventions."},

{id:113,mod:3,type:"mcq",
stem:"A nurse is providing discharge education to a client with a peripheral IV. Which signs of complications should the nurse instruct the client to report immediately?",
opts:["Occasional mild itching at the dressing site only","Pain, swelling, redness, or leakage at or around the IV site","A slight cool sensation at the IV site during infusion — always normal","Visible tubing — this is always an emergency"],
ans:1,
why:["Occasional mild itching may be dressing-related but is not the comprehensive teaching focus.","✓ Blueprint Module 3: 'Teach signs of complications (pain, swelling, redness, leakage). Reinforce the importance of reporting changes promptly.'","Cool sensation during infusion of room-temperature fluids may be normal, but unexplained coolness suggests infiltration.","Visible tubing is expected — not an emergency."],
rat:"Blueprint Module 3 patient education outcomes: explain purpose, expected duration, and care of IV site; teach signs of complications (pain, swelling, redness, leakage); reinforce reporting changes promptly. Patient education is an autonomous nursing function.",
pearl:"Also teach patients: do not adjust infusion rate themselves, do not kink or pull tubing, report if alarm sounds on the pump, call nurse before getting up with pump, and report any unusual sensations at the site. Empowered patients are an important safety check."},

{id:114,mod:3,type:"fib",
stem:"Fill in the blanks: When performing peripheral IV insertion, the skin is cleansed with chlorhexidine and allowed to ___ completely before the catheter is inserted. The needle bevel should face ___ at an angle of ___–___ degrees.",
blanks:["Chlorhexidine allowed to ___","Bevel faces ___","Insertion angle ___ to ___ degrees"],
ans:["dry","up","10","30"],
rat:"IV lecture venipuncture technique: cleanse with chlorhexidine and allow to DRY completely (minimum 30 seconds — must be dry for maximum antiseptic effect). Bevel UP (angled tip facing ceiling allows sharpest point to enter vein first). Angle 10–30 degrees (shallow enough to stay in lumen, deep enough to enter vessel).",
pearl:"Why bevel UP: ensures the sharpest point enters the vein first, reducing vessel trauma. Angle too steep (>30°) risks going through the posterior wall. Too shallow (<10°) may not penetrate the vessel wall. After blood flashback, advance the catheter slightly, then lower angle and thread catheter off needle."},

{id:115,mod:3,type:"mcq",
stem:"A provider orders 1,000 mL of 0.9% NS to infuse over 8 hours using a 20 gtt/mL macrodrip set. What is the correct drip rate in gtt/min?",
opts:["20 gtt/min","42 gtt/min","125 gtt/min","32 gtt/min"],
ans:1,
why:["20 gtt/min would deliver only 60 mL/hr — too slow.","✓ Formula: (mL/hr × drop factor) ÷ 60. First: 1000 mL ÷ 8 hr = 125 mL/hr. Then: (125 × 20) ÷ 60 = 2500 ÷ 60 = 41.67 ≈ 42 gtt/min.","125 gtt/min would deliver 375 mL/hr — far too fast.","32 gtt/min is incorrect for this calculation."],
rat:"Step 1: Calculate mL/hr = 1000 ÷ 8 = 125 mL/hr. Step 2: Apply drop factor formula = (125 mL/hr × 20 gtt/mL) ÷ 60 min = 2500 ÷ 60 = 41.67 → round to 42 gtt/min.",
pearl:"Always show your work in IV calculations. Common drop factors: 10, 15, 20 gtt/mL (macrodrip — check the package). 60 gtt/mL = microdrip. Shortcut for microdrip: gtt/min = mL/hr exactly. For 20 gtt/mL: multiply mL/hr × 0.333 (or divide by 3)."},

{id:116,mod:3,type:"mcq",
stem:"A GRAY (16-gauge) peripheral IV catheter is indicated for which clinical situation?",
opts:["Pediatric patients with fragile small veins","Routine medication administration and hydration","Major surgery, large volume infusions, and hemodynamically unstable patients","Short-term access when only small veins are accessible"],
ans:2,
why:["Pediatric/fragile veins = 24-gauge (yellow).","Routine meds/hydration = 20-gauge (pink).","✓ IV lecture: 'Gray (16): Major surgery, large volume infusions, unstable patients.'","Small veins/short-term = 22-gauge (blue)."],
rat:"IV catheter color-gauge memory from lecture: Magma/Orange 14=trauma; Gray 16=major surgery/unstable; Green 18=large volume/multiple or rapid transfusion; Pink 20=medications/hydration/transfusions; Blue 22=small veins/short-term; Yellow 24=fragile/pediatric/last resort adults.",
pearl:"Poiseuille's Law: flow rate is proportional to the FOURTH POWER of the radius. A 16-gauge catheter allows dramatically more fluid to flow than an 18-gauge, even though the size difference seems small. For massive hemorrhage or rapid resuscitation, gauge selection is a life-saving decision."},

{id:117,mod:3,type:"mcq",
stem:"A nurse working in a medical-surgical unit is asked why palliative care knowledge is relevant outside of oncology settings. Which demographic fact best supports this argument?",
opts:["Double","Triple","Quadruple","Stay the same"],
ans:2,
why:["Double = not the stated figure.","Triple = not the stated figure.","✓ Brunner Ch. 13: 'Between 2000 and 2050, the number of people older than 85 years is expected to quadruple.'","The text specifically projects significant increase."],
rat:"Brunner Ch. 13 population context: aging demographics + more chronic illnesses = more patients needing palliative/end-of-life nursing care. 'More than half of the aged population has one or more chronic, serious illness.' This drives the necessity for all nurses to develop primary palliative care competence.",
pearl:"Brunner identifies four illness trajectories: sudden death, terminal illness (e.g., cancer — high then rapid decline), organ failure (episodic exacerbations with each recovery less complete), and frailty (dementia — slow progressive decline from already frail baseline). Each trajectory requires different end-of-life care planning."},

{id:118,mod:3,type:"mcq",
stem:"Which action is APPROPRIATE postmortem care for the BODY of a deceased patient?",
opts:["Remove all tubes regardless of whether an autopsy is scheduled","Keep identification tags off the body until family views it","Place the body in anatomic position, replace dressings, remove tubes (unless autopsy scheduled), place identification tags on body","Immediately transfer the body to the morgue without family viewing"],
ans:2,
why:["Tubes should be left if an AUTOPSY is scheduled — removing them could compromise forensic findings.","Identification tags should be placed on the body — not withheld.","✓ Chapter 44 PPTX: 'Care of the Body: Prepare the body for discharge. Place the body in anatomic position, replace dressings, and remove tubes (UNLESS there is an autopsy scheduled). Place identification tags on the body. Follow local law if patient died of communicable disease.'","Family viewing should be facilitated, not prevented."],
rat:"Postmortem body care: anatomic position (dignity), replace soiled dressings, remove tubes (unless autopsy — forensic evidence), apply ID tags, follow communicable disease protocols. This care reflects respect for patient dignity even after death.",
pearl:"Chapter 44 PPTX on family care after death: 'Listen to family's expressions of grief, loss, and helplessness. Offer solace and support by being an attentive listener. Arrange for family members to view the body. In case of sudden death, provide a private place for family to begin grieving. It is appropriate for the nurse to attend the funeral and make a follow-up visit to the family.'"},

{id:119,mod:3,type:"mcq",
stem:"Interdisciplinary collaboration in palliative care is described as communication and cooperation among diverse health care disciplines to jointly plan, implement, and evaluate care — resulting in:",
opts:["Multiple separate care plans, one from each discipline","A single integrated care plan addressing the needs of the patient and family","Physicians making all decisions independently","Specialists providing care only in their own domain without coordination"],
ans:1,
why:["Separate plans = MULTIDISCIPLINARY (parallel, not integrated).","✓ Brunner Ch. 13: 'Each member of the team contributing to a single integrated care plan that addresses the needs of the patient and the family.' This is the definition of INTERDISCIPLINARY care.","Physician-only decisions violate the interdisciplinary model.","Domain-specific care without integration = multidisciplinary, not interdisciplinary."],
rat:"Brunner Ch. 13 distinction: Interdisciplinary = communication, cooperation, single integrated plan. Multidisciplinary = varied backgrounds and skill sets BUT without coordination and integration. Palliative care is explicitly an interdisciplinary model.",
pearl:"Palliative care team members typically include: physician/APRN, RN, social worker, chaplain, pharmacist, dietitian, physical/occupational therapist, and bereavement counselor. Each contributes to the integrated care plan with the patient and family at the center."},

{id:120,mod:3,type:"mcq",
stem:"Which term describes the controlled and monitored use of sedatives to reduce consciousness for refractory symptoms that have not responded to other management measures — with the purpose of relieving suffering, NOT hastening death?",
opts:["Euthanasia","Palliative sedation","Physician-assisted suicide","Terminal extubation"],
ans:1,
why:["Euthanasia = intentional ending of life — illegal in most US states.","✓ Brunner Ch. 13 glossary: 'Palliative sedation: controlled and monitored use of certain sedatives and nonopioid medications with the intention of reducing the patient's level of consciousness for the relief of refractory pain and symptoms that have not responded to other management measures; the purpose is NOT to hasten the patient's death but to relieve intractable symptoms.'","Physician-assisted suicide = patient self-administers lethal medication prescribed by physician.","Terminal extubation = removing mechanical ventilation — a separate but related end-of-life decision."],
rat:"Brunner Ch. 13: Palliative sedation is ethically justified by the Principle of Double Effect — the intent is suffering relief, not death hastening. It is legal, ethical, and governed by institutional protocols. Requires consent, documentation, and ongoing monitoring.",
pearl:"Palliative sedation indications: refractory pain, refractory dyspnea, intractable nausea/vomiting, existential distress unresponsive to other interventions. Key NCLEX distinction: the intent matters. Adequate symptom control that may secondarily affect survival ≠ euthanasia."}
