{id:171,mod:2,type:"mcq",
stem:"A client is found unresponsive and pulseless. The cardiac monitor shows an organized-looking rhythm but no pulse is detected with any assessment technique. Which action does the nurse take FIRST?",
opts:["Defibrillate immediately — an organized rhythm is always shockable","Administer atropine 1 mg IV push — this is the treatment for all pulseless rhythms","Begin CPR, administer epinephrine every 3 to 5 minutes, and identify reversible causes","Perform synchronized cardioversion at 50 joules for this organized rhythm"],
ans:2,
why:["PEA is NOT shockable — there is an organized electrical rhythm but no mechanical activity. Shocking it has no benefit.","Atropine is not part of the PEA algorithm — epinephrine every 3–5 minutes is the pharmacologic treatment.","✓ Pulseless Electrical Activity (PEA): non-shockable. Treatment: high-quality CPR + epinephrine 1 mg IV every 3–5 min + identify and treat reversible causes (Hs and Ts). No defibrillation.","Synchronized cardioversion is for tachyarrhythmias WITH a pulse — PEA is a pulseless state."],
rat:"Cardiac Rhythms lecture shockable vs. non-shockable summary: Shockable = VFib + pulseless VT. Non-shockable = asystole + PEA. PEA is deceptive because the monitor looks organized — always check for a pulse before assuming the rhythm is perfusing. Treatment: CPR + epinephrine + Hs/Ts.",
pearl:"PEA common causes (Hs and Ts) in clinical practice: massive PE, tension pneumothorax, cardiac tamponade, severe hypovolemia, profound acidosis, hyperkalemia. Point-of-care ultrasound (POCUS) during CPR can rapidly identify tamponade, PE, and hypovolemia as PEA causes."},

{id:172,mod:2,type:"mcq",
stem:"Which oxygen delivery device provides the MOST PRECISE and controlled FiO2 — especially important for COPD patients?",
opts:["Simple face mask (5–10 L/min)","Nasal cannula (1–6 L/min)","Venturi mask (air-entrainment mask)","Non-rebreather mask (15 L/min)"],
ans:2,
why:["Simple mask delivers variable FiO2 (35–50%) depending on breathing pattern — not precise.","Nasal cannula delivers variable FiO2 (24–44%) depending on respiratory rate and depth — not precise.","✓ Cardiac Assessment PDF and COPD materials: Venturi mask uses the Bernoulli principle (air-entrainment) to deliver a PRECISE, consistent FiO2 (24%, 28%, 31%, 35%, 40%, 60%) regardless of respiratory pattern — ideal for COPD.","Non-rebreather delivers the HIGHEST FiO2 (60–90%) but is NOT precise — dangerous in COPD."],
rat:"Venturi mask (air-entrainment mask): color-coded adapters specify exact FiO2. Gold standard for controlled O2 therapy in COPD. Even if the patient's breathing pattern changes, the FiO2 remains constant. Most appropriate for patients needing precise titration.",
pearl:"Venturi mask color codes (common standard): Blue=24%, White=28%, Yellow/Orange=35%, Red=40%, Green=60%. Always check the package — colors vary by manufacturer. For NCLEX: Venturi mask = most precise = best for COPD controlled O2 therapy."},

{id:173,mod:1,type:"mcq",
stem:"Which of the EIGHT key domains of quality palliative care identified by the National Consensus Project (NCP) relates to the nurse's role in 'exploring goals of care through therapeutic communication'?",
opts:["Domain 2 — addresses physical symptom management and pharmacological pain control","Domain 4 — addresses social factors and environmental supports affecting quality of life","Domain 6 — addresses culturally sensitive care and provider self-examination of bias","Domain 8 — addresses patient self-determination and the ethical principles of beneficence and non-maleficence"],
ans:3,
why:["Physical aspects = symptom management and pain control.","Ethical/legal = advance directives, consent.","Psychological = anxiety, depression, coping.","✓ Brunner Ch. 13 states that primary palliative care for all nurses includes 'basic symptom assessment and management and the ability to explore goals of care through therapeutic communication' — this cuts across ALL 8 NCP domains, not just one."],
rat:"Brunner Ch. 13: The 8 NCP domains of quality palliative care (2018): structure/processes, physical, psychological/psychiatric, social, spiritual/religious/existential, cultural, care of the patient near end of life, ethical/legal. Therapeutic communication is foundational to ALL domains.",
pearl:"The ANA/HPNA 2017 Call for Action identified 5 areas of palliative nursing: clinical practice, education, policy, research, and administration. Nurses who develop strong therapeutic communication skills are better equipped to address goals-of-care conversations in every clinical setting."},

{id:174,mod:2,type:"mcq",
stem:"A nurse is teaching a student about the cardiac cycle. Which statement correctly describes diastole?",
opts:["Diastole is the period of ventricular contraction when blood is ejected into the aorta and pulmonary artery","Diastole is the period of ventricular relaxation during which the ventricles fill with blood from the atria","Diastole refers to the closure of the AV valves that produces the S1 heart sound","Diastole describes the electrical activation of the ventricular myocardium on the ECG"],
ans:1,
why:["Ventricular contraction and ejection = SYSTOLE, not diastole.","✓ Diastole = ventricular RELAXATION. AV valves open → ventricles fill passively from atria → atrial systole adds the final 20–30% (atrial kick) at the end of diastole.","AV valve closure (S1) marks the END of diastole and the BEGINNING of systole — it is not diastole itself.","Ventricular electrical activation = QRS complex — this is depolarization, not the mechanical diastole phase."],
rat:"Brunner Ch. 21: Diastole = relaxation and filling phase. Systole = contraction and ejection phase. Atrial and ventricular systoles are NOT simultaneous — atrial systole occurs at the END of diastole (atrial kick), followed by ventricular systole. This synchronization ensures complete ventricular filling.",
pearl:"Atrial kick (atrial systole) contributes ~20–30% of ventricular filling. In atrial fibrillation, there is no organized atrial contraction — atrial kick is LOST → ventricular filling is reduced → cardiac output decreases by up to 20–30%. This is why AFib with rapid rate can cause hemodynamic compromise."},

{id:175,mod:2,type:"mcq",
stem:"Which statement correctly describes automaticity of cardiac cells?",
opts:["Automaticity refers to the heart's mechanical ability to generate a pumping force each beat","Automaticity is the ability of cardiac cells to initiate an electrical impulse without external stimulation","Automaticity requires continuous nervous system input to generate impulses in the SA node","Automaticity exists only in the SA node — no other cardiac cells can initiate impulses independently"],
ans:1,
why:["Pumping function = contractility — not automaticity.","✓ Brunner Ch. 22 glossary: 'Automaticity: ability of the cardiac cells to initiate an electrical impulse.' This is the property that allows pacemaker cells to spontaneously depolarize.","The SA node has intrinsic automaticity — it does not require external stimulation to fire.","All cardiac pacemaker cells have automaticity: SA node (60–100), AV node (40–60), Purkinje fibers (20–40) — the SA node 'wins' because it fires fastest."],
rat:"Brunner Ch. 22 cardiac properties: Automaticity (ability to self-initiate impulse), Conductivity (ability to transmit impulse), Contractility (ability to shorten/contract), Excitability (ability to respond to stimuli). Arrhythmias can result from abnormalities in any of these properties.",
pearl:"Enhanced automaticity = a mechanism of arrhythmias. When a lower pacemaker (AV node, Purkinje fiber) fires faster than the SA node due to abnormal conditions (ischemia, electrolyte disturbance, drugs), it 'takes over' → ectopic rhythms (junctional tachycardia, accelerated idioventricular rhythm)."},

{id:176,mod:3,type:"mcq",
stem:"A charge nurse is evaluating a new graduate nurse administering IV medications. Which additional right does the nurse add beyond the traditional six rights of medication administration?",
opts:["Right medication — confirming the correct drug name matches the current medication order","Right patient — verifying two client identifiers before administering any medication","Right documentation — recording the medication given immediately after administration","Right reason — verifying that a valid clinical indication exists for the medication being given"],
ans:3,
why:["Right medication = one of the original six rights.","Right patient = one of the original six rights.","Right documentation = one of the original six rights.","✓ Blueprint Module 3 adds: 'Right reason and Right response' to the traditional six rights. Right reason = there must be a valid clinical indication. Right response = monitor for expected therapeutic effect and adverse effects."],
rat:"Traditional 6 Rights: patient, drug, dose, route, time, documentation. Blueprint adds: Right reason (clinical indication verified) and Right response (monitor effect). These additions shift from task-completion to clinical reasoning — especially critical for IV medications where effects are immediate.",
pearl:"Applying all 8 rights to IV therapy prevents: administering IV medications with no documented indication, administering without monitoring for response, or failing to reassess after administration. For high-alert IV medications, 'Right reason' prevents unnecessary administration that could cause harm."},

{id:177,mod:1,type:"mcq",
stem:"'The Dying Person's Bill of Rights.' Which principle is foundational to this concept?",
opts:["The dying patient forfeits decision-making rights when they become incapacitated","The dying patient has the right to be treated as a living human being with dignity until death","Family members make all decisions for dying patients regardless of the patient's expressed wishes","Aggressive life-prolonging treatment must always be attempted regardless of prognosis"],
ans:1,
why:["Incapacity requires a surrogate decision-maker but does not eliminate the patient's dignity or rights.","✓ The Dying Person's Bill of Rights holds that dying patients have the right to be treated as living human beings — with dignity, honesty, and respect — until the moment of death.","Family input is valuable but the patient's expressed wishes take precedence while they have capacity.","The Dying Person's Bill of Rights includes the right to choose palliative care and to refuse unwanted interventions."],
rat:"The Dying Person's Bill of Rights includes: right to be treated as a living person, right to maintain hope, right to be free from pain, right to honest answers, right to participate in care decisions, right to die in peace and dignity, right to not die alone. These principles guide nursing care.",
pearl:"Nurses can advocate for the dying patient's rights by: ensuring pain is adequately managed, facilitating honest communication, supporting patient choice, honoring advance directives, providing spiritual/emotional support, and ensuring the patient is not left alone near the end of life."},

{id:178,mod:2,type:"sata",
stem:"A nurse is caring for a client admitted with a decreasing level of consciousness following a traumatic fall. Which priority nursing interventions should be implemented? Select all that apply.",
opts:["Maintain a patent airway and prepare for possible intubation","Perform a complete neurological assessment including GCS, pupil response, and motor function","Obtain a complete medication history from family or emergency contacts","Position the client with HOB elevated 30 degrees, head in midline","Administer oxygen to maintain SpO2 greater than or equal to 94%","Prepare to administer IV fluids at a rapid rate to prevent hypotension"],
ans:[0,1,2,3,4],
why:["CORRECT — Airway is always the first priority (ABCs). A decreasing LOC means the client may lose ability to protect the airway.","CORRECT — Neurological assessment establishes a baseline and detects deterioration early (GCS, pupils, motor = key components).","CORRECT — Medication history identifies anticoagulants, sedatives, or other drugs that may contribute to altered LOC.","CORRECT — HOB 30 degrees in midline promotes venous drainage from the brain, reducing ICP without compromising cerebral perfusion.","CORRECT — Hypoxia worsens brain injury; maintain SpO2 ≥94%. Avoid hyperoxia (>99% O2) which can cause vasoconstriction.","INCORRECT — Aggressive IV fluids in a brain-injured client can worsen cerebral edema and increase ICP. Fluids should be carefully titrated."],
rat:"Priority interventions for decreased LOC: ABC first, then neuro assessment. Avoid hypoxia, hypotension, AND hypervolemia — all worsen outcomes. Position: HOB 30 degrees, midline to optimize venous drainage. NCLEX priority framework: Airway > Breathing > Circulation > Safety."},

{id:179,mod:2,type:"mcq",
stem:"A nurse auscultates an abnormal turbulent sound during systole at the left sternal border in a client with a history of rheumatic heart disease. Which term does the nurse use to document this finding?",
opts:["Normal valve closure creating S1 and S2","Abnormal, TURBULENT flow of blood in the heart","Electrical conduction abnormalities in the AV node","Pericardial inflammation causing friction"],
ans:1,
why:["Normal valve closure = S1 and S2 — not murmurs.","✓ Brunner Ch. 21 glossary: 'Murmurs: sounds created by abnormal, turbulent flow of blood in the heart.' Turbulence is caused by structural abnormalities (valvular stenosis, regurgitation, septal defects) or high-flow states.","Conduction abnormalities = arrhythmias — not murmurs.","Pericardial inflammation = friction rub — not a murmur."],
rat:"Murmurs result from turbulent blood flow through: narrowed (stenotic) valves, incompetent (regurgitant) valves, septal defects (VSD, ASD), or high-flow states (anemia, fever, pregnancy — 'innocent' murmurs). Characterized by: timing (systolic/diastolic), quality, intensity (grade I–VI), location, radiation.",
pearl:"All diastolic murmurs are pathological. Systolic murmurs may be innocent (no structural abnormality) or pathological. Innocent murmurs: soft (grade I–II), short, no radiation, no associated symptoms, no structural abnormality on echo. Common in children, athletes, pregnant women, and high-output states."},

{id:180,mod:3,type:"mcq",
stem:"A client receiving IV therapy asks, 'Why do I need this IV if I can just take my medicine by mouth?' Which response by the nurse is most accurate?",
opts:["'You don't really have a choice — this is what the provider has ordered for your care.'","'IV medications are absorbed directly into the bloodstream for an immediate effect — this is important given your current clinical needs.'","'IV therapy is always superior to oral medications regardless of the clinical situation.'","'You're right that oral medications work just as well — I'll hold your IV dose for now.'"],
ans:1,
why:["Dismissing the patient's question violates therapeutic communication and patient education principles.","✓ IV lecture Knowledge and Science: 'Absorption into bloodstream is immediate (rapid onset). Medications have immediate physiological response.' This explains the clinical rationale clearly and invites shared decision-making.","IV therapy is not always 'better' — the route is chosen based on clinical need.","Holding medications without a provider order and without clinical assessment is unsafe."],
rat:"IV therapy lecture: IV medications have immediate absorption and rapid physiological response — critical for emergencies, when oral intake is not possible, for precise dosing, or when oral bioavailability is insufficient. Patient education should explain the rationale in plain language.",
pearl:"Patient education principle: explain the 'why' behind every intervention. Patients who understand the reason for their treatment are more cooperative and have better outcomes. Use plain language ('goes straight into your bloodstream immediately' rather than 'bypasses first-pass hepatic metabolism')."}

{id:181,mod:1,type:"mcq",
stem:"Which technique involves encouraging the patient to continue talking without directing the topic?",
opts:["Clarifying","Directing/Focusing","General Lead","Sequencing"],
ans:2,
why:["Clarifying = trying to understand what was said more clearly.","Directing/Focusing = asking for elaboration on a specific topic — this guides the conversation.","✓ Lecture notes: 'General Leads: Encouraging the patient to continue talking.' Examples: 'Go on…', 'I see…', 'Tell me more.'","Sequencing = making sure you understand the steps in a process."],
rat:"General leads are minimal encouragers that signal the nurse is listening and invite the patient to continue at their own pace without redirection. They are useful when the patient needs space to process difficult emotions or complex information.",
pearl:"Examples of general leads: 'Go on…', 'And then?', 'I see', nodding. These are low-intervention techniques with high therapeutic value — they communicate presence without interrupting. Use them to prevent premature closure of important conversations."},

{id:182,mod:1,type:"mcq",
stem:"A client near the end of life states, 'I've made my peace. I'm ready to go.' Which stage of grief best describes this response, and what is the most therapeutic nursing action?",
opts:["Depression — encourage the patient to talk about their sadness","Denial — gently help the patient face reality","Acceptance — be present, affirm the patient's peace, and ask what they need","Bargaining — explore what conditions the patient is placing on their acceptance"],
ans:2,
why:["Depression = intense sadness and withdrawal — not equanimity.","Denial = refusing to accept the diagnosis — this patient clearly accepts it.","✓ Acceptance = patient has processed grief and faces death with peace. Therapeutic response: be present, honor this state, and ask how to best support the patient.","Bargaining = 'if...then' conditions — this patient expresses readiness without conditions."],
rat:"Acceptance is not giving up — it is a state of peace with the reality of death. The nurse's role is to honor that peace, remain present, and support meaningful use of remaining time. Avoid projecting sadness onto a patient who has reached acceptance.",
pearl:"Not all patients reach acceptance, and forcing it is never therapeutic. For those who do, quiet presence and willingness to sit with the patient are more valuable than any intervention. Some of the most profound nursing moments are silent ones."},

{id:183,mod:1,type:"mcq",
stem:"Which is the correct description of THERAPEUTIC SILENCE as a communication technique?",
opts:["Leave the room quietly to give the client private space to process the news alone","Say 'I know this is hard, but we have excellent treatments available for your diagnosis.'","Sit quietly beside the client without speaking, allowing the silence to continue as therapeutic presence","Begin explaining the available treatment options to give the client something constructive to focus on"],
ans:2,
why:["Silence communicates presence and attentiveness when used intentionally — not disinterest.","Silence is explicitly listed as a therapeutic technique in the lecture notes.","✓ Lecture notes: 'Silence: Therapeutic listening.' Intentional silence lets the patient think, feel, and respond at their own pace.","Therapeutic silence is an intentional clinical skill — not a default."],
rat:"Therapeutic silence: the nurse remains present with eye contact and open body language while allowing the patient time to process. Many patients need silence after sharing something difficult. Premature verbal filling of silence can interrupt important patient processing.",
pearl:"Brief silence (5–10 seconds) after an emotional disclosure communicates 'I'm with you in this.' Learn to distinguish productive therapeutic silence from uncomfortable social silence — the difference is intentionality and body language. Don't rush to fill every pause."},

{id:184,mod:1,type:"sata",
stem:"Which statements correctly describe the MEDICARE HOSPICE BENEFIT? (Select ALL that apply)",
opts:["It is a Medicare Part A entitlement","The patient must have a terminal illness with a prognosis of 6 months or less","The patient must agree to forego disease-directed treatment and focus on comfort","A physician must certify the terminal prognosis","Patients who enroll can never return to curative treatment"],
ans:[0,1,2,3],
why:["✓ Brunner Ch. 13: 'Medicare Hospice Benefit: a Medicare Part A entitlement.'","✓ Brunner: eligibility requires 'a terminal illness and a life expectancy of less than 6 months.'","✓ Brunner: hospice patients 'have made the decision to forego disease-directed therapies.'","✓ Physician certification of terminal prognosis is required for the benefit.","Patients CAN revoke hospice and return to curative treatment at any time. This is a common misconception."],
rat:"Medicare Hospice Benefit: Part A, terminal illness, ≤6-month prognosis, physician certification, patient elects comfort over cure. Covers medications related to terminal diagnosis, nursing, social work, chaplaincy, aide services, and 13 months of bereavement support post-death.",
pearl:"Hospice is widely underutilized — many patients are referred only days before death when they could have benefited for months. Early hospice referral improves quality of life, reduces unnecessary hospitalizations, and in some studies is associated with longer survival compared to aggressive treatment."},

{id:185,mod:1,type:"mcq",
stem:"A nurse is counseling a client who is weighing surgical options. Which response by the nurse best demonstrates patient advocacy?",
opts:["'Surgery is your only choice — you need this operation.'","'If you don't have surgery, you may not live to see your grandchildren.'","'Whether or not you have the surgery is your choice. It is your body.'","'Your family needs you to make the right decision.'"],
ans:2,
why:["This removes patient choice — coercion, not advocacy.","This uses fear to pressure the patient — emotional manipulation.","✓ The PPTX lists this exact statement as the therapeutic, advocacy-based response: it respects autonomy and supports the patient's right to decide.","Invoking family obligation to pressure a decision = manipulation, not advocacy."],
rat:"Patient advocacy = supporting the patient's RIGHT to self-determination, even when you disagree with their choice. A nurse who uses fear, guilt, or authority to override a patient's decision violates both the advocacy role and the ethical principle of autonomy.",
pearl:"Therapeutic advocacy in action: provide accurate information, ensure the patient understands options and consequences, verify the decision is free of coercion, document the informed decision-making process. Your role is to inform and support — not to decide for the patient."},

{id:186,mod:1,type:"mcq",
stem:"The four illness trajectories include sudden death, terminal illness (e.g., cancer), organ failure, and frailty. Which trajectory is characterized by a SLOW DECLINE OVER YEARS from an already frail baseline?",
opts:["The guidelines have been endorsed by approximately 10 national organizations since publication","The guidelines have been endorsed by about 30 national organizations including major nursing groups","The guidelines have been endorsed by more than 80 national organizations including ACS, HPNA, and NHPCO","The guidelines have been endorsed by over 150 national organizations and international bodies"],
ans:3,
why:["Sudden death = unexpected death — no trajectory of decline.","Terminal illness (cancer) = high function for a period, then rapid decline near death.","Organ failure = slow decline with episodic crises, each recovery less complete (HF, COPD, kidney disease).","✓ Brunner Ch. 13: 'Frailty (e.g., dementia) is typically diagnosed when one is already frail, with a slow decline over years.'"],
rat:"Understanding illness trajectories helps nurses anticipate care needs and timing for goals-of-care conversations. Frailty patients may have a very long trajectory — years of gradual decline — requiring sustained support and repeated goals-of-care discussions as functional status changes.",
pearl:"The frailty trajectory is often associated with dementia, failure to thrive, and multimorbidity in elderly patients. Unlike cancer, there is rarely a clear 'turning point.' Hospice eligibility for dementia patients requires: FAST Stage 7C or beyond, plus at least one complication (aspiration pneumonia, UTI, pressure ulcer, fever)."},

{id:187,mod:1,type:"mcq",
stem:"A nurse is helping a bereaved family understand the difference between grief and mourning. Which statement correctly describes mourning?",
opts:["Individual, family, group, and cultural expressions of grief through behaviors, symbols, and rituals","The internal emotional experience of loss felt privately by the bereaved individual","The time period following a loss during which grief and mourning take place","A coordinated interdisciplinary care program focused on comfort for the terminally ill"],
ans:2,
why:["Internal emotional reaction to loss = GRIEF.","Period during which grieving takes place = BEREAVEMENT.","✓ Chapter 44 PPTX and Brunner Ch. 13: 'Mourning: individual, family, group, and cultural expressions of grief and associated behaviors.' Mourning is the outward, observable expression.","Coordinated interdisciplinary care program = HOSPICE or PALLIATIVE CARE."],
rat:"Key grief terminology: Grief = internal feelings (invisible). Mourning = outward expressions and behaviors (visible — crying, rituals, ceremonies). Bereavement = the time period after a loss during which mourning occurs. Dysfunctional grief = unresolved or inhibited, may require professional support.",
pearl:"Cultural expressions of mourning vary enormously — some cultures are demonstrative (communal gathering, loud expression), others are quiet and private. Always ask about and respect cultural mourning practices. Create private space for families to express grief in their own culturally appropriate way."},

{id:188,mod:2,type:"mcq",
stem:"An echocardiogram report shows an ejection fraction of 35%. Which interpretation does the nurse apply?",
opts:["Normal cardiac function — ejection fraction of 35% is within the expected range","Mild systolic dysfunction — ejection fraction between 35% and 50% requires monitoring only","Heart failure with reduced ejection fraction (HFrEF) — EF below 40% indicates systolic dysfunction","Heart failure with preserved ejection fraction (HFpEF) — EF above 50% with diastolic dysfunction"],
ans:2,
why:["Normal EF = 55–70% — 35% is significantly below normal.","EF of 35% is below 40% — this falls in the HFrEF category, not mild dysfunction requiring monitoring only.","✓ EF <40% = HFrEF (systolic dysfunction). The heart contracts weakly. Treatment: ACE inhibitors/ARBs, beta-blockers, diuretics, aldosterone antagonists, SGLT2 inhibitors.","HFpEF = EF ≥50% with HF symptoms from diastolic dysfunction — EF 35% is the opposite."],
rat:"EF is a key cardiac function indicator measured by echocardiogram. Normal EF 55–70%. Heart failure with reduced EF (HFrEF) = EF <40% (systolic dysfunction). Heart failure with preserved EF (HFpEF) = EF ≥50% with HF symptoms (diastolic dysfunction).",
pearl:"EF guides HF treatment: HFrEF (EF <40%) → ACE inhibitors/ARBs, beta-blockers, diuretics, aldosterone antagonists, SGLT2 inhibitors. HFpEF (EF ≥50%) → rate control, treat underlying HTN/DM/AF, diuretics for congestion. Knowing EF directs therapy."},

{id:189,mod:2,type:"mcq",
stem:"What is the key difference between SYNCHRONIZED CARDIOVERSION and DEFIBRILLATION?",
opts:["Both procedures involve identical delivery of electrical current — only the energy level differs","Cardioversion is synchronized to the QRS complex; defibrillation is unsynchronized and not timed to the cardiac cycle","Defibrillation uses lower energy levels than cardioversion for equivalent arrhythmia treatment","Cardioversion is used exclusively for ventricular arrhythmias and never for atrial rhythms"],
ans:1,
why:["They are distinct procedures with different indications and techniques.","✓ Brunner Ch. 22: 'Cardioversion: electrical current given in synchrony with the patient's own QRS complex. Defibrillation: electrical current given to stop an arrhythmia, not synchronized with the patient's QRS complex.'","Defibrillation typically uses higher energy, not lower.","Cardioversion is used for tachyarrhythmias WITH a pulse — AFib, flutter, SVT, stable VT."],
rat:"Synchronized cardioversion: shock timed to the R wave to avoid the T wave (vulnerable period — shock on T can induce VFib). Used for unstable tachyarrhythmias with a pulse. Defibrillation: unsynchronized, delivered immediately — used for VFib and pulseless VT where no organized QRS exists.",
pearl:"When setting up synchronized cardioversion, confirm the 'SYNC' mode is activated on the defibrillator before charging and delivering the shock. If accidental unsynchronized shock occurs during AFib/flutter, it can precipitate VFib. Always verbally confirm sync mode is on before delivery."},

{id:190,mod:2,type:"mcq",
stem:"The neurotransmitter GABA (gamma-aminobutyric acid) has which primary action?",
opts:["Usually excitatory; major parasympathetic transmitter","Usually inhibitory; affects behavior, attention, and fine movement","Inhibitory; controls mood, sleep, and pain inhibition","Inhibitory; located in nerve terminals of the spinal cord and cerebellum"],
ans:3,
why:["Excitatory + parasympathetic = acetylcholine.","Behavior/attention/fine movement = dopamine.","Mood/sleep/pain = serotonin.","✓ Brunner Ch. 60 neurotransmitter table: 'GABA: Source = nerve terminals of the spinal cord, cerebellum. Action = inhibitory.' GABA is the primary inhibitory neurotransmitter of the CNS."],
rat:"Brunner Ch. 60 neurotransmitter table: Acetylcholine = excitatory/parasympathetic. Serotonin = inhibitory, mood/sleep/pain. Dopamine = inhibitory, behavior/fine movement. Norepinephrine = excitatory, sympathetic. GABA = inhibitory, spinal cord/cerebellum.",
pearl:"GABA is targeted by many medications: benzodiazepines and barbiturates enhance GABA activity → sedation, anxiolysis, anticonvulsant effect. Alcohol also enhances GABA. GABA deficiency is implicated in anxiety disorders, seizures, and insomnia. Baclofen is a GABA-B agonist used for spasticity."},

{id:191,mod:2,type:"mcq",
stem:"What is the appropriate first-line treatment for SYMPTOMATIC SINUS BRADYCARDIA (HR 38, hypotension, altered mental status)?",
opts:["Perform synchronized cardioversion at 100 joules immediately","Administer amiodarone 300 mg IV push for rate control","Administer atropine 0.5 mg IV push and repeat every 3 to 5 minutes to a max of 3 mg","Administer adenosine 6 mg rapid IV push to restore sinus rhythm"],
ans:2,
why:["Cardioversion is for tachyarrhythmias — not bradycardia.","Amiodarone is an antiarrhythmic for ventricular and supraventricular tachyarrhythmias — not bradycardia.","✓ Cardiac Rhythms lecture and ACLS: symptomatic bradycardia → atropine 0.5 mg IV, repeat every 3–5 minutes, max 3 mg total. If atropine fails → transcutaneous pacing → dopamine/epinephrine infusion.","Adenosine slows conduction (treats SVT) — would worsen bradycardia."],
rat:"Atropine mechanism: blocks vagal (parasympathetic) tone on the SA and AV nodes → increases heart rate and conduction speed. Works best for vagally mediated bradycardia and sinus bradycardia. Less effective for infranodal (below AV node) blocks like Mobitz II or 3rd degree block.",
pearl:"If atropine fails or the patient is severely compromised: initiate transcutaneous pacing immediately. Place pads, set rate (typically 60–80 bpm), increase output (mA) until electrical capture (wide QRS with T wave after each pacing spike). Verify mechanical capture by palpating a pulse. Transcutaneous pacing is uncomfortable — provide analgesia/sedation."},

{id:192,mod:2,type:"mcq",
stem:"Barrel chest in emphysema results from which mechanism?",
opts:["Accumulation of pleural fluid between the chest wall and lungs","Chronic hyperinflation causing ribs to fix in an inspiratory position with loss of lung elasticity","Cardiomegaly causing outward displacement of the chest wall","Hypertrophy of the respiratory muscles expanding the rib cage permanently"],
ans:1,
why:["Pleural fluid = pleural effusion — causes dullness to percussion, not barrel chest.","✓ Brunner pgs. 606–608: 'In patients with COPD who have a primary emphysematous component, chronic hyperinflation leads to the barrel chest thorax configuration. This results from a more fixed position of the ribs in the inspiratory position (due to hyperinflation) and from loss of lung elasticity.'","Cardiomegaly causes cardiac silhouette enlargement on CXR — not barrel chest.","Respiratory muscle hypertrophy does not cause the rib cage to permanently expand."],
rat:"Barrel chest: AP diameter equals or exceeds transverse diameter (normal ratio ~1:2). The ribs are horizontally positioned instead of angled. On inspection: rounded, hyperinflated chest. On percussion: hyperresonance throughout. Associated with accessory muscle use, prolonged expiration, and tripod positioning.",
pearl:"COPD posture (Brunner Fig. 20-4): patient leans forward, uses accessory muscles of respiration, forces shoulder girdle upward, supraclavicular fossae retract on inspiration. Teaching: pursed-lip breathing (maintains positive airway pressure, prevents small airway collapse, slows exhalation to allow more complete CO2 elimination)."},

{id:193,mod:2,type:"mcq",
stem:"Which describes LOCKED-IN SYNDROME?",
opts:["A state of wakefulness without conscious content — sleep-wake cycles present but no awareness","A condition from a pontine lesion where cognition is fully intact but all motor output is lost except vertical eye movement","Irreversible cessation of all brain function including the brainstem","Acute onset confusion and disorientation with fluctuating level of consciousness"],
ans:1,
why:["Wakeful but no conscious content = persistent vegetative state.","✓ Brunner Ch. 61 glossary: 'Locked-in syndrome: condition resulting from a lesion in the pons in which the patient lacks all distal motor activity (paralysis) but cognition is intact.' Eye movements (vertical) are typically preserved and allow communication.","Irreversible loss of all brain function including brain stem = brain death.","Acute disorientation = delirium."],
rat:"Locked-in syndrome: the patient is cognitively FULLY INTACT but cannot move or speak. They experience and understand everything happening around them. Communication via eye movements (blink once for yes, twice for no) is critical. This has profound nursing implications — always speak to and about these patients with full respect.",
pearl:"Brunner also distinguishes: Coma (unarousable), Persistent Vegetative State (sleep-wake cycles but no cognitive content), Minimally Conscious State (some reproducible signs of awareness but cannot communicate), Locked-in Syndrome (full cognition, no motor output except eye movement). Each requires different assessment and communication approaches."},

{id:194,mod:2,type:"mcq",
stem:"A patient with METABOLIC ALKALOSIS develops tingling of the fingers and toes and muscle cramping (tetany). What is the physiologic mechanism?",
opts:["Alkalosis drives potassium out of cells causing hyperkalemia which irritates nerve membranes","Alkalosis causes calcium to bind to albumin reducing ionized calcium which increases neuromuscular excitability causing tetany","Alkalosis causes sodium retention which depolarizes nerve membranes and causes tetany","Alkalosis directly irritates peripheral nerve endings causing tingling and muscle cramping"],
ans:1,
why:["Alkalosis causes hypokalemia (not hyperkalemia) as H+ leaves cells and K+ enters cells.","✓ Brunner Ch. 10: 'In alkalosis, H+ ions are decreased. Calcium ions bind to proteins. As calcium ions bind to proteins, free Ca²⁺ ions decrease and hypocalcemia develops. Alkalosis is primarily manifested by symptoms related to hypocalcemia — tingling and tetany.'","Hypernatremia causes different neurological symptoms.","The mechanism is specifically ionized calcium decrease — not direct nerve irritation."],
rat:"Alkalosis → calcium binds to albumin → ionized (free) calcium decreases → neuromuscular excitability increases → tingling, carpopedal spasm, tetany, seizures (in severe cases). This is the same mechanism as true hypocalcemia. Chvostek's sign (facial twitch with tapping) and Trousseau's sign (carpal spasm with BP cuff inflation) assess for this.",
pearl:"Chvostek's sign: tap the facial nerve anterior to the ear → facial muscle twitch = positive (hypocalcemia). Trousseau's sign: inflate BP cuff above systolic for 3 min → carpal spasm = positive (hypocalcemia). Both indicate low ionized calcium — check in patients with alkalosis, hypoparathyroidism, or post-parathyroidectomy."},

{id:195,mod:3,type:"mcq",
stem:"Which action VIOLATES aseptic technique during peripheral IV insertion?",
opts:["Applying chlorhexidine with back-and-forth friction for 30 seconds and allowing it to air dry","Wearing clean gloves throughout the insertion procedure as required by standard precautions","Re-palpating the vein directly over the cleaned insertion site with an ungloved finger before inserting","Using a new sterile catheter for each insertion attempt rather than reusing the same device"],
ans:2,
why:["Chlorhexidine friction + air dry = correct technique.","Clean gloves = required for all IV insertions.","✓ Re-palpating the cleaned site with an ungloved finger CONTAMINATES the prepared site. After cleaning, do NOT touch the site. If re-palpation is needed, clean the site again or use a sterile gloved finger.","New sterile catheter per attempt = correct technique — never reuse."],
rat:"Non-touch technique: after antiseptic prep, nothing non-sterile touches the insertion site. Common violations: blowing on the site to speed drying, re-palpating without sterile gloves, placing catheter on bedding before insertion, touching the needle tip. Any contamination requires restarting the cleaning process.",
pearl:"'If in doubt, throw it out' — if there is any question about contamination of the insertion site or catheter, start over. The cost of a new catheter and prep supplies is trivial compared to the cost of a blood stream infection. Contamination during insertion is a preventable cause of CLABSI."},

{id:196,mod:3,type:"mcq",
stem:"A provider orders 250 mL of 0.9% NS to infuse over 2 hours using a 15 gtt/mL tubing set. What is the correct drip rate in gtt/min?",
opts:["15 gtt/min","31 gtt/min","125 gtt/min","8 gtt/min"],
ans:1,
why:["15 gtt/min would only deliver 60 mL/hr — too slow.","✓ Step 1: 250 mL ÷ 2 hr = 125 mL/hr. Step 2: (125 mL/hr × 15 gtt/mL) ÷ 60 min = 1875 ÷ 60 = 31.25 ≈ 31 gtt/min.","125 gtt/min would deliver 500 mL/hr — dangerously fast.","8 gtt/min would deliver only 32 mL/hr — too slow."],
rat:"IV drip rate formula: (mL/hr × drop factor) ÷ 60 = gtt/min. For 15 gtt/mL tubing: shortcut = mL/hr ÷ 4. So 125 ÷ 4 = 31.25 ≈ 31 gtt/min. Always round to the nearest whole number.",
pearl:"Drop factor shortcuts: 10 gtt/mL → divide mL/hr by 6. 15 gtt/mL → divide mL/hr by 4. 20 gtt/mL → divide mL/hr by 3. 60 gtt/mL (microdrip) → gtt/min equals mL/hr exactly. Memorize these shortcuts — they save critical time on NCLEX calculations."},

{id:197,mod:3,type:"mcq",
stem:"Which statement about IV SITE SELECTION is correct?",
opts:["Use the antecubital fossa as the preferred site for all continuous IV infusions due to easy access","Lower extremity veins are an acceptable alternative when upper extremity access is unavailable in adult clients","Never use the arm with an arteriovenous (AV) fistula for IV access, blood draws, or blood pressure measurement","Insert the IV in the dominant arm to allow the client to use their preferred hand freely during the infusion"],
ans:2,
why:["The AC fossa is associated with high complication rates (phlebitis, infiltration, catheter kinking with arm movement) and limits patient mobility — avoid for routine PIV access.","Lower extremity veins in adults carry HIGH risk of DVT and thrombophlebitis — avoid unless no upper extremity access is possible.","✓ IV lecture on sites to avoid: NEVER use the arm with an AV fistula — no IV access, no blood draws, no blood pressure. The fistula is the dialysis patient's lifeline; any intervention risks thrombosis, infection, or permanent damage.","The NON-dominant arm is preferred to preserve function and patient comfort."],
rat:"IV site selection hierarchy (distal to proximal, non-dominant preferred): dorsal hand veins → forearm (cephalic, basilic, median) → antecubital (last resort for peripheral). Sites to AVOID: AV fistula arm, mastectomy-side arm, paralyzed limb, infected/burned areas, lower extremities (DVT risk), existing phlebitis.",
pearl:"Why avoid the AC fossa for routine IV: catheter kinks with elbow flexion → flow interrupted → pump alarms constantly → patient and nurse frustration. Reserve AC veins for when nothing else is accessible, for one-time blood draws, or when a PICC is being placed (which terminates in the SVC, not the AC)."},

{id:198,mod:3,type:"mcq",
stem:"'scrub the hub' before every IV access. What is the correct technique?",
opts:["Wipe the connector once with an alcohol swab and insert the syringe immediately","Scrub the connector vigorously with an appropriate antiseptic for at least 15 seconds using mechanical friction then allow to air dry completely before access","Clean the connector with povidone-iodine before each use as recommended by current INS guidelines","Scrub the connector only before the first access of the day since subsequent accesses during the same shift are lower risk"],
ans:1,
why:["One wipe is insufficient — mechanical friction is required to disrupt biofilm.","✓ Blueprint/IV lecture: 'Scrub the hub' = vigorous mechanical scrubbing × ≥15 seconds with an appropriate antiseptic + air dry before access. This removes biofilm and reduces microbial colonization at every access.","Povidone-iodine is not recommended for hub disinfection per current INS guidelines.","Every access requires hub scrubbing — not just the first. Every connection is a potential entry point for microorganisms."],
rat:"'Scrub the hub' is a proven CLABSI prevention strategy. Technique: new alcohol pad or CHG wipe, scrub top and sides of connector with friction × ≥15 seconds, allow to dry completely. Apply to every port, every time, no exceptions. This simple 15-second step prevents devastating bloodstream infections.",
pearl:"Studies show that the needleless connector becomes contaminated within hours of use. Proper hub disinfection before every access reduces intraluminal contamination — one of the primary routes of CLABSI. 'Scrub the hub' is now a universal standard in evidence-based IV care practice."},

{id:199,mod:3,type:"mcq",
stem:"Which patient statement indicates they have CORRECTLY understood their IV care teaching?",
opts:["'If the IV machine beeps, I'll just press the button to silence it and not bother the nurse.'","'I can take a shower with my IV in — I just need to keep the site covered and dry.'","'If my IV site starts to hurt or swell, I should just push the call button — my nurse will fix it.'","'I can adjust the clamp if I feel the IV is going too slow — it probably just needs to be turned up.'"],
ans:1,
why:["Silencing alarms without calling the nurse = dangerous. Alarms indicate a clinical problem requiring assessment.","✓ Patients can bathe/shower with peripheral IVs if the site is protected from getting wet. This is accurate information and demonstrates understanding of site protection.","This option is partially correct (calling the nurse for symptoms is right) but the phrasing is passive. Option B is the clearest demonstration of correct, actionable understanding.","Patients must NEVER adjust IV flow rates — this risks medication dosing errors and patient harm."],
rat:"Correct patient IV education per blueprint: report pain/swelling/redness/leakage immediately, protect site from moisture, do not kink or pull tubing, call nurse when alarm sounds, never adjust rate, know how to move safely with the IV pole. Evaluate understanding with teach-back.",
pearl:"Return demonstration and teach-back: 'To make sure I explained it clearly, can you tell me what you would do if you notice your IV site is swollen?' Correct answer: call the nurse right away. This method catches misunderstandings before they become incidents and is the standard for evaluating patient education effectiveness."},

{id:200,mod:3,type:"mcq",
stem:"This is the 200th and final question of the NRSG 3333 bank — integrating all three modules. A patient with COPD (M2) receiving IV vancomycin via a 20-gauge peripheral IV (M3) says tearfully, 'I just don't know how much longer I can keep fighting this' (M1). Applying Tanner's Model RESPONDING step, which nursing action BEST addresses all domains simultaneously?",
opts:["Chart that the client appears tearful and continue the vancomycin infusion without taking any further action","Assess the IV site, confirm vancomycin infuses over at least 60 minutes, sit with the client and use therapeutic presence and open-ended questions, and notify the provider of distress and possible palliative needs","Speed up the vancomycin infusion to finish it sooner and free up more time for emotional support","Call the client's family immediately without first asking the client's permission to share this information"],
ans:1,
why:["Charting without engaging the patient fails both the clinical and emotional dimensions of care.","✓ Tanner's RESPONDING step = advocacy + collaborative goal-setting. This response addresses: safe IV care (vancomycin ≥60 min to prevent Red Man Syndrome), physical assessment (IV site for phlebitis), AND emotional/palliative care (therapeutic presence, open questions, referral consideration).","Faster vancomycin infusion causes Red Man Syndrome — unsafe.","Contacting family without consent violates HIPAA and patient autonomy."],
rat:"Expert nursing integrates all domains simultaneously. Module 1: therapeutic communication + palliative care awareness. Module 2: COPD assessment + recognition of distress. Module 3: safe IV medication administration. The tearful statement warrants both clinical and emotional assessment — ask: 'Tell me more about what you mean by that.'",
pearl:"'I don't know how much longer I can keep fighting this' may signal: physical exhaustion, emotional burnout, caregiver fatigue, existential distress, or a desire to discuss goals of care. Open the conversation: 'That sounds really hard. Can you tell me more about how you've been feeling?' Then listen — your presence is the intervention."}

// 30 TRUE ATI/NCLEX-STYLE QUESTIONS — IDs 201–230
