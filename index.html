{id:54,mod:3,type:"mcq",stem:"A dying client's family asks the nurse why their loved one makes a loud gurgling sound while breathing. Which response by the nurse is most appropriate?",opts:["Reposition the client to a semi-prone position to improve secretion drainage and call the provider","This is an aspiration event requiring emergency bronchoscopy and immediate airway suctioning","This is the death rattle — an expected sound as secretions pool when the swallowing reflex diminishes. It is not painful; repositioning and mouth care may reduce the sound","This is acute pulmonary edema — administer IV furosemide immediately and apply a non-rebreather mask"],ans:2,why:["The death rattle is not reliably associated with pain.","Routine deep suctioning is distressing and NOT recommended for the death rattle.","✓ Death rattle = pooled secretions as swallowing reflex diminishes. Generally not distressing to the patient. Reassure family, reposition patient, glycopyrrolate may be ordered to reduce secretions.","Not pneumonia — a normal physiological change in active dying."],rat:"Active dying signs: mottling, Cheyne-Stokes respirations, death rattle, cooling extremities, decreased consciousness, jaw relaxation. These are expected and irreversible — shift care focus entirely to comfort.",pearl:"Explaining the death rattle to family: 'This sound can be hard to hear, but it doesn't mean your loved one is struggling or in pain. As the body prepares to stop, the swallowing reflex weakens. We can reposition them to help reduce the sound.'"},

{id:55,mod:1,type:"mcq",stem:"Which ethical principle allows a nurse to administer opioids for pain relief even if respiratory depression may occur?",opts:["Justice","Double effect","Non-maleficence","Fidelity"],ans:1,why:["Justice = fair distribution of resources.","✓ Double effect = action intended to produce good (pain relief) may have a foreseeable but unintended negative effect (respiratory depression). Ethically justifiable when intent is good and action is proportionate.","Non-maleficence = do no harm — actually supported here by double effect principle.","Fidelity = keeping commitments and trust."],rat:"Principle of Double Effect: used in palliative/hospice care to ethically justify opioid use when adequate pain control may theoretically shorten life. The PRIMARY intent must be relief of suffering, not hastening death.",pearl:"4 biomedical ethics principles (Beauchamp & Childress): Autonomy (self-determination), Beneficence (do good), Non-maleficence (avoid harm), Justice (fairness). All four may be in tension in end-of-life care — resolved through ethical reasoning."},

{id:56,mod:3,type:"mcq",stem:"A family member calls the nursing unit requesting information about their relative's recent HIV diagnosis. Which response by the nurse is correct?",opts:["Confirm the diagnosis to ease the family's concern and provide them with educational resources","Read relevant portions of the chart to the family member to promote transparency","Decline to confirm or deny any patient health information — release requires the client's written consent","Transfer the call to the charge nurse who can determine how much information to share"],ans:2,why:["Confirming any diagnosis without consent violates HIPAA — regardless of the family relationship.","Reading the chart to anyone without consent is a HIPAA violation.","✓ HIPAA protects all patient health information. The nurse cannot confirm or deny any diagnosis or treatment without the client's written authorization — even to family members.","The charge nurse is also bound by HIPAA — transferring the call does not resolve the consent issue."],rat:"HIPAA protects all patient health information. Exceptions: mandatory reporting (child/elder abuse, communicable diseases), imminent danger to identified third party. Family members do NOT have automatic right to patient information.",pearl:"HIPAA NCLEX tips: Never confirm a patient's room number, diagnosis, or care to callers without patient consent. Provide patients with their Notice of Privacy Practices. Family access = only with patient written permission or when patient is incapacitated."},

{id:57,mod:1,type:"mcq",stem:"A nurse is handing off care to the oncoming nurse using the SBAR communication tool. Which sequence correctly represents the components of SBAR?",opts:["Safety, Baseline, Assessment, Response","Situation, Background, Assessment, Recommendation","Status, Behavior, Action, Results","Summary, Brief, Assessment, Rationale"],ans:1,why:["Incorrect acronym.","✓ SBAR: Situation (what's happening), Background (relevant history), Assessment (clinical impression), Recommendation (what's needed). Standard healthcare communication framework.","Incorrect acronym.","Incorrect acronym."],rat:"SBAR is a standardized communication framework for handoffs and provider calls. It reduces communication errors and improves patient safety. Required by The Joint Commission for patient handoffs.",pearl:"SBAR example calling provider: S='Patient in room 302 has chest pain 8/10'; B='History of CAD, 2 days post-PTCA'; A='I think he may be having an MI — ST elevation in V1-V4'; R='Please come evaluate immediately — I'm activating the cath lab protocol.'"},

{id:58,mod:1,type:"mcq",stem:"A client near the end of life states, 'I'm at peace. I've had a full life.' Which stage of grief does the nurse recognize?",opts:["Denial","Bargaining","Depression","Acceptance"],ans:3,why:["Denial = refusing to believe the diagnosis.","Bargaining = making conditions to postpone death.","Depression = sadness and withdrawal.","✓ Acceptance = patient has processed their grief and faces death with equanimity and peace. Not happiness — peace."],rat:"Acceptance: patient has worked through other stages and reached a place of readiness. The nurse's role: support, be present, not project sadness. Allow the patient to express what this stage means for them.",pearl:"Not all patients reach acceptance — and that's completely valid. The nurse should NEVER try to rush patients through grief stages or imply they 'should' be in acceptance. Meet each patient exactly where they are."},

{id:59,mod:1,type:"mcq",stem:"A nurse suspects a client is experiencing elder financial abuse. Which action does the nurse take as the PRIORITY?",opts:["Confront the suspected abuser directly at the bedside before involving any authorities","Document the concern in the chart and continue to monitor for additional signs","Report the suspected abuse to adult protective services — nurses are mandatory reporters","Ask the client to confirm the abuse privately before taking any action"],ans:2,why:["Confronting the abuser directly may endanger the client and is outside the nurse's role.","Documentation alone without reporting fails the mandatory reporter obligation.","✓ Nurses are mandatory reporters for suspected elder abuse. Report to adult protective services (APS) even without confirmation — APS investigates. Document findings objectively in the chart.","Mandatory reporting does not require confirmation from the victim — suspicion alone triggers the obligation."],rat:"Elder abuse types: physical, emotional, sexual, financial, neglect, abandonment. All nurses = mandated reporters in all 50 states. Report to APS based on SUSPICION, not proof. Document objective findings. Do NOT investigate yourself.",pearl:"Signs of elder financial abuse: unexplained changes in financial accounts, new caregiver-controlled accounts, missing valuables, unpaid bills despite adequate income, patient fearful when finances are discussed, caregiver controls all financial decisions."},

{id:60,mod:3,type:"mcq",stem:"A nurse uses the client's adult child as an interpreter during a discussion about a newly diagnosed serious illness. Which statement about this practice is correct?",opts:["This is the preferred method — family members understand the client's values and context best","This is acceptable as long as the family member is fluent in both languages","This practice violates standards of care — a certified medical interpreter should be used","This is acceptable in emergencies but should be avoided for routine health discussions"],ans:2,why:["Family members may filter, omit, or add information — and may be emotionally unable to translate accurately during a serious illness disclosure.","Fluency alone does not make a family member an appropriate medical interpreter — medical accuracy and neutrality are also required.","✓ Using family members as interpreters is a violation of language access standards. Certified medical interpreters ensure accuracy, confidentiality, and neutrality. Title VI of the Civil Rights Act requires free interpreter services.","The standard applies to all clinical discussions — not just emergencies. Sensitive information (diagnosis, prognosis, consent) especially requires a certified interpreter."],rat:"Medical interpreter services are legally required for limited English proficiency patients (Title VI, Joint Commission standards). Family interpreters may withhold information, introduce bias, lack medical vocabulary, or place themselves in an unfair role.",pearl:"Professional medical interpretation services: in-person interpreters, video remote interpreting (VRI), telephone interpretation (AT&T Language Line — 200+ languages, 24/7). NEVER use a child as an interpreter for a parent's medical care."},

{id:61,mod:1,type:"mcq",stem:"A hospice nurse explains hospice to a family. Which statement BEST describes hospice care?",opts:["Hospice care means giving up — it is appropriate only when the family has accepted that death is imminent within 24 hours","Hospice is comfort-focused interdisciplinary care for clients with a prognosis of 6 months or less who choose comfort over curative treatment","Hospice care is reserved for clients with cancer diagnoses only and is typically provided in a hospital setting","Hospice is provided exclusively in dedicated inpatient hospice facilities, not in the client's home"],ans:1,why:["Hospice is NOT giving up — it is a meaningful, active shift in the GOAL of care from curing to comfort and quality of life.","✓ Hospice: comfort-focused interdisciplinary care (nursing, social work, chaplaincy, aide, bereavement) for prognosis ≤6 months, patient/family choose comfort over curative treatment.","Hospice is for any terminal diagnosis and typically for months, not just 24 hours.","Hospice is most often provided in the patient's OWN HOME — home, nursing facility, or dedicated hospice."],rat:"Hospice eligibility: prognosis ≤6 months (physician certified), patient/family chooses comfort over cure. Medicare Hospice Benefit covers medications, nursing, social work, aide, chaplaincy, bereavement for 13 months after death.",pearl:"Palliative care vs. hospice: Palliative = comfort alongside curative treatment at any stage. Hospice = specialized palliative care when curative treatment is stopped, prognosis ≤6 months. NCLEX commonly tests this distinction."},

{id:62,mod:2,type:"mcq",stem:"A nurse is caring for a client with a confirmed deep vein thrombosis of the left lower extremity. Which intervention is most appropriate?",opts:["Massage the affected leg with warm oil to reduce thrombus size and improve circulation","Encourage the client to ambulate in the hallway to prevent further clot propagation","Maintain bed rest, elevate the extremity, avoid massaging, and notify the provider","Apply a compression wrap to the affected leg and encourage active range of motion"],ans:2,why:["Massaging a DVT risks dislodging the clot and causing a pulmonary embolism — never massage.","Ambulation is contraindicated until therapeutic anticoagulation is established.","✓ Acute DVT management: bed rest (until anticoagulated), elevate the extremity to reduce edema, NO massage, notify provider for anticoagulation orders. Monitor for signs of PE (sudden dyspnea, chest pain, tachycardia).","Compression and active exercise are contraindicated with acute untreated DVT."],rat:"Conscientious objection: nurses may seek reassignment for procedures conflicting with deeply held moral beliefs, ONLY IF patient is not abandoned and standard of care is maintained. Refusing all care is NOT acceptable.",pearl:"ANA Code of Ethics Provision 1: Respect patient dignity and worth. Provision 5: Maintain own integrity. These provisions must be balanced — patient welfare always takes precedence over nurse's personal values."},

{id:63,mod:1,type:"mcq",stem:"A nurse is assessing a terminally ill client who cannot verbalize pain. Which method does the nurse use to assess pain?",opts:["Assume the client is comfortable since they cannot report pain verbally","Ask the family to rate the client's pain on a 0 to 10 numeric scale","Use a behavioral pain scale — assess for grimacing, guarding, restlessness, and vital sign changes","Administer a PRN analgesic every four hours regardless of observable signs"],ans:2,why:["Absence of verbal report does not mean absence of pain — behavioral assessment is required.","Family perception of pain may not accurately reflect the client's experience.","✓ When a client cannot self-report pain, use a validated behavioral pain assessment tool (CPOT, PAINAD, FLACC) — assess grimacing, guarding, vocalization, restlessness, and vital signs.","Routine analgesic administration without assessment does not constitute pain management — titration requires ongoing behavioral assessment."],rat:"PAINAD scale: 5 items (breathing, vocalization, facial expression, body language, consolability) each scored 0–2. Total 0–10. Score ≥3 = moderate to severe pain requiring treatment. Never assume non-verbal patients are comfortable.",pearl:"Non-verbal pain scale options: PAINAD (dementia/dying), FLACC (children), CPOT (intubated ICU patients). Any pain score requires treatment and documentation. Treat non-verbal pain before concluding a patient is 'comfortable.'"},

{id:64,mod:2,type:"mcq",stem:"Delirium differs from dementia in which key way?",opts:["Contact adult protective services after first confirming the abuse with the client privately","Document the suspicion in the chart and notify the provider at the next opportunity","Report the suspected abuse to adult protective services — nurses are mandatory reporters","Confront the suspected abuser directly to prevent further harm before involving authorities"],ans:1,why:["Memory impairment occurs in BOTH.","✓ DELIRIUM = acute onset (hours-days), fluctuating (worse at night = sundowning), usually reversible. DEMENTIA = insidious onset, progressive, irreversible.","Dementia is typically irreversible; delirium is usually reversible.","Delirium can occur at any age, though more common in elderly."],rat:"Delirium vs Dementia: Delirium = acute + fluctuating + altered attention + reversible. Dementia = gradual + progressive + memory/cognition + irreversible (typically). CAM (Confusion Assessment Method) screens for delirium.",pearl:"Delirium in hospitalized elderly: incidence 14–56%, associated with increased mortality. Common causes: medications (anticholinergics, benzos), infection (UTI, pneumonia), pain, urinary retention, constipation, immobility. Use the THINK mnemonic: Toxic meds, Hypoxia, Infection, Non-pharma interventions, K+ (electrolytes)."},

{id:65,mod:1,type:"mcq",stem:"A nurse documents care provided. Which practice is CORRECT?",opts:["Use white-out to correct a documentation error","Document in real time using objective, factual, specific language","Complete all documentation at end of shift to save time","Copy the previous nurse's assessment if the patient hasn't changed"],ans:1,why:["White-out NEVER should be used on medical records — draw single line through error, write 'error', initial, date.","✓ Timely, accurate, objective, specific documentation is the gold standard. 'If it's not documented, it wasn't done.'","End-of-shift documentation risks memory errors and doesn't reflect real-time patient status.","Cloning documentation = falsification. Each assessment must reflect current actual findings."],rat:"Documentation standards: accurate, timely (as soon after care as possible), complete, legible, objective, specific. Avoid: generalizations, subjective interpretations without evidence, falsification, copying.",pearl:"Legal documentation principle: 'If it's not documented, it wasn't done.' In malpractice cases, the medical record is the primary evidence. Document objectively: say 'Patient states 7/10 pain' not 'Patient seems to be in pain.'"}

console.log("Total questions loaded:", QB.length);

// ── STATE ──
let state={exam:[],idx:0,answers:{},wrongBank:{},mode:'exam',wrongOnly:false};
const PASS=73;
const MODS=[
  {id:1,label:"Module 1 — Health Assessment, Communication & Fundamentals"},
  {id:2,label:"Module 2 — Cardiac, Respiratory & Neurological Assessment"},
  {id:3,label:"Module 3 — Peripheral IV Therapy & Venous Access"}
];

// ── INIT ──
function init(){
  renderModCfg();
  updateWrongSec();
}

function renderModCfg(){
  const d=document.getElementById('modcfg');
  d.innerHTML=MODS.map(m=>{
    const cnt=QB.filter(q=>q.mod===m.id).length;
    return`<div class="mrow">
      <span class="mbadge">M${m.id}</span>
      <label>${m.label} <span style="color:var(--tx3);font-size:.8rem">(${cnt} available)</span></label>
      <input type="number" min="0" max="${cnt}" value="0" id="m${m.id}cnt" oninput="updateTotal()">
    </div>`;
  }).join('');
  updateTotal();
}

function updateTotal(){
  let t=0;
  MODS.forEach(m=>{const v=parseInt(document.getElementById('m'+m.id+'cnt')?.value)||0;t+=v;});
  document.getElementById('totdisp').textContent=t;
}

function updateWrongSec(){
  const cnt=Object.keys(state.wrongBank).length;
  const s=document.getElementById('wrongsec');
  document.getElementById('wcntbdg').textContent=cnt;
  s.style.display=cnt>0?'block':'none';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── START EXAM ──
function startExam(){
  let pool=[];
  MODS.forEach(m=>{
    const cnt=parseInt(document.getElementById('m'+m.id+'cnt')?.value)||0;
    if(cnt>0){
      const avail=QB.filter(q=>q.mod===m.id);
      const shuffled=shuffle([...avail]);
      pool=pool.concat(shuffled.slice(0,Math.min(cnt,shuffled.length)));
    }
  });
  if(pool.length===0){alert('Please select at least 1 question from any module.');return;}
  QB.forEach(q=>{
    delete q._pending;
    delete q._shuffleMap;
    delete q._shuffleOpts;
    delete q._shuffleWhy;
    delete q._shuffleAns;
    delete q._pendingSATA;
    delete q._btCond;
    delete q._btActs;
    delete q._btParams;
    delete q._hsSelected;
  });
  state.exam=shuffle(pool);
  state.idx=0;
  state.answers={};
  state.wrongOnly=false;
  document.getElementById('emlbl').textContent='Exam';
  showScreen('exam');
  renderQ();
}

function startWrong(){
  const wqs=QB.filter(q=>state.wrongBank[q.id]);
  if(wqs.length===0){alert('No incorrect questions recorded yet.');return;}
  // Deep clone questions so shuffle map and pending state don't affect originals
  const cloned=wqs.map(q=>Object.assign({},q,{
    _pending:undefined,
    _pendingSATA:undefined,
    _shuffleMap:null,
    _btCond:undefined,
    _btActs:undefined,
    _btParams:undefined,
    _hsSelected:undefined
  }));
  state.exam=shuffle(cloned);
  state.idx=0;
  state.answers={};
  state.wrongOnly=true;
  document.getElementById('emlbl').textContent='📋 Review: Incorrect Questions';
  showScreen('exam');
  renderQ();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

// ── RENDER QUESTION ──
function renderQ(){
  const q=state.exam[state.idx];
  const tot=state.exam.length;
  const pct=Math.round((state.idx/tot)*100);
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('qcnt').textContent=(state.idx+1)+'/'+tot;

  const saved=state.answers[q.id];

  // In review mode: shuffle answer options on first render of this question (MCQ/SATA only)
  if(state.wrongOnly && !q._shuffleMap && saved===undefined && q.opts){
    const n=q.opts.length;
    const order=[...Array(n).keys()];
    // Fisher-Yates shuffle of indices
    for(let i=n-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [order[i],order[j]]=[order[j],order[i]];
    }
    q._shuffleMap=order; // _shuffleMap[displayedIdx] = originalIdx
    q._shuffleOpts=order.map(i=>q.opts[i]);
    q._shuffleWhy=order.map(i=>q.why[i]);
    // Recalculate the displayed correct answer index
    q._shuffleAns=order.indexOf(q.ans);
  }

  let html='';

  // type badge
  const typeLabels={mcq:'Multiple Choice',sata:'Select All That Apply',fib:'Fill in the Blank',bowtie:'Bowtie — Clinical Judgment',hotspot:'Hot Spot — Highlight the Finding'};
  html+=`<span class="qbadge qb-${q.type}">${typeLabels[q.type]}</span>`;

  // module badge
  html+=`<span style="font-size:.72rem;background:var(--bg2);color:var(--tx3);padding:2px 8px;border-radius:20px;margin-left:6px;font-weight:600">Module ${q.mod}</span>`;

  // media (EKG/diagrams)
  if(q.svg) html+=`<div class="qmedia">${q.svg}</div>`;

  html+=`<div class="qstem">${q.stem}</div>`;

  if(q.type==='mcq') html+=renderMCQ(q,saved);
  else if(q.type==='sata') html+=renderSATA(q,saved);
  else if(q.type==='fib') html+=renderFIB(q,saved);
  else if(q.type==='bowtie') html+=renderBowtie(q,saved);
  else if(q.type==='hotspot') html+=renderHotspot(q,saved);

  // feedback panel
  html+=renderFeedback(q,saved);

  // nav
  html+=`<div class="navrow">
    <button class="btn btn-s" onclick="navQ(-1)" ${state.idx===0?'disabled':''}>← Back</button>
    <button class="btn btn-s" onclick="exitExam()" style="background:transparent;border:1.5px solid var(--tx3);color:var(--tx3)">✕ Exit Exam</button>`;
  if(saved===undefined){
    if(q.type==='bowtie'){
      html+=`<button class="btn btn-p" onclick="submitBowtie('${q.id}')">Submit Answer</button>`;
    } else if(q.type==='hotspot'){
      html+=`<button class="btn btn-p" onclick="submitHotspot('${q.id}')">Submit Answer</button>`;
    } else {
      html+=`<button class="btn btn-p" onclick="submitAnswer('${q.id}','${q.type}')">Submit Answer</button>`;
    }
  } else if(state.idx<state.exam.length-1){
    html+=`<button class="btn btn-p" onclick="navQ(1)">Next →</button>`;
  } else {
    html+=`<button class="btn btn-p" onclick="finishExam()">Finish Exam →</button>`;
  }
  html+=`</div>`;

  document.getElementById('qcard').innerHTML=html;
}

function renderMCQ(q,saved){
  const letters='ABCD';
  // Use shuffled options if in review mode
  const opts=q._shuffleOpts||q.opts;
  const whys=q._shuffleWhy||q.why;
  const corrIdx=q._shuffleAns!==undefined?q._shuffleAns:q.ans;
  return`<ul class="opts">`+opts.map((opt,i)=>{
    let cls='opt';
    let tooltip='';
    if(saved!==undefined){
      // Map real saved answer back to displayed index for highlighting
      const displayedSaved=q._shuffleMap?q._shuffleMap.indexOf(saved):saved;
      cls+=' dis';
      if(i===corrIdx) cls+=' corr';
      else if(i===displayedSaved && displayedSaved!==corrIdx) cls+=' wrng';
      // Show tooltip on ALL non-correct options after reveal
      if(i!==corrIdx){
        tooltip=`<div class="tooltip">${whys[i]}</div>`;
      }
    } else {
      if(q._pending===i) cls+=' sel';
    }
    return`<li class="${cls}" onclick="${saved===undefined?`selectMCQ('${q.id}',${i})`:''}">
      <div class="oltr">${letters[i]}</div>
      <div class="otxt">${opt}</div>${tooltip}
    </li>`;
  }).join('')+'</ul>';
}

function renderSATA(q,saved){
  const letters='ABCDEFGH';
  let html=`<div class="sata-hint">Select all that apply. Partial credit given for correct selections.</div><ul class="opts">`;
  html+=q.opts.map((opt,i)=>{
    let cls='opt';
    let tooltip='';
    if(saved!==undefined){
      cls+=' dis';
      const correctAns=Array.isArray(q.ans)?q.ans:[q.ans];
      const userSel=Array.isArray(saved)?saved:[];
      if(correctAns.includes(i)) cls+=' corr';
      if(userSel.includes(i) && !correctAns.includes(i)) cls+=' wrng';
      // Show tooltip on all non-correct options after reveal
      if(!correctAns.includes(i)){tooltip=`<div class="tooltip">${q.why[i]}</div>`;}
    }
    return`<li class="${cls}" onclick="${saved===undefined?`toggleSATA('${q.id}',${i})`:''}">
      <div class="oltr">${letters[i]}</div>
      <div class="otxt">${opt}</div>${tooltip}
    </li>`;
  }).join('');
  return html+'</ul>';
}

function renderFIB(q,saved){
  let html=`<div class="fib-wrap">`;
  html+=q.blanks.map((lbl,i)=>{
    let cls='fib-in';
    let val='';
    if(saved!==undefined){
      val=saved[i]||'';
      const correct=q.ans[i].toLowerCase().trim();
      const user=(saved[i]||'').toLowerCase().trim();
      cls+= user===correct?' corr':' wrng';
    }
    return`<div class="fib-row">
      <label>${lbl}:</label>
      <input class="${cls}" type="text" id="fib_${q.id}_${i}" value="${val}" placeholder="Type answer..." ${saved!==undefined?'disabled':''}>
    </div>`;
  }).join('');
  return html+'</div>';
}

function renderFeedback(q,saved){
  if(saved===undefined) return`<div class="fbpanel" id="fbpanel"></div>`;

  // Bowtie feedback
  if(q.type==='bowtie'){
    const score=saved.score||0;
    const perfect=score===5;
    return`<div class="feedback ${perfect?'fb-corr':'fb-wrong'}">
      <div class="fb-hd">${perfect?'✓ Complete — All Correct!':'✗ Review Required — See Correct Answers Below'}</div>
      <div class="fb-body" style="margin-bottom:6px"><strong>Score: ${score}/5 points</strong></div>
      <div class="fb-body"><strong>Condition:</strong> ${q.condition.opts[q.condition.ans]}</div>
      <div class="fb-body"><strong>Actions:</strong> ${q.actions.ans.map(i=>q.actions.opts[i]).join(' &amp; ')}</div>
      <div class="fb-body"><strong>Monitor:</strong> ${q.parameters.ans.map(i=>q.parameters.opts[i]).join(' &amp; ')}</div>
      <div class="fb-body">${q.rat}</div>
      <div class="fb-pearl">💡 <strong>NCLEX Pearl:</strong> ${q.pearl}</div>
    </div>`;
  }

  // Hotspot feedback
  if(q.type==='hotspot'){
    const perfect=saved.perfect||false;
    const criticalTexts=q.ans.map(i=>q.findings[i].text);
    return`<div class="feedback ${perfect?'fb-corr':'fb-wrong'}">
      <div class="fb-hd">${perfect?'✓ All Critical Findings Identified!':'✗ Review — Critical Findings Were:'}</div>
      <div class="fb-body"><ul style="margin:4px 0 0 18px">${criticalTexts.map(t=>`<li>${t}</li>`).join('')}</ul></div>
      <div class="fb-body">${q.rat}</div>
      <div class="fb-pearl">💡 <strong>NCLEX Pearl:</strong> ${q.pearl}</div>
    </div>`;
  }

  let fbClass, fbTitle, fbAns;

  if(q.type==='mcq'){
    const correct=saved===q.ans;
    fbClass=correct?'c-fb':'w-fb';
    fbTitle=correct?'✓ Correct!':'✗ Incorrect';
    fbAns=`<div class="fbans">Correct answer: <strong>${q.opts[q.ans]}</strong></div>`;
  } else if(q.type==='sata'){
    const correctSet=Array.isArray(q.ans)?q.ans:[q.ans];
    const userSet=Array.isArray(saved)?saved:[];
    const correctSel=userSet.filter(i=>correctSet.includes(i)).length;
    const wrongSel=userSet.filter(i=>!correctSet.includes(i)).length;
    const points=Math.max(0,correctSel-wrongSel);
    const total=correctSet.length;
    const allRight=points===total && wrongSel===0;
    fbClass=allRight?'c-fb':(points>0?'p-fb':'w-fb');
    fbTitle=allRight?'✓ Perfect!':'Points: '+points+'/'+total;
    const corrLabels=correctSet.map(i=>'ABCDE'[i]).join(', ');
    fbAns=`<div class="fbans">Correct answers: <strong>${corrLabels}</strong></div>`;
  } else {
    const allRight=q.ans.every((a,i)=>(saved[i]||'').toLowerCase().trim()===a.toLowerCase().trim());
    fbClass=allRight?'c-fb':'w-fb';
    fbTitle=allRight?'✓ Correct!':'✗ Incorrect';
    fbAns=`<div class="fbans">Correct answers: <strong>${q.ans.join(', ')}</strong></div>`;
  }

  return`<div class="fbpanel ${fbClass} show">
    <div class="fbtit">${fbTitle}</div>
    ${fbAns}
    <div class="fbrat">${q.rat}</div>
    <div class="fbpearl">${q.pearl}</div>
  </div>`;
}

// ── INTERACTION ──
function selectMCQ(qid,idx){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;
  // temp select visual
  document.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.toggle('sel',i===idx);
  });
  q._pending=idx;
}

function toggleSATA(qid,idx){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;
  if(!q._pendingSATA) q._pendingSATA=[];
  const i=q._pendingSATA.indexOf(idx);
  if(i>-1) q._pendingSATA.splice(i,1);
  else q._pendingSATA.push(idx);
  document.querySelectorAll('.opt').forEach((el,i)=>{
    el.classList.toggle('sel',q._pendingSATA.includes(i));
  });
}

function submitAnswer(qid,type){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;

  let answer;
  if(type==='mcq'){
    if(q._pending===undefined){alert('Please select an answer first.');return;}
    // If shuffled, map displayed index back to original answer index for scoring
    answer=q._shuffleMap?q._shuffleMap[q._pending]:q._pending;
  } else if(type==='sata'){
    if(!q._pendingSATA || q._pendingSATA.length===0){alert('Please select at least one option.');return;}
    answer=[...q._pendingSATA];
  } else if(type==='fib'){
    answer=q.blanks.map((_,i)=>document.getElementById('fib_'+qid+'_'+i)?.value||'');
    if(answer.every(a=>!a.trim())){alert('Please fill in the blanks.');return;}
  }

  state.answers[q.id]=answer;

  // Update wrong bank
  let isWrong=false;
  if(type==='mcq') isWrong=answer!==q.ans;
  else if(type==='sata'){
    const correctSet=Array.isArray(q.ans)?q.ans:[q.ans];
    const userSet=answer;
    isWrong=!(correctSet.every(i=>userSet.includes(i)) && userSet.every(i=>correctSet.includes(i)));
  } else if(type==='fib'){
    isWrong=!q.ans.every((a,i)=>(answer[i]||'').toLowerCase().trim()===a.toLowerCase().trim());
  }

  if(isWrong) state.wrongBank[q.id]=true;
  else delete state.wrongBank[q.id];

  updateWrongSec();
  renderQ();
}

// ── FINISH ──
function finishExam(){
  let totalPts=0, earnedPts=0, correctCount=0, wrongCount=0;

  state.exam.forEach(q=>{
    const ans=state.answers[q.id];
    if(ans===undefined) return;

    if(q.type==='mcq'){
      totalPts+=1;
      if(ans===q.ans){earnedPts+=1;correctCount++;}
      else wrongCount++;
    } else if(q.type==='sata'){
      const correctSet=Array.isArray(q.ans)?q.ans:[q.ans];
      const userSet=Array.isArray(ans)?ans:[];
      const pts=Math.max(0,userSet.filter(i=>correctSet.includes(i)).length - userSet.filter(i=>!correctSet.includes(i)).length);
      totalPts+=correctSet.length;
      earnedPts+=pts;
      const allRight=pts===correctSet.length && userSet.filter(i=>!correctSet.includes(i)).length===0;
      if(allRight) correctCount++; else wrongCount++;
    } else if(q.type==='fib'){
      const allRight=q.ans.every((a,i)=>(ans[i]||'').toLowerCase().trim()===a.toLowerCase().trim());
      totalPts+=1;
      if(allRight){earnedPts+=1;correctCount++;}
      else wrongCount++;
    }
  });

  const pct=totalPts>0?Math.round((earnedPts/totalPts)*100):0;
  const pass=pct>=PASS;

  document.getElementById('rpct').textContent=pct+'%';
  document.getElementById('rcorr').textContent=correctCount;
  document.getElementById('rwrng').textContent=wrongCount;
  document.getElementById('rtot').textContent=state.exam.length;

  const banner=document.getElementById('rbanner');
  banner.textContent=pass?'🎉 Passing Score!':'Keep Studying — You\'ve Got This!';
  banner.className='rbanner '+(pass?'pass':'fail');

  const motivImgs=['🏥','👩‍⚕️','🩺','💉','🩻','🏨'];
  const motivTexts=pass?[
    'Outstanding work! Your patients are lucky to have such a dedicated nurse.',
    'You passed! Every patient you care for benefits from your dedication.',
    'Excellent! Keep building on this knowledge.',
    'You did it! Your hard work is paying off.',
  ]:[
    'You\'re building toward excellence. Review your missed questions and try again!',
    'Growth mindset: every wrong answer is a learning opportunity.',
    'Great nurses are made through practice and persistence. Keep going!',
  ];
  document.getElementById('motivimg').textContent=motivImgs[Math.floor(Math.random()*motivImgs.length)];
  document.getElementById('motivtxt').textContent=motivTexts[Math.floor(Math.random()*motivTexts.length)];

  const wbtn=document.getElementById('wreviewbtn');
  const wrongCount2=Object.keys(state.wrongBank).length;
  wbtn.style.display=wrongCount2>0?'block':'none';

  showScreen('results');
  if(pass || state.wrongOnly) launchConfetti();
}

// ── CONFETTI ──
function launchConfetti(){
  const canvas=document.getElementById('cc');
  const ctx=canvas.getContext('2d');
  canvas.style.display='block';
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;

  const colors=['#c2621a','#e07d35','#8b3e08','#f5ede0','#2d6a2d','#1a47a0','#8b1a5a'];
  const pieces=Array.from({length:120},()=>({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height-canvas.height,
    r:Math.random()*6+4,
    d:Math.random()*120+80,
    color:colors[Math.floor(Math.random()*colors.length)],
    tilt:Math.random()*10-10,
    tiltAngle:0,
    tiltSpeed:Math.random()*.1+.05
  }));

  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.lineWidth=p.r/2;
      ctx.strokeStyle=p.color;
      ctx.moveTo(p.x+p.tilt+(p.r/4),p.y);
      ctx.lineTo(p.x+p.tilt,p.y+p.tilt+(p.r/4));
      ctx.stroke();
      p.tiltAngle+=p.tiltSpeed;
      p.y+=((Math.cos(frame*(Math.PI/180)+p.d)+2)*0.7);
      p.tilt=Math.sin(p.tiltAngle)*12;
      if(p.y>canvas.height){p.x=Math.random()*canvas.width;p.y=-10;}
    });
    frame++;
    if(frame<360) requestAnimationFrame(draw);
    else{ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';}
  }
  draw();
}
