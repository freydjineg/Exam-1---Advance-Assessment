const QB_ATI20 = [

// ── MODULE 1: Communication & End of Life (7 Qs) ──

{id:231,mod:1,type:"mcq",
stem:"A nurse is caring for a client who has just been told they have a terminal diagnosis. The client stares at the wall silently for two minutes. Which action by the nurse is MOST therapeutic?",
opts:["Leave the room to give the client privacy","Say, 'I know this is hard, but we have great treatments available.'","Sit quietly beside the client and allow the silence to continue","Begin explaining the treatment plan to give the client something to focus on"],
ans:2,
why:["Leaving abandons the client at their most vulnerable moment.","False reassurance dismisses the emotional impact of a terminal diagnosis.","✓ Therapeutic silence: sit with the client, maintain presence, allow processing time without pressure. Silence communicates 'I am here' — one of the most powerful therapeutic interventions available.","Launching into treatment planning is premature and redirects from emotion to information the client is not ready to receive."],
rat:"Lecture notes: 'Silence: Therapeutic listening.' After devastating news, the most therapeutic response is often to be present without words. The client is processing — silence allows this without pressure. The nurse's physical presence communicates compassion.",
pearl:"ATI pattern: when a client receives bad news and goes quiet, the correct answer is NEVER to fill the silence with information or reassurance. Sit. Wait. Be present. The silence is doing therapeutic work."},

{id:232,mod:1,type:"mcq",
stem:"A nurse is attempting to take a health history from a client who speaks only Mandarin. No interpreter is currently available. Which action does the nurse take FIRST?",
opts:["Ask the client's adult child who is present to interpret the questions","Proceed with the assessment using gestures and pantomime","Contact the hospital interpreter service or access a telephone/video interpreter","Document 'language barrier — assessment deferred' and return when an interpreter is found"],
ans:2,
why:["Family members, especially children, should NOT be used as medical interpreters — they may filter, misinterpret, or be emotionally impacted by the content. This is a standard-of-care and legal issue.","Gestures alone are insufficient for a health history — clinical accuracy requires precise communication.","✓ Lecture notes: 'Use an interpreter whenever possible.' Hospital interpreter services (in-person, phone, or video) are the standard. Access must be immediate, not deferred.","Deferring the assessment may delay needed care and is not patient-centered."],
rat:"Lecture notes on patients who do not speak English: use an interpreter whenever possible; never rely solely on family members (especially children) as interpreters; speak in simple sentences and normal tone; be aware of nonverbal communication. Certified medical interpreters ensure accuracy and confidentiality.",
pearl:"Legal and regulatory standard: Title VI of the Civil Rights Act requires healthcare organizations receiving federal funding to provide meaningful access to patients with limited English proficiency — including free interpreter services. Using a family member is a legal risk and an accuracy risk."},

{id:233,mod:1,type:"mcq",
stem:"A nurse is caring for a client with dementia who becomes agitated and combative during morning care. Which approach is MOST appropriate?",
opts:["Continue the teaching session without modification and document that teaching was completed","Stop the task, step back, use a calm tone to reorient the client, and reattempt when the client is calm","Administer the scheduled PRN sedative immediately to allow safe completion of morning care","Ask two additional nurses to assist in holding the client still to complete the care safely"],
ans:1,
why:["Physical restraint often escalates agitation and increases injury risk — and requires a physician order. Not a first-line intervention.","✓ Lecture notes on cognitively impaired clients: calm approach, simple communication, reduce stimulation, allow time. Stopping and reorienting before continuing respects dignity and de-escalates agitation.","PRN sedatives are not a first-line response to behavioral disturbance during ADL care.","Forcing care over active resistance violates dignity and increases injury risk for both client and nurse."],
rat:"Dementia behavioral management: when a client resists care, STOP — forcing care escalates distress and can cause injury. Approach calmly, use the client's name, maintain eye contact, use simple short sentences, redirect, offer choices. Return to the task when the client is calmer.",
pearl:"Brunner Ch. 61 Quality and Safety Alert: 'Every measure available and appropriate for calming and quieting the patient should be used. Any form of restraint is likely to be countered with resistance, leading to self-injury or dangerous increase in ICP.' Behavioral de-escalation first — always."},

{id:234,mod:1,type:"mcq",
stem:"A nurse is caring for a client in the bargaining stage of grief who repeatedly asks, 'If I pray hard enough and change my diet, will I get better?' Which response by the nurse is MOST therapeutic?",
opts:["Say 'Yes — a positive attitude and lifestyle changes can definitely improve your disease outcome.'","Tell the client directly that prayer and dietary changes will not reverse a terminal diagnosis","Reflect the underlying hope and ask: 'It sounds like you're looking for ways to feel more in control. Tell me more.'","Redirect the client to the physician since nurses cannot address questions about treatment efficacy"],
ans:2,
why:["False hope is not therapeutic and is clinically inaccurate — this response sets up the client for a deeper crisis when the condition progresses.","Bluntly dismissing hope at this stage is not therapeutic — it removes a coping mechanism without offering anything in its place.","✓ Reflects the underlying feeling (hope, desire for control), uses a general lead to open further discussion. Does not confirm or deny false hope. Meets the client where they are in the grief process.","Deflection to the physician closes the therapeutic conversation the nurse could be having right now."],
rat:"Bargaining is a normal grief stage characterized by hoping that something — prayer, behavior change, deals — can reverse the outcome. The therapeutic response acknowledges the hope without validating false beliefs or dismissing the emotion. Open-ended follow-up invites the client to explore their feelings.",
pearl:"The nurse's role in bargaining is not to correct, teach, or redirect — it is to accompany. The client needs to feel heard. Validation of the EMOTION ('you're hoping') is different from validation of the BELIEF ('your prayers will cure you'). This distinction is crucial."},

{id:235,mod:1,type:"sata",
stem:"A hospice nurse is educating a family about signs that death is approaching within hours to days. Which findings should the nurse include in this education? Select all that apply.",
opts:["Mottling and cyanosis of the knees, feet, and hands","Cheyne-Stokes respirations — rhythmic waxing and waning with periods of apnea","Extremities cool to touch as circulation withdraws to the core","Increased urine output and improved appetite","Unresponsiveness to verbal or gentle touch","Periods of agitation, restlessness, or terminal delirium"],
ans:[0,1,2,4,5],
why:["CORRECT — Mottling (lace-like purple/blue discoloration) begins at the knees and feet as circulation fails — a cardinal active dying sign.","CORRECT — Cheyne-Stokes respirations reflect brainstem-level changes in respiratory control — expected in active dying.","CORRECT — As cardiac output falls, blood is shunted to vital organs; extremities become cool and mottled.","INCORRECT — As death approaches, urine output DECREASES (oliguria/anuria) and appetite is lost, not increased.","CORRECT — Unresponsiveness to external stimuli is a late active dying sign; hearing is believed to be the last sense lost.","CORRECT — Terminal restlessness/delirium is common in the final hours; causes include metabolic changes, urinary retention, and pain."],
rat:"Active dying signs (hours to days): mottling, Cheyne-Stokes respirations, cooling extremities, unresponsiveness, terminal restlessness, loss of bowel/bladder control, jaw relaxation. Nursing role: family education that these are EXPECTED, not painful or distressing to the client. Hearing is preserved — encourage family to speak to the patient."},

{id:236,mod:1,type:"mcq",
stem:"A client on a palliative care unit states, 'I don't want my family to see me like this.' The family is waiting in the hall, eager to visit. Which action by the nurse is MOST appropriate?",
opts:["Invite the family in — family presence is always therapeutic for dying clients","Ask the family to wait and explore the client's concerns before facilitating the visit","Document the client's statement and proceed with family visitation as scheduled","Inform the family the client is sleeping to avoid a difficult conversation"],
ans:1,
why:["The client's autonomy over their own care and visitors is paramount — family presence is not always wanted.","✓ The client has expressed a concern about family visitation. Before any action, the nurse must explore what the client means: Are they embarrassed? Wanting to protect the family? Wanting to die alone? The client's wishes direct the plan.","Documenting without addressing the client's concern is insufficient.","Deceiving the family violates honesty and is not patient-centered."],
rat:"Patient autonomy includes control over who visits and when. 'I don't want my family to see me like this' could mean many things — the nurse must explore further before acting. Therapeutic communication: 'Tell me more about what's worrying you about the visit.' Then advocate for the client's decision.",
pearl:"End-of-life autonomy includes: where to die, who is present, what interventions are used, what information is shared. The nurse's advocacy role is most critical at end of life when the client may lack energy to advocate for themselves. Document client's stated wishes and ensure the care plan reflects them."},

{id:237,mod:1,type:"mcq",
stem:"A palliative care nurse is reviewing the National Consensus Project (NCP) Clinical Practice Guidelines. Which domain specifically addresses the client's right to direct their own care and the ethical principles of beneficence and non-maleficence?",
opts:["Domain 2: Physical Aspects of Care","Domain 4: Social Aspects of Care","Domain 6: Cultural Aspects of Care","Domain 8: Ethical and Legal Aspects of Care"],
ans:3,
why:["Domain 2 = pain, symptoms, and side effects — physical management.","Domain 4 = environmental and social factors affecting quality of life.","Domain 6 = culturally sensitive care, provider self-examination of bias.","✓ Brunner Ch. 13: 'Domain 8: Ethical and Legal Aspects of Care — The patient's goals, preferences, and choices are within legally acceptable standards and form the basis for the plan of care. Knowledge of ethical principles (beneficence, nonmaleficence, justice, self-determination) is required.'"],
rat:"NCP 8 domains (Brunner Ch. 13): 1=Structure/Processes, 2=Physical, 3=Psychological/Psychiatric, 4=Social, 5=Spiritual/Religious/Existential, 6=Cultural, 7=Care near End of Life, 8=Ethical/Legal. Domain 8 grounds care in ethical principles and patient self-determination — foundational to all other domains.",
pearl:"Ethical principles in palliative care: Beneficence (do good), Non-maleficence (do no harm), Justice (fair distribution), Autonomy/Self-determination (patient directs care). When these conflict — e.g., patient refuses treatment the team believes is beneficial — autonomy typically takes precedence for a capacitated client."},

// ── MODULE 2: Cardiac + Neuro + Respiratory (8 Qs) ──

{id:238,mod:2,type:"mcq",
stem:"A nurse is caring for a client post-myocardial infarction who develops a heart rate of 38 bpm, blood pressure of 84/50 mmHg, and is confused. The cardiac monitor shows: regular rhythm, narrow QRS, P waves present before each QRS, rate 38. Which action does the nurse take FIRST?",
opts:["Prepare the client for immediate synchronized cardioversion — bradycardia requires a shock","Administer adenosine 6 mg IV rapid push — this is first-line for symptomatic slow rhythms","Notify the provider and prepare to administer atropine 0.5 mg IV — symptomatic bradycardia requires treatment","Obtain a 12-lead ECG and wait for the provider to review it before initiating any treatment"],
ans:2,
why:["Synchronized cardioversion is for tachyarrhythmias — this is a bradycardia.","Adenosine slows AV conduction and would worsen bradycardia — contraindicated.","✓ Symptomatic sinus bradycardia (rate 38, BP 84/50, altered LOC = hemodynamically unstable) → notify provider and administer atropine 0.5 mg IV. This is the first-line ACLS treatment. Repeat every 3–5 min up to 3 mg total.","A 12-lead ECG is appropriate but should not delay treatment in a hemodynamically unstable client."],
rat:"Brunner Ch. 22 / Cardiac Rhythms lecture: symptomatic bradycardia treatment sequence — atropine 0.5 mg IV (first line) → if unresponsive: transcutaneous pacing → dopamine or epinephrine infusion. Symptoms = hypotension, altered mental status, chest pain, acute HF, syncope.",
pearl:"Remember: atropine works best for VAGALLY mediated or SA node/AV node bradycardia. It is LESS effective (sometimes ineffective) for Mobitz II and third-degree block (infranodal) — these clients often require pacing directly. Know which rhythm you're treating before giving atropine."},

{id:239,mod:2,type:"mcq",
stem:"A nurse is reviewing telemetry and notices a client's rhythm has changed. The strip shows: regular, rate 150 bpm, narrow QRS, no clearly visible P waves (may be hidden in T waves), abrupt onset. The client is anxious but BP is 108/70. Which action does the nurse take FIRST?",
opts:["Prepare for immediate unsynchronized defibrillation — this client has no palpable pulse","Administer amiodarone 300 mg IV push — first-line antiarrhythmic for all tachyarrhythmias","Assess the client at the bedside and notify the provider — stable SVT requires evaluation first","Administer atropine 0.5 mg IV push — atropine is used to accelerate heart rate in bradycardia"],
ans:2,
why:["Unsynchronized defibrillation is for pulseless rhythms — this client has a BP of 108/70.","Amiodarone 300 mg IV push is for VFib/pulseless VT — not SVT in a stable client.","✓ Cardiac Rhythms PDF: SVT = 150–250 bpm, regular, narrow, P waves hidden. Stable client (BP 108/70) → assess, notify provider, anticipate vagal maneuvers or adenosine order. Not an emergency defibrillation.","Atropine increases heart rate — would worsen SVT."],
rat:"SVT management: stable → vagal maneuvers (Valsalva, carotid sinus massage) first → adenosine 6 mg IV rapid push if vagal fails → if refractory: calcium channel blocker or beta-blocker. Unstable SVT (hypotension, chest pain, altered LOC) → synchronized cardioversion.",
pearl:"Adenosine for SVT: give 6 mg IV rapid push into a large proximal vein (antecubital or above), immediately flush with 20 mL NS, then raise the arm. Half-life is 6–10 seconds. Client may feel chest tightness or brief asystole — warn them. If 6 mg fails → 12 mg → second 12 mg."},

{id:240,mod:2,type:"mcq",
stem:"A nurse is caring for a client with a new left bundle branch block (LBBB) on ECG. The client has chest pain and diaphoresis. Which action takes PRIORITY?",
opts:["Reassure the client that bundle branch blocks are always benign and rarely need follow-up","Notify the provider immediately — new LBBB with chest pain meets STEMI equivalence criteria","Administer acetaminophen for the chest discomfort and monitor vital signs every four hours","Obtain orthostatic blood pressures to rule out dehydration as a contributing cause"],
ans:1,
why:["New LBBB with chest pain is never benign — it is a STEMI equivalent.","✓ Cardiac Rhythms lecture / Brunner Ch. 22: new LBBB in the context of chest pain = STEMI equivalent per ACLS guidelines. This is a cardiac emergency requiring immediate provider notification and catheterization lab activation.","Acetaminophen does not address the underlying ischemia.","Orthostatic vitals are for volume status assessment — not the priority with STEMI criteria."],
rat:"Brunner Ch. 22 bundle branch block: QRS >0.12 sec with specific morphology. NEW LBBB in a client with ischemic symptoms = STEMI equivalent — the blocked conduction masks typical ST changes. Immediate 12-lead ECG, provider notification, aspirin, and cath lab activation are the priorities.",
pearl:"STEMI equivalents (not classic ST elevation but treated urgently): new LBBB + symptoms, posterior MI (ST depression V1-V4, dominant R waves), Wellens syndrome (critical LAD stenosis, specific T-wave pattern in V2-V3). Any of these with symptoms = treat as STEMI."},

{id:241,mod:2,type:"mcq",
stem:"A nurse is assessing a client 24 hours after a craniotomy. The client's GCS was 14 on admission. Current assessment: GCS 10, right pupil 4mm sluggish (was 3mm brisk), left pupil 3mm brisk, BP 158/90, HR 52. Which action does the nurse take FIRST?",
opts:["Reposition the client to a more comfortable position and reassess neurological status in 30 minutes","Document the findings in the chart and wait until the provider's next scheduled rounding visit","Immediately notify the provider — declining GCS, new pupil asymmetry, and Cushing's triad indicate increasing ICP with possible herniation","Administer the client's scheduled PRN analgesic in case pain-related agitation is causing the changes"],
ans:2,
why:["Repositioning delays critical intervention in a deteriorating client.","Waiting for scheduled rounding when a client is acutely deteriorating is a patient safety failure.","✓ Declining GCS (14→10), new unequal pupils (right sluggish = CN III compression beginning), Cushing's triad (bradycardia + hypertension) = clinical picture of increasing ICP with early herniation. This is a neurological emergency.","Pain medication without first assessing and reporting neurological deterioration is the wrong priority."],
rat:"Brunner Ch. 61: 'Progressive pupil dilation indicates increasing ICP. Fixed dilated pupils indicate injury at the midbrain level.' Blueprint Chart 61-1: declining LOC + new pupil changes + vital sign changes (Cushing's triad) = late ICP signs requiring IMMEDIATE intervention. Every minute matters.",
pearl:"ICP emergency interventions (anticipate): HOB 30° with head midline, hyperventilation target PaCO2 35 mmHg (temporary), mannitol 0.25–1 g/kg IV, hypertonic saline, CSF drainage via ventriculostomy, urgent CT head, possible surgical decompression. Notify the provider before initiating — but have these ready."},

{id:242,mod:2,type:"sata",
stem:"A nurse is caring for an unconscious client with confirmed increased intracranial pressure (ICP). Which nursing interventions are appropriate? Select all that apply.",
opts:["Elevate the head of bed to 30 degrees with the head maintained in midline position","Keep the environment quiet and minimize clustering of nursing procedures","Suction the airway continuously for up to 60 seconds to maintain patency","Turn the client every 2 hours using the logrolling technique","Avoid extreme hip flexion and Trendelenburg positioning","Monitor for Cushing's triad as a late sign of ICP elevation"],
ans:[0,1,3,4,5],
why:["CORRECT — HOB 30 degrees midline promotes venous drainage from the cranial vault, reducing ICP without compromising CPP.","CORRECT — Stimulation (noise, painful procedures, clustering of care) causes transient ICP spikes. Space interventions to allow recovery.","INCORRECT — Continuous suctioning for 60 seconds is contraindicated — it causes hypoxia and Valsalva, both of which dramatically increase ICP. Limit to <10 seconds per pass, pre-oxygenate.","CORRECT — Logrolling maintains spinal alignment and prevents ICP spikes from twisting; every 2 hours prevents pressure injuries.","CORRECT — Hip flexion and Trendelenburg impair venous drainage from the head, raising ICP.","CORRECT — Cushing's triad (widened pulse pressure, bradycardia, irregular respirations) is a very late sign — herniation may already be occurring."],
rat:"ICP management: position (HOB 30 midline), minimize stimulation, careful suctioning (<10 sec, pre-oxygenate), avoid Valsalva, monitor neuro status. The suctioning option is a classic NCLEX trap — the duration (60 seconds) makes it wrong. Cushing's triad is late and ominous — act on early signs (restlessness, pupil changes) before it develops."},

{id:243,mod:2,type:"mcq",
stem:"A client with COPD removes their prescribed Venturi mask at 28% FiO2 and replaces it with a nasal cannula at 4 L/min. Which action does the nurse take FIRST?",
opts:["Allow the change since a nasal cannula is more comfortable and 4 L/min delivers similar oxygen","Replace the Venturi mask and explain that the prescribed device delivers a precise FiO2 that matters for this client's condition","Increase the nasal cannula flow to 6 L/min to compensate for the lower concentration of the Venturi mask","Document the client's preference in the chart and notify the provider at the next available opportunity"],
ans:1,
why:["4 L/min nasal cannula delivers approximately 36–40% FiO2 — significantly higher than the prescribed 28%. In a COPD patient with chronic CO2 retention, this may suppress the hypoxic drive.","✓ Brunner Ch. 10: COPD with chronic CO2 retention = hypoxic drive. The Venturi mask at 28% is prescribed precisely to deliver a controlled, safe FiO2. The nurse must replace the mask and educate the client on why this specific delivery method is necessary.","6 L/min nasal cannula = ~44% FiO2 — even more dangerous for this client.","Deferring to the next available opportunity while the client breathes too much O2 is unsafe."],
rat:"Nasal cannula FiO2 estimate: 1L=24%, 2L=28%, 3L=32%, 4L=36%, 5L=40%, 6L=44%. A Venturi mask at 28% is more precise and reliable than a nasal cannula at the same estimated FiO2 — and critically, the nasal cannula FiO2 varies with the client's breathing pattern. For COPD with CO2 retention, precision matters.",
pearl:"Patient education script: 'I know the mask is uncomfortable, but your body has adapted to a lower oxygen level. If we give you too much oxygen, it can actually slow down your breathing. The special mask keeps it at exactly the right amount for you.' Then problem-solve comfort: mask fit, padding, incentive to keep it on."},

{id:244,mod:2,type:"mcq",
stem:"A nurse auscultates a Grade III/VI systolic murmur at the right second intercostal space that radiates to the neck. The client is a 72-year-old with exertional dyspnea and syncope. Which interpretation is MOST accurate?",
opts:["This is likely an innocent murmur — systolic murmurs in older adults are common and benign","This presentation is consistent with aortic stenosis — a symptomatic murmur here requires provider notification and workup","A systolic murmur at this location indicates mitral regurgitation with radiation to the axilla","Grade III murmurs are never clinically significant — only Grade V and VI require reporting"],
ans:1,
why:["There are no truly innocent murmurs in adults presenting with symptoms (dyspnea, syncope) — this requires workup.","✓ Brunner Ch. 21: aortic valve area = 2nd ICS RSB. Systolic ejection murmur + radiation to neck + exertional symptoms (dyspnea, syncope, angina) = classic triad of aortic stenosis. This is a significant finding requiring urgent evaluation.","Mitral regurgitation = apical systolic murmur radiating to the axilla — not this location.","Murmur grade describes intensity, not clinical significance. Grade III with symptoms is significant."],
rat:"Aortic stenosis classic triad: angina + syncope + dyspnea (SAD). Systolic ejection murmur at 2nd ICS RSB, radiates to neck/carotids, may have a systolic click, harsh quality, may decrease with Valsalva. Severe AS with symptoms = poor prognosis without valve replacement.",
pearl:"Murmur grading (Brunner Ch. 21 Characteristics of Heart Murmurs): I = barely audible, II = quiet but heard immediately, III = moderately loud without thrill, IV = loud with thrill, V = heard with stethoscope barely on chest, VI = heard without stethoscope. Grade III+ in a symptomatic client = always report."},

{id:245,mod:2,type:"mcq",
stem:"A nurse is assessing a client and performs the Romberg test. The client stands with feet together and eyes open without difficulty but loses balance when eyes are closed. How does the nurse document this finding and what does it suggest?",
opts:["Negative Romberg — the client maintained balance in both positions and the test is normal","Positive Romberg indicating cerebellar dysfunction that persists even when visual input is available","Positive Romberg indicating a proprioceptive or vestibular deficit — the client uses vision to compensate","Indeterminate result — repeat the test with the client seated before drawing any conclusions"],
ans:2,
why:["The client lost balance with eyes closed = positive Romberg — not negative.","Positive Romberg with eyes OPEN would suggest cerebellar pathology (cannot compensate with vision). This client was stable with eyes open = the cerebellum is intact.","✓ Brunner Ch. 60: 'Romberg test: inability to maintain position for 20 seconds is a positive test.' Stable with eyes open but falls with eyes closed = uses vision to compensate for proprioceptive/vestibular loss. This is a positive Romberg indicating proprioceptive or vestibular deficit.","The standing Romberg is the standard form — no need to repeat seated."],
rat:"Romberg interpretation: Eyes open stable + eyes closed UNSTABLE = positive Romberg → proprioceptive deficit (e.g., vitamin B12 deficiency, peripheral neuropathy) or vestibular disorder. Eyes open ALSO unstable = cerebellar problem (cannot use vision to compensate). Normal = stable in both positions for ≥20 seconds.",
pearl:"Report positive Romberg findings with: specific observation ('client swayed and stepped to the left when eyes were closed'), duration maintained, whether support was needed. Positive Romberg = fall risk → implement fall precautions, bed alarm, non-skid footwear, and notify provider."},

// ── MODULE 3: IV Therapy & Safety (5 Qs) ──

{id:246,mod:3,type:"mcq",
stem:"A client is receiving a continuous norepinephrine infusion via a peripheral IV. The pump alarms with high occlusion pressure, and the surrounding tissue is cool and pale. Which action does the nurse take FIRST?",
opts:["Increase the pump pressure limit setting to silence the alarm and reassess the site in 30 minutes","Flush the line with 10 mL of normal saline to restore flow through the catheter","Stop the infusion immediately — norepinephrine is a vesicant and this presentation indicates extravasation","Reduce the infusion to 50 percent of the ordered rate and continue to monitor closely"],
ans:2,
why:["Increasing the pump pressure limit forces vesicant into the extravasated tissue — dangerous.","Flushing would force more norepinephrine into the tissue — dangerous.","✓ Norepinephrine is a vesicant (IV lecture). Cool, pale limb + high pressure alarm = extravasation. STOP immediately. Maintain IV access (for antidote — phentolamine). Notify pharmacy and provider. Do not remove catheter until antidote is administered through it.","Slowing a vesicant infusion that is extravasating still causes tissue necrosis — stop it."],
rat:"IV lecture vesicant list: catecholamines including norepinephrine (Levophed), dopamine, epinephrine. ANY vesicant extravasation = Grade 4. Treatment: STOP → notify pharmacy (phentolamine antidote) → notify provider → do not remove catheter → photograph → document. Also: norepinephrine should ideally run via central line — antecubital site is high-risk.",
pearl:"Antecubital fossa is a high-risk site for vasopressor infusions because: (1) IV is often positional and kinks with arm movement, (2) pump alarms frequently, (3) extravasation risk is high. Best practice: vasopressors via central venous access. If only peripheral access, use a large-bore IV in a large proximal vein with frequent assessment."},

{id:247,mod:3,type:"mcq",
stem:"A nurse is preparing to discontinue a client's peripheral IV. After removing the catheter, the nurse notes the catheter tip appears to be missing — the catheter is shorter than expected. Which action does the nurse take FIRST?",
opts:["Apply a bandage to the site and document the finding in the chart for the next shift to follow up","Apply a tourniquet proximal to the insertion site, notify the provider immediately, and prepare for imaging","Massage the insertion site firmly to encourage the fragment to move toward the venipuncture point","Flush the vein with normal saline in an attempt to retrieve the catheter fragment"],
ans:1,
why:["Bandaging without acting on a potential catheter embolism is dangerous.","✓ Suspected catheter embolism: apply tourniquet PROXIMAL to the site (to slow the fragment's travel toward central circulation), notify provider immediately, do not remove tourniquet, prepare for X-ray/fluoroscopy to locate the radiopaque fragment. This is a medical emergency.","Massaging may dislodge the fragment and accelerate its migration — contraindicated.","Flushing into a vein with a missing catheter tip could drive the fragment further — contraindicated."],
rat:"Catheter embolism: if the catheter tip is not intact after removal, assume a fragment has entered the venous system. Radiopaque IV catheters can be located by X-ray. The fragment can travel to the heart or pulmonary vasculature — potentially fatal. Immediate tourniquet + notification + imaging is the emergency response.",
pearl:"Prevention: inspect the catheter BEFORE and AFTER removal. Never use scissors near IV tubing or catheters. Always remove the needle and catheter as a unit — never reinsert a needle into the catheter. Document catheter tip intactness after removal: 'Catheter removed intact, tip visualized and confirmed.'"},

{id:248,mod:3,type:"mcq",
stem:"A nurse receives an order to administer ceftriaxone 1 g IV piggyback over 30 minutes. The client has a primary line of D5W running at 75 mL/hr. Before hanging the ceftriaxone, the nurse checks compatibility and finds ceftriaxone is incompatible with calcium-containing solutions. Which action is CORRECT?",
opts:["Hang the ceftriaxone into the existing D5W line — dextrose does not contain calcium and is compatible","Stop the D5W, flush the line with normal saline before and after the ceftriaxone infusion, then resume D5W","Administer ceftriaxone as a rapid IV push over 5 minutes to avoid compatibility concerns altogether","Mix the ceftriaxone directly into the D5W bag and administer as a combined infusion"],
ans:1,
why:["This option is nearly correct — D5W does not contain calcium, so ceftriaxone is compatible with D5W. HOWEVER, if the client is a neonate, ceftriaxone is contraindicated with ANY calcium-containing solution (including calcium gluconate given at a different time). For adult clients without concurrent calcium, piggybacking into D5W is acceptable.","✓ For a client where there is uncertainty, or if calcium-containing solutions have been running through the tubing (LR, calcium gluconate), flushing with NS between infusions is the safest practice. This is also required in neonates where ceftriaxone-calcium interaction can cause fatal precipitates.","IV push ceftriaxone concentrations are too high for peripheral veins and cause phlebitis — not appropriate.","Mixing incompatible drugs into one bag risks precipitation and drug inactivation."],
rat:"Ceftriaxone-calcium interaction: in neonates, concurrent administration with calcium-containing solutions (IV or enteral) can cause fatal calcium-ceftriaxone precipitates in the lungs and kidneys. In adults, the risk is lower but NS flushing between incompatible solutions is always the safest practice.",
pearl:"Compatibility rule: when uncertain about drug compatibility, always separate with a NS flush (minimum 10–20 mL) before and after the incompatible drug. Call pharmacy for any compatibility questions — pharmacists are the drug-drug compatibility experts. Document the flush in your medication administration record."},

{id:249,mod:3,type:"mcq",
stem:"A nurse is preparing to start a peripheral IV on a client who has bilateral mastectomies and a dialysis fistula in the left arm. Which site is MOST appropriate?",
opts:["Left antecubital fossa — the largest vein accessible on the affected side of the body","Right dorsal hand — contralateral to the fistula arm and away from lymphedema risk","Left forearm — acceptable because it avoids the fistula site itself on that arm","Dorsal foot vein — appropriate because all arm sites are contraindicated in this client"],
ans:1,
why:["Left arm = AV fistula arm — absolutely contraindicated for any IV access, blood draw, or BP measurement.","✓ Right side is the non-fistula arm. After bilateral mastectomy, both arms carry lymphedema risk, but the right side is preferable as it does not have the fistula. Right dorsal hand = small distal vein, avoids AC fossa, appropriate choice in this complex situation.","Left arm = fistula arm — contraindicated entirely.","Foot veins are avoided in adults due to high DVT risk except as a last resort — with bilateral mastectomy and a fistula, the right hand/forearm should be attempted first."],
rat:"Site avoidance priority: AV fistula arm = absolute contraindication (entire arm). Mastectomy-side arm = lymphedema risk (avoid when possible). With bilateral mastectomy + left fistula: right arm is the only viable option. Choose the most distal appropriate site on the right side first.",
pearl:"When all standard sites are compromised, document why each site was avoided, which site was selected, and the rationale. Involve the provider in decisions about unusual access sites. Consider requesting a PICC or midline through interventional radiology when peripheral access is repeatedly difficult or contraindicated."},

{id:250,mod:3,type:"mcq",
stem:"A nurse is hanging a new bag of IV fluids and notices the bag of D5 0.45% NS has visible white floating particles inside. Which action does the nurse take?",
opts:["Shake the bag vigorously to dissolve the particles before hanging","Hang the bag — particles in IV fluid bags are normal and do not affect the client","Return the bag to the pharmacy, obtain a new bag, and document the finding","Filter the fluid through the IV tubing filter and proceed with the infusion"],
ans:2,
why:["Shaking does not dissolve particulate contamination — and shaking does not make a contaminated bag safe.","Visible particulate matter in IV fluids is NEVER normal — it indicates contamination, precipitation, or degradation.","✓ Any IV bag with visible particulate matter, cloudiness, discoloration, or damage must be RETURNED to the pharmacy unused. Obtain a replacement bag. Document the finding including lot number. This is a medication safety and infection control standard.","Standard IV tubing filters (0.22 micron) catch some particles but are not a substitute for a sterile, uncontaminated bag. Do not administer a visibly contaminated bag."],
rat:"IV fluid inspection before hanging (safety standard): check expiration date, bag integrity (no leaks, cracks), solution clarity (no cloudiness, discoloration, particulates), additive label accuracy. Any abnormality = do not hang, return to pharmacy, document lot number and issue for pharmacovigilance.",
pearl:"The nurse is the last safety checkpoint before any medication or IV fluid reaches the patient. 'When in doubt, throw it out' — returning a suspicious IV bag to pharmacy costs nothing. Administering a contaminated IV fluid can cause septicemia. Document the returned bag with lot number so the pharmacy can investigate and report if needed."}

// ── CRANIAL NERVE QUESTIONS (IDs 251–265) — sourced from Cranial_Nerves.pptx ──

{id:251,mod:2,type:"mcq",
stem:"A nurse is assessing a client following a stroke. The client cannot identify the smell of coffee when it is held under each nostril with eyes closed. Which cranial nerve is most likely affected?",
opts:["CN II (Optic)","CN I (Olfactory)","CN V (Trigeminal)","CN VII (Facial)"],
ans:1,
why:["CN II is the optic nerve — it transmits visual information, not smell.","✓ CN I (Olfactory) is the sensory nerve responsible for the sense of smell. Testing involves asking the client to identify familiar scents with eyes closed, one nostril at a time. Loss of smell (anosmia) indicates CN I damage.","CN V (Trigeminal) provides facial sensation and controls chewing — not smell.","CN VII (Facial) controls facial expression and conveys taste from the anterior 2/3 of the tongue — not smell."],
rat:"Cranial Nerves PPTX: CN I (Olfactory) — sensory nerve originating from the cerebrum. Assesses the sense of smell. Tested by having the client identify familiar odors (coffee, vanilla) with one nostril occluded and eyes closed. Anosmia (loss of smell) may indicate frontal lobe injury, olfactory groove meningioma, or head trauma.",
pearl:"Mnemonic from the PPTX: 'Oh Oh Oh To Touch And Feel Very Green Vegetables AH!' = Olfactory, Optic, Oculomotor, Trochlear, Trigeminal, Abducens, Facial, Vestibulocochlear, Glossopharyngeal, Vagus, Accessory, Hypoglossal (CN I–XII)."},

{id:252,mod:2,type:"mcq",
stem:"A nurse is performing a visual acuity assessment and testing peripheral vision using confrontation. Which cranial nerve is being evaluated?",
opts:["CN I (Olfactory)","CN III (Oculomotor)","CN II (Optic)","CN IV (Trochlear)"],
ans:2,
why:["CN I is the olfactory nerve — it assesses smell, not vision.","CN III controls eye movement and pupil dilation — not visual acuity or peripheral vision.","✓ CN II (Optic) transmits visual information from the retina to the brain. Assessment includes visual acuity (Snellen chart) and peripheral vision (confrontation testing). The PPTX states: 'Transmits visual information from the retina to the brain. Tests peripheral vision and visual acuity.'","CN IV (Trochlear) innervates the superior oblique muscle controlling downward/inward eye movement — not visual acuity."],
rat:"Cranial Nerves PPTX: CN II (Optic) — sensory nerve originating from the cerebrum (along with CN I, the only two cranial nerves that do not emerge from the brainstem). Functions: transmits visual information from retina to brain. Assessment: visual acuity testing, peripheral vision by confrontation, visual field testing.",
pearl:"CN II clinical significance: damage causes visual field defects (hemianopia, scotomas), vision loss, or blindness depending on the location of injury. Papilledema (optic disc swelling from increased ICP) is assessed by examining CN II during fundoscopic exam — a key finding in elevated ICP."},

{id:253,mod:2,type:"mcq",
stem:"A nurse performs a cranial nerve assessment and shines a penlight into a client's eye. The nurse observes that the pupil constricts directly and the opposite pupil also constricts consensually. Which cranial nerve controls these responses?",
opts:["CN II only provides the afferent signal and is the only nerve involved in the full reflex arc","CN III only provides the efferent signal and is the only nerve required for the full reflex arc","Both CN II (afferent light detection) and CN III (efferent pupil constriction) are required","CN VI controls lateral gaze and is responsible for coordinating the bilateral pupil response"],
ans:2,
why:["CN II carries the afferent (sensory) signal from the retina — necessary but not sufficient alone for pupil constriction.","CN III carries the efferent (motor) signal causing pupil constriction — necessary but not sufficient alone.","✓ PPTX notes on CN III: 'Visceral Motor function is pupil dilation (and constriction).' The complete pupillary light reflex requires: CN II (afferent — detects light) → midbrain → CN III (efferent — constricts pupil). Both must be intact for a normal response.","CN VI controls lateral gaze via the lateral rectus muscle — it has no role in pupillary response."],
rat:"Cranial Nerves PPTX: CN III (Oculomotor) modality is 'Somatic Motor (eye movement) and Visceral Motor (pupil dilation/constriction).' Innervates the majority of extra-ocular muscles and controls the upper eyelid. Damage: ptosis (drooping eyelid), fixed dilated pupil, eye deviated down and out.",
pearl:"A fixed dilated pupil ('blown pupil') = CN III compression — classically from uncal herniation compressing CN III against the tentorial edge as ICP rises. This is why post-craniotomy pupil checks are critical. A unilateral fixed dilated pupil = neurosurgical emergency."},

{id:254,mod:2,type:"mcq",
stem:"A client reports difficulty looking downward and inward with one eye, particularly when descending stairs. Which cranial nerve deficit does the nurse suspect?",
opts:["CN III damage — the eye deviates down and out with associated ptosis and pupil dilation","CN VI damage — the eye is pulled medially toward the midline and cannot move outward","CN IV damage — the superior oblique is weakened, causing difficulty with downward inward gaze","CN II damage — this is a purely sensory nerve with no role in controlling eye movement"],
ans:2,
why:["CN III damage causes the eye to deviate down and OUT (not inward) and causes ptosis and pupil dilation.","CN VI damage causes failure of outward gaze (lateral rectus) — the eye is pulled medially, causing diplopia on lateral gaze, not difficulty looking down stairs.","✓ PPTX notes: 'CN IV Trochlear — innervates the Superior Oblique muscle.' The superior oblique depresses and internally rotates the eye. Damage causes vertical diplopia worse on downward gaze — clients describe difficulty walking down stairs or reading.","CN II is purely sensory — it does not control eye movement."],
rat:"Cranial Nerves PPTX: CN IV (Trochlear) — motor nerve innervating the superior oblique muscle. This muscle moves the eye downward and inward. CN IV palsy: vertical diplopia, head tilt (away from the affected side to compensate). Difficulty with stairs and reading are hallmark complaints because these tasks require downward gaze.",
pearl:"CN IV has the longest intracranial course of all cranial nerves — making it vulnerable to trauma. Head tilt is the classic compensatory posture: the client tilts their head away from the affected side to reduce the vertical diplopia from superior oblique weakness."},

{id:255,mod:2,type:"mcq",
stem:"A nurse is assessing a client who had facial trauma. The client reports numbness of the face and weakness when chewing. Which cranial nerve is most likely involved?",
opts:["CN VII (Facial) — controls the muscles of facial expression and taste from the anterior tongue","CN V (Trigeminal) — provides facial sensation and controls the muscles of chewing","CN IX (Glossopharyngeal) — provides taste to the posterior tongue and the gag reflex afferent limb","CN XII (Hypoglossal) — controls tongue movement and would cause deviation on protrusion"],
ans:1,
why:["CN VII controls facial expression muscles and conveys taste from the anterior 2/3 of the tongue — it does not provide facial sensation or control chewing.","✓ PPTX notes: 'CN V (Trigeminal) is responsible for sensation in the face and motor functions such as biting and chewing; it is the largest of the cranial nerves.' This client has both sensory (numbness) AND motor (chewing weakness) deficits — a mixed nerve presentation.","CN IX provides sensory innervation to the posterior throat and taste to the posterior 1/3 of the tongue — not facial sensation or chewing.","CN XII controls tongue movement — not facial sensation or jaw muscles."],
rat:"Cranial Nerves PPTX: CN V (Trigeminal) — the largest cranial nerve, mixed (sensory + motor). Three branches: V1 ophthalmic (forehead/scalp), V2 maxillary (cheek/upper lip), V3 mandibular (jaw/lower lip + motor for chewing). Assessment: light touch/pain sensation to face in all three distributions, ask client to clench teeth, assess jaw deviation.",
pearl:"Trigeminal Neuralgia (tic douloureux): severe lancinating facial pain along CN V distribution — one of the most severe pain syndromes. Triggers: light touch, chewing, talking, cold air. Treatment: carbamazepine (first line), gabapentin, surgical decompression (microvascular decompression). Assess pain character and triggers carefully."},

{id:256,mod:2,type:"mcq",
stem:"A nurse is testing a client's eye movements by asking the client to follow a penlight in an 'H' pattern without moving their head. CN III, IV, and VI are all being assessed. A deficit in which nerve would cause the affected eye to be unable to move laterally (outward) and be pulled toward the midline?",
opts:["CN III (Oculomotor)","CN IV (Trochlear)","CN VI (Abducens)","CN II (Optic)"],
ans:2,
why:["CN III damage causes the eye to deviate DOWN and OUT (ptosis, dilated pupil) — the eye cannot move up, inward, or the eyelid droops.","CN IV damage causes inability to move the eye downward and inward — vertical diplopia, worse on downgaze.","✓ PPTX notes: 'CN VI (Abducens) controls the movement of the lateral rectus, responsible for outward gaze. Damage to the peripheral part of the abducens nerve will cause double vision (diplopia). The affected eye is pulled to look towards the midline.' The lateral rectus is the only muscle CN VI innervates.","CN II is purely sensory — no motor function over eye movement."],
rat:"Cranial Nerves PPTX CN VI (Abducens): lateral rectus only. Damage = eye pulled medially (midline) by the unopposed medial rectus. Clinical presentation: horizontal diplopia worse on lateral gaze toward the affected side. Compensatory head turn toward the affected side to eliminate the diplopia. Test: 'H' pattern eye tracking.",
pearl:"PPTX note: 'In order to see without double vision, patients will rotate their heads so that both eyes are toward the temple.' This compensatory head turn is a clinical clue to CN VI palsy. CN VI is often the first nerve affected by elevated ICP because of its long intracranial course — new CN VI palsy can be a false localizing sign of raised ICP."},

{id:257,mod:2,type:"mcq",
stem:"A client is admitted after a motor vehicle collision. On assessment, the nurse notes facial drooping on the right side, inability to close the right eye completely, and the client reports food collecting in the right cheek while eating. Which condition does the nurse suspect?",
opts:["CN V (Trigeminal) injury — causes facial numbness and jaw weakness but not facial drooping","CN VII (Facial) palsy — the facial nerve controls all muscles of facial expression on that side","CN IX (Glossopharyngeal) injury — causes loss of gag reflex and posterior tongue taste changes","CN XII (Hypoglossal) injury — causes tongue deviation toward the affected side on protrusion"],
ans:1,
why:["CN V injury causes facial numbness and jaw weakness — not facial drooping or inability to close the eye.","✓ PPTX notes on CN VII: 'Motor Damage: Facial Asymmetry — weakness, paralysis, right or left, Bell's Palsy.' CN VII controls all muscles of facial expression. Unilateral weakness: cannot raise eyebrow, cannot close eye, drooping corner of mouth, food pooling in cheek (buccinator weakness). All consistent with CN VII palsy.","CN IX injury causes loss of gag reflex and taste changes in the posterior tongue — not facial drooping or eye closure problems.","CN XII injury causes tongue deviation toward the affected side — not facial drooping."],
rat:"Cranial Nerves PPTX CN VII (Facial): emerges from the brainstem between the pons and medulla. Controls muscles of facial expression. Also conveys taste from anterior 2/3 of tongue. Damage manifestations: Motor = Bell's palsy, facial asymmetry, inability to close eye (corneal exposure risk). Parasympathetic = abnormal tearing or salivation. Sensory = loss of taste anterior 2/3 tongue.",
pearl:"Bell's palsy is the most common cause of unilateral facial nerve palsy — idiopathic CN VII inflammation, often post-viral (HSV-1). Key nursing concern: incomplete eye closure → corneal drying → corneal ulceration. Nursing intervention: artificial tears, eye patch at night, tape eyelid closed. Most cases resolve within weeks to months."},

{id:258,mod:2,type:"mcq",
stem:"A client reports new onset of vertigo and hearing loss after an upper respiratory infection. Which cranial nerve assessment finding is most consistent with this presentation?",
opts:["Inability to identify familiar scents with eyes closed — a deficit of CN I (Olfactory)","Diplopia on lateral gaze only — a deficit of CN VI (Abducens) from lateral rectus weakness","Impaired whisper test and loss of balance with eyes closed — consistent with CN VIII deficit","Absent gag reflex on the affected side — a deficit involving CN IX and CN X"],
ans:2,
why:["Anosmia (CN I) is unrelated to vertigo or hearing loss.","CN VI palsy causes diplopia, not vertigo or hearing loss.","✓ PPTX: 'CN VIII (Vestibulocochlear) transmits sound and equilibrium (balance) information from the inner ear to the brain.' CN VIII has two components: cochlear (hearing) and vestibular (balance/equilibrium). Post-viral CN VIII damage = sensorineural hearing loss + vertigo = classic presentation.","CN IX deficit causes loss of gag reflex and taste changes — not hearing loss or vertigo."],
rat:"Cranial Nerves PPTX CN VIII (Vestibulocochlear): transmits sound AND equilibrium information from inner ear to brain. Two branches: cochlear (hearing) and vestibular (balance). Assessment: whisper test, Weber/Rinne test (tuning fork), Romberg test (vestibular component). Damage: sensorineural hearing loss, vertigo, tinnitus, nystagmus.",
pearl:"Vestibular neuritis vs. BPPV: vestibular neuritis = sustained vertigo (days) from CN VIII inflammation, often post-viral. BPPV (benign paroxysmal positional vertigo) = brief positional vertigo from displaced otoconia. Nursing: fall prevention is critical for both — implement fall precautions, monitor ambulation, educate about position changes."},

{id:259,mod:2,type:"mcq",
stem:"A nurse prepares to assess the gag reflex by pressing a tongue depressor against the posterior pharyngeal wall. The client has no gag response. Which cranial nerves are involved in the gag reflex, and what is the nursing priority?",
opts:["CN V and VII — facial sensation and expression; priority is pain assessment","CN IX and X — glossopharyngeal (afferent) and vagus (efferent); priority is aspiration precautions","CN XI and XII — accessory and hypoglossal; priority is monitoring shoulder strength","CN I and II — olfactory and optic; no immediate safety concern"],
ans:1,
why:["CN V and VII are not part of the gag reflex pathway.","✓ PPTX: CN IX (Glossopharyngeal) is the afferent limb of the gag reflex — it senses the stimulus. CN X (Vagus) is the efferent limb — it causes the motor response (pharyngeal contraction). Loss of gag reflex = risk of aspiration. Priority: aspiration precautions, NPO until swallowing assessment, elevate HOB.","CN XI and XII are not part of the gag reflex pathway.","CN I and II are not involved in the gag reflex."],
rat:"Cranial Nerves PPTX CN IX and X: CN IX senses the pharyngeal wall stimulus (afferent). CN X responds with pharyngeal muscle contraction (efferent). PPTX notes they are 'often combined because they exit from the brainstem side-by-side and have similar and overlapping distributions.' Absent gag reflex = impaired airway protection → aspiration risk.",
pearl:"An absent gag reflex does not always mean the client cannot swallow safely — the gag reflex and swallowing are separate processes. However, absent gag in a neurologically impaired client is a red flag. Perform a formal swallowing evaluation (bedside swallow screen first, then speech-language pathology referral) before any oral intake."},

{id:260,mod:2,type:"mcq",
stem:"A nurse is assessing a client following a neck dissection for cancer. The nurse asks the client to shrug both shoulders against resistance and turn the head side to side. The client cannot shrug the right shoulder and has weakened head turning to the left. Which cranial nerve deficit does this indicate?",
opts:["CN X (Vagus) — controls vocal cord movement, swallowing, and autonomic function","CN XI (Spinal Accessory) — supplies the sternocleidomastoid and trapezius muscles","CN XII (Hypoglossal) — controls tongue movement and would cause tongue deviation","CN VII (Facial) — controls facial expression and taste from the anterior two-thirds of the tongue"],
ans:1,
why:["CN X damage causes hoarseness, dysphagia, and autonomic dysfunction — not shoulder or neck weakness.","✓ PPTX notes: 'CN XI (Accessory) is a cranial nerve that supplies the sternocleidomastoid and trapezius muscles.' The SCM turns the head to the OPPOSITE side; the trapezius shrugs the shoulder. Neck dissection commonly injures CN XI — causing ipsilateral shoulder drop and contralateral head-turning weakness.","CN XII damage causes tongue deviation — not shoulder or neck weakness.","CN VII damage causes facial asymmetry — not shoulder weakness."],
rat:"Cranial Nerves PPTX CN XI (Spinal Accessory) — purely motor nerve. Muscles: SCM (turns head contralaterally) and trapezius (shrugs shoulder, stabilizes scapula). Assessment: 'Shrug both shoulders against resistance' and 'Turn head to each side against resistance.' Damage: ipsilateral shoulder drop, scapular winging, neck turning weakness.",
pearl:"CN XI is at risk during posterior triangle neck dissections, lymph node biopsies, and central line insertion in the posterior triangle. Iatrogenic CN XI injury is a known complication of neck procedures. Post-neck dissection nursing assessment always includes CN XI: shoulder shrug strength and head rotation against resistance."},

{id:261,mod:2,type:"mcq",
stem:"A nurse asks a client to stick out their tongue. The tongue deviates to the right side. Which interpretation is correct?",
opts:["This is a normal finding — slight tongue deviation is common","CN XII (Hypoglossal) damage on the RIGHT side — the tongue deviates toward the side of the lesion","CN XII (Hypoglossal) damage on the LEFT side — the tongue deviates away from the lesion","CN IX (Glossopharyngeal) damage — causing unilateral taste loss and tongue deviation"],
ans:1,
why:["Tongue deviation on protrusion is always abnormal and indicates CN XII pathology.","✓ PPTX: 'CN XII (Hypoglossal) provides motor control of the extrinsic muscles of the tongue.' When CN XII is damaged on one side, the tongue muscles on that side are weakened — the intact side pushes the tongue toward the affected (weakened) side. Tongue deviates TOWARD the lesion.","The tongue deviates TOWARD the side of the lesion (not away). Left-side damage would deviate the tongue to the LEFT.","CN IX affects taste on the posterior tongue and the gag reflex — not tongue protrusion direction."],
rat:"Cranial Nerves PPTX CN XII (Hypoglossal) — purely motor, controls extrinsic tongue muscles. Assessment: protrude tongue, move side to side, assess for deviation, atrophy, fasciculations. Key rule: tongue deviates TOWARD the side of the lower motor neuron lesion (the weak side). Central (UMN) lesion: tongue deviates AWAY from the lesion side.",
pearl:"LMN vs. UMN tongue deviation: LMN (CN XII nucleus or nerve) = tongue deviates TOWARD lesion (the weak side wins). UMN (cortical stroke) = tongue deviates AWAY from the lesion (toward the weak side of the body). For UMN: right hemisphere stroke → left hemiplegia → tongue points left. This distinction matters for stroke localization."},

{id:262,mod:2,type:"mcq",
stem:"A client develops a hoarse voice, difficulty swallowing, and deviation of the uvula to the LEFT when saying 'Ahh' after a right-sided neck surgery. Which cranial nerve is most likely injured?",
opts:["CN XI (Accessory) injury — causes ipsilateral shoulder drop and weakness turning the head","CN X (Vagus) on the right side — hoarseness and uvular deviation away from the side of injury","CN XII (Hypoglossal) injury — causes tongue deviation toward the side of the lower motor neuron lesion","CN IX (Glossopharyngeal) alone — controls the afferent limb of the gag reflex only"],

why:["CN XI controls shoulder and neck muscles — not the uvula, voice, or swallowing.","✓ PPTX CN X (Vagus): 'Motor: Provides motor innervation to the majority of the muscles of the pharynx, soft palate and larynx.' Hoarseness (laryngeal muscle), dysphagia (pharyngeal muscle), and uvular deviation toward the intact side = classic CN X (vagus) injury. Right vagus injured → right palate weakens → uvula pulled LEFT by intact left side.","CN XII controls tongue movement — not the uvula or voice.","CN IX alone does not control the uvula or larynx. The efferent limb of the gag reflex is CN X."],
rat:"Cranial Nerves PPTX CN X (Vagus) — the most widespread cranial nerve. Motor innervation to pharynx, soft palate, and larynx. Parasympathetic to heart, trachea, bronchi, and GI tract. Sensory to laryngopharynx and viscera. Clinical deficits: hoarseness, dysphagia, uvular deviation away from injured side, autonomic dysfunction. CN IX and X tested together (gag reflex, 'Ahh' test).",
pearl:"Uvular deviation rule: uvula deviates AWAY from the damaged CN X (toward the intact side that is still pulling). Right CN X injury → uvula points left. This is opposite to tongue deviation (tongue deviates toward the injury). Assess both tongue protrusion (CN XII) and uvular deviation (CN X) simultaneously in any client with dysphagia or suspected brainstem pathology."},

rat:"Cranial Nerves PPTX sensory vs. motor classification: Purely sensory = CN I, II, VIII. Purely motor = CN III, IV, VI, XI, XII. Mixed (sensory + motor) = CN V, VII, IX, X. Mnemonic: 'Some Say Marry Money But My Brother Says Big Brains Matter More' = Sensory, Sensory, Motor, Motor, Both, Motor, Both, Sensory, Both, Both, Motor, Motor.",

// ── BOWTIE RENDERER ──
function renderBowtie(q,saved){
  const sections=[
    {key:'condition',label:'Most Likely Condition',limit:'Select 1',multi:false},
    {key:'actions',label:'Nursing Actions',limit:'Select 2',multi:true},
    {key:'parameters',label:'Parameters to Monitor',limit:'Select 2',multi:true}
  ];
  const arrows=['→','→'];

  let html=`<div class="bowtie-wrap">`;
  // Left col: condition
  const cond=q.condition;
  const condSaved=saved?saved.condition:undefined;
  html+=`<div class="bt-col">
    <h4>Most Likely Condition</h4>
    <div class="bt-section-label">Select 1</div>`;
  cond.opts.forEach((opt,i)=>{
    let cls='bt-opt';
    if(condSaved!==undefined){
      cls+=' dis';
      if(i===cond.ans) cls+=' corr';
      else if(i===condSaved) cls+=' wrng';
    } else {
      if(q._btCond===i) cls+=' bt-sel';
    }
    const onclick=condSaved!==undefined?'':` onclick="btSelect('${q.id}','cond',${i})"`;
    html+=`<div class="${cls}"${onclick}><div class="bt-circ">${'ABCD'[i]}</div><div>${opt}</div></div>`;
  });
  html+=`</div>`;

  // Center bowtie
  html+=`<div class="bt-center">
    <div class="bt-arrow">→</div>
    <div class="bt-box">Bowtie</div>
    <div class="bt-arrow">→</div>
  </div>`;

  // Right col split into actions (top) and parameters (bottom)
  html+=`<div style="display:flex;flex-direction:column;gap:12px">`;
  
  // Actions
  const acts=q.actions;
  const actsSaved=saved?saved.actions:undefined;
  html+=`<div class="bt-col">
    <h4>Nursing Actions</h4>
    <div class="bt-section-label">Select 2</div>`;
  acts.opts.forEach((opt,i)=>{
    let cls='bt-opt';
    if(actsSaved!==undefined){
      cls+=' dis';
      if(acts.ans.includes(i)) cls+=' corr';
      else if(actsSaved.includes(i)) cls+=' wrng';
    } else {
      if((q._btActs||[]).includes(i)) cls+=' bt-sel';
    }
    const onclick=actsSaved!==undefined?'':` onclick="btSelect('${q.id}','acts',${i})"`;
    html+=`<div class="${cls}"${onclick}><div class="bt-circ">${'ABCDE'[i]}</div><div>${opt}</div></div>`;
  });
  html+=`</div>`;

  // Parameters
  const params=q.parameters;
  const paramsSaved=saved?saved.parameters:undefined;
  html+=`<div class="bt-col">
    <h4>Parameters to Monitor</h4>
    <div class="bt-section-label">Select 2</div>`;
  params.opts.forEach((opt,i)=>{
    let cls='bt-opt';
    if(paramsSaved!==undefined){
      cls+=' dis';
      if(params.ans.includes(i)) cls+=' corr';
      else if(paramsSaved.includes(i)) cls+=' wrng';
    } else {
      if((q._btParams||[]).includes(i)) cls+=' bt-sel';
    }
    const onclick=paramsSaved!==undefined?'':` onclick="btSelect('${q.id}','params',${i})"`;
    html+=`<div class="${cls}"${onclick}><div class="bt-circ">${'ABCDE'[i]}</div><div>${opt}</div></div>`;
  });
  html+=`</div></div></div>`;
  return html;
}

function btSelect(qid,section,idx){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;
  if(section==='cond'){
    q._btCond=idx;
  } else if(section==='acts'){
    q._btActs=q._btActs||[];
    const pos=q._btActs.indexOf(idx);
    if(pos>-1) q._btActs.splice(pos,1);
    else if(q._btActs.length<2) q._btActs.push(idx);
  } else {
    q._btParams=q._btParams||[];
    const pos=q._btParams.indexOf(idx);
    if(pos>-1) q._btParams.splice(pos,1);
    else if(q._btParams.length<2) q._btParams.push(idx);
  }
  renderQ();
}

function submitBowtie(qid){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;
  if(q._btCond===undefined){alert('Please select a condition.');return;}
  if((q._btActs||[]).length!==2){alert('Please select exactly 2 nursing actions.');return;}
  if((q._btParams||[]).length!==2){alert('Please select exactly 2 monitoring parameters.');return;}

  // Score: 1 pt condition, 1 pt each correct action (max 2), 1 pt each correct param (max 2) = 5 pts total
  let score=0;
  if(q._btCond===q.condition.ans) score++;
  (q._btActs||[]).forEach(i=>{if(q.actions.ans.includes(i)) score++;});
  (q._btParams||[]).forEach(i=>{if(q.parameters.ans.includes(i)) score++;});

  const answer={condition:q._btCond,actions:[...q._btActs],parameters:[...q._btParams],score};
  state.answers[q.id]=answer;

  // Wrong bank: add if score < 5
  if(score<5){
    state.wrongBank[q.id]=true;
    updateWrongSec();
  }
  renderQ();
}

// ── HOTSPOT RENDERER ──
function renderHotspot(q,saved){
  let html=`<div class="hs-instr">💡 Click to highlight all findings that are critical / require immediate action. Select all that apply.</div>`;
  q.findings.forEach((f,i)=>{
    let cls='hs-finding';
    const isSel=(q._hsSelected||[]).includes(i);
    if(saved!==undefined){
      cls+=' dis';
      if(q.ans.includes(i)) cls+=' corr';
      else if(isSel) cls+=' wrng';
    } else {
      if(isSel) cls+=' hs-sel';
    }
    const onclick=saved!==undefined?'':` onclick="hsToggle('${q.id}',${i})"`;
    const check=saved!==undefined?(q.ans.includes(i)?'✓':(isSel?'✗':'')):(isSel?'✓':'');
    html+=`<div class="${cls}"${onclick}>
      <div class="hs-check">${check}</div>
      <div>${f.text}</div>
    </div>`;
  });
  return html;
}

function hsToggle(qid,idx){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;
  q._hsSelected=q._hsSelected||[];
  const pos=q._hsSelected.indexOf(idx);
  if(pos>-1) q._hsSelected.splice(pos,1);
  else q._hsSelected.push(idx);
  renderQ();
}

function submitHotspot(qid){
  const q=state.exam.find(x=>x.id==qid);
  if(!q) return;
  if((q._hsSelected||[]).length===0){alert('Please highlight at least one finding.');return;}
  
  const selected=q._hsSelected||[];
  // Score: correct selections / total correct answers (partial credit)
  const correctSelected=selected.filter(i=>q.ans.includes(i)).length;
  const wrongSelected=selected.filter(i=>!q.ans.includes(i)).length;
  const score=Math.max(0,correctSelected-wrongSelected);
  const perfect=(correctSelected===q.ans.length && wrongSelected===0);
  
  state.answers[q.id]={selected:[...selected],score,perfect};
  if(!perfect){
    state.wrongBank[q.id]=true;
    updateWrongSec();
  }
  renderQ();
}

{id:266,mod:1,type:"bowtie",stem:"A hospice nurse is caring for a 74-year-old client with end-stage heart failure. The client has a resting SpO2 of 84%, is using accessory muscles to breathe, has Cheyne-Stokes respirations, cool mottled extremities, and has not responded to verbal stimuli for the past 2 hours. The family is at the bedside, visibly distressed, asking 'Is she dying?'",condition:{opts:["Acute decompensated heart failure requiring aggressive diuresis","Active dying process — client is in the final hours of life","Hypoxic respiratory failure requiring intubation","Sepsis from an unidentified source requiring blood cultures"],ans:1},actions:{opts:["Initiate a rapid response and transfer to the ICU","Provide honest compassionate information to the family about the signs of active dying","Ensure comfort measures are in place — reposition mouth care reduce stimulation","Draw blood cultures and start broad-spectrum IV antibiotics","Call the provider to initiate IV fluid resuscitation"],ans:[1,2]},parameters:{opts:["Serial serum lactate levels every 4 hours","Comfort and absence of signs of distress — facial grimacing restlessness labored breathing","Urine output via indwelling catheter every hour","Family understanding coping and need for additional support","Daily weight and strict fluid balance"],ans:[1,3]},rat:"Cheyne-Stokes respirations, mottled extremities, unresponsiveness, and SpO2 of 84% are classic signs of the active dying process in hospice. The nursing priority is comfort (not resuscitation), honest family communication, and emotional support. Monitoring focuses on absence of distress and family wellbeing.",pearl:"Active dying signs from Chapter 44: Cheyne-Stokes or irregular respirations, mottling/cyanosis of extremities, unresponsiveness, cooling skin, decreased urine output, loss of reflexes. Family education is a core nursing intervention — normalize the process and use therapeutic presence."},
{id:267,mod:1,type:"bowtie",stem:"A nurse is performing a health assessment on Mr. James, a 58-year-old construction worker. The nurse notices he is diaphoretic upon walking to the exam room. His BP is 168/96, SpO2 is 92% on room air, and he mentions he has been short of breath for 'a few months.' He works with asbestos and has not seen a doctor in 8 years. He lives alone and cannot afford medications.",condition:{opts:["Acute MI requiring immediate catheterization lab activation","Complex multi-system presentation with likely cardiac and pulmonary components compounded by SDOH barriers","Anxiety disorder causing somatic symptoms and elevated blood pressure","Occupational asthma requiring immediate bronchodilator therapy"],ans:1},actions:{opts:["Dismiss the client after recording vitals and schedule a follow-up in 6 months","Perform a comprehensive assessment including cardiac respiratory and social history","Order an ECG chest X-ray and oxygen therapy; involve social work for SDOH barriers","Prescribe antihypertensives immediately without further assessment","Focus only on the blood pressure and defer all other concerns to a specialist"],ans:[1,2]},parameters:{opts:["Daily serum potassium levels","Response to interventions — vital signs SpO2 symptom improvement","Client understanding of diagnosis and follow-through with referrals","Number of specialty referrals generated per visit","Client BMI at each visit"],ans:[1,2]},rat:"This is the Mr. James case from the Tanner's Model PPTX. The nurse applies all 4 steps: Noticing (diaphoresis, vitals, SDOH), Interpreting (multi-system + social complexity), Responding (comprehensive assessment + social work + diagnostics), Reflecting (team huddle). SDOH barriers require interdisciplinary response.",pearl:"Tanner's Responding step = advocacy + collaborative goal-setting. The nurse does not just treat the BP — they address the whole person including occupational exposure, access to care, and social determinants. This is person-centered holistic advanced health assessment."},
{id:268,mod:2,type:"bowtie",stem:"A nurse is monitoring a post-operative client on a cardiac telemetry unit 6 hours after abdominal surgery. The monitor shows: rate 156 bpm, regular rhythm, narrow QRS complexes, P waves not clearly visible. BP is 88/54 mmHg. The client is diaphoretic and reports chest tightness. The previous rhythm was normal sinus rhythm at 78 bpm.",condition:{opts:["Sinus tachycardia from post-operative pain — treat with analgesia","Atrial fibrillation with rapid ventricular response","Supraventricular tachycardia (SVT) with hemodynamic instability","Ventricular tachycardia with a pulse"],ans:2},actions:{opts:["Administer adenosine 6 mg IV and await resolution before notifying anyone","Call the provider immediately and prepare for synchronized cardioversion","Obtain a 12-lead ECG and establish IV access if not already present","Administer metoprolol 5 mg IV push without further assessment","Increase IV fluid rate to 200 mL/hr to treat hypotension"],ans:[1,2]},parameters:{opts:["Urine output — target greater than 30 mL/hr","Continuous cardiac rhythm — watch for conversion or deterioration","Blood pressure and level of consciousness — indicators of hemodynamic status","Daily serum digoxin level","Bowel sounds every 4 hours"],ans:[1,2]},rat:"SVT with HR 156, BP 88/54, diaphoresis, and chest tightness = hemodynamically UNSTABLE tachyarrhythmia. Priority: notify provider + prepare for synchronized cardioversion. Obtain 12-lead ECG to confirm while preparing. Stable SVT = vagal maneuvers then adenosine. Unstable = cardiovert.",pearl:"SVT: narrow complex, regular, 150-250 bpm, P waves hidden in T waves. Hemodynamic instability (hypotension, chest pain, altered LOC) = synchronized cardioversion. Always confirm SYNC mode is on. Stable SVT: vagal first, then adenosine 6mg rapid IV push with 20mL flush."},
{id:269,mod:2,type:"bowtie",stem:"A nurse is performing a neurological assessment on a client 12 hours after a craniotomy for a subdural hematoma. The client's GCS has declined from 14 to 9 over the past 2 hours. The right pupil is 5mm and sluggish; the left pupil is 3mm and brisk. BP is 172/58 (widened pulse pressure), HR 48 bpm, respirations are irregular at 6/min.",condition:{opts:["Post-operative pain causing sympathetic stimulation","Transtentorial (uncal) herniation from increasing intracranial pressure","Expected post-craniotomy neurological changes — continue routine monitoring","Hypertensive urgency unrelated to the surgical procedure"],ans:1},actions:{opts:["Administer a PRN analgesic and reassess in 30 minutes","Immediately notify the provider and neurosurgery team","Prepare for airway management — position HOB 30 degrees ensure suction available","Administer mannitol or hypertonic saline per protocol if ordered","Continue current monitoring frequency — changes are expected post-operatively"],ans:[1,2]},parameters:{opts:["Pupillary response and GCS every 15 minutes or continuously","Temperature every 4 hours","Blood pressure and heart rate — trending Cushing's triad","Bowel sounds every 8 hours","Serum sodium levels daily"],ans:[0,2]},rat:"Declining GCS + unequal pupils (right CN III compression) + Cushing's triad (HTN + bradycardia + irregular respirations) = uncal herniation from rising ICP. This is a neurosurgical emergency. Immediate provider notification + airway preparation are simultaneous priorities.",pearl:"Cushing's triad = LATE sign of catastrophic ICP: widened pulse pressure + bradycardia + irregular respirations. Act on EARLY signs: restlessness, confusion, unilateral pupil change. By the time Cushing's triad appears, herniation is occurring. Every minute matters."},
{id:270,mod:3,type:"bowtie",stem:"A nurse is caring for a client receiving dopamine 8 mcg/kg/min via a peripheral 20-gauge IV in the right forearm. The client reports burning at the site. Assessment reveals: surrounding tissue is cool and pale from wrist to mid-forearm, no swelling yet, pump alarming with high occlusion pressure. BP is 82/50 and dopamine is the only vasopressor running.",condition:{opts:["Grade 1 phlebitis — erythema from chemical irritation of the vein","Dopamine extravasation — vesicant leaking into surrounding tissue","Peripheral venous spasm — treat with warm compresses and continue infusion","Catheter occlusion — flush with 10 mL normal saline to restore flow"],ans:1},actions:{opts:["Flush the IV with normal saline to confirm patency before stopping","Stop the dopamine infusion immediately and keep the catheter in place","Notify the provider and pharmacy — anticipate phentolamine antidote order","Increase the infusion rate to compensate for the interrupted dose","Apply warm compresses and continue dopamine at a reduced rate"],ans:[1,2]},parameters:{opts:["The affected tissue — monitor for worsening pallor blistering or necrosis","Blood pressure continuously — dopamine was the only vasopressor","IV site temperature and color every 15 minutes after intervention","Urine output every 4 hours","Serum potassium levels every 6 hours"],ans:[0,1]},rat:"Dopamine is a vesicant (catecholamine). Cool pale tissue + burning + high pressure alarm = extravasation. STOP immediately but KEEP catheter for phentolamine delivery. Notify pharmacy + provider. The BP concern is critical — provider will need to establish new access for vasopressor continuation.",pearl:"Vesicant extravasation: STOP → Keep catheter → Notify pharmacy (phentolamine) → Notify provider → Do NOT flush → Do NOT remove catheter until antidote given → Photograph and document. Phentolamine is an alpha-blocker that reverses catecholamine-induced tissue ischemia."}
