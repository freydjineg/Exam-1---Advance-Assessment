<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>NRSG 3333 Exam Bank</title>
<style>
:root{--bg:#f5ede0;--bg2:#ede0cc;--card:#fffaf4;--or:#c2621a;--orl:#e07d35;--ord:#8b3e08;--tx:#2d1a08;--tx2:#5a3a1a;--tx3:#8a6040;--bdr:#d4aa80;--ok:#2d6a2d;--okb:#e8f5e8;--er:#8b1a1a;--erb:#fde8e8;--pt:#7a5500;--ptb:#fff3cd;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.screen{display:none;min-height:100vh;padding:2rem 1rem}.screen.active{display:block}
#home{max-width:700px;margin:0 auto}
.hdr{text-align:center;padding:2rem 0 1.5rem}.hdr .logo{font-size:2.5rem}.hdr h1{font-size:1.9rem;color:var(--ord)}.hdr p{color:var(--tx2);margin-top:.3rem}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:1.5rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(139,62,8,.08)}
.card h2{font-size:1.05rem;color:var(--ord);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--bdr)}
.mrow{display:flex;align-items:center;gap:10px;margin-bottom:.6rem}
.mrow label{flex:1;font-size:.93rem;color:var(--tx2)}
.mrow input[type=number]{width:72px;padding:5px 8px;border:1px solid var(--bdr);border-radius:6px;background:var(--bg);color:var(--tx);font-size:.9rem}
.mbadge{background:var(--or);color:#fff;border-radius:20px;padding:2px 10px;font-size:.75rem;font-weight:700}
.tot{text-align:center;font-size:.95rem;color:var(--tx2);margin:.6rem 0}.tot span{font-weight:700;color:var(--or);font-size:1.15rem}
.btn{display:inline-block;padding:10px 22px;border-radius:8px;border:none;cursor:pointer;font-size:.95rem;font-weight:600;transition:all .15s}
.btn-p{background:var(--or);color:#fff}.btn-p:hover{background:var(--ord)}
.btn-s{background:var(--bg2);color:var(--tx);border:1px solid var(--bdr)}.btn-s:hover{background:var(--bdr)}
.btn-d{background:#c0392b;color:#fff}.btn-d:hover{background:#96281b}
.btn-full{width:100%;text-align:center;padding:13px;font-size:1rem}
.btn-sm{padding:6px 14px;font-size:.83rem}
.wcard{background:linear-gradient(135deg,#fff5ee,#ffe8d0);border:1.5px solid var(--orl);border-radius:var(--r);padding:1.1rem 1.4rem;margin-bottom:1rem;display:flex;align-items:center;justify-content:space-between;gap:1rem}
.wcard .wi{flex:1}.wcard .wi h3{font-size:.97rem;color:var(--ord)}.wcard .wi p{font-size:.83rem;color:var(--tx3);margin-top:2px}
.wcnt{background:var(--er);color:#fff;border-radius:20px;padding:3px 12px;font-size:.83rem;font-weight:700}
#exam-wrap{max-width:860px;margin:0 auto}
.exam-top{display:flex;align-items:center;background:var(--card);border-bottom:1px solid var(--bdr);padding:.85rem 1.4rem;border-radius:var(--r) var(--r) 0 0;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(139,62,8,.07)}
.exam-top h2{font-size:.95rem;color:var(--ord);white-space:nowrap}
.pbwrap{flex:1;margin:0 1rem;height:8px;background:var(--bg2);border-radius:10px;overflow:hidden}
.pb{height:100%;background:var(--or);border-radius:10px;transition:width .3s}
.qcnt{font-size:.85rem;color:var(--tx2);white-space:nowrap}
.scroll{overflow-y:auto;max-height:calc(100vh - 68px);padding:1.2rem}
.qcard{background:var(--card);border:1px solid var(--bdr);border-radius:0 0 var(--r) var(--r);padding:1.8rem;min-height:480px;display:flex;flex-direction:column}
.qbadge{display:inline-block;font-size:.72rem;font-weight:700;padding:2px 9px;border-radius:20px;margin-bottom:.9rem;text-transform:uppercase;letter-spacing:.05em}
.qb-mcq{background:#e8f0fe;color:#1a47a0}.qb-sata{background:#fce8f3;color:#8b1a5a}.qb-fib{background:#e8f5e8;color:#1a6b2d}
.qstem{font-size:1.03rem;line-height:1.65;color:var(--tx);margin-bottom:1.3rem;font-weight:500}
.qmedia{margin-bottom:1.1rem;border-radius:8px;overflow:hidden;border:1px solid var(--bdr);background:var(--bg);padding:.8rem;text-align:center}
.qmedia svg{max-width:100%;height:auto}
.opts{list-style:none;display:flex;flex-direction:column;gap:.55rem;flex:1}
.opt{display:flex;align-items:flex-start;gap:9px;padding:11px 13px;border:1.5px solid var(--bdr);border-radius:9px;cursor:pointer;transition:all .14s;background:var(--bg);position:relative}
.opt:hover:not(.dis){border-color:var(--orl);background:#fff5ee}
.opt.sel{border-color:var(--or);background:#fff5ee}
.opt.corr{border-color:var(--ok);background:var(--okb)}
.opt.wrng{border-color:var(--er);background:var(--erb)}
.opt.dis{cursor:default}
.oltr{width:25px;height:25px;border-radius:50%;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0;color:var(--tx2);background:#fff}
.opt.sel .oltr{background:var(--or);color:#fff;border-color:var(--or)}
.opt.corr .oltr{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt.wrng .oltr{background:var(--er);color:#fff;border-color:var(--er)}
.otxt{font-size:.95rem;line-height:1.5;flex:1;padding-top:2px}
.tooltip{display:none;position:absolute;left:101%;top:50%;transform:translateY(-50%);background:#2d1a08;color:#fff;padding:7px 11px;border-radius:7px;font-size:.79rem;width:210px;z-index:50;line-height:1.4;pointer-events:none}
.opt.dis:hover .tooltip{display:block;}.tooltip::before{content:'';position:absolute;right:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-right-color:#2d1a08}
.opt.wrng:hover .tooltip{display:block}
.sata-hint{font-size:.8rem;color:var(--tx3);margin-bottom:.9rem;font-style:italic}
.fib-wrap{display:flex;flex-direction:column;gap:.7rem;flex:1}
.fib-row{display:flex;align-items:center;gap:9px}
.fib-row label{font-size:.88rem;color:var(--tx2);min-width:90px}
.fib-in{padding:8px 11px;border:1.5px solid var(--bdr);border-radius:7px;font-size:.92rem;background:var(--bg);color:var(--tx);width:240px}
.fib-in.corr{border-color:var(--ok);background:var(--okb)}
.fib-in.wrng{border-color:var(--er);background:var(--erb)}
.fbpanel{margin-top:1.3rem;padding:1.1rem;border-radius:9px;border:1px solid;display:none}
.fbpanel.show{display:block}
.fbpanel.c-fb{background:var(--okb);border-color:var(--ok)}
.fbpanel.w-fb{background:var(--erb);border-color:var(--er)}
.fbpanel.p-fb{background:var(--ptb);border-color:var(--pt)}
.fbtit{font-weight:700;font-size:.97rem;margin-bottom:.45rem}
.c-fb .fbtit{color:var(--ok)}.w-fb .fbtit{color:var(--er)}.p-fb .fbtit{color:var(--pt)}
.fbans{font-size:.89rem;margin-bottom:.4rem;color:var(--tx2)}
.fbrat{font-size:.89rem;line-height:1.6;color:var(--tx);margin-bottom:.55rem}
.fbpearl{font-size:.85rem;background:#fffbe6;border-left:3px solid #e6a817;padding:7px 11px;border-radius:4px;color:#5a4000;line-height:1.5}
.fbpearl::before{content:'💡 NCLEX Pearl: ';font-weight:700}
.navrow{display:flex;align-items:center;justify-content:space-between;margin-top:1.3rem;gap:.8rem}
.navrow .btn{min-width:100px}
#results{max-width:680px;margin:0 auto;text-align:center}
.rcard{background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);padding:2.2rem;box-shadow:0 2px 12px rgba(139,62,8,.1)}
.scirc{width:130px;height:130px;border-radius:50%;border:7px solid var(--or);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.3rem;background:#fff}
.spct{font-size:2.2rem;font-weight:700;color:var(--ord);line-height:1}
.slbl{font-size:.75rem;color:var(--tx3);margin-top:2px}
.rbanner{font-size:1.35rem;font-weight:700;margin-bottom:.4rem}
.rbanner.pass{color:var(--ok)}.rbanner.fail{color:var(--er)}
.rstats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:1.3rem 0}
.sbox{background:var(--bg);border-radius:8px;padding:11px}.sbox .n{font-size:1.45rem;font-weight:700;color:var(--or)}.sbox .l{font-size:.75rem;color:var(--tx3);margin-top:1px}
.motiv{font-size:3.5rem;margin:1rem 0}
.ract{display:flex;flex-direction:column;gap:9px;margin-top:1.3rem}
canvas#cc{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;display:none}
@media(max-width:580px){.qcard{padding:1.1rem}.tooltip{display:none!important}.rstats{grid-template-columns:1fr 1fr}}
</style></head><body>
<canvas id="cc"></canvas>
<div id="home" class="screen active">
  <div class="hdr"><div class="logo">🩺</div><h1>NRSG 3333 Exam Bank</h1><p>Advanced Health Assessment · Personalized Practice</p></div>
  <div class="card"><h2>⚙️ Configure Your Exam</h2><div id="modcfg"></div><div class="tot">Total questions: <span id="totdisp">0</span></div><button class="btn btn-p btn-full" onclick="startExam()">Start Exam →</button></div>
  <div id="wrongsec" style="display:none"><div class="wcard"><div class="wi"><h3>📋 Review Missed Questions</h3><p>Practice only questions you've answered incorrectly</p></div><div style="text-align:center"><div class="wcnt" id="wcntbdg">0</div><br><button class="btn btn-d btn-sm" style="margin-top:6px" onclick="startWrong()">Review Now</button></div></div></div>
</div>
<div id="exam" class="screen">
  <div id="exam-wrap">
    <div class="exam-top"><h2 id="emlbl">Exam</h2><div class="pbwrap"><div class="pb" id="pb"></div></div><div class="qcnt" id="qcnt">1/10</div></div>
    <div class="scroll"><div class="qcard" id="qcard"></div></div>
  </div>
</div>
<div id="results" class="screen">
  <div class="rcard">
    <div class="scirc"><div class="spct" id="rpct">0%</div><div class="slbl">Score</div></div>
    <div class="rbanner" id="rbanner">—</div>
    <div class="rstats"><div class="sbox"><div class="n" id="rcorr">0</div><div class="l">Correct</div></div><div class="sbox"><div class="n" id="rwrng">0</div><div class="l">Incorrect</div></div><div class="sbox"><div class="n" id="rtot">0</div><div class="l">Total</div></div></div>
    <div class="motiv" id="motivimg">🏥</div>
    <p id="motivtxt" style="font-size:.97rem;color:var(--tx2);margin-bottom:.8rem"></p>
    <div class="ract"><button class="btn btn-p btn-full" onclick="showScreen('home')">← Back to Home</button><button class="btn btn-s btn-full" id="wreviewbtn" style="display:none" onclick="startWrong()">Review Missed Questions</button></div>
  </div>
</div>
<script>
const QB=[
// MODULE 1 — Health Assessment & Fundamentals
{id:1,mod:1,type:"mcq",stem:"When performing a health assessment, what should the nurse do FIRST?",opts:["Auscultate lung sounds","Obtain a complete health history","Perform a head-to-toe physical exam","Review the medication list"],ans:1,why:["Auscultation is objective data gathered AFTER the history.","✓ The health history always comes first — it guides the entire assessment.","Physical exam follows the history.","Medication review is part of the history, not the starting point."],rat:"The health history (subjective data) is obtained first and directs the physical examination. It establishes chief complaint, past medical history, allergies, and current medications.",pearl:"Nursing process order: Assess → Diagnose → Plan → Implement → Evaluate. Within assessment, SUBJECTIVE data (history) always precedes OBJECTIVE data (physical exam)."},

{id:2,mod:1,type:"mcq",stem:"A nurse uses a stick of gum to assess cranial nerve I. Which technique correctly tests CN I?",opts:["Ask the patient to follow the gum with their eyes","Unwrap the gum beside the patient's ear and ask if they hear it","Hold the unwrapped gum near the patient's nose and ask them to identify the smell","Ask the patient to read the words on the gum wrapper"],ans:2,why:["Following an object tests CN III, IV, VI.","Hearing sound tests CN VIII.","✓ CN I (Olfactory) = smell. With eyes closed, the patient identifies the gum's scent (e.g., cinnamon).","Reading tests CN II (Optic)."],rat:"CN I (Olfactory) is responsible for the sense of smell. With eyes closed, hold an odorous item near the nose and ask the patient to identify it.",pearl:"Memory aid for CN I–XII: 'On Old Olympus Towering Tops A Finn And German Viewed Some Hops.' CN I=Olfactory=Smell only."},

{id:3,mod:1,type:"mcq",stem:"To test CN III, IV, and VI simultaneously, the nurse asks the patient to:",opts:["Clench their teeth against resistance","Follow a moving object through 6 cardinal positions of gaze","Identify a familiar scent with eyes closed","Shrug shoulders against resistance"],ans:1,why:["Teeth clenching tests CN V (Trigeminal).","✓ CN III, IV, VI all control extraocular eye movements — all tested by the H-pattern gaze test.","Scent identification tests CN I.","Shoulder shrug tests CN XI."],rat:"CN III (Oculomotor), CN IV (Trochlear), and CN VI (Abducens) collectively control all eye movements. Testing all six cardinal positions of gaze assesses all three nerves.",pearl:"CN III also controls pupil constriction and eyelid elevation (ptosis = CN III palsy). A 'down and out' eye with ptosis = classic CN III palsy — common in posterior communicating artery aneurysm."},

{id:4,mod:1,type:"sata",stem:"Which actions correctly assess cranial nerve function using the stick-of-gum method? (Select ALL that apply)",opts:["Hold gum near nose to assess smell (CN I)","Ask patient to read the wrapper text (CN II)","Move gum through 6 positions of gaze (CN III/IV/VI)","Place gum on tongue to assess taste (CN VII)","Unwrap gum beside each ear to assess hearing (CN VIII)"],ans:[0,1,2,3,4],why:["✓ Smell = CN I","✓ Reading small print = CN II","✓ Eye movements = CN III, IV, VI","✓ Taste = CN VII","✓ Hearing = CN VIII"],rat:"The stick-of-gum technique efficiently assesses all 12 cranial nerves at the bedside. CN XI (shrug) and CN XII (tongue protrusion) can also be assessed in the same encounter.",pearl:"This technique was published in the Journal of Emergency Nursing (2010). A full CN I–XII exam takes under 2 minutes — critical in busy clinical settings."},

{id:5,mod:1,type:"mcq",stem:"A patient says 'ah' and the uvula deviates to the RIGHT. The nurse correctly identifies weakness of:",opts:["Right CN X","Left CN X","Right CN XII","Left CN IX"],ans:1,why:["The uvula DEVIATES AWAY from the weak side. Deviation right = LEFT weakness.","✓ Correct — uvula deviates away from the affected CN X. Deviation to right = left CN X weakness.","CN XII controls tongue movement — tongue deviates TOWARD the weak side.","CN IX helps swallowing but CN X controls uvula elevation."],rat:"CN X (Vagus) controls soft palate and uvula elevation. On saying 'ah,' the uvula should remain midline. Deviation away from the lesion indicates CN X weakness on that side.",pearl:"Contrast: UVULA deviates AWAY from the lesion (CN X). TONGUE deviates TOWARD the lesion (CN XII). This contrast is high-yield for NCLEX neurological questions."},

{id:6,mod:1,type:"fib",stem:"Fill in the blank: The normal documentation phrase for an intact cranial nerve exam is: 'Cranial nerves ___ through ___ grossly intact by physical examination.'",blanks:["First CN number","Last CN number"],ans:["I","XII"],rat:"'Cranial nerves I–XII grossly intact by physical examination' is the standard documentation for a normal cranial nerve assessment. Any abnormal findings require specific documentation of the nerve affected and the exact finding.",pearl:"Always document abnormal CN findings specifically. Example: 'Nystagmus noted on left lateral gaze, CN VI involvement suspected.' Specific documentation is essential for legal protection and care continuity."},

{id:7,mod:1,type:"mcq",stem:"A patient can only see the '200' line on the Snellen chart at 20 feet. Visual acuity is documented as:",opts:["20/20","20/200","200/20","20/40"],ans:1,why:["20/20 = normal vision.","✓ 20/200 = patient sees at 20 ft what a normal eye sees at 200 ft. This is the legal blindness threshold.","Visual acuity is always written 20/X — never reversed.","20/40 = reads the '40' line at 20 feet."],rat:"Snellen notation: numerator = test distance (20 ft); denominator = distance at which normal eye reads that line. 20/200 = legal blindness threshold in the US.",pearl:"Safety considerations for visually impaired patients: orient to environment, keep call light within reach, ensure adequate lighting, use verbal communication, place items consistently."},

{id:8,mod:1,type:"mcq",stem:"When using an otoscope on an adult, the nurse should pull the auricle:",opts:["Down and back","Up and forward","Up and back","Down and forward"],ans:2,why:["Down and back = technique for children under 3.","Up and forward does not straighten the ear canal.","✓ In adults, pull auricle UP and BACK to straighten the ear canal for visualization.","Down and forward is incorrect."],rat:"Adult ear canal curves upward — pulling the auricle up and back straightens it for otoscope insertion. In children under 3, pull down and back (canal curves differently in young children).",pearl:"Classic NCLEX trick: adult = UP and BACK. Child under 3 = DOWN and BACK. The difference in technique reflects anatomical differences in ear canal development."},

{id:9,mod:1,type:"mcq",stem:"The nurse notes a lesion that is raised, fluid-filled, and less than 1 cm in diameter. This is documented as a:",opts:["Macule","Vesicle","Papule","Pustule"],ans:1,why:["Macule = flat, colored spot (freckle).","✓ Vesicle = small (<1 cm), raised, fluid-filled (chickenpox, herpes).","Papule = raised, solid, <1 cm (wart).","Pustule = raised, pus-filled (acne)."],rat:"Primary skin lesions: macule (flat, colored), papule (raised, solid, <1cm), vesicle (fluid-filled, <1cm), bulla (fluid-filled, >1cm), pustule (pus-filled), nodule (solid, deep), plaque (raised, solid, >1cm).",pearl:"Melanoma ABCDE: Asymmetry, Border irregularity, Color variation, Diameter >6mm, Evolution. Any lesion meeting criteria requires dermatology referral."},

{id:10,mod:1,type:"mcq",stem:"For abdominal assessment, the correct sequence is:",opts:["Inspection → Palpation → Percussion → Auscultation","Inspection → Auscultation → Percussion → Palpation","Palpation → Auscultation → Percussion → Inspection","Auscultation → Inspection → Palpation → Percussion"],ans:1,why:["Standard IPPA works for all systems EXCEPT the abdomen.","✓ Abdomen only: Inspect → Auscultate → Percuss → Palpate. Auscultation before palpation prevents altering bowel sounds.","Incorrect sequence.","Incorrect — inspection is always first."],rat:"For the abdomen, auscultation occurs BEFORE palpation and percussion because touching the abdomen can stimulate or inhibit bowel sounds, giving false results.",pearl:"This is a classic NCLEX trap! IPPA for all systems; IAPA for the abdomen. Palpating before auscultating may artificially stimulate or suppress bowel sounds."},

{id:11,mod:1,type:"mcq",stem:"The nurse palpates the precordium and feels a vibrating sensation under the palm. This is documented as a:",opts:["Heave","Thrill","Point of maximal impulse","Friction rub"],ans:1,why:["A heave is a sustained forceful pulsation that displaces the hand — associated with ventricular hypertrophy.","✓ A thrill is a palpable murmur — turbulent blood flow felt through the chest wall. Always associated with Grade IV murmur or higher.","PMI is a brief normal apical impulse.","Friction rub is an auscultated sound (pericarditis)."],rat:"A thrill is a palpable murmur indicating significant turbulence (Grade IV+). It is never normal and requires further evaluation.",pearl:"Murmur grades I–VI: Grade I = barely audible; Grade III = loud without thrill; Grade IV = loud WITH thrill; Grade VI = audible without stethoscope. Any thrill = Grade IV or higher."},

{id:12,mod:1,type:"mcq",stem:"S1 and S2 heart sounds are caused by:",opts:["Opening of the AV and semilunar valves","Closure of the AV valves (S1) and semilunar valves (S2)","Turbulent blood flow through narrowed valves","Atrial and ventricular contractions respectively"],ans:1,why:["Heart sounds are caused by valve CLOSURE, not opening.","✓ S1 (lub) = AV valve closure (mitral + tricuspid) = start of systole. S2 (dub) = semilunar valve closure (aortic + pulmonic) = end of systole.","Turbulent flow = murmur.","S1 and S2 relate to valve events, not directly to muscle contractions."],rat:"S1 = mitral + tricuspid closure = beginning of systole. S2 = aortic + pulmonic closure = end of systole/beginning of diastole. S1 loudest at apex; S2 loudest at base.",pearl:"'Lub-DUB': S1 coincides with carotid pulse upstroke. The shorter gap (S1→S2) = systole. The longer gap (S2→next S1) = diastole at normal heart rates."},

{id:13,mod:1,type:"mcq",stem:"An S3 heart sound is auscultated in a 65-year-old patient with dyspnea and bilateral ankle edema. This finding is most consistent with:",opts:["Normal finding in elderly patients","Left ventricular failure","Aortic stenosis","Pericarditis"],ans:1,why:["S3 is normal in children/young adults. In adults over 40, it is pathological.","✓ S3 (ventricular gallop) = blood rushing into a distended, poorly compliant ventricle = left ventricular failure. 'Ken-tuck-Y' sound.","Aortic stenosis causes a systolic ejection murmur.","Pericarditis causes a friction rub."],rat:"S3 (ventricular gallop) in adults = LV failure, dilated cardiomyopathy, or mitral regurgitation. It occurs early in diastole due to rapid ventricular filling. Sounds like 'Ken-tuck-Y' (S1-S2-S3).",pearl:"S3 = 'Ken-TUCKY' (S1-S2-S3). S4 = 'TEN-nes-see' (S4-S1-S2). S4 occurs late in diastole from atrial contraction into a stiff ventricle — seen in HTN, aortic stenosis, hypertrophic cardiomyopathy."},

{id:14,mod:1,type:"sata",stem:"Which cardiac auscultation locations are CORRECTLY matched? (Select ALL that apply)",opts:["Aortic area — 2nd ICS, right sternal border","Pulmonic area — 2nd ICS, left sternal border","Erb's point — 3rd ICS, left sternal border","Tricuspid area — 4th ICS, left sternal border","Mitral area — 5th ICS, midclavicular line"],ans:[0,1,2,3,4],why:["✓","✓","✓","✓","✓"],rat:"All five cardiac auscultation landmarks: Aortic (2ICS RSB), Pulmonic (2ICS LSB), Erb's Point (3ICS LSB), Tricuspid (4ICS LSB), Mitral/Apical (5ICS MCL). S2>S1 at base; S1>S2 at apex.",pearl:"Mnemonic 'All People Enjoy Time Magazine': Aortic, Pulmonic, Erb's, Tricuspid, Mitral. PMI normally at 5ICS MCL — displaced laterally suggests cardiomegaly."},

{id:15,mod:1,type:"mcq",stem:"A patient has an apical pulse of 108 bpm and a radial pulse of 90 bpm. The nurse documents this as a:",opts:["Pulsus paradoxus","Pulse deficit","Orthostatic hypotension","Sinus arrhythmia"],ans:1,why:["Pulsus paradoxus = >10 mmHg drop in SBP with inspiration (cardiac tamponade).","✓ Pulse deficit = apical rate minus peripheral rate. Some contractions lack enough force to transmit to the periphery. Common in atrial fibrillation.","Orthostatic hypotension = BP drop on standing.","Sinus arrhythmia = normal rate variation with breathing."],rat:"Pulse deficit indicates that some cardiac contractions do not generate adequate stroke volume to produce a palpable peripheral pulse. Most commonly caused by atrial fibrillation. Requires two nurses simultaneously counting apical and radial pulses for 1 full minute.",pearl:"AFib produces an irregularly irregular rhythm. A large pulse deficit (>10) with irregular rhythm should prompt provider notification and assessment for hemodynamic compromise."},

{id:16,mod:1,type:"mcq",stem:"When palpating for the thyroid gland, the nurse should position themselves:",opts:["In front of the patient at eye level","Behind the patient, with fingers on either side of the trachea below the cricoid cartilage","To the side of the patient at shoulder level","In front of the patient with the patient lying supine"],ans:1,why:["Standing in front makes bilateral palpation more difficult.","✓ Standard thyroid palpation = nurse behind patient, fingers on both sides of trachea. Ask patient to swallow — thyroid rises with swallowing.","This position does not allow bilateral assessment.","Supine position is not standard for thyroid palpation."],rat:"Thyroid palpation: stand behind patient, place fingers on either side of trachea below cricoid cartilage. Have patient swallow (sip of water helps) — thyroid rises with swallowing, making nodules and asymmetry easier to detect.",pearl:"Thyroid bruit (auscultated over the thyroid) = increased blood flow → suggests hyperthyroidism/Graves disease. Hyperthyroid signs: tachycardia, weight loss, heat intolerance, tremor, exophthalmos."},

{id:17,mod:1,type:"mcq",stem:"A nurse checks vital signs lying, sitting, and standing. The patient has SBP 135 lying and SBP 108 standing with dizziness. This is:",opts:["Normal positional variation","Orthostatic (postural) hypotension","Hypertensive urgency","A normal finding in athletes"],ans:1,why:["A >20 mmHg systolic drop on standing is NOT normal.","✓ Orthostatic hypotension = SBP drop ≥20 mmHg (or DBP ≥10 mmHg) within 3 minutes of standing, often with symptoms. Major fall risk.","Hypertensive urgency = severely elevated BP.","Athletes may have lower resting BP but not orthostatic drops."],rat:"Orthostatic hypotension causes: dehydration, antihypertensives, diuretics, prolonged bedrest, autonomic neuropathy, aging. Management: rise slowly, dangle legs before standing, increase fluid intake, compression stockings.",pearl:"Orthostatic hypotension is a major fall risk in elderly patients. Teach: dangle legs at bedside, rise slowly, call for assistance. Review medications — antihypertensives and diuretics are common culprits."},

{id:18,mod:1,type:"mcq",stem:"The nurse grades bilateral lower extremity pitting edema. The indentation is 4mm deep and rebounds in 20 seconds. This is graded as:",opts:["+1 pitting edema","+2 pitting edema","+3 pitting edema","+4 pitting edema"],ans:1,why:["+1 = 2–3mm, <15 sec rebound.","+2 = 3–4mm, 15–30 sec rebound — matches this scenario.","✓ Correct","✓+3 = 5–6mm, >30 sec rebound.","+4 = >7mm, may not rebound."],rat:"Pitting edema grading: +1=2-3mm/<15sec; +2=3-4mm/15-30sec; +3=5-6mm/>30sec; +4=>7mm/prolonged. Bilateral edema suggests systemic causes (HF, renal disease, hypoalbuminemia).",pearl:"Unilateral leg edema + warmth + redness = suspect DVT. NEVER massage a suspected DVT — risk of pulmonary embolism. Notify provider and prepare for duplex ultrasound."},

{id:19,mod:1,type:"mcq",stem:"During respiratory assessment, the nurse hears a high-pitched, continuous, musical sound on expiration. This is:",opts:["Crackles","Rhonchi","Wheezing","Stridor"],ans:2,why:["Crackles = discontinuous, non-musical (cellophane crackling) = fluid in alveoli.","Rhonchi = low-pitched, continuous, clears with cough = mucus in large airways.","✓ Wheezing = high-pitched, musical, expiratory = narrowed airways (bronchospasm). Classic in asthma/COPD.","Stridor = high-pitched INSPIRATORY sound = upper airway obstruction = EMERGENCY."],rat:"Wheezing results from airway narrowing (bronchospasm, mucus, foreign body). Predominantly expiratory. Both inspiratory and expiratory wheezing = severe obstruction.",pearl:"Stridor = upper airway emergency. Sudden stridor may indicate anaphylaxis, croup, epiglottitis, or foreign body. Priority: maintain airway, call for help, prepare for intubation."},

{id:20,mod:1,type:"mcq",stem:"The Babinski reflex is tested in an adult patient. The great toe extends upward and the other toes fan out. This finding is:",opts:["Normal in adults","Abnormal — indicates upper motor neuron (UMN) lesion","Normal — indicates adequate spinal cord function","Abnormal — indicates lower motor neuron (LMN) damage"],ans:1,why:["Positive Babinski is normal only in infants up to 12–18 months.","✓ Positive Babinski in adults = pyramidal/corticospinal tract lesion = UMN pathology (stroke, MS, TBI, spinal cord injury).","Normal spinal cord function = negative Babinski (toes curl DOWN).","LMN damage = decreased reflexes, atrophy, fasciculations — negative Babinski."],rat:"Normal adult plantar reflex: toes curl downward (plantar flexion). Positive Babinski (great toe up + toe fanning) = UMN lesion. Part of every stroke assessment.",pearl:"UMN vs LMN: UMN = hyperreflexia, spasticity, positive Babinski, minimal atrophy. LMN = hyporeflexia, flaccidity, atrophy, fasciculations, negative Babinski. Critical NCLEX distinction for neurological questions."},

{id:21,mod:1,type:"mcq",stem:"A nurse is assessing Tanner's Model of Clinical Judgment. Which step involves perceiving what is relevant based on past experience and expectations?",opts:["Responding","Reflecting","Noticing","Interpreting"],ans:2,why:["Responding = deciding what action to take.","Reflecting = thinking back after the situation to learn from it.","✓ Noticing = first step — perceiving what is salient based on clinical knowledge, background, and past experience.","Interpreting = making sense of what was noticed."],rat:"Tanner's 4 steps: Noticing (perceive relevant data) → Interpreting (make sense of data) → Responding (act) → Reflecting (learn). Clinical judgment improves with experience and reflection.",pearl:"Tanner emphasizes that clinical judgment is not just checklist-following — it involves intuition developed through experience. Novice nurses follow protocols; expert nurses perceive subtle cues others miss."},

{id:22,mod:1,type:"mcq",stem:"A patient states, 'I'm worried about my surgery tomorrow.' The nurse's BEST therapeutic response is:",opts:["'Don't worry — your surgeon is excellent.'","'Everything will be fine. Try to relax.'","'Tell me more about what specifically concerns you.'","'Surgery is very common. Most people do great.'"],ans:2,why:["False reassurance — dismisses the patient's concern.","False reassurance — dismissive and non-therapeutic.","✓ Open-ended invitation encourages the patient to elaborate, validate feelings, and builds trust.","Minimizes the patient's fear with comparison — non-therapeutic."],rat:"Therapeutic communication principles: use open-ended questions, validate feelings, avoid false reassurance, maintain non-judgmental presence. 'Tell me more' is a classic therapeutic open-ended technique.",pearl:"NCLEX therapeutic communication: NEVER use false reassurance, changing the subject, asking 'why' questions, or giving unsolicited advice. Always validate feelings first, then gather information."},

{id:23,mod:1,type:"sata",stem:"Which are examples of NON-THERAPEUTIC communication techniques? (Select ALL that apply)",opts:["Giving false reassurance ('It will all be fine')","Using therapeutic silence","Asking 'Why did you stop your medication?'","Offering unsolicited advice","Reflecting the patient's feelings back to them"],ans:[0,2,3],why:["✓ False reassurance dismisses feelings — non-therapeutic.","Silence IS therapeutic — it allows processing.","✓ 'Why' questions sound accusatory and create defensiveness — non-therapeutic.","✓ Unsolicited advice disrespects patient autonomy — non-therapeutic.","Reflecting IS therapeutic — shows active listening."],rat:"Non-therapeutic techniques: false reassurance, 'why' questions, unsolicited advice, changing subject, minimizing feelings, excessive questioning. These create barriers to therapeutic nurse-patient relationship.",pearl:"Replace 'why' with open-ended prompts: Instead of 'Why did you stop your medication?' ask 'Can you help me understand what made it difficult to continue your medication?' This is empowering, not accusatory."},

{id:24,mod:1,type:"mcq",stem:"During a mental status exam, the nurse asks the patient to spell 'WORLD' backwards. This tests:",opts:["Orientation to time","Attention and concentration","Long-term memory","Abstract thinking"],ans:1,why:["Orientation = asking person/place/time questions.","✓ Spelling WORLD backwards (or serial 7s: 100-7-7...) tests attention and concentration — key MSE component.","Long-term memory = asking patient to recall historical personal events.","Abstract thinking = interpreting proverbs or explaining similarities between objects."],rat:"MMSE (Mini-Mental State Examination) tests: orientation, registration, attention/concentration, recall, language, visuospatial ability. Attention deficit = hallmark of DELIRIUM.",pearl:"Attention deficits are the hallmark of DELIRIUM. If patient cannot spell WORLD backwards, suspect acute confusion. Investigate cause immediately: infection, medications, metabolic disturbance, pain, urinary retention."},

{id:25,mod:1,type:"mcq",stem:"A patient is alert, oriented to person and place, but incorrectly states the year. The nurse documents the patient as oriented to:",opts:["×4 (person, place, time, event)","×2 (person and place)","×3 (person, place, time)","×1 (person only)"],ans:1,why:["×4 requires correct person + place + time + event/situation.","✓ ×2 = knows person and place but NOT time. Incorrect year = disoriented to time.","×3 would require correct time — incorrect year means time is wrong.","×1 = knows person only."],rat:"Orientation levels: ×1=person; ×2=person+place; ×3=person+place+time; ×4=person+place+time+event. Orientation to time is typically the first to decline in cognitive impairment.",pearl:"Always document specific orientation responses, not just 'A&O×3.' Example: 'Patient states name correctly, identifies location as hospital, states year as 1985 (incorrect).' Specific documentation supports accurate clinical tracking."},

// MODULE 2 — Cardiac, Respiratory & IV Therapy
{id:26,mod:2,type:"mcq",stem:"On a cardiac monitor, a nurse identifies: no distinct P waves, irregularly irregular rhythm, normal QRS complexes. This rhythm is:",opts:["Normal sinus rhythm","Atrial fibrillation","Atrial flutter","Ventricular tachycardia"],ans:1,why:["NSR = regular, P before every QRS.","✓ AFib = absent P waves, fibrillatory baseline, irregularly irregular R-R intervals.","Atrial flutter = sawtooth flutter waves (250–350 bpm), not fibrillatory baseline.","VT = wide QRS, regular, no P waves, rate 100–250."],rat:"AFib key features: absent P waves, fibrillatory baseline, irregularly irregular ventricular rhythm, normal QRS. AFib increases stroke risk 5-fold due to atrial stasis and clot formation.",pearl:"AFib stroke prevention: CHA₂DS₂-VASc score. Score ≥2 (men) or ≥3 (women) = anticoagulation recommended. Rate control target: resting HR <80 bpm."},

{id:27,mod:2,type:"mcq",stem:"A patient's ECG shows: regular rhythm, rate 38 bpm, P wave before every QRS, normal QRS. This is:",opts:["First-degree AV block","Sinus bradycardia","Junctional rhythm","Third-degree heart block"],ans:1,why:["First-degree block = prolonged PR interval (>0.20 sec), not specifically rate.","✓ Sinus bradycardia = all features of NSR (P before each QRS, normal PR, narrow QRS) but rate <60 bpm.","Junctional = absent/inverted P waves, rate 40–60.","Third-degree = complete P-QRS dissociation."],rat:"Sinus bradycardia: rate <60, originates in SA node. Causes: vagal stimulation, athletes, beta-blockers, hypothyroidism, inferior MI, increased ICP. Treatment only if symptomatic.",pearl:"Symptomatic bradycardia treatment: Atropine 0.5 mg IV → repeat to max 3 mg → transcutaneous pacing → dopamine or epinephrine infusion. Atropine is ineffective for complete heart block."},

{id:28,mod:2,type:"mcq",stem:"A nurse reviews a rhythm strip showing PR intervals that progressively lengthen over several beats until a QRS complex is dropped, after which the cycle resets. Which rhythm does the nurse identify?",opts:["First-degree AV block","Second-degree AV block Type I (Wenckebach)","Second-degree AV block Type II (Mobitz II)","Third-degree heart block"],ans:1,why:["First-degree = consistently prolonged PR without dropped beats.","✓ Wenckebach (Mobitz I): PR progressively lengthens until a QRS drops, then resets. AV node level block.","Mobitz II = constant PR, sudden unexpected QRS drop — more dangerous.","Third-degree = complete P-QRS dissociation."],rat:"Wenckebach pattern: PR gets longer until a beat is dropped, then cycle resets. Mobitz I is relatively benign (AV node issue), often reversible. Mobitz II (infranodal) is more dangerous and may require pacemaker.",pearl:"Heart block poem: 'If the PR is far from P, First degree. Longer longer longer QRS drop = Wenckebach. Some P's don't go through = Mobitz Two. P's and Q's don't agree = Third degree.'"},

{id:29,mod:2,type:"mcq",stem:"A patient has VFib on the monitor and is pulseless. The FIRST intervention is:",opts:["Administer epinephrine 1 mg IV","Defibrillate immediately","Start a lidocaine infusion","Perform synchronized cardioversion"],ans:1,why:["Epinephrine is given every 3–5 min during CPR but defibrillation comes FIRST for shockable rhythms.","✓ VFib = shockable rhythm. Immediate defibrillation + CPR gives the best survival outcome. Every minute without defibrillation decreases survival by ~10%.","Antiarrhythmics (amiodarone preferred) come after defibrillation and CPR.","Synchronized cardioversion is for tachyarrhythmias WITH a pulse — not for pulseless VFib."],rat:"Shockable rhythms: VFib and pulseless VT → immediate defibrillation + CPR. Non-shockable: asystole and PEA → CPR + epinephrine + treat reversible causes.",pearl:"Shockable: VFib, pulseless VT. Non-shockable: asystole, PEA. Remember: you SHOCK VFib/pulseless VT. You do NOT shock asystole or PEA — treat cause and give epinephrine + CPR."},

{id:30,mod:2,type:"mcq",stem:"Using the 300-method on ECG, there are 4 large boxes between R waves. The heart rate is:",opts:["60 bpm","75 bpm","100 bpm","150 bpm"],ans:1,why:["300/5 = 60 bpm.","✓ 300/4 = 75 bpm. Divide 300 by the number of large boxes between R peaks.","300/3 = 100 bpm.","300/2 = 150 bpm."],rat:"300 method (for regular rhythms): 300 ÷ number of large boxes between consecutive R waves = heart rate. Large box = 0.20 sec. For irregular rhythms: count R waves in 6-sec strip × 10.",pearl:"Memorize: 1 box=300, 2=150, 3=100, 4=75, 5=60, 6=50. Normal sinus rhythm = 60–100 bpm, regular, P before each QRS, PR 0.12–0.20 sec, QRS <0.12 sec."},

{id:31,mod:2,type:"mcq",stem:"ST elevation is noted in leads II, III, and aVF on a patient's 12-lead ECG. This pattern indicates:",opts:["Anterior STEMI — LAD occlusion","Inferior STEMI — RCA occlusion","Lateral STEMI — circumflex occlusion","Normal variant early repolarization"],ans:1,why:["Anterior STEMI = ST elevation in V1–V4 (LAD territory).","✓ Inferior STEMI = ST elevation in II, III, aVF — RCA territory. Risk of right ventricular involvement.","Lateral STEMI = I, aVL, V5–V6 (circumflex territory).","Early repolarization may show mild STE but not in context of chest pain."],rat:"STEMI localization: Anterior=V1-V4; Inferior=II,III,aVF; Lateral=I,aVL,V5-V6; Posterior=ST depression V1-V3. Inferior STEMI (RCA) = check V4R for RV involvement.",pearl:"Inferior STEMI + RV involvement: DO NOT give nitroglycerin (patients are preload-dependent — NTG causes severe hypotension). Give IV fluids. Check V4R lead for ST elevation confirming RV infarct. HIGH-YIELD NCLEX!"},

{id:32,mod:2,type:"mcq",stem:"A nurse assesses a PIV site and finds: 3 cm palpable cord, streak formation, purulent drainage. Phlebitis grade is:",opts:["Grade 1","Grade 2","Grade 3","Grade 4"],ans:3,why:["Grade 1 = erythema ± pain only.","Grade 2 = erythema + edema + pain (no cord).","Grade 3 = Grade 2 + streak + palpable cord (no purulent drainage).","✓ Grade 4 = Grade 3 + cord >1 inch + purulent drainage. Remove catheter immediately, culture site, notify provider."],rat:"Phlebitis grading: 0=none; 1=erythema±pain; 2=+edema+pain; 3=+streak+cord; 4=+purulent drainage. Grade 4 represents infectious thrombophlebitis requiring immediate intervention.",pearl:"Grade 4 phlebitis is a potential source of bacteremia/sepsis. Remove catheter, culture site, apply warm compresses, notify provider, monitor for systemic infection signs (fever, tachycardia)."},

{id:33,mod:2,type:"mcq",stem:"A patient's forearm is swollen, cool, and pale around the IV site. The infusion is running slowly. The nurse identifies:",opts:["Phlebitis","Infiltration","Extravasation","Catheter occlusion"],ans:1,why:["Phlebitis = warmth, redness, pain, cord — NOT cool and pale.","✓ Infiltration = IV fluid in surrounding tissue. Signs: swelling, coolness, pallor, taut skin, slowed infusion. Non-vesicant fluid.","Extravasation = vesicant leakage (this is NS — non-vesicant).","Occlusion causes slow infusion but NOT swelling."],rat:"Infiltration: non-vesicant fluid extravasation. Treatment: stop infusion, remove catheter, elevate extremity, warm (hypotonic) or cool (isotonic/hypertonic) compresses per facility policy, restart elsewhere.",pearl:"All extravasations are infiltrations, but not all infiltrations are extravasations. Extravasation = vesicant leakage = tissue necrosis risk. Vesicants: chemotherapy, dopamine, norepinephrine, hypertonic saline, phenytoin."},

{id:34,mod:2,type:"mcq",stem:"A nurse receives an order to administer potassium chloride (KCl) 20 mEq IV to a client with a potassium level of 2.8 mEq/L. Which administration method is safe?",opts:["A diluted piggyback infusion","An IV push","Via infusion pump","Over 1 hour"],ans:1,why:["Diluted piggyback is the correct method.","✓ IV PUSH potassium = FATAL. Causes immediate cardiac arrest. This is one of the most dangerous medication errors in nursing.","Infusion pump use is REQUIRED for KCl.","Infusion over at least 1 hour (10-20 mEq/hr peripherally) is appropriate."],rat:"KCl SAFETY RULES: NEVER IV push, always dilute, always use infusion pump, peripheral max 10-20 mEq/hr, central line max 40 mEq/hr with continuous cardiac monitoring. KCl is a high-alert medication.",pearl:"KCl is on The Joint Commission NPSG high-alert medication list. Must be stored separately, requires double-check, must be diluted. Undiluted KCl vials should NEVER be kept on clinical units."},

{id:35,mod:2,type:"mcq",stem:"A COPD patient's SpO2 is 88% on room air. The nurse prepares to administer oxygen. What is the TARGET SpO2?",opts:["95–100%","88–92%","100%","Above 94% at all times"],ans:1,why:["95–100% is the target for most patients — but not for chronic CO2 retainers.","✓ COPD patients rely on hypoxic drive. Target SpO2 88–92% provides adequate oxygenation without eliminating the hypoxic drive.","100% O2 in COPD can suppress respiratory drive → CO2 narcosis → respiratory arrest.","Above 94% may be appropriate for non-COPD patients but not chronic CO2 retainers."],rat:"COPD and oxygen: chronic CO2 retainers rely on low O2 as respiratory stimulus. Excessive O2 can eliminate this drive → respiratory depression. Target SpO2 88–92%; use low-flow NC 1–2 L/min or Venturi mask.",pearl:"Venturi mask is the MOST PRECISE O2 delivery device — delivers exact FiO2 (24%, 28%, 35%, 40%, 60%). Preferred for COPD. Color-coded adapters indicate FiO2. Never give high-flow O2 to COPD without ABG monitoring."},

{id:36,mod:2,type:"mcq",stem:"A patient's ABG shows: pH 7.29, PaCO2 62, HCO3 28, PaO2 52. The nurse interprets this as:",opts:["Metabolic acidosis with compensation","Respiratory acidosis with metabolic compensation","Respiratory alkalosis with metabolic acidosis","Normal ABG for COPD"],ans:1,why:["Metabolic acidosis = pH low + HCO3 low. Here HCO3 is elevated (compensation).","✓ pH 7.29 = acidosis; PaCO2 62 = elevated (respiratory cause); HCO3 28 = elevated (kidneys compensating). = Respiratory acidosis with partial metabolic compensation.","Respiratory alkalosis = low PaCO2. This patient has HIGH PaCO2.","pH 7.29 is significantly acidotic — not normal even for COPD."],rat:"ABG interpretation: pH<7.35=acidosis; pH>7.45=alkalosis. PaCO2↑=respiratory acidosis; HCO3↑=metabolic alkalosis. Compensation = kidneys retain HCO3 in chronic respiratory acidosis.",pearl:"ROME method: Respiratory=Opposite (pH↑/CO2↓ or pH↓/CO2↑). Metabolic=Equal (pH↑/HCO3↑ or pH↓/HCO3↓). Then check for compensation (opposite system moving in same direction as primary disorder)."},

{id:37,mod:2,type:"mcq",stem:"Left-sided heart failure primarily causes:",opts:["Peripheral edema, JVD, hepatomegaly","Bibasilar crackles, orthopnea, S3 gallop","Fever, productive cough, consolidation","Barrel chest, pursed-lip breathing"],ans:1,why:["Peripheral edema + JVD + hepatomegaly = RIGHT-sided HF (systemic venous congestion).","✓ Left HF → pulmonary congestion: bibasilar crackles, orthopnea, PND, S3, pink frothy sputum in severe cases.","Fever + productive cough + consolidation = pneumonia.","Barrel chest + pursed-lip breathing = COPD/emphysema."],rat:"Left HF → pulmonary backup: crackles, orthopnea (dyspnea when supine), PND (paroxysmal nocturnal dyspnea), S3 gallop, pulmonary edema. Right HF → systemic backup: JVD, hepatomegaly, ankle edema, ascites.",pearl:"HF position: High Fowler's (90°) maximizes lung expansion. Orthopnea: how many pillows does patient use? 2-pillow orthopnea = significant HF. Priority: prescribed diuretics, fluid restriction, daily weights."},

{id:38,mod:2,type:"mcq",stem:"A nurse prepares to administer nitroglycerin to a patient with chest pain. Which assessment is MOST critical before administration?",opts:["Last meal time","Blood pressure and recent phosphodiesterase-5 inhibitor use","Heart rate only","Patient's religious beliefs"],ans:1,why:["Last meal is relevant for procedures, not nitroglycerin.","✓ Nitroglycerin is a vasodilator. Contraindications: SBP <90 mmHg, RV infarction, PDE-5 inhibitor use within 24–48 hours (sildenafil/tadalafil) — combination causes life-threatening hypotension.","Heart rate is important but BP is the critical safety check before NTG.","Religious beliefs are not relevant to NTG administration."],rat:"Always check BP before each NTG dose. Contraindications: SBP<90, HR<50 or >100, RV MI, PDE-5 inhibitors. NTG reduces preload (venodilation) and dilates coronary arteries.",pearl:"ACS mnemonic MONA: Morphine, Oxygen (if SpO2<90%), Nitroglycerin, Aspirin. Note: routine O2 no longer recommended unless hypoxic per current guidelines. Always follow facility protocols and updated guidelines."},

{id:39,mod:2,type:"mcq",stem:"Beck's triad of cardiac tamponade includes:",opts:["Hypertension, bradycardia, widened pulse pressure","Muffled heart sounds, hypotension, distended neck veins","ST elevation, chest pain, diaphoresis","Absent breath sounds, tracheal deviation, hypotension"],ans:1,why:["Hypertension + bradycardia + widened PP = Cushing's triad (increased ICP).","✓ Beck's triad: (1) muffled heart sounds, (2) hypotension, (3) JVD. Pericardial fluid compresses the heart.","ST elevation + chest pain + diaphoresis = STEMI.","Absent breath sounds + tracheal deviation + hypotension = tension pneumothorax."],rat:"Cardiac tamponade: pericardial fluid compresses the heart, preventing diastolic filling. Beck's triad: muffled sounds + hypotension + JVD. Also: pulsus paradoxus >10 mmHg. Treatment: pericardiocentesis.",pearl:"Pulsus paradoxus >10 mmHg = cardiac tamponade sign. Measure with BP cuff: note when Korotkoff sounds first appear (expiration only) then when heard on both inspiration and expiration. The difference = pulsus paradoxus."},

{id:40,mod:2,type:"mcq",stem:"A nurse administers dopamine through a peripheral IV. The patient develops blistering and discoloration around the site. The FIRST action is:",opts:["Apply warm compresses and continue the infusion","Stop the infusion, notify provider, and contact pharmacy for antidote","Aspirate the site with a syringe","Increase the infusion rate to push the medication through"],ans:1,why:["Dopamine is a vesicant — continuing infusion causes further tissue necrosis.","✓ Extravasation: STOP infusion → notify provider → contact pharmacy (phentolamine = antidote for catecholamines) → do NOT remove catheter until antidote administered.","Aspiration does not reverse tissue damage.","Increasing rate dramatically worsens the extravasation injury."],rat:"Extravasation treatment: STOP → call provider → notify pharmacy → DO NOT remove catheter (antidote injected through it) → photograph site → document → follow protocol. Phentolamine reverses catecholamine extravasation.",pearl:"Extravasation antidotes: Catecholamines (dopamine/epi/norepi) → Phentolamine. Vinca alkaloids → Hyaluronidase. Anthracyclines (doxorubicin) → Dexrazoxane. Memorize these pairs — they are clinically and exam-critical."},

{id:41,mod:2,type:"mcq",stem:"A trauma patient needs rapid fluid resuscitation. Which IV catheter provides the fastest flow rate?",opts:["24-gauge (yellow)","22-gauge (blue)","18-gauge (green)","14-gauge (orange/magma)"],ans:3,why:["24-gauge = smallest — pediatric/fragile veins. Very slow.","22-gauge = small — routine meds, not adequate for rapid resuscitation.","18-gauge = large volume infusions but not the maximum.","✓ 14-gauge provides maximum flow rate. Poiseuille's law: flow ∝ radius⁴. Larger bore = dramatically faster flow."],rat:"IV gauge and use: 14=trauma; 16=major surgery/unstable; 18=large volume/transfusion; 20=general/meds/hydration; 22=small veins/short term; 24=pediatric/fragile. Smaller number = larger bore = faster flow.",pearl:"REMEMBER: gauge is inversely proportional to size. 14>18>22 in bore size. Blood transfusion requires minimum 20-gauge (18 preferred). Anything smaller than 22-gauge cannot administer blood products."},

{id:42,mod:2,type:"mcq",stem:"A provider orders an IV infusion to run at 125 mL/hr. The nurse is using macrodrip tubing with a drop factor of 15 gtt/mL. What is the correct drip rate in gtt/min?",opts:["15 gtt/min","31 gtt/min","45 gtt/min","60 gtt/min"],ans:1,why:["15 gtt/min would deliver far less than 125 mL/hr.","✓ Formula: (Volume mL/hr × Drop factor) ÷ 60 = (125 × 15) ÷ 60 = 1875 ÷ 60 = 31.25 ≈ 31 gtt/min.","45 gtt/min is too fast.","60 gtt/min would be 240 mL/hr with 15 gtt/mL tubing."],rat:"IV drip rate formula: (mL/hr × drop factor) ÷ 60 = gtt/min. Macrodrip = 10, 15, or 20 gtt/mL (check package). Microdrip = 60 gtt/mL. At microdrip: gtt/min = mL/hr exactly.",pearl:"Shortcut for 15 gtt/mL: multiply mL/hr × 0.25 (divide by 4). For 10 gtt/mL: divide mL/hr by 6. For microdrip (60 gtt/mL): gtt/min = mL/hr. Practice these for NCLEX math questions."},

{id:43,mod:2,type:"mcq",stem:"A patient receiving vancomycin develops facial flushing, neck redness, and pruritus during the infusion. BP is normal. The nurse identifies this as:",opts:["Anaphylaxis — administer epinephrine","Red man syndrome — slow the infusion and administer diphenhydramine","Grade 4 phlebitis","Stevens-Johnson syndrome"],ans:1,why:["Anaphylaxis = urticaria, angioedema, bronchospasm, hypotension — not just flushing.","✓ Red man syndrome = rate-dependent, non-IgE-mediated mast cell degranulation from rapid vancomycin infusion. Flushing + pruritus only. Treatment: slow infusion + diphenhydramine.","Phlebitis is a local IV site reaction — not a systemic flush.","SJS = severe mucocutaneous reaction with skin sloughing."],rat:"Red man syndrome: flushing, erythema of face/neck/chest, pruritus — occurs with rapid vancomycin infusion. NOT a true allergy. Prevention: infuse over at least 60 minutes. Pre-treat with diphenhydramine.",pearl:"Red man ≠ anaphylaxis. Red man = rate-dependent, flushing only, no hypotension/bronchospasm. Anaphylaxis = IgE-mediated, urticaria, angioedema, bronchospasm, hypotension → epinephrine. Red man → slow rate + Benadryl."},

{id:44,mod:2,type:"mcq",stem:"A patient with a suspected DVT is admitted. The nurse should:",opts:["Vigorously massage the affected calf to relieve discomfort","Notify the provider, elevate the extremity, and avoid massaging","Apply ice and keep the leg dependent","Encourage ambulation to improve circulation"],ans:1,why:["NEVER massage a suspected DVT — risk of pulmonary embolism.","✓ DVT suspected: notify provider, keep patient rested, elevate extremity, measure calf circumference bilaterally, prepare for duplex ultrasound. Do NOT massage.","Ice and dependent position are contraindicated.","Ambulating before DVT is confirmed risks embolization — wait for imaging and orders."],rat:"DVT assessment: unilateral leg swelling, warmth, redness, pain. Homan's sign (calf pain with dorsiflexion) is unreliable and no longer recommended. Confirmed by venous duplex ultrasound. Treatment: anticoagulation.",pearl:"DVT prophylaxis postop: SCDs (sequential compression devices) when in bed, LMWH/enoxaparin, early ambulation, hydration. SCDs must be ON when patient is in bed — verify during rounds. Verify they're actually applied, not just ordered."},

{id:45,mod:2,type:"sata",stem:"Which findings indicate LEFT-sided heart failure? (Select ALL that apply)",opts:["Bibasilar crackles","Jugular venous distension (JVD)","Orthopnea (dyspnea when supine)","S3 gallop","Peripheral pitting edema in both legs"],ans:[0,2,3],why:["✓ Bibasilar crackles = pulmonary congestion = left HF.","JVD = right HF finding (systemic venous congestion).","✓ Orthopnea = pulmonary congestion = left HF.","✓ S3 gallop = LV failure hallmark.","Bilateral peripheral edema = right HF finding."],rat:"Left HF → pulmonary congestion: crackles, orthopnea, PND, S3. Right HF → systemic congestion: JVD, hepatomegaly, bilateral ankle edema, ascites. Most patients eventually develop biventricular failure.",pearl:"Left vs Right HF: Think L=Lungs (left) and R=Remainder of body (right). Left HF backs up into LUNGS → crackles, orthopnea. Right HF backs up into BODY → edema, JVD, hepatomegaly."},

{id:46,mod:2,type:"mcq",stem:"A patient on a loop diuretic has K+ 2.8 mEq/L. The PRIORITY action is:",opts:["Document and continue monitoring","Notify the provider immediately and prepare for potassium replacement","Restrict dietary potassium intake","Administer calcium gluconate"],ans:1,why:["K+ 2.8 is critically low — documentation alone is inadequate.","✓ K+ 2.8 mEq/L is critically low (normal 3.5–5.0). Immediate risk of life-threatening arrhythmias. Notify provider, prepare IV or oral KCl, cardiac monitoring.","Potassium restriction would worsen hypokalemia.","Calcium gluconate is used for HYPERKALEMIA-induced cardiac toxicity, not hypokalemia."],rat:"Hypokalemia (K+ <3.5): loop diuretics cause significant potassium wasting. K+<3.0 = severe arrhythmia risk. ECG changes: flat/inverted T waves, prominent U waves, ST depression. Replace with oral KCl if tolerated; IV KCl for severe cases (NEVER IV push).",pearl:"Hypokalemia ECG: flat T waves + prominent U waves (positive deflection after T wave). HyperKalemia ECG: TALL peaked T waves → widened QRS → sine wave → cardiac arrest. Know both patterns for NCLEX telemetry questions."},

{id:47,mod:2,type:"mcq",stem:"A patient with a chest tube has CONTINUOUS bubbling in the water-seal chamber. This indicates:",opts:["Normal chest tube function","An air leak — check connections or lung not sealed","The lung has fully re-expanded","The chest tube needs replacement"],ans:1,why:["Tidaling (water rising/falling with breathing) is normal. Continuous bubbling is NOT.","✓ Continuous bubbling in water-seal chamber = persistent air leak. Check all connections; if secure, the leak is from the lung (bronchopleural fistula).","Full re-expansion = cessation of tidaling and no bubbling.","Replacing the tube is not the first step — check connections first."],rat:"Chest tube water-seal: Normal = tidaling with respiration. Normal = intermittent bubbling with coughing. ABNORMAL = continuous bubbling = air leak. First: check all connections from insertion site to drainage system.",pearl:"Chest tube complications: occlusion, dislodgement, kinking, continuous air leak. If tube dislodges: cover insertion site with petroleum gauze to prevent open pneumothorax. NEVER clamp a chest tube routinely — risk of tension pneumothorax."},

// MODULE 3 — Loss, Grief, Communication & Ethics
{id:48,mod:3,type:"mcq",stem:"A client receiving hospice care states, 'Why is this happening to me? I've lived a good life!' Which stage of grief does this response reflect?",opts:["Denial","Anger","Bargaining","Acceptance"],ans:1,why:["Denial = 'There must be a mistake.'","✓ Anger = 'Why me? It's not fair!' — directed at God, providers, family. Acknowledge without taking it personally.","Bargaining = 'If I can just... then I'll accept it.'","Acceptance = peaceful readiness to face death."],rat:"Kübler-Ross stages (DABDA): Denial, Anger, Bargaining, Depression, Acceptance. Stages are NOT linear — patients may skip, revisit, or experience multiple simultaneously.",pearl:"Therapeutic response during anger: acknowledge without defending. 'I can hear how angry and frustrated you feel. That makes complete sense given what you're going through.' Never argue or take anger personally."},

{id:49,mod:3,type:"mcq",stem:"A terminally ill patient says, 'If I can just see my grandchild born, I'll accept what comes.' This represents which Kübler-Ross stage?",opts:["Denial","Anger","Bargaining","Depression"],ans:2,why:["Denial = refusing to believe the diagnosis.","Anger = expressing rage about the situation.","✓ Bargaining = 'if...then' condition. Negotiating with God, fate, or medical team for more time or postponement of death.","Depression = quiet sadness and withdrawal."],rat:"Bargaining: 'if I can just...' statements with conditions attached. Often directed at God or fate. Patient accepts reality but tries to negotiate timing/circumstances. Therapeutic: acknowledge hope and emotional needs.",pearl:"Bargaining ≠ denial. The patient accepts the reality but is trying to negotiate. It is a healthy coping mechanism. Therapeutic response: listen actively, acknowledge wishes, involve chaplaincy if appropriate."},

{id:50,mod:3,type:"mcq",stem:"A terminally ill patient is quiet, withdrawn, and stops eating. They say, 'I just feel so sad.' The nurse recognizes this as:",opts:["Clinical depression requiring immediate psychiatric medication","Preparatory depression — a normal part of the dying process","Suicidal ideation requiring immediate assessment","Acceptance stage of grief"],ans:1,why:["Not all sadness in dying patients requires psychiatric medication — context matters.","✓ Preparatory depression = normal grieving of upcoming losses. Different from clinical depression. Treatment: presence, listening, spiritual care.","Sadness about dying ≠ suicidal ideation. However, always assess further if concerned.","Acceptance involves peace and resolution, not sadness."],rat:"Preparatory depression: grieving future losses (leaving loved ones, loss of existence). Normal and expected. Benefits most from presence, listening, meaning-making, and spiritual care rather than medications alone.",pearl:"When a dying patient expresses sadness: sit with them. Don't try to fix it. Don't say 'try to stay positive.' Presence, validation, and active listening are more therapeutic than any intervention. Sometimes silence communicates more than words."},

{id:51,mod:3,type:"mcq",stem:"A patient with a valid DNR order goes into cardiac arrest. The nurse should:",opts:["Start CPR — instincts override legal documents","Verify the valid DNR order and provide comfort measures only","Call family for permission before deciding","Initiate CPR until the physician arrives"],ans:1,why:["Personal instincts do NOT override legally valid advance directives — this is both unethical and illegal.","✓ A valid DNR/DNAR/POLST legally and ethically directs the nurse not to initiate CPR. Provide comfort measures, notify provider, support family.","Family cannot override the patient's own valid advance directive.","CPR against patient's documented wishes = battery."],rat:"Advance directives represent the patient's autonomous right to direct their own care. Nurses are legally and ethically obligated to honor valid advance directives. Document time of death, notify provider, support family.",pearl:"POLST (Physician Orders for Life-Sustaining Treatment) = medical order signed by physician/APRN, immediately actionable in any setting. Living Will = legal document expressing wishes. POLST is more portable and clinically actionable than a living will."},

{id:52,mod:3,type:"mcq",stem:"A patient who is Jehovah's Witness refuses a blood transfusion. The patient is alert and competent. The nurse should:",opts:["Administer the transfusion because it is life-saving","Honor the refusal, document it, notify provider, and explore alternatives","Ask the family to override the patient's decision","Administer the blood while the patient is sleeping"],ans:1,why:["Administering treatment to a competent patient who refuses = BATTERY. Illegal and unethical.","✓ Competent adults have the absolute right to refuse any treatment, even life-saving. Nurse documents refusal, notifies provider, explores alternatives (erythropoietin, iron, cell salvage).","Family cannot override a competent adult's decision.","Administering treatment without consent = battery — always illegal."],rat:"Respect for autonomy: competent adults can refuse any treatment. Document refusal thoroughly, ensure patient has full information, ensure decision is voluntary, explore alternatives, notify provider.",pearl:"Jehovah's Witnesses vary in what they'll accept. Ask specifically: most refuse whole blood, RBCs, WBCs, platelets, plasma. Some accept albumin, clotting factors, autologous blood (cell saver). Never assume — ask the individual patient what they will or won't accept."},

{id:53,mod:3,type:"mcq",stem:"A patient asks, 'Am I going to die soon?' The MOST therapeutic response is:",opts:["'Let's talk about something more positive.'","'Only God knows — try not to worry.'","'Tell me what's making you think about that. What are you feeling?'","'Yes, the doctors say you have about 2 weeks.'"],ans:2,why:["Changing the subject invalidates the patient's concern — non-therapeutic.","Deflecting and minimizing the concern — non-therapeutic.","✓ Open-ended response explores the patient's feelings, knowledge, and needs. This is always the first step before providing information.","Giving a precise prognosis without exploring emotional state first is inappropriate."],rat:"When patients ask difficult end-of-life questions: first explore what they already know, what they're feeling, and what they need. This is the NURSE-FIRST principle. Then provide information tailored to what the patient can hear.",pearl:"SPIKES framework for bad news: Setting, Perception (what does patient know?), Invitation (how much do they want to know?), Knowledge (deliver gently), Emotions (acknowledge empathetically), Strategy/Summary. Apply these principles daily."},

{id:54,mod:3,type:"mcq",stem:"A patient's family asks why their loved one makes a 'gurgling' sound while breathing. The nurse explains:",opts:["This is pain — administer opioids immediately","The patient needs suctioning every 30 minutes","This is the 'death rattle' — a normal dying process change from relaxed oropharyngeal muscles and pooled secretions","This is aspiration pneumonia requiring antibiotics"],ans:2,why:["The death rattle is not reliably associated with pain.","Routine deep suctioning is distressing and NOT recommended for the death rattle.","✓ Death rattle = pooled secretions as swallowing reflex diminishes. Generally not distressing to the patient. Reassure family, reposition patient, glycopyrrolate may be ordered to reduce secretions.","Not pneumonia — a normal physiological change in active dying."],rat:"Active dying signs: mottling, Cheyne-Stokes respirations, death rattle, cooling extremities, decreased consciousness, jaw relaxation. These are expected and irreversible — shift care focus entirely to comfort.",pearl:"Explaining the death rattle to family: 'This sound can be hard to hear, but it doesn't mean your loved one is struggling or in pain. As the body prepares to stop, the swallowing reflex weakens. We can reposition them to help reduce the sound.'"},

{id:55,mod:3,type:"mcq",stem:"Which ethical principle allows a nurse to administer opioids for pain relief even if respiratory depression may occur?",opts:["Justice","Double effect","Non-maleficence","Fidelity"],ans:1,why:["Justice = fair distribution of resources.","✓ Double effect = action intended to produce good (pain relief) may have a foreseeable but unintended negative effect (respiratory depression). Ethically justifiable when intent is good and action is proportionate.","Non-maleficence = do no harm — actually supported here by double effect principle.","Fidelity = keeping commitments and trust."],rat:"Principle of Double Effect: used in palliative/hospice care to ethically justify opioid use when adequate pain control may theoretically shorten life. The PRIMARY intent must be relief of suffering, not hastening death.",pearl:"4 biomedical ethics principles (Beauchamp & Childress): Autonomy (self-determination), Beneficence (do good), Non-maleficence (avoid harm), Justice (fairness). All four may be in tension in end-of-life care — resolved through ethical reasoning."},

{id:56,mod:3,type:"mcq",stem:"A family member calls asking about their relative's HIV diagnosis. The nurse's correct response is:",opts:["Confirm the diagnosis because family needs to know","Deny the patient is hospitalized","Say 'I cannot confirm or deny any patient's diagnosis. Please speak directly with your family member.'","Tell the family to call the provider"],ans:2,why:["Sharing a patient's diagnosis without consent = HIPAA violation.","Denying the patient is hospitalized (if they are) may also violate HIPAA.","✓ Standard HIPAA response: neither confirm nor deny patient information without consent. Patient has the right to control their own information.","Redirecting to the provider may reveal that the person IS a patient — still a potential violation."],rat:"HIPAA protects all patient health information. Exceptions: mandatory reporting (child/elder abuse, communicable diseases), imminent danger to identified third party. Family members do NOT have automatic right to patient information.",pearl:"HIPAA NCLEX tips: Never confirm a patient's room number, diagnosis, or care to callers without patient consent. Provide patients with their Notice of Privacy Practices. Family access = only with patient written permission or when patient is incapacitated."},

{id:57,mod:3,type:"mcq",stem:"A nurse is handing off care to the oncoming nurse using the SBAR communication tool. Which sequence correctly represents the components of SBAR?",opts:["Safety, Baseline, Assessment, Response","Situation, Background, Assessment, Recommendation","Status, Behavior, Action, Results","Summary, Brief, Assessment, Rationale"],ans:1,why:["Incorrect acronym.","✓ SBAR: Situation (what's happening), Background (relevant history), Assessment (clinical impression), Recommendation (what's needed). Standard healthcare communication framework.","Incorrect acronym.","Incorrect acronym."],rat:"SBAR is a standardized communication framework for handoffs and provider calls. It reduces communication errors and improves patient safety. Required by The Joint Commission for patient handoffs.",pearl:"SBAR example calling provider: S='Patient in room 302 has chest pain 8/10'; B='History of CAD, 2 days post-PTCA'; A='I think he may be having an MI — ST elevation in V1-V4'; R='Please come evaluate immediately — I'm activating the cath lab protocol.'"},

{id:58,mod:3,type:"mcq",stem:"A client near the end of life states, 'I'm at peace. I've had a full life.' Which stage of grief does the nurse recognize?",opts:["Denial","Bargaining","Depression","Acceptance"],ans:3,why:["Denial = refusing to believe the diagnosis.","Bargaining = making conditions to postpone death.","Depression = sadness and withdrawal.","✓ Acceptance = patient has processed their grief and faces death with equanimity and peace. Not happiness — peace."],rat:"Acceptance: patient has worked through other stages and reached a place of readiness. The nurse's role: support, be present, not project sadness. Allow the patient to express what this stage means for them.",pearl:"Not all patients reach acceptance — and that's completely valid. The nurse should NEVER try to rush patients through grief stages or imply they 'should' be in acceptance. Meet each patient exactly where they are."},

{id:59,mod:3,type:"mcq",stem:"A nurse suspects elder financial abuse. The PRIORITY action is:",opts:["Confront the suspected abuser directly","Document objective observations and report to Adult Protective Services (APS) and supervisor","Ignore it — it is a family matter","Ask the patient to sign new financial documents"],ans:1,why:["Confronting the abuser may escalate the situation and endanger the patient.","✓ Suspected elder abuse (including financial) must be reported to APS and supervisor. Nurses are mandated reporters for elder abuse in ALL states. Document objective observations.","Elder abuse is NOT a private family matter — it is a public health and legal issue.","Signing new legal documents with a potentially exploited patient is inappropriate and may be invalid."],rat:"Elder abuse types: physical, emotional, sexual, financial, neglect, abandonment. All nurses = mandated reporters in all 50 states. Report to APS based on SUSPICION, not proof. Document objective findings. Do NOT investigate yourself.",pearl:"Signs of elder financial abuse: unexplained changes in financial accounts, new caregiver-controlled accounts, missing valuables, unpaid bills despite adequate income, patient fearful when finances are discussed, caregiver controls all financial decisions."},

{id:60,mod:3,type:"mcq",stem:"A nurse uses a family member to interpret during a medical discussion. This practice:",opts:["Is appropriate if the family member is fluent in both languages","Violates safe care standards — certified medical interpreters must be used","Is acceptable in emergencies only","Is preferred over telephone interpreter services"],ans:1,why:["Fluency alone does not make a family member an appropriate interpreter — they may filter information, lack medical terminology, or compromise privacy.","✓ Using family/friends as interpreters violates Title VI of the Civil Rights Act, HIPAA (patient privacy), and safe care standards. Certified medical interpreters are required.","Emergency exception exists but professional interpreters are still preferred even then.","Professional interpreters are preferred over family in ALL non-emergency situations."],rat:"Medical interpreter services are legally required for limited English proficiency patients (Title VI, Joint Commission standards). Family interpreters may withhold information, introduce bias, lack medical vocabulary, or place themselves in an unfair role.",pearl:"Professional medical interpretation services: in-person interpreters, video remote interpreting (VRI), telephone interpretation (AT&T Language Line — 200+ languages, 24/7). NEVER use a child as an interpreter for a parent's medical care."},

{id:61,mod:3,type:"mcq",stem:"A hospice nurse explains hospice to a family. Which statement BEST describes hospice care?",opts:["Hospice is giving up and means active treatment is being withheld","Hospice is comfort-focused, interdisciplinary care for patients with ≤6 month prognosis that supports both patient and family","Hospice is only available for cancer patients in the last 24 hours of life","Hospice care requires the patient to be moved to a separate facility"],ans:1,why:["Hospice is NOT giving up — it is a meaningful, active shift in the GOAL of care from curing to comfort and quality of life.","✓ Hospice: comfort-focused interdisciplinary care (nursing, social work, chaplaincy, aide, bereavement) for prognosis ≤6 months, patient/family choose comfort over curative treatment.","Hospice is for any terminal diagnosis and typically for months, not just 24 hours.","Hospice is most often provided in the patient's OWN HOME — home, nursing facility, or dedicated hospice."],rat:"Hospice eligibility: prognosis ≤6 months (physician certified), patient/family chooses comfort over cure. Medicare Hospice Benefit covers medications, nursing, social work, aide, chaplaincy, bereavement for 13 months after death.",pearl:"Palliative care vs. hospice: Palliative = comfort alongside curative treatment at any stage. Hospice = specialized palliative care when curative treatment is stopped, prognosis ≤6 months. NCLEX commonly tests this distinction."},

{id:62,mod:3,type:"mcq",stem:"A patient declines a life-sustaining procedure. The nurse personally opposes the patient's choice. The nurse's priority obligation is to:",opts:["Administer treatment according to personal beliefs","Honor the patient's autonomous decision; seek reassignment if morally unable, ensuring no abandonment","Seek ethics committee approval before honoring the decision","Persuade the patient to follow the nurse's recommendation"],ans:1,why:["The nurse's personal beliefs do NOT override the patient's legal right to refuse treatment.","✓ Patient autonomy is paramount. If the nurse cannot personally honor the request due to moral objection, seek reassignment while ensuring the patient is not abandoned and receives appropriate care.","Ethics committee consultation is not required for a competent patient's refusal.","Attempting to override the patient's decision with personal beliefs violates autonomy."],rat:"Conscientious objection: nurses may seek reassignment for procedures conflicting with deeply held moral beliefs, ONLY IF patient is not abandoned and standard of care is maintained. Refusing all care is NOT acceptable.",pearl:"ANA Code of Ethics Provision 1: Respect patient dignity and worth. Provision 5: Maintain own integrity. These provisions must be balanced — patient welfare always takes precedence over nurse's personal values."},

{id:63,mod:3,type:"mcq",stem:"A nurse assesses a terminally ill patient for pain. The patient cannot speak or communicate. The MOST appropriate tool is:",opts:["NRS (0–10 numeric rating scale)","PAINAD (Pain Assessment in Advanced Dementia)","FACES scale","Patient self-report only"],ans:1,why:["NRS requires verbal self-report — not appropriate for non-verbal patients.","✓ PAINAD is validated for non-verbal patients: observes Breathing, Negative Vocalization, Facial Expression, Body Language, Consolability. Score 0–10.","FACES scale requires patient to point to faces — also requires some communication ability.","Self-report is not possible if the patient cannot communicate."],rat:"PAINAD scale: 5 items (breathing, vocalization, facial expression, body language, consolability) each scored 0–2. Total 0–10. Score ≥3 = moderate to severe pain requiring treatment. Never assume non-verbal patients are comfortable.",pearl:"Non-verbal pain scale options: PAINAD (dementia/dying), FLACC (children), CPOT (intubated ICU patients). Any pain score requires treatment and documentation. Treat non-verbal pain before concluding a patient is 'comfortable.'"},

{id:64,mod:3,type:"mcq",stem:"Delirium differs from dementia in which key way?",opts:["Memory impairment is present in delirium but not dementia","Delirium has acute onset with fluctuating course; dementia has gradual progressive onset","Dementia is always reversible with treatment","Delirium only affects elderly patients"],ans:1,why:["Memory impairment occurs in BOTH.","✓ DELIRIUM = acute onset (hours-days), fluctuating (worse at night = sundowning), usually reversible. DEMENTIA = insidious onset, progressive, irreversible.","Dementia is typically irreversible; delirium is usually reversible.","Delirium can occur at any age, though more common in elderly."],rat:"Delirium vs Dementia: Delirium = acute + fluctuating + altered attention + reversible. Dementia = gradual + progressive + memory/cognition + irreversible (typically). CAM (Confusion Assessment Method) screens for delirium.",pearl:"Delirium in hospitalized elderly: incidence 14–56%, associated with increased mortality. Common causes: medications (anticholinergics, benzos), infection (UTI, pneumonia), pain, urinary retention, constipation, immobility. Use the THINK mnemonic: Toxic meds, Hypoxia, Infection, Non-pharma interventions, K+ (electrolytes)."},

{id:65,mod:3,type:"mcq",stem:"A nurse documents care provided. Which practice is CORRECT?",opts:["Use white-out to correct a documentation error","Document in real time using objective, factual, specific language","Complete all documentation at end of shift to save time","Copy the previous nurse's assessment if the patient hasn't changed"],ans:1,why:["White-out NEVER should be used on medical records — draw single line through error, write 'error', initial, date.","✓ Timely, accurate, objective, specific documentation is the gold standard. 'If it's not documented, it wasn't done.'","End-of-shift documentation risks memory errors and doesn't reflect real-time patient status.","Cloning documentation = falsification. Each assessment must reflect current actual findings."],rat:"Documentation standards: accurate, timely (as soon after care as possible), complete, legible, objective, specific. Avoid: generalizations, subjective interpretations without evidence, falsification, copying.",pearl:"Legal documentation principle: 'If it's not documented, it wasn't done.' In malpractice cases, the medical record is the primary evidence. Document objectively: say 'Patient states 7/10 pain' not 'Patient seems to be in pain.'"}
]; // end QB

console.log("Total questions loaded:", QB.length);

// ── STATE ──
let state={exam:[],idx:0,answers:{},wrongBank:{},mode:'exam',wrongOnly:false};
const PASS=73;
const MODS=[
  {id:1,label:"Module 1 — Health Assessment & Fundamentals"},
  {id:2,label:"Module 2 — Cardiac, Respiratory & IV Therapy"},
  {id:3,label:"Module 3 — Loss, Grief, Communication & Ethics"}
];

// ── INIT ──
function init(){
  renderModCfg();
  updateWrongSec();
}

function renderModCfg(){
  const d=document.getElementById('modcfg');
  d.innerHTML=MODS.map(m=>{
    const cnt=QB.filter(q=>q.mod===m.id).length;
    return`<div class="mrow">
      <span class="mbadge">M${m.id}</span>
      <label>${m.label} <span style="color:var(--tx3);font-size:.8rem">(${cnt} available)</span></label>
      <input type="number" min="0" max="${cnt}" value="0" id="m${m.id}cnt" oninput="updateTotal()">
    </div>`;
  }).join('');
  updateTotal();
}

function updateTotal(){
  let t=0;
  MODS.forEach(m=>{const v=parseInt(document.getElementById('m'+m.id+'cnt')?.value)||0;t+=v;});
  document.getElementById('totdisp').textContent=t;
}

function updateWrongSec(){
  const cnt=Object.keys(state.wrongBank).length;
  const s=document.getElementById('wrongsec');
  document.getElementById('wcntbdg').textContent=cnt;
  s.style.display=cnt>0?'block':'none';
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

// ── START EXAM ──
function startExam(){
  let pool=[];
  MODS.forEach(m=>{
    const cnt=parseInt(document.getElementById('m'+m.id+'cnt')?.value)||0;
    if(cnt>0){
      const avail=QB.filter(q=>q.mod===m.id);
      const shuffled=shuffle([...avail]);
      pool=pool.concat(shuffled.slice(0,Math.min(cnt,shuffled.length)));
    }
  });
  if(pool.length===0){alert('Please select at least 1 question from any module.');return;}
  state.exam=shuffle(pool);
  state.idx=0;
  state.answers={};
  state.wrongOnly=false;
  document.getElementById('emlbl').textContent='Exam';
  showScreen('exam');
  renderQ();
}

function startWrong(){
  const wqs=QB.filter(q=>state.wrongBank[q.id]);
  if(wqs.length===0){alert('No incorrect questions recorded yet.');return;}
  state.exam=shuffle([...wqs]);
  state.idx=0;
  state.answers={};
  state.wrongOnly=true;
  document.getElementById('emlbl').textContent='📋 Review: Incorrect Questions';
  showScreen('exam');
  renderQ();
}

function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}return arr;}

// ── RENDER QUESTION ──
function renderQ(){
  const q=state.exam[state.idx];
  const tot=state.exam.length;
  const pct=Math.round((state.idx/tot)*100);
  document.getElementById('pb').style.width=pct+'%';
  document.getElementById('qcnt').textContent=(state.idx+1)+'/'+tot;

  const saved=state.answers[q.id];
  let html='';

  // type badge
  const typeLabels={mcq:'Multiple Choice',sata:'Select All That Apply',fib:'Fill in the Blank'};
