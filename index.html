{id:271,mod:1,type:"hotspot",stem:"A hospice nurse reviews the following assessment of a client with end-stage COPD. Identify ALL findings that indicate the client is in the active dying process and require immediate family notification. Select all that apply.",findings:[{text:"Respirations: Cheyne-Stokes pattern with periods of apnea lasting 20-30 seconds",critical:true},{text:"Temperature: 36.1°C (down from 37.2°C yesterday)",critical:false},{text:"Skin: mottling and cyanosis noted from knees to feet bilaterally",critical:true},{text:"Blood pressure: 88/52 mmHg (baseline was 124/78)",critical:false},{text:"Pupils: sluggish bilaterally",critical:false},{text:"Extremities: cool to touch from mid-calf downward",critical:true},{text:"Client does not respond to verbal stimuli or gentle touch",critical:true},{text:"Urine output: 15 mL over the past 4 hours (dark amber)",critical:false}],ans:[0,2,5,6],rat:"Active dying process signs (Chapter 44 PPTX): Cheyne-Stokes/irregular respirations, mottling and cyanosis, cooling of extremities, and unresponsiveness are the cardinal signs of imminent death. Temperature drop, decreased BP, sluggish pupils, and decreased urine are expected changes but are less specific to the active dying process.",pearl:"Family education: 'These changes tell us the body is naturally shutting down. The changes are expected and not painful.' Therapeutic presence and honest communication are the primary nursing interventions at this stage."},
{id:272,mod:1,type:"hotspot",stem:"A nursing student is conducting a health interview with a client. Review the student's communication behaviors below. Highlight ALL behaviors that require correction by the supervising nurse.",findings:[{text:"Student chews gum while interviewing a client who is deaf and lip-reading",critical:true},{text:"Student sits at eye level and faces the client directly throughout the interview",critical:false},{text:"Student asks: 'You don't have any allergies do you?' while documenting",critical:true},{text:"Student uses therapeutic silence after the client shares difficult news",critical:false},{text:"Student says 'I understand exactly how you feel — I've been through something similar'",critical:true},{text:"Student uses open-ended questions to explore the client's chief complaint",critical:false},{text:"Student stands in the doorway at a distance of 15 feet while asking sensitive questions",critical:true},{text:"Student gives the client adequate time to respond before continuing",critical:false}],ans:[0,2,4,6],rat:"Errors: (1) Chewing gum blocks lip-reading — stated in lecture notes. (2) Leading questions bias the response. (3) 'I understand exactly how you feel' is false empathy — use 'It sounds like this has been very difficult.' (4) Sensitive questions at 15 feet = public zone — personal zone required for health interviews.",pearl:"Proxemics: Personal zone (18in-4ft) for health interviews. Public zone (>12ft) = lectures only. Leading questions bias responses — use open-ended or neutral phrasing. True empathy reflects the feeling without claiming to fully share it."},
{id:273,mod:2,type:"hotspot",stem:"A nurse receives shift report on a client admitted for chest pain evaluation. Review the assessment findings below. Highlight ALL findings that require IMMEDIATE provider notification.",findings:[{text:"BP 164/94 mmHg — client has documented history of hypertension with baseline 158/90",critical:false},{text:"New onset right pupil 6mm fixed and non-reactive; left pupil 3mm and brisk",critical:true},{text:"Heart rate 58 bpm regular with P waves present before every QRS complex",critical:false},{text:"ST elevation of 2mm in leads II III and aVF on the 12-lead ECG",critical:true},{text:"Peripheral oxygen saturation 96% on room air",critical:false},{text:"Client reports new onset crushing substernal chest pain radiating to the left arm",critical:true},{text:"Temperature 37.4°C",critical:false},{text:"Serum troponin trending upward: 0.02 then 0.18 then 1.4 ng/mL over 6 hours",critical:true}],ans:[1,3,5,7],rat:"Critical findings: (1) Unilateral fixed dilated pupil = CN III compression — neurological emergency. (2) ST elevation in II, III, aVF = inferior STEMI — activate cath lab immediately. (3) Crushing chest pain + radiation = ACS until proven otherwise. (4) Rising troponin to 1.4 = myocardial injury confirmed. BP at baseline, HR 58 with P waves, SpO2 96%, temp normal = monitor not immediately critical.",pearl:"Inferior STEMI: ST elevation in II, III, aVF = RCA occlusion. Check right-sided leads (V4R) for right ventricular MI — if present avoid nitrates (RV preload dependent). Rising troponin confirms myocardial necrosis. Door-to-balloon goal: 90 minutes."},
{id:274,mod:2,type:"hotspot",stem:"A nurse is assessing a client 8 hours after a traumatic brain injury. Review the findings below. Highlight ALL findings that represent LATE signs of increased intracranial pressure requiring immediate action.",findings:[{text:"Client is restless and confused — GCS 13 (was 15 on admission)",critical:false},{text:"Blood pressure 188/52 mmHg with widened pulse pressure from baseline 124/78",critical:true},{text:"Heart rate 44 bpm — was 82 bpm on admission",critical:true},{text:"Client reports a constant headache rated 6/10 that worsens with movement",critical:false},{text:"Respirations: irregular ataxic pattern at 6 breaths per minute",critical:true},{text:"Right pupil 7mm fixed and non-reactive; left pupil 4mm sluggish",critical:true},{text:"Left arm drift noted on motor assessment",critical:false},{text:"Decerebrate posturing elicited with painful stimuli",critical:true}],ans:[1,2,4,5,7],rat:"Late ICP signs (Blueprint Chart 61-1): Cushing's triad = widened pulse pressure (BP 188/52) + bradycardia (HR 44) + irregular respirations (ataxic 6/min). Fixed/dilated pupils = CN III compression (herniation). Decerebrate posturing = brainstem-level injury. All LATE signs. Restlessness, confusion, headache, arm drift = EARLY signs.",pearl:"Decerebrate = all extension (brainstem, worse prognosis). Decorticate = arm flexion toward core (cortical, less severe). Cushing's triad = VERY LATE. Act on early signs to PREVENT reaching this point. Once Cushing's triad appears, herniation may already be occurring."},
{id:275,mod:3,type:"hotspot",stem:"A nurse is preparing to administer IV medications and perform IV site care. Review the nursing actions below. Highlight ALL actions that are UNSAFE or INCORRECT and require immediate correction.",findings:[{text:"Nurse primes the IV tubing completely before connecting to the client's catheter",critical:false},{text:"Nurse plans to administer potassium chloride 40 mEq IV push over 5 minutes",critical:true},{text:"Nurse scrubs the needleless connector for 15 seconds with alcohol before accessing",critical:false},{text:"Nurse re-palpates the insertion site with an ungloved finger after chlorhexidine prep",critical:true},{text:"Nurse hangs piperacillin-tazobactam piggyback into a running D5W line without flushing",critical:true},{text:"Nurse documents IV site assessment including gauge location and appearance",critical:false},{text:"Nurse applies warm compresses to a Grade 2 phlebitis site after removing the catheter",critical:false},{text:"Nurse continues dopamine infusion through a peripheral site that is cool pale with burning",critical:true}],ans:[1,3,4,7],rat:"Unsafe actions: (1) KCl IV push is FATAL — always dilute and infuse via pump at 10 mEq/hr max. (2) Re-palpating a cleaned site with ungloved finger = contamination — must reclean. (3) Piperacillin-tazobactam incompatible with dextrose — flush with NS before and after. (4) Continuing dopamine (vesicant) through cool pale burning site = extravasation — stop immediately.",pearl:"IV safety non-negotiables: KCl NEVER IV push. Vesicant extravasation: STOP and keep catheter. No re-palpation after prep without sterile gloves. Piperacillin-tazobactam + dextrose = drug degradation. These are the four highest-stakes IV safety topics on NCLEX."}

{id:276,mod:2,type:"bowtie",

actions:{opts:["Administer atropine 0.5 mg IV push, repeat every 3-5 minutes to a max of 3 mg","Apply transcutaneous pacing pads and prepare for pacing if atropine fails","Perform synchronized cardioversion at 100 joules immediately","Administer adenosine 6 mg rapid IV push","Administer amiodarone 300 mg IV push"],ans:[0,1]},
parameters:{opts:["Heart rate and rhythm on continuous cardiac monitor","Blood pressure and MAP response to treatment","PR interval and QRS duration on 12-lead ECG","Serum potassium and magnesium levels","Urine output as indicator of cardiac output"],ans:[0,1]},

{id:277,mod:2,type:"mcq",

opts:[

],

"✓ Brunner Ch.22: adenosine must be given as a rapid IV bolus into a large proximal vein (antecubital or above) followed immediately by a 20 mL NS flush to drive the drug to the heart before it degrades.",

],
rat:"Adenosine half-life is 6–10 seconds — it is inactivated by red blood cells and endothelial cells almost immediately. Rapid push + immediate flush into a proximal vein gets the drug to the heart before breakdown. Warn the client: they will feel transient chest tightness, flushing, or brief asystole.",
pearl:"If 6 mg fails: give 12 mg rapid push × 2 more doses. Adenosine is contraindicated in second- or third-degree heart block and sick sinus syndrome (without a pacemaker). It is also used diagnostically for atrial flutter — transiently slowing the ventricular rate reveals the sawtooth flutter waves."},

{id:278,mod:2,type:"mcq",

],
ans:1,
why:[

"✓ Brunner Ch.22: AFib causes loss of organized atrial contraction → blood pools in the left atrial appendage → clot formation → stroke risk 5× normal. Anticoagulation prevents this. CHA₂DS₂-VASc ≥2 (men) or ≥3 (women) = anticoagulate.",
"Warfarin has no effect on cardiac contractility.",
"Rate control uses beta-blockers, calcium channel blockers, or digoxin — not warfarin."
],
rat:"Brunner Ch.22: AFib anticoagulation is based on CHA₂DS₂-VASc score: C=CHF, H=HTN, A₂=Age≥75 (×2), D=DM, S₂=Stroke/TIA (×2), V=vascular disease, A=Age 65-74, Sc=Sex category (female). Score ≥2 men / ≥3 women → anticoagulate with warfarin, rivaroxaban, apixaban, or edoxaban.",
pearl:"Warfarin education: take at the same time daily, avoid major dietary changes in vitamin K intake (leafy greens), report bleeding signs (unusual bruising, blood in urine/stool, prolonged bleeding from cuts), keep all INR appointments (target INR 2–3 for AFib). Alcohol and many medications alter warfarin metabolism."},

{id:279,mod:2,type:"sata",
stem:"A nurse is reviewing medications for a client newly prescribed amiodarone. Which potential adverse effects does the nurse include in client education? Select all that apply.",
opts:[

"Nephrotoxicity — monitor BUN and creatinine weekly"
],

why:[
"✓ Amiodarone causes pulmonary fibrosis/toxicity — one of the most serious adverse effects. Monitor with chest X-ray and pulmonary function tests.",
"✓ Amiodarone is 37% iodine by weight — it can cause both hypothyroidism AND hyperthyroidism. Monitor thyroid function every 6 months.",
"✓ Amiodarone deposits in the skin causing blue-gray discoloration and severe photosensitivity. Sunscreen and protective clothing are essential.",
"✓ Amiodarone prolongs the QT interval — risk of torsades de pointes, especially when combined with other QT-prolonging drugs.",
"Nephrotoxicity is NOT a primary adverse effect of amiodarone. Hepatotoxicity (liver damage) is the concern, not renal."
],
rat:"Brunner Ch.22: Amiodarone is a Class III antiarrhythmic used for VFib/pulseless VT and refractory arrhythmias. Major adverse effects: pulmonary toxicity, thyroid dysfunction (hypo or hyper), corneal microdeposits, photosensitivity/blue-gray skin, hepatotoxicity, QT prolongation. Requires monitoring of thyroid, liver, pulmonary function, and ophthalmology.",
pearl:"Amiodarone has an extremely long half-life (40–55 days) — adverse effects can appear months after starting or persist long after stopping. It interacts with warfarin (increases INR), digoxin, and statins. Always check the medication reconciliation carefully when a client is on amiodarone."},

{id:280,mod:2,type:"mcq",
stem:"A client in ventricular fibrillation does not convert after two defibrillation attempts and CPR. The provider orders epinephrine 1 mg IV. Which statement best explains the purpose of epinephrine in this situation?",
opts:[
"Epinephrine directly converts ventricular fibrillation to a perfusing rhythm",
"Epinephrine causes peripheral vasoconstriction, increasing aortic diastolic pressure and improving coronary and cerebral perfusion during CPR",

"Epinephrine acts as a direct antiarrhythmic by stabilizing the ventricular myocardium"
],
ans:1,
why:[
"Epinephrine does not directly convert VFib — defibrillation does that.",
"✓ Epinephrine (alpha-1 agonist effect) causes intense peripheral vasoconstriction → increases aortic diastolic pressure → improves coronary artery perfusion pressure → increases myocardial oxygen delivery during CPR, making defibrillation more likely to succeed.",

"Epinephrine is not classified as an antiarrhythmic — its benefit is hemodynamic, not direct electrical."
],
rat:"Cardiac Rhythms lecture: 'CPR + epinephrine (no shock)' for asystole/PEA. For VFib: CPR + defib + epinephrine 1 mg IV every 3–5 min. The primary mechanism is vasoconstriction improving coronary perfusion pressure, not direct antiarrhythmic action.",
pearl:"ACLS drug sequence for VFib: Defib → CPR → Defib → CPR → Epinephrine 1 mg IV → Defib → CPR → Amiodarone 300 mg IV → Defib → repeat. Epinephrine every 3–5 minutes throughout. Amiodarone 150 mg second dose if needed. Address reversible causes (Hs and Ts)."},

{id:281,mod:2,type:"bowtie",
stem:"A nurse is caring for a client with atrial fibrillation and rapid ventricular response who is receiving an IV diltiazem infusion for rate control. Complete the bowtie clinical judgment.",
condition:{opts:["Atrial fibrillation with stable rate — continue current diltiazem dose","Atrial fibrillation with rapid ventricular response on IV calcium channel blocker","Atrial flutter with 2:1 block requiring cardioversion","SVT with aberrant conduction requiring adenosine"],ans:1},
actions:{opts:["Continuously monitor cardiac rhythm and heart rate response to diltiazem","Hold the infusion and notify the provider if BP falls below 90/60 mmHg or HR below 50 bpm","Increase the diltiazem infusion rate if heart rate does not decrease within 15 minutes","Administer atropine 0.5 mg IV if heart rate drops below 60 bpm","Obtain a 12-lead ECG only after the infusion is complete"],ans:[0,1]},
parameters:{opts:["Heart rate — target rate control 60-100 bpm at rest","Blood pressure — diltiazem causes vasodilation and hypotension","Serum creatinine — diltiazem is renally cleared","Signs of heart failure exacerbation including dyspnea and crackles","Serum potassium — hypokalemia increases AFib recurrence risk"],ans:[0,1]},
why:["CORRECT — Continuous rhythm monitoring is mandatory during IV antiarrhythmic administration to detect excessive rate slowing or AV block.","CORRECT — Diltiazem causes hypotension and bradycardia. Hold parameters must be established and strictly followed.","INCORRECT — Increasing the infusion without provider order is outside nursing scope and dangerously increases hypotension risk.","INCORRECT — Atropine is for symptomatic bradycardia, not for managing rate control. The priority is to hold the diltiazem.","INCORRECT — 12-lead ECG monitoring should be ongoing, not deferred until after the infusion."],
rat:"IV diltiazem for AFib RVR: rate control target 60-100 bpm. Monitor BP (vasodilation effect) and HR continuously. Hold parameters: BP less than 90/60, HR less than 50. Calcium gluconate is the antidote for CCB toxicity — not glucagon (that is for beta-blocker toxicity)."},

{id:282,mod:2,type:"mcq",
stem:"A client receiving digoxin reports nausea, yellow-green visual disturbances, and seeing halos around lights. The client's heart rate is 52 bpm. Which action does the nurse take FIRST?",
opts:[
"Administer the next scheduled digoxin dose and monitor symptoms",
"Reassure the client that visual changes are a common expected side effect of digoxin",
"Hold the digoxin, check the serum digoxin level and potassium, and notify the provider",
"Administer an antiemetic for nausea and continue routine monitoring"
],
ans:2,
why:[
"Administering digoxin with signs of toxicity could be fatal — never give next dose with these symptoms.",
"Visual disturbances (xanthopsia — yellow-green vision, halos) + bradycardia + nausea = classic digoxin toxicity. This is not a routine side effect to reassure away.",
"✓ Classic triad of digoxin toxicity: GI symptoms (nausea, vomiting, anorexia) + visual disturbances (yellow-green tint, halos) + bradyarrhythmias. Action: hold drug, check level (therapeutic 0.5–2 ng/mL), check potassium (hypokalemia potentiates toxicity), notify provider.",
"Treating only the nausea ignores the life-threatening nature of the full toxicity presentation."
],
rat:"Brunner Ch.22: Digoxin has a narrow therapeutic index (0.5–2 ng/mL). Toxicity enhanced by hypokalemia (potassium competes with digoxin at the Na-K ATPase pump). Early toxicity: anorexia, nausea, vomiting. Late: bradyarrhythmias, heart block, life-threatening ventricular arrhythmias. Treatment: hold digoxin, correct electrolytes, DigiFab (digoxin-specific antibody) for severe toxicity.",
pearl:"Hypokalemia + digoxin = dangerous combination. Loop diuretics (furosemide) cause potassium loss → hypokalemia → digoxin toxicity. Always check potassium before giving digoxin. Teaching: report nausea, visual changes, and pulse below 60 bpm. Check pulse for 1 full minute before each dose."},

{id:283,mod:2,type:"mcq",
stem:"A nurse is caring for a client with COPD who is admitted for a COPD exacerbation. The provider orders furosemide 40 mg IV for lower extremity edema. Which laboratory value requires priority notification to the provider?",
opts:[
"Serum sodium 138 mEq/L",
"Serum potassium 2.9 mEq/L",
"BUN 18 mg/dL",
"Serum chloride 101 mEq/L"
],
ans:1,
why:[
"Sodium 138 mEq/L is normal — no concern.",
"✓ Potassium 2.9 mEq/L is significantly below normal (3.5–5.0). Furosemide is a loop diuretic that causes potassium wasting. Giving furosemide with an already low K+ will worsen hypokalemia, risking dangerous dysrhythmias (PVCs, VFib) and paralytic ileus. Notify provider before administering.",
"BUN 18 mg/dL is normal — no concern.",
"Chloride 101 mEq/L is normal — no concern."
],
rat:"Brunner Ch.10: Furosemide (loop diuretic) causes urinary potassium wasting → hypokalemia → metabolic alkalosis. In COPD clients on furosemide, monitor potassium closely. Hypokalemia also produces U waves on ECG and increases risk of digoxin toxicity (if co-prescribed). Replace potassium before administering additional diuretics when K+ is below 3.5.",
pearl:"Furosemide nursing checklist before administration: (1) Check potassium — hold if <3.5 and notify provider. (2) Check blood pressure — furosemide causes significant fluid shift. (3) Ensure the client can reach the bathroom/has a urinal — diuresis begins within 30–60 min IV. (4) Monitor weight daily. (5) Auscultate breath sounds post-administration."},

// ══ MODULE 2 — NEURO/ICP DRUGS ══

{id:284,mod:2,type:"mcq",
stem:"A client with a traumatic brain injury has an ICP of 28 mmHg despite positioning and sedation. The provider orders mannitol 1 g/kg IV. Which assessment finding would cause the nurse to hold this medication and contact the provider?",
opts:[
"Serum osmolality of 298 mOsm/kg",
"Serum osmolality of 325 mOsm/kg",
"Heart rate of 72 bpm",
"Blood pressure of 142/88 mmHg"
],
ans:1,
why:[
"Serum osmolality 298 = normal (normal range 275–295). Mannitol can be safely administered.",
"✓ Mannitol is an osmotic diuretic that draws fluid from brain tissue into the vascular space. It is contraindicated when serum osmolality exceeds 320 mOsm/kg — further osmotic loading risks renal failure and rebound cerebral edema. 325 exceeds the safety threshold.",
"Heart rate 72 is normal — no contraindication to mannitol.",
"BP 142/88 = mild hypertension — expected with increased ICP (Cushing's response). Not a contraindication to mannitol."
],
rat:"Brunner Ch.61: Mannitol reduces ICP through osmotic diuresis — water moves from swollen brain cells into the hypertonic blood. Monitor: serum osmolality (hold >320 mOsm/kg), serum sodium, urine output, ICP, blood pressure. Foley catheter required — mannitol causes massive diuresis.",
pearl:"Mannitol vs. hypertonic saline (3%) for ICP: Both reduce cerebral edema. Mannitol = osmotic diuretic, may cause hypotension with volume depletion. Hypertonic saline = volume-expanding, preferred when ICP elevation is accompanied by hypotension. Monitor serum sodium with both — target Na 145–155 mEq/L for ICP management."},

// ══ MODULE 2 — RESPIRATORY DRUGS ══

{id:285,mod:2,type:"mcq",
stem:"A client with COPD is being counseled on smoking cessation. The nurse teaches the client about varenicline (Chantix). Which statement by the client indicates a need for further teaching?",
opts:[
"I should set a quit date within the first 2 weeks of starting varenicline",
"Varenicline is safe to take with alcohol — it does not interact with it",
"I may experience nausea especially when I first start the medication",
"I should report any changes in mood behavior or suicidal thoughts to my provider right away"
],
ans:1,
why:[
"Setting a quit date within 1–2 weeks of starting is the correct recommendation — no further teaching needed.",
"✓ Varenicline does interact with alcohol — there are reports of increased intoxication and blackouts. This statement is incorrect and indicates a need for further teaching.",
"Nausea is the most common side effect of varenicline — taking it with food and a full glass of water reduces this. This is correct knowledge.",
"Neuropsychiatric adverse effects (mood changes, depression, suicidal ideation) are a serious concern with varenicline — this is correct and important safety teaching."
],
rat:"Brunner COPD pages 606-608: Smoking cessation is the single most cost-effective intervention to reduce COPD risk and progression. Pharmacotherapy includes: nicotine replacement therapy (NRT), bupropion SR, and varenicline (Chantix). Varenicline warning: neuropsychiatric symptoms, alcohol interaction. Bupropion is also used for depression — assess baseline mood.",
pearl:"Smoking cessation counseling: set a quit date, follow up within 3–5 days, combine behavioral counseling + pharmacotherapy (most effective together). Relapse is common — focus on what worked, not failures. NRT forms: patch (24hr), gum, lozenge, inhaler, nasal spray. First-line options: NRT, bupropion, or varenicline. Second-line: nortriptyline."},

// ══ MODULE 3 — IV THERAPY DRUGS ══

{id:286,mod:3,type:"mcq",
stem:"A nurse is preparing to administer potassium chloride (KCl) 20 mEq to a client with a potassium level of 2.8 mEq/L. Which action by the nurse is safe?",
opts:[
"Administer KCl 20 mEq IV push over 3 minutes for rapid correction",
"Add KCl 20 mEq to 50 mL NS and infuse over 15 minutes",
"Dilute KCl 20 mEq in 100 mL NS and administer via infusion pump at 10 mEq/hr",
"Administer KCl 20 mEq undiluted through a central line over 10 minutes"
],
ans:2,
why:[
"IV push KCl causes immediate cardiac arrest from ventricular fibrillation — absolutely never.",
"50 mL over 15 minutes = 80 mEq/hr rate — far exceeds the maximum safe rate. This concentration is also unsafe.",
"✓ Safe KCl administration: minimum dilution 100 mL, infusion pump only, maximum rate 10 mEq/hr peripherally (up to 20 mEq/hr centrally with continuous cardiac monitoring). This option meets all criteria.",
"Undiluted KCl through any line is never acceptable — central or peripheral. Must be diluted."
],
rat:"IV lecture: KCl is a high-alert medication. Rules: NEVER IV push, NEVER undiluted, always via infusion pump, peripheral max 10 mEq/hr, central max 20 mEq/hr with continuous cardiac monitoring, second nurse verification required. Maximum peripheral concentration: 40 mEq per 100 mL.",
pearl:"KCl IV push mechanism of death: high potassium concentrations stop the sodium-potassium pump → depolarization block → cardiac arrest within seconds. This is why KCl is stored separately on clinical units (removed from floor stock) and always requires a pharmacy-prepared, labeled bag."},

{id:287,mod:3,type:"mcq",
stem:"A client develops flushing of the face, neck, and upper chest along with itching 15 minutes after IV vancomycin is started. The infusion has been running at 500 mg over 30 minutes. The client denies shortness of breath and the blood pressure is 118/74 mmHg. Which action does the nurse take FIRST?",
opts:[
"Stop the infusion, call a code, and administer epinephrine 0.3 mg IM",
"Slow the infusion rate to complete the dose over at least 60 minutes and administer diphenhydramine as ordered",
"Increase the infusion rate to complete the dose faster and minimize total exposure time",
"Stop the infusion permanently and document a vancomycin allergy in the chart"
],
ans:1,
why:[
"This is Red Man Syndrome — a rate-related reaction, NOT anaphylaxis. No airway compromise, no hypotension. Epinephrine is not indicated.",
"✓ Red Man Syndrome = mast cell degranulation from rapid vancomycin infusion (not IgE-mediated). Treatment: slow to ≥60 minutes (≤10 mg/min), diphenhydramine. The infusion can continue at the slower rate.",
"Increasing the rate will worsen the reaction — rate reduction is the intervention.",
"Red Man Syndrome is not a true allergy — stopping permanently and documenting an allergy is incorrect and could deprive the client of an important antibiotic in the future."
],
rat:"IV lecture: Vancomycin must be infused over ≥60 minutes to prevent Red Man Syndrome. Pre-medicate susceptible clients with diphenhydramine. Red Man Syndrome = flushing, erythema, pruritus of face/neck/chest — rate-related, not immune-mediated. Distinguish from anaphylaxis (airway compromise, hypotension, urticaria, bronchospasm = epinephrine).",
pearl:"Red Man Syndrome vs. Anaphylaxis: Red Man — slow onset, upper body flushing, no hypotension, no airway compromise → slow rate + diphenhydramine. Anaphylaxis — rapid onset, urticaria, angioedema, bronchospasm, hypotension → STOP, epinephrine IM, call code. Vancomycin can also cause nephrotoxicity and ototoxicity with prolonged use — monitor BUN, creatinine, and auditory function."},

{id:288,mod:3,type:"mcq",
stem:"A nurse is caring for a client whose peripheral IV site shows pallor, coolness, and swelling after dopamine infiltrates. The nurse stops the infusion and keeps the catheter in place. The provider orders phentolamine. Which statement best describes the purpose of this medication?",
opts:[
"Phentolamine is an anticoagulant that dissolves the clot caused by dopamine extravasation",
"Phentolamine is an alpha-adrenergic blocker that reverses catecholamine-induced vasoconstriction and tissue ischemia",
"Phentolamine is a corticosteroid that reduces inflammation from the chemical injury",
"Phentolamine is a vesicant antidote that neutralizes dopamine molecules in the tissue"
],
ans:1,
why:[
"Phentolamine is not an anticoagulant — there is no clot involved in dopamine extravasation.",
"✓ IV lecture: Phentolamine is an alpha-adrenergic BLOCKER. Dopamine causes tissue ischemia via alpha-1 receptor stimulation (intense vasoconstriction). Phentolamine blocks these receptors → vasodilation → restored tissue perfusion → prevents necrosis.",
"Phentolamine is not a corticosteroid — it has no anti-inflammatory mechanism.",
"Phentolamine works on receptors, not by neutralizing dopamine molecules chemically."
],
rat:"IV lecture: Phentolamine antidote is specific to catecholamine extravasation (dopamine, epinephrine, norepinephrine). Injected locally through the existing IV catheter into the extravasated area. Mechanism: alpha-1 blockade → reversal of vasoconstriction → tissue reperfusion. Must be given promptly — delay increases necrosis risk.",
pearl:"Why keep the catheter in for the antidote? Phentolamine is injected THROUGH the existing catheter directly into the extravasated tissue area — this delivers the antidote to exactly where the vasoconstrictive drug is. Removing the catheter first eliminates this treatment route. After antidote is given: THEN remove, photograph, document, monitor site."},

{id:289,mod:3,type:"mcq",
stem:"A nurse is hanging a new bag of phenytoin (Dilantin) for a client with a seizure disorder. The client's current IV is infusing D5W. Which action does the nurse take before starting the phenytoin infusion?",
opts:[
"Connect the phenytoin directly into the existing D5W line — dextrose is compatible with phenytoin",
"Flush the IV line with normal saline before and after phenytoin — phenytoin precipitates in dextrose solutions",
"Mix phenytoin in a 50 mL bag of D5W for a more dilute concentration",
"Phenytoin must be given IV push — it cannot be infused via a secondary line"
],
ans:1,
why:[
"Phenytoin is INCOMPATIBLE with dextrose solutions — mixing or infusing into a D5W line causes precipitation.",
"✓ IV lecture: Phenytoin precipitates in any dextrose-containing solution. Always use 0.9% normal saline. Flush the line with NS before and after to prevent precipitation in the tubing.",
"Mixing phenytoin in D5W would cause immediate precipitation — never do this.",
"Phenytoin CAN be given as an IV infusion — but at a maximum rate of 50 mg/min peripherally and must be in NS, not dextrose."
],
rat:"IV compatibility: Phenytoin precipitates in dextrose solutions (D5W, D10W, D5NS) — this is a physical incompatibility, not a pharmacological interaction. Always use NS for dilution and flushing. Maximum infusion rate: 50 mg/min (25 mg/min in elderly/hypotensive). Monitor ECG during infusion — phenytoin can cause bradycardia and hypotension.",
pearl:"IV incompatibility high-yield list: Phenytoin → NS only (no dextrose). Piperacillin-tazobactam → incompatible with dextrose. Ceftriaxone → incompatible with calcium (fatal in neonates). Amphotericin B → D5W only (incompatible with NS). Vancomycin + beta-lactams → may precipitate (flush between doses). When in doubt — call pharmacy."},

{id:290,mod:3,type:"sata",
stem:"A nurse is reviewing the medication administration record for clients with peripheral IVs. Which medications require a second-nurse verification before administration? Select all that apply.",
opts:[
"Potassium chloride (KCl) 40 mEq in 100 mL NS via infusion pump",
"0.9% normal saline at 125 mL/hr for maintenance hydration",
"Regular insulin 10 units/hr via infusion pump",
"Vancomycin 1 g in 250 mL NS over 90 minutes",
"Unfractionated heparin infusion per weight-based protocol"
],
ans:[0,2,4],
why:[
"✓ KCl is a high-alert medication requiring double verification — IV push KCl is fatal; concentrated electrolytes require second-nurse check of concentration, rate, and pump settings.",
"Plain saline for maintenance hydration is not a high-alert medication — double verification not required.",
"✓ Insulin infusions are high-alert — dosing errors can cause life-threatening hypoglycemia. Double verification of dose, concentration, and pump programming is required.",
"Vancomycin requires careful administration (rate ≥60 min) but is not universally classified as high-alert requiring double verification at most institutions — the infusion rate is the primary safety check.",
"✓ Heparin infusions are high-alert — require weight-based dosing and double verification of concentration, rate, and pump settings. Heparin errors cause serious bleeding."
],
rat:"High-alert medications (Institute for Safe Medication Practices — ISMP) requiring double verification: concentrated electrolytes (KCl, hypertonic saline), insulin infusions, heparin infusions, chemotherapy, anticoagulants, neuromuscular blocking agents, concentrated opioids. These medications have a narrow margin between therapeutic and toxic doses.",
pearl:"ISMP High-Alert Medication list is tested frequently on NCLEX. The 5 highest-alert IV medications: (1) KCl concentrated, (2) Insulin, (3) Heparin, (4) Concentrated NaCl (3%), (5) Neuromuscular blocking agents. All require: independent double check, pump drug library programming, clear labeling, and storage separate from routine medications."},

// ══ MODULE 1 — PALLIATIVE DRUGS ══

{id:291,mod:1,type:"bowtie",
stem:"A hospice nurse is caring for a client with terminal cancer experiencing severe uncontrolled pain. The client's family states they are afraid that increasing the morphine dose will cause their loved one to die sooner. Complete the bowtie clinical judgment.",
condition:{opts:["Opioid toxicity — the current morphine dose is too high","Adequately controlled pain — the family's concerns are clinically valid","Inadequately controlled pain at end of life with family concerns about opioid dosing","Non-opioid analgesic failure requiring procedural intervention"],ans:2},
actions:{opts:["Educate the family about the Principle of Double Effect — the intent is comfort, not to hasten death","Advocate for titrating the morphine dose to achieve adequate pain and symptom control","Withhold the next morphine dose until written family consent is obtained","Reduce the morphine dose to address the family's concerns about hastening death","Refer all pain management decisions to the provider without nursing advocacy"],ans:[0,1]},
parameters:{opts:["Pain level using a validated tool (0-10 numeric scale or PAINAD for nonverbal clients)","Respiratory rate and depth — assess for opioid-induced respiratory depression","Family understanding and their ability to provide care during the active dying phase","Oral intake and signs of dehydration","Bowel function — opioids cause constipation requiring a scheduled bowel regimen"],ans:[0,1]},
why:["CORRECT — The Principle of Double Effect is the foundational ethical justification for palliative opioid use. Intent = comfort.","CORRECT — Nurse advocacy means ensuring adequate pain relief. Undertreating pain at EOL is an ethical failure of beneficence.","INCORRECT — A competent family cannot override a competent client's treatment plan. Withholding ordered medications violates the client's rights.","INCORRECT — Reducing the dose because of family anxiety leaves the client in uncontrolled pain. Violates beneficence and non-maleficence.","INCORRECT — Advocacy is a core nursing responsibility. Referring without advocating abandons the client's best interests."],
rat:"Principle of Double Effect: an action with good intent (comfort) is ethical even if a harmful side effect is theoretically possible — especially when evidence shows adequate opioid dosing does not shorten life. NCLEX: undertreating EOL pain is the greater ethical violation."}
];
